  function dxfCircle32(x,y,r){ return `0\nCIRCLE\n8\nCUT\n10\n${x}\n20\n${y}\n30\n0\n40\n${r}\n`; }
  function dxfText32(x,y,t){ return `0\nTEXT\n8\nTEXT\n10\n${x}\n20\n${y}\n30\n0\n40\n6\n1\n${String(t).replace(/\n/g,' ')}\n`; }
  function rectLines32(x,y,w,h){ return dxfLine32(x,y,x+w,y)+dxfLine32(x+w,y,x+w,y+h)+dxfLine32(x+w,y+h,x,y+h)+dxfLine32(x,y+h,x,y); }
  function makeDxf32(f){
    const pieces=calculateBoxV32(f).cutList; const boardW=Math.max(80,n32(f.stockBoardWidth,300)), boardH=Math.max(80,n32(f.stockBoardHeight,600)); const gap=12;
    let x=12,y=12,rowH=0,out='0\nSECTION\n2\nENTITIES\n'; out += rectLines32(0,0,boardW,boardH);
    pieces.forEach((p,i)=>{ if(x+p.w+12>boardW){ x=12; y+=rowH+gap; rowH=0; } if(y+p.h+30>boardH) return; out += rectLines32(x,y,p.w,p.h); out += dxfText32(x+3,y+8,`#${i+1} ${p.part}`); if(p.pieceKey==='front'&&b32(f.boxHandleHole)) out += rectLines32(x+(p.w-n32(f.boxHandleWidth,70))/2,y+p.h*0.18,n32(f.boxHandleWidth,70),n32(f.boxHandleHeight,18)); if((p.pieceKey==='front'||p.pieceKey==='top')&&b32(f.boxMagnet)){ const r=n32(f.boxMagnetDiameter,6)/2; out += dxfCircle32(x+p.w*.18,y+p.h*.18,r)+dxfCircle32(x+p.w*.82,y+p.h*.18,r); } if((p.pieceKey==='back'||p.pieceKey==='top')&&(b32(f.boxHinge)||String(f.boxLidMode)==='hinge')){ const c=Math.max(1,Math.round(n32(f.boxHingeCount,2))); for(let j=0;j<c;j++){ const cx=x+p.w*(j+1)/(c+1); out += dxfCircle32(cx,y+p.h*.86,2.2)+dxfCircle32(cx+Math.min(16,n32(f.boxHingeHoleSpacing,32)/2),y+p.h*.86,2.2); }} x+=p.w+gap; rowH=Math.max(rowH,p.h+18); });
    out += '0\nENDSEC\n0\nEOF\n'; return out;
  }
  function renderBoxDiagrams32(){ const f=state.resultForm, result=calculateBoxV32(f), items=result.cutList; return `${card32('盒子成品圖 / 三視圖','盒子進階',`上蓋形式、提把孔、磁吸孔、合頁孔位會同步到圖紙。`, previewSvg32(f)+legend32(items))}${card32('板件獨立編號對照裁切清單',`${items.length} 件`,`每塊板件都能保留/移除，也能單獨取消榫卯切割。`,`<table class="v32-table"><thead><tr><th>#</th><th>板件</th><th>尺寸</th><th>說明</th></tr></thead><tbody>${pieceRows32(items)}</tbody></table>`)}${card32('雷射切割圖紙 / 自動排版','SVG / DXF',`依原板尺寸自動把板件排到工作範圍內，可匯出 SVG、DXF 或 PNG 預覽。`,`<div class="btn-row"><button class="secondary" id="v32ExportSvg">匯出 SVG 雷射圖紙</button><button class="secondary" id="v32ExportDxf">匯出 DXF</button><button class="secondary" id="v32ExportPng">匯出 PNG 預覽</button></div>${layoutSvg32(f)}`)}`; }

  function downloadBlob32(name, mime, text){ const blob=new Blob([text],{type:mime}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000); }
  function bindBoxExports32(){
    const svgBtn=document.getElementById('v32ExportSvg'); if(svgBtn) svgBtn.onclick=()=>{ const svg=document.querySelector('.v32-export-svg'); if(!svg){alert('目前沒有 SVG 圖紙');return;} const src=new XMLSerializer().serializeToString(svg); downloadBlob32(`wo-no-mokkou-box-v32-${Date.now()}.svg`,'image/svg+xml;charset=utf-8',src); };
    const dxfBtn=document.getElementById('v32ExportDxf'); if(dxfBtn) dxfBtn.onclick=()=>downloadBlob32(`wo-no-mokkou-box-v32-${Date.now()}.dxf`,'application/dxf',makeDxf32(state.resultForm));
    const pngBtn=document.getElementById('v32ExportPng'); if(pngBtn) pngBtn.onclick=()=>{ const svg=document.querySelector('.v32-export-svg'); if(!svg){alert('目前沒有 PNG 圖紙');return;} let src=new XMLSerializer().serializeToString(svg); if(!src.match(/^<svg[^>]+xmlns=/)) src=src.replace(/^<svg/,'<svg xmlns="http://www.w3.org/2000/svg"'); const blob=new Blob([src],{type:'image/svg+xml;charset=utf-8'}); const url=URL.createObjectURL(blob); const img=new Image(); img.onload=()=>{ const vb=svg.viewBox.baseVal; const c=document.createElement('canvas'); c.width=(vb.width||800)*2; c.height=(vb.height||600)*2; const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height); ctx.drawImage(img,0,0,c.width,c.height); URL.revokeObjectURL(url); const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download=`wo-no-mokkou-box-v32-${Date.now()}.png`; a.click(); }; img.onerror=()=>{URL.revokeObjectURL(url); alert('PNG 匯出失敗');}; img.src=url; };
  }

  const style=document.createElement('style');
  style.textContent=`.v32-card{background:#fffdf9;border:1.5px solid #d5bf95;border-radius:18px;padding:14px;margin-bottom:14px}.v32-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}.v32-tag{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:#efe2c7;border:1px solid #d5bf95;color:#5d4827;font-size:.76rem;font-weight:700}.v32-note{font-size:.86rem;color:#756146;line-height:1.55;margin:8px 0}.v32-svg{width:100%;height:auto;background:#fff;border:1px solid #eee5d7;border-radius:12px}.v32-table{width:100%;border-collapse:collapse;font-size:.85rem}.v32-table th,.v32-table td{padding:8px 10px;border-bottom:1px solid #eadfcf;text-align:left;vertical-align:top}.v32-table th{background:#f7efdf;color:#6b5737;font-size:.78rem}.v32-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.v32-legend span{display:inline-flex;align-items:center;gap:6px;border:1px solid #d5bf95;background:#fff9ef;border-radius:999px;padding:5px 10px;font-size:.78rem;color:#5d4827}.v32-legend i{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:#111;color:#fff;font-size:.72rem;font-style:normal;font-weight:700}`;
  document.head.appendChild(style);

  function scrollToTop32(){ setTimeout(()=>window.scrollTo({top:0,behavior:'smooth'}),80); }
  document.addEventListener('click', ev=>{ const hit=ev.target.closest('.tab, button.primary, button.secondary, .file-btn'); if(!hit) return; if(String(hit.id||'').match(/Export|Import|Backup|Png|Svg|Dxf/i)) return; scrollToTop32(); }, true);

  function applyBrandV32(){
    document.title='我の木工 PWA v32';
    const top=document.querySelector('.hero > div'); if(top) top.textContent='我の木工 PWA v32';
    const h1=document.querySelector('.hero h1'); if(h1) h1.textContent='盒子進階 + SVG/DXF 雷射圖紙版';
    const p=document.querySelector('.hero p'); if(p) p.textContent='加入蓋型細分、自動排版、DXF 匯出、提把孔/磁吸/合頁孔位、內外尺寸切換與按鈕回頂。';
    const foot=document.querySelector('.footer'); if(foot) foot.textContent='PWA v32 盒子進階雷射版｜尺寸單位 mm｜本機儲存 localStorage｜穩定更新';
    document.querySelectorAll('.pwa-mini-version').forEach(x=>x.textContent=APP_VERSION_V32);
  }

  const prevRenderV32=window.render;
  window.render=function(){ const out=prevRenderV32?prevRenderV32.apply(this,arguments):undefined; try{ const view=document.getElementById('view'); if(typeof activeTab!=='undefined' && activeTab==='diagrams' && state.resultForm && state.resultForm.projectType==='box' && view){ view.innerHTML=renderBoxDiagrams32(); bindBoxExports32(); } }catch(e){ console.error('v32 render error',e); } setTimeout(applyBrandV32,0); return out; };
  try{ render=window.render; }catch(e){}
  window.addEventListener('load',()=>setTimeout(applyBrandV32,80));
  applyBrandV32();
})();
</script>
