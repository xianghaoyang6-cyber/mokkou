  calc:{type:'box',width:250,depth:280,height:250,thickness:3,backThickness:5,bottomThickness:3,sizeMode:'outer',boxLid:'hinge',boxJoint:'finger',bottomJoint:'finger',fingerSize:18,kerf:0.065,slideClearance:13,slideLength:350,drawerGap:2,shelfCount:2,doorGap:2,pieceOutput:{},edgeModes:{}},

function num(v,d=0){const x=Number(v);return Number.isFinite(x)?x:d}
function round(v,p=1){const k=Math.pow(10,p);return Math.round(num(v)*k)/k}

function deepMerge(a,b){const out=Array.isArray(a)?a.slice():{...a};Object.keys(b||{}).forEach(k=>{if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k]))out[k]=deepMerge(out[k]||{},b[k]);else out[k]=b[k]});return out}

function save(note='已儲存'){

  const el=$('saveNote');
  if(el)el.textContent='本機儲存：'+note+' '+now;
  if(state&&state.ui){
    state.ui.lastAutoSaveAt=now;
    if(note.includes('輸入')||note.includes('自動'))state.ui.autoSaveStatus='已自動保存 '+now;

  if(autoSaveTimer)clearTimeout(autoSaveTimer);

function analyzeCalcLayout(){
  const info=safeAreaInfo();let pieces=[];
  try{
    pieces=selectedCalcPiecesForLayout();
  }catch(e){
    return {info,pieces:[],normal:[],rotated:[],oversize:[],placed:[],layout:null,error:e.message};
  }
  let lay;
  try{
    lay=nestPieces(pieces,info.area,info.margin);
  }catch(e){
    return {info,pieces,normal:[],rotated:[],oversize:[],placed:[],layout:null,error:e.message};
  }
  const placed=(lay.placed||[]).filter(p=>!p.overflow);
  const normal=placed.filter(p=>!p.rot);
  const rotated=placed.filter(p=>p.rot);
  const oversize=(lay.oversize||[]).map(p=>({...p,origW:num(p.origW??p.w),origH:num(p.origH??p.h),canRotate:!!p.canRotate}));
  return {info,pieces,normal,rotated,oversize,placed,layout:lay,error:null};
}

  else if(warnings.length){level='warn';label='可輸出但需注意';detail='有 '+warnings.length+' 項注意事項，建議切割前確認。';}

function layoutBoardStats(){
  const a=analyzeCalcLayout();
  if(a.error)return {error:a.error,info:a.info,boards:[],a};
  const info=a.info,lay=a.layout||{placed:[],boards:0};
  const placed=(lay.placed||[]).filter(p=>!p.overflow);
  const boardNos=[...new Set(placed.map(p=>p.board))].sort((x,y)=>x-y);
  const maxBoard=Math.max(lay.boards||0,...boardNos,1);
  const boards=[];
  for(let b=1;b<=maxBoard;b++){
    const ps=placed.filter(p=>p.board===b);
    if(!ps.length&&b>boardNos.length)continue;
    const area=ps.reduce((sum,p)=>sum+num(p.w)*num(p.h),0);
    const denom=Math.max(1,num(lay.usable||info.usable)*num(lay.usable||info.usable));
    boards.push({board:b,pieces:ps,area,usage:Math.min(999,area/denom*100)});
  }
  return {info,boards,a,placedCount:placed.length,totalPieces:a.pieces.length,oversizeCount:a.oversize.length,manualCount:manualRotateCount(),rotatedCount:a.rotated.length};
}

function downloadCheckHtml(){return `<div class="download-check"><div>1. 預覽版 SVG：含文字、尺寸線與旋轉提示，適合手機檢查，不建議直接切割。</div><div>2. 乾淨 SVG：移除文字標註與安全框，較適合正式切割。</div><div>3. 分層 SVG：CUT_RED 為切割線，GUIDE_GRAY 為有效區 / 排版區參考框，ENGRAVE_BLACK 為雕刻 / 標記線。</div><div>4. 匯入 LightBurn 後，請確認比例仍為 mm，並確認 280×280 mm 有效區、邊距與板件間距。</div></div>`}
function downloadGuard(scope,kind='SVG'){
  const targetScope=scope||'all';
  const warnings=collectWarnings(targetScope);
  const summary=downloadSummaryText(targetScope,kind||'SVG');
  const status=layoutOutputStatus(targetScope);
  const kindKey=String(kind||'').includes('乾淨')?'clean':String(kind||'').includes('分層')?'layered':'preview';
  const pre=downloadPrecheckItems(targetScope,kindKey);
  const bad=pre.items.filter(i=>i.level==='bad');
  const warn=pre.items.filter(i=>i.level==='warn');
  let msg='【下載前檢查摘要】\n';
  msg+='下載類型：'+pre.kindInfo.label+'\n';
  msg+='輸出狀態：'+status.label+'｜'+status.detail+'\n';
  msg+='檢查結果：正常 '+pre.items.filter(i=>i.level==='ok').length+'｜注意 '+warn.length+'｜錯誤 '+bad.length+'\n\n';
  msg+=summary+'\n\n';
  if(bad.length)msg+='錯誤項目：\n- '+bad.map(i=>i.title+'：'+i.detail).join('\n- ')+'\n\n';
  if(warn.length)msg+='注意項目：\n- '+warn.slice(0,8).map(i=>i.title+'：'+i.detail).join('\n- ')+'\n\n';
  if(warnings.length)msg+='原始檢查提醒：\n- '+warnings.slice(0,8).join('\n- ')+'\n\n';
  msg+='正式切割前請確認尺寸、材料與 LightBurn 比例。\n\n是否繼續下載？';
  return confirm(msg);
}

><button class="secondary" data-action="apply-drawing-knob">套用到圖紙</button></div>`,true)}`}

function smoothClosedPath(pts,t=.2){if(!pts||pts.length<3)return polygonPath(pts||[]);if(t<=0)return polygonPath(pts);const n=pts.length,entry=[],exit=[];for(let i=0;i<n;i++){const prev=pts[(i-1+n)%n],cur=pts[i],next=pts[(i+1)%n];entry.push([cur[0]+(prev[0]-cur[0])*t,cur[1]+(prev[1]-cur[1])*t]);exit.push([cur[0]+(next[0]-cur[0])*t,cur[1]+(next[1]-cur[1])*t]);}let d=`M ${round(entry[0][0],2)} ${round(entry[0][1],2)}`;for(let i=0;i<n;i++){const ni=(i+1)%n;d+=` Q ${round(pts[i][0],2)} ${round(pts[i][1],2)} ${round(exit[i][0],2)} ${round(exit[i][1],2)} L ${round(entry[ni][0],2)} ${round(entry[ni][1],2)}`;}return d+' Z'}
function knobOutlineMarkup(style,cx,cy,d,roundnessPct,kerfOffset=0){const k=Math.max(0,num(kerfOffset,0));const cd=num(d)+2*k;const r=cd/2;const smooth=Math.max(0,Math.min(100,num(roundnessPct,0)))/100;if(style==='round')return `<circle class="cut" cx="${cx}" cy="${cy}" r="${round(r,3)}"/>`;if(style==='bar')return `<rect class="cut" x="${round(cx-cd/2,3)}" y="${round(cy-cd*.225,3)}" width="${round(cd,3)}" height="${round(cd*.45,3)}" rx="${round(cd*(0.12+0.28*smooth),2)}"/>`;const pts=knobPoints(style,cx,cy,r);if(!pts)return '';const t=(style==='hex'?0.05+0.18*smooth:0.06+0.32*smooth);return `<path class="cut" d="${smoothClosedPath(pts,t)}"/>`}
function knobPoints(style,cx,cy,r){if(style==='hex'){let pts=[];for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)])}return pts}if(style==='star'){let pts=[];for(let i=0;i<10;i++){const rr=i%2?r*.55:r;const a=-Math.PI/2+i*Math.PI/5;pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}return pts}if(style==='gear'){let pts=[];for(let i=0;i<32;i++){const rr=i%2?r:r*.86;const a=-Math.PI/2+i*Math.PI/16;pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}return pts}if(style==='flower'){let pts=[];for(let i=0;i<72;i++){const a=-Math.PI/2+i*Math.PI*2/72;const rr=r*(.84+.16*Math.sin(6*a));pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}return pts}return null}
function polygonPath(pts){return 'M '+pts.map(p=>`${round(p[0],2)} ${round(p[1],2)}`).join(' L ')+' Z'}

function updateKnobPreview(fromSlider=false){const boxes=document.querySelectorAll('[data-knob-preview],#knobPreviewBox');boxes.forEach(box=>{box.innerHTML=knobSvgPreview();});const status=document.getElementById('knobLiveStatus');if(status)status.textContent='預覽已同步：'+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});if(fromSlider&&window.requestAnimationFrame){requestAnimationFrame(()=>{document.querySelectorAll('[data-knob-preview],#knobPreviewBox').forEach(box=>{box.innerHTML=knobSvgPreview();});});}}
function knobSvgPreview(){const k=state.knob;const d=num(k.outerDiameter),cx=80,cy=80,ko=Math.max(0,num(k.kerf,0));const holeR=Math.max(0.05,num(k.centerHole)/2-ko);let nut='';if(k.nutShape==='hex'){nut=`<path class="engrave" d="${polygonPath(knobPoints('hex',cx,cy,num(k.nutAcross)/Math.sqrt(3)))}"/>`}else if(k.nutShape==='round'){nut=`<circle class="engrave" cx="${cx}" cy="${cy}" r="${num(k.nutAcross)/2}"/>`}return `<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock()}<rect x="1" y="1" width="158" height="158" fill="#fff" stroke="#eadcc2"/>${knobOutlineMarkup(k.style,cx,cy,d,k.roundness,ko)}<circle class="cut" cx="${cx}" cy="${cy}" r="${round(holeR,3)}"/>${nut}<text class="labelText" x="10" y="148">${esc(knobStyleLabel(k.style))}｜外徑 ${round(d)}｜孔 ${round(k.centerHole)} mm｜補償 ${round(ko,3)}</text></svg>`}

function downloadPrecheckItems(scope='calc',kind='preview'){
  const info=safeAreaInfo();
  const status=layoutOutputStatus(scope);
  const warnings=collectWarnings(scope);
  const kindInfo=downloadKindInfo(kind);
  const items=[];
  const srcLabel=scope==='knob'?'旋鈕':'目前計算結果';
  items.push({level:'ok',title:'下載類型',detail:kindInfo.label+'｜'+kindInfo.use});
  items.push({level:'ok',title:'圖紙來源',detail:srcLabel});
  items.push({level:'ok',title:'排版區',detail:`有效 ${round(info.area)}×${round(info.area)} mm｜邊距 ${round(info.margin)} mm｜實際排版 ${round(info.usable)}×${round(info.usable)} mm｜間距 ${round(info.gap)} mm`});
  if(scope==='knob'){
    const k=state.knob,dia=num(k.outerDiameter,0)+2*Math.max(0,num(k.kerf,0)),gap=info.gap,cols=Math.max(1,Math.floor((info.usable+gap)/(Math.max(1,dia)+gap))),cap=cols*cols,count=Math.max(0,Math.floor(num(k.count,0)));
    items.push({level:count>0?'ok':'warn',title:'旋鈕數量',detail:`目前 ${count} 個｜單片約可放 ${cap} 個｜外徑加補償 ${round(dia,2)} mm`});
  }else{
    const st=pieceOutputStats();
    const s=layoutBoardStats();
    if(s.error){
      items.push({level:'bad',title:'排版摘要',detail:'排版摘要產生失敗，請先檢查尺寸。'});
    }else{
      items.push({level:st.enabledCount>0?'ok':'warn',title:'SVG 輸出板件',detail:`${st.enabledCount}/${st.total} 件｜關閉 ${st.disabledCount} 件`});
      items.push({level:s.oversizeCount?'bad':'ok',title:'超尺寸檢查',detail:`分片 ${s.boards.length} 片｜可排入 ${s.placedCount} 件｜超尺寸 ${s.oversizeCount} 件`});
      items.push({level:'ok',title:'旋轉狀態',detail:`自動旋轉 ${info.autoRotate?'開啟':'關閉'}｜手動指定 ${s.manualCount} 件｜已旋轉 ${s.rotatedCount} 件`});
      items.push({level:info.outputOnlyFit?'ok':'warn',title:'只輸出可放入',detail:info.outputOnlyFit?'開啟：超尺寸板件不會進入 SVG':'關閉：超尺寸板件仍可能出現在預覽中，請確認。'});
    }

  return {items,status,warnings,kindInfo};
}

function flattenPieces(pieces){const out=[];pieces.forEach(p=>{for(let i=0;i<p.qty;i++)out.push({...p,name:p.part+(p.qty>1?' '+(i+1):'')})});return out.sort((a,b)=>Math.max(b.w,b.h)-Math.max(a.w,a.h))}
function basePieceForLayout(p,rot=false,reason=''){
  const w0=num(p.w),h0=num(p.h),mode=getManualRotateMode(p);
  return {...p,origW:w0,origH:h0,w:rot?h0:w0,h:rot?w0:h0,rot:!!rot,fitStatus:rot?'rotated':'normal',rotateReason:reason,manualMode:mode};
}
function fitsBoard(p,usable){return num(p.w)<=usable&&num(p.h)<=usable}
function boardOrientations(raw,usable,autoRotate){
  const mode=getManualRotateMode(raw);
  const normal=basePieceForLayout(raw,false,'');
  const rotated=basePieceForLayout(raw,true,mode==='rotate'?'手動指定':'原方向超出');
  const out=[];
  if(mode==='normal'){
    if(fitsBoard(normal,usable))out.push(normal);
    return out;
  }
  if(mode==='rotate'){
    if(num(raw.w)===num(raw.h)){if(fitsBoard(normal,usable))out.push({...normal,rotateReason:'正方形不需旋轉'});return out;}
    if(fitsBoard(rotated,usable))out.push(rotated);
    return out;
  }
  if(fitsBoard(normal,usable))out.push(normal);
  if(autoRotate&&num(raw.w)!==num(raw.h)&&fitsBoard(rotated,usable))out.push(rotated);
  return out;
}
function orientationFailure(raw,usable,autoRotate){
  const mode=getManualRotateMode(raw),normal=basePieceForLayout(raw,false,''),rotated=basePieceForLayout(raw,true,mode==='rotate'?'手動指定':'原方向超出');
  const normalFits=fitsBoard(normal,usable),rotatedFits=num(raw.w)!==num(raw.h)&&fitsBoard(rotated,usable);
  let p=mode==='rotate'?rotated:normal;
  let problem='超過排版區';
  if(mode==='rotate'&&normalFits&&!rotatedFits)problem='手動旋轉後超尺寸，改回自動或原方向可放入';
  else if(mode==='normal'&&rotatedFits)problem='手動固定原方向後超尺寸，改回自動或旋轉可放入';
  else if(mode==='auto'&&!autoRotate&&rotatedFits)problem='自動旋轉關閉，旋轉後其實可放入';
  return {p,normalFits,rotatedFits,canRotate:rotatedFits,manualMode:mode,problem};
}
function pickOrientationForCurrentRow(raw,usable,autoRotate,remainW,remainH){
  const opts=boardOrientations(raw,usable,autoRotate);
  if(!opts.length)return null;
  const normal=opts.find(p=>!p.rot);
  if(normal&&num(normal.w)<=remainW&&num(normal.h)<=remainH)return normal;
  const rotated=opts.find(p=>p.rot&&num(p.w)<=remainW&&num(p.h)<=remainH);
  if(rotated)return {...rotated,rotateReason:rotated.manualMode==='rotate'?'手動指定':'補入同列'};
  return null;
}
function pickOrientationForNewRow(raw,usable,autoRotate){
  const opts=boardOrientations(raw,usable,autoRotate);
  if(!opts.length)return null;
  const normal=opts.find(p=>!p.rot);
  if(normal)return normal;
  const rotated=opts.find(p=>p.rot);
  return rotated?{...rotated,rotateReason:rotated.manualMode==='rotate'?'手動指定':'原方向超出'}:opts[0];
}
function nestPieces(pieces,area,margin=10){
  margin=Math.max(0,Math.min(num(margin,10),Math.max(0,area/3)));
  const info=safeAreaInfo();const gap=Math.max(0,num(info.gap,8));const autoRotate=info.autoRotate;
  const top=20+margin,bottom=20+area-margin,right=area-margin;
  let x=margin,y=top,rowH=0,placed=[],oversize=[],board=1;
  const usable=Math.max(1,area-2*margin);
  for(const raw of pieces){
    const opts=boardOrientations(raw,usable,autoRotate);
    if(!opts.length){
      const fail=orientationFailure(raw,usable,autoRotate);
      const p={...fail.p,fitStatus:'oversize',canRotate:fail.canRotate,problem:fail.problem,manualMode:fail.manualMode};
      oversize.push({...p,board:null});
      if(x+Math.min(num(p.w),usable)>right){x=margin;y+=rowH+gap;rowH=0}
      if(y+Math.min(num(p.h),usable)>bottom){board++;x=margin;y=top;rowH=0}
      placed.push({...p,x,y,w:num(p.w),h:num(p.h),board,overflow:true});
      x+=Math.min(num(p.w),usable)+gap;rowH=Math.max(rowH,Math.min(num(p.h),usable));
      continue;
    }
    let remainW=right-x, remainH=bottom-y;
    let p=pickOrientationForCurrentRow(raw,usable,autoRotate,remainW,remainH);
    if(!p){
      x=margin;y+=rowH+gap;rowH=0;
      if(y>=bottom){board++;x=margin;y=top;}
      p=pickOrientationForNewRow(raw,usable,autoRotate);
      if(!p){
        const fail=orientationFailure(raw,usable,autoRotate);const o={...fail.p,fitStatus:'oversize',canRotate:fail.canRotate,problem:fail.problem,manualMode:fail.manualMode};
        oversize.push({...o,board:null});placed.push({...o,x,y,w:num(o.w),h:num(o.h),board,overflow:true});
        x+=Math.min(num(o.w),usable)+gap;rowH=Math.max(rowH,Math.min(num(o.h),usable));continue;
      }
      if(y+num(p.h)>bottom){board++;x=margin;y=top;rowH=0;}
    }
    placed.push({...p,x,y,w:num(p.w),h:num(p.h),board,overflow:false});
    x+=num(p.w)+gap;rowH=Math.max(rowH,num(p.h));
  }
  return {placed,oversize,boards:board,margin,usable,gap,autoRotate}
}

function segmentCount(len,tooth){
  tooth=Math.max(4,num(tooth,18));
  let n=Math.max(1,Math.round(Math.abs(len)/tooth));
  if(n<1)n=1;
  return n;
}
function pushTopEdge(pts,x,y,w,tooth,depth,mode){
  if(mode==='flat'){pts.push([x+w,y]);return}
  const n=segmentCount(w,tooth),step=w/n;
  for(let i=0;i<n;i++){
    const a=x+i*step,b=x+(i+1)*step;
    if(i%2===0){const yy=mode==='out'?y-depth:y+depth;pts.push([a,yy],[b,yy],[b,y])}
    else pts.push([b,y]);
  }
}
function pushRightEdge(pts,x,y,h,tooth,depth,mode){
  if(mode==='flat'){pts.push([x,y+h]);return}
  const n=segmentCount(h,tooth),step=h/n;
  for(let i=0;i<n;i++){
    const a=y+i*step,b=y+(i+1)*step;
    if(i%2===0){const xx=mode==='out'?x+depth:x-depth;pts.push([xx,a],[xx,b],[x,b])}
    else pts.push([x,b]);
  }
}
function pushBottomEdge(pts,x,y,w,tooth,depth,mode){
  if(mode==='flat'){pts.push([x,y]);return}
  const n=segmentCount(w,tooth),step=w/n;
  for(let i=0;i<n;i++){
    const a=x+w-i*step,b=x+w-(i+1)*step;
    if(i%2===0){const yy=mode==='out'?y+depth:y-depth;pts.push([a,yy],[b,yy],[b,y])}
    else pts.push([b,y]);
  }
}
function pushLeftEdge(pts,x,y,h,tooth,depth,mode){
  if(mode==='flat'){pts.push([x,y]);return}
  const n=segmentCount(h,tooth),step=h/n;
  for(let i=0;i<n;i++){
    const a=y+h-i*step,b=y+h-(i+1)*step;
    if(i%2===0){const xx=mode==='out'?x-depth:x+depth;pts.push([xx,a],[xx,b],[x,b])}
    else pts.push([x,b]);
  }
}
function fingerRectPath(x,y,w,h,tooth,depth){
  return fingerRectPathByEdges(x,y,w,h,tooth,depth,{top:'out',right:'out',bottom:'out',left:'out'});
}
function fingerRectPathByEdges(x,y,w,h,tooth,depth,edges){
  tooth=Math.max(4,num(tooth,18));
  depth=Math.max(1,Math.min(num(depth,3),Math.min(w,h)/4));
  edges=edges||{top:'flat',right:'flat',bottom:'flat',left:'flat'};
  const pts=[[x,y]];
  pushTopEdge(pts,x,y,w,tooth,depth,edges.top||'flat');
  pushRightEdge(pts,x+w,y,h,tooth,depth,edges.right||'flat');
  pushBottomEdge(pts,x,y+h,w,tooth,depth,edges.bottom||'flat');
  pushLeftEdge(pts,x,y,h,tooth,depth,edges.left||'flat');
  return 'M '+pts.map(p=>`${round(p[0],2)} ${round(p[1],2)}`).join(' L ')+' Z';
}

function dimensionMarkup(p,ox){const x=ox+p.x,y=p.y,w=num(p.w),h=num(p.h);const bx=y+h+8,rx=x+w+8;const midX=x+w/2,midY=y+h/2;return `<g class="dimMark"><line class="dimLine" x1="${x}" y1="${bx}" x2="${x+w}" y2="${bx}"/><line class="dimTick" x1="${x}" y1="${bx-3}" x2="${x}" y2="${bx+3}"/><line class="dimTick" x1="${x+w}" y1="${bx-3}" x2="${x+w}" y2="${bx+3}"/><text class="dim" text-anchor="middle" x="${midX}" y="${bx+10}">${round(w)} mm</text><line class="dimLine" x1="${rx}" y1="${y}" x2="${rx}" y2="${y+h}"/><line class="dimTick" x1="${rx-3}" y1="${y}" x2="${rx+3}" y2="${y}"/><line class="dimTick" x1="${rx-3}" y1="${y+h}" x2="${rx+3}" y2="${y+h}"/><text class="dim" x="${rx+4}" y="${midY}">${round(h)} mm</text></g>`}

function rotateReasonShort(reason){
  if(!reason)return '';
  const map={'手動指定':'手動','自動判斷':'自動','排版判斷':'自動','手動旋轉':'手動'};
  return map[reason]||String(reason).replace('手動指定','手動').replace('自動判斷','自動');
}
function pieceMetaLineY(p){

}
function pieceJointLabel(p,ox){if(!(p.sourceType==='box'&&p.joint==='finger'))return '';return `<text class="dim" x="${ox+p.x+3}" y="${p.y+pieceMetaLineY(p)}">榫齒 ${round(p.fingerSize)} mm</text>`}
function kerfOffsetForPiece(p){if(p.sourceType==='box')return Math.max(0,num(state.calc.kerf,0));return 0}
function compensatedPieceBox(p,ox){const k=kerfOffsetForPiece(p);return {x:round(ox+p.x-k,3),y:round(p.y-k,3),w:round(num(p.w)+2*k,3),h:round(num(p.h)+2*k,3),k}}
function pieceCutMarkupRaw(p,ox){const g=compensatedPieceBox(p,ox);const hasEdges=p.sourceType==='box'&&p.joint==='finger'&&p.edgeModes;const allFinger=p.sourceType==='box'&&p.joint==='finger'&&p.fingerEdges==='all';if(hasEdges){const d=fingerRectPathByEdges(g.x,g.y,g.w,g.h,p.fingerSize,p.jointDepth,p.edgeModes);return `<path class="cut" d="${d}"/>`;}if(allFinger){const d=fingerRectPath(g.x,g.y,g.w,g.h,p.fingerSize,p.jointDepth);return `<path class="cut" d="${d}"/>`;}return `<rect class="cut" x="${g.x}" y="${g.y}" width="${g.w}" height="${g.h}"/>`}
function pieceCutMarkup(p,ox,opts={}){if(p.rot){const local={...p,x:0,y:0,w:p.origW||p.h,h:p.origH||p.w};const tx=round(ox+p.x+p.w,3),ty=round(p.y,3);return `<g transform="translate(${tx},${ty}) rotate(90)">${pieceCutMarkupRaw(local,0)}</g>`;}return pieceCutMarkupRaw(p,ox)}

function layoutSvg(opts={}){const showLabels=opts.labels!==false,showNotes=opts.notes!==false&&showLabels;const area=num(state.drawing.effectiveArea,280),margin=Math.max(0,num(state.drawing.margin,10)),info=safeAreaInfo(),res=calcResult(),pieces=selectedCalcPiecesForLayout();const lay=nestPieces(pieces,area,margin);const W=area*lay.boards+20*(lay.boards+1),H=area+(showNotes?86:24);let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock()}`;for(let b=1;b<=lay.boards;b++){const ox=20+(b-1)*(area+20);const boardPieces=(lay.placed||[]).filter(p=>p.board===b && !(info.outputOnlyFit&&p.overflow));const fitPieces=boardPieces.filter(p=>!p.overflow);const usedArea=fitPieces.reduce((sum,p)=>sum+num(p.w)*num(p.h),0);const usage=usedArea/Math.max(1,num(lay.usable)*num(lay.usable))*100;s+=`<rect x="${ox}" y="20" width="${area}" height="${area}" fill="#fff" stroke="#b88a44" stroke-width="1.5"/>${showLabels&&info.showSafeFrame?`<rect class="safe-frame" x="${ox+margin}" y="${20+margin}" width="${Math.max(1,area-2*margin)}" height="${Math.max(1,area-2*margin)}"/>`:''}`;if(showLabels)s+=`<text class="labelText" x="${ox}" y="15">第 ${b} 片｜有效 ${area}×${area} mm｜邊距 ${margin} mm｜排版區 ${round(lay.usable)}×${round(lay.usable)}｜使用率 ${round(usage,1)}%</text>`;boardPieces.forEach(p=>{s+=pieceCutMarkup(p,ox,{labels:showLabels});if(showLabels){const nameTags=[];if(p.overflow)nameTags.push('超尺寸');const nameLine=`${esc(p.name)}${nameTags.length?'｜'+nameTags.join('｜'):''}`;s+=`<text class="labelText" x="${ox+p.x+3}" y="${p.y+12}">${nameLine}</text>`;s+=`<text class="dim" x="${ox+p.x+3}" y="${p.y+p.h-4}">${round(p.w)}×${round(p.h)} mm${p.rot?'｜原 '+round(p.origW)+'×'+round(p.origH):''}</text>`;if(p.rot)s+=`<text class="rot-tag" x="${ox+p.x+3}" y="${p.y+24}">已旋轉 90°${p.rotateReason?'｜'+esc(rotateReasonShort(p.rotateReason)):''}</text>`;s+=pieceJointLabel(p,ox);s+=dimensionMarkup(p,ox);}});}const jointNote=state.calc.type==='box'?`｜盒子接合：${state.calc.boxJoint==='finger'?'榫卯 function knobBatchSvg(opts={}){const showLabels=opts.labels!==false;const area=num(state.drawing.effectiveArea,280),margin=Math.max(0,num(state.drawing.margin,10)),usable=Math.max(1,area-2*margin),k=state.knob,d=num(k.outerDiameter),ko=Math.max(0,num(k.kerf,0)),cd=d+2*ko,gap=Math.max(0,num(state.drawing.pieceGap,8));const cols=Math.max(1,Math.floor((usable+gap)/(cd+gap))),rows=Math.ceil(num(k.count)/cols);const H=Math.max(area+(showLabels?40:20),rows*(cd+gap)+(showLabels?60:40));let s=`<svg viewBox="0 0 ${area+40} ${H}" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock()}${showLabels?`<rect x="20" y="20" width="${area}" height="${area}" fill="#fff" stroke="#b88a44" stroke-width="1.5"/>`:`<rect class="guide" x="20" y="20" width="${area}" height="${area}"/>`}`;if(showLabels)s+=`<rect class="safe-frame" x="${20+margin}" y="${20+margin}" width="${usable}" height="${usable}"/><text class="labelText" x="20" y="15">旋鈕排版｜有效 ${area}×${area} mm｜邊距 ${margin} mm</text>`;for(let i=0;i<num(k.count);i++){const c=i%cols,r=Math.floor(i/cols),cx=20+margin+cd/2+c*(cd+gap),cy=20+margin+cd/2+r*(cd+gap);if(cx+cd/2>20+area-margin||cy+cd/2>20+area-margin)continue;const holeR=Math.max(0.05,num(k.centerHole)/2-ko);s+=knobOutlineMarkup(k.style,cx,cy,d,k.roundness,ko)+`<circle class="cut" cx="${cx}" cy="${cy}" r="${round(holeR,3)}"/>`;if(k.nutShape==='hex')s+=`<path class="engrave" d="${polygonPath(knobPoints('hex',cx,cy,num(k.nutAcross)/Math.sqrt(3)))}"/>`;else if(k.nutShape==='round')s+=`<circle class="engrave" cx="${cx}" cy="${cy}" r="${num(k.nutAcross)/2}"/>`;}

function selfCheckTry(title,fn){
  try{
    const result=fn();
    if(result===true)return {level:'ok',title,detail:'正常'};
    if(result&&typeof result==='object')return {level:result.level||'ok',title,detail:result.detail||'正常'};
    return {level:'ok',title,detail:String(result||'正常')};
  }catch(err){
    return {level:'bad',title,detail:(err&&err.message)?err.message:String(err)};
  }
}

function viewBlock(x,y,w,h,title,realW,realH,axisLabel,note){
  realW=Math.max(1,num(realW));
  realH=Math.max(1,num(realH));
  const innerX=x+16, innerY=y+16, innerW=w-32;
  const drawAreaTop=y+58;
  const drawAreaBottom=y+h-78;
  const drawAreaH=Math.max(60,drawAreaBottom-drawAreaTop);
  const drawAreaW=innerW-90;
  const scale=Math.min(drawAreaW/realW, drawAreaH/realH);
  const dw=Math.max(36,realW*scale);
  const dh=Math.max(36,realH*scale);
  const dx=x+(w-dw)/2-20;
  const dy=drawAreaTop+(drawAreaH-dh)/2;
  const rightX=dx+dw+16;
  const bottomY=dy+dh+18;
  const dimLabel=`${round(realW)} × ${round(realH)} mm`;
  return `
  <g>
    <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="18" fill="#fcfaf4" stroke="#e5d7b8"/>
    <text class="labelText" x="${innerX}" y="${innerY+13}" style="font-size:15px;font-weight:800">${title}</text>
    <text class="dim" x="${innerX+86}" y="${innerY+13}" style="font-size:11px">${axisLabel}</text>

    <rect x="${dx}" y="${dy}" width="${dw}" height="${dh}" class="cut"/>

    <line class="dimLine" x1="${dx}" y1="${bottomY}" x2="${dx+dw}" y2="${bottomY}"/>
    <line class="dimTick" x1="${dx}" y1="${bottomY-4}" x2="${dx}" y2="${bottomY+4}"/>
    <line class="dimTick" x1="${dx+dw}" y1="${bottomY-4}" x2="${dx+dw}" y2="${bottomY+4}"/>
    <text class="dim" text-anchor="middle" x="${dx+dw/2}" y="${bottomY+15}" style="font-size:12px">${round(realW)} mm</text>

    <line class="dimLine" x1="${rightX}" y1="${dy}" x2="${rightX}" y2="${dy+dh}"/>
    <line class="dimTick" x1="${rightX-4}" y1="${dy}" x2="${rightX+4}" y2="${dy}"/>
    <line class="dimTick" x1="${rightX-4}" y1="${dy+dh}" x2="${rightX+4}" y2="${dy+dh}"/>
    <text class="dim" x="${rightX+8}" y="${dy+dh/2}" style="font-size:12px">${round(realH)} mm</text>

    <text class="dim" x="${innerX}" y="${y+h-28}" style="font-size:11px">${note}</text>
    <text class="dim" x="${innerX}" y="${y+h-12}" style="font-size:11px">尺寸：${dimLabel}</text>
  </g>`
}

function initZoomBox(box){const stage=box.querySelector('[data-zoom-stage]'),svg=stage&&stage.querySelector('svg');if(!stage||!svg)return;const vb=getSvgViewBox(svg);svg.setAttribute('width',vb.w);svg.setAttribute('height',vb.h);svg.style.width=vb.w+'px';svg.style.height=vb.h+'px';const st={stage,svg,w:vb.w,h:vb.h,scale:1,x:8,y:8,min:.05,max:8,pointers:new Map(),lastDist:0,lastCenter:null,lastPan:null,zoomMode:'fit'};box._zoomState=st;zoomFit(box,st);box.onpointerdown=(e)=>{box.setPointerCapture(e.pointerId);st.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});st.lastPan={x:e.clientX,y:e.clientY};if(st.pointers.size===2){const p=[...st.pointers.values()];st.lastDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);st.lastCenter={x:(p[0].x+p[1].x)/2-box.getBoundingClientRect().left,y:(p[0].y+p[1].y)/2-box.getBoundingClientRect().top};}};box.onpointermove=(e)=>{if(!st.pointers.has(e.pointerId))return;st.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(st.pointers.size>=2){const p=[...st.pointers.values()].slice(0,2);const rect=box.getBoundingClientRect();const dist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);const center={x:(p[0].x+p[1].x)/2-rect.left,y:(p[0].y+p[1].y)/2-rect.top};if(st.lastDist>0)zoomAt(box,st,st.scale*(dist/st.lastDist),center.x,center.y,'custom');st.lastDist=dist;st.lastCenter=center;}else if(st.pointers.size===1&&st.lastPan){const dx=e.clientX-st.lastPan.x,dy=e.clientY-st.lastPan.y;st.x+=dx;st.y+=dy;st.lastPan={x:e.clientX,y:e.clientY};zoomUpdate(box,st);}};box.onpointerup=box.onpointercancel=(e)=>{st.pointers.delete(e.pointerId);st.lastDist=0;st.lastCenter=null;st.lastPan=null;};box.onwheel=(e)=>{e.preventDefault();const rect=box.getBoundingClientRect();const factor=e.deltaY<0?1.12:.89;zoomAt(box,st,st.scale*factor,e.clientX-rect.left,e.clientY-rect.top,'custom');};}
function zoomFit(box,st){const bw=Math.max(1,box.clientWidth-16),bh=Math.max(1,box.clientHeight-16);const s=Math.min(bw/st.w,bh/st.h);st.scale=Math.max(st.min,Math.min(st.max,s));st.x=Math.max(8,(box.clientWidth-st.w*st.scale)/2);st.y=Math.max(8,(box.clientHeight-st.h*st.scale)/2);zoomUpdate(box,st,'目前：自適應','fit');}

function highlightVersionText(root=document.body){
  if(!root)return;
  const re=/v\d+(?:\.\d+){1,4}/g;
  const skipTags=new Set(['SCRIPT','STYLE','TEXTAREA','INPUT','SELECT','OPTION','CODE']);
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
    acceptNode(node){
      const parent=node.parentElement;
      if(!parent)return NodeFilter.FILTER_REJECT;
      if(skipTags.has(parent.tagName))return NodeFilter.FILTER_REJECT;
      if(parent.closest('.version-blue'))return NodeFilter.FILTER_REJECT;
      if(!re.test(node.nodeValue)){re.lastIndex=0;return NodeFilter.FILTER_REJECT;}
      re.lastIndex=0;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes=[];
  while(walker.nextNode())nodes.push(walker.currentNode);
  nodes.forEach(node=>{
    const frag=document.createDocumentFragment();
    let text=node.nodeValue,last=0;
    text.replace(re,(m,idx)=>{
      frag.appendChild(document.createTextNode(text.slice(last,idx)));
      const span=document.createElement('span');
      span.className='version-blue';
      span.textContent=m;
      frag.appendChild(span);
      last=idx+m.length;
      return m;
    });
    frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag,node);
  });
}

/* v12.17.9.17 overrides: custom App modal for download confirmation, no native browser title */
function appModalConfirm(opts){
  opts=opts||{};
  return new Promise(resolve=>{
    const old=document.querySelector('.app-modal-backdrop');
    if(old)old.remove();
    const wrap=document.createElement('div');
    wrap.className='app-modal-backdrop';
    wrap.innerHTML=`<div class="app-modal-card" role="dialog" aria-modal="true"><div class="app-modal-head"><div class="app-modal-title">${esc(opts.title||'下載前確認')}</div>${opts.sub?`<div class="app-modal-sub">${esc(opts.sub)}</div>`:''}</div><div class="app-modal-body">${opts.body||''}</div><div class="app-modal-actions"><button type="button" class="cancel" data-modal-cancel>取消</button><button type="button" class="confirm" data-modal-confirm>${esc(opts.okText||'確定下載')}</button></div></div>`;
    document.body.appendChild(wrap);
    const done=(val)=>{wrap.remove();resolve(val);};
    wrap.querySelector('[data-modal-cancel]').onclick=()=>done(false);
    wrap.querySelector('[data-modal-confirm]').onclick=()=>done(true);
    wrap.addEventListener('click',e=>{if(e.target===wrap)done(false);});
    document.addEventListener('keydown',function escClose(e){if(e.key==='Escape'){document.removeEventListener('keydown',escClose);if(document.body.contains(wrap))done(false);}}, {once:true});
  });
}

function pegboardWarnings(){
  const p=state.pegboard||pegboardDefaults,st=pegboardStats(),out=[];

  if(st.d<=0)out.push('洞洞板孔徑必須大於 0 mm。');
  if(st.pitch<=0)out.push('洞洞板孔距必須大於 0 mm。');
  if(st.pitch<=st.d)out.push('孔距小於或等於孔徑，孔與孔之間會被切斷。');
  if(st.pattern==='honey'&&st.rowPitch<=st.d)out.push('蜂巢排列的垂直孔距小於或等於孔徑，孔與孔之間可能被切斷。');
  if(st.mode==='manual'&&st.inputMx*2>=st.w)out.push('左右邊距過大，已經吃掉整個板寬。');
  if(st.mode==='manual'&&st.inputMy*2>=st.h)out.push('上下邊距過大，已經吃掉整個板高。');
  if(st.mode==='fixed'&&!st.fitFixed)out.push('固定欄列放不進目前板寬 / 板高，請減少欄列數、縮小孔距或增加板尺寸。');
  if(st.mode!=='manual'&&(st.mx<0||st.my<0))out.push('自動計算後邊距為負值，代表指定孔數或孔距超出板面。');
  if(st.holeCount<1)out.push('孔位數為 0，請調小邊距、減少安全限制或增加板尺寸。');
  if(st.holeCount>220)out.push('孔位超過 220 個，10W 藍光切割時間會很長，建議分片或加大孔距。');
  if(st.w>st.area||st.h>st.area)out.push('洞洞板外尺寸超出目前有效切割區 '+round(st.area)+'×'+round(st.area)+' mm。');
  if(bool(p.includeMountHoles)&&num(p.mountHoleDiameter,0)<=0)out.push('已開啟四角掛孔，但掛孔直徑必須大於 0 mm。');
  if(num(p.mountHoleDiameter,0)>0&&bool(p.includeMountHoles)&&num(p.mountHoleInset,0)<=num(p.mountHoleDiameter,0)/2)out.push('四角掛孔內縮太小，可能切破外框。');
  if(bool(p.includeMountHoles)&&num(p.mountHoleInset,0)*2>=Math.min(st.w,st.h)&&st.w>0&&st.h>0)out.push('掛孔內縮過大，四角掛孔位置可能重疊或超出合理範圍。');

  if(num(p.kerf,0)<0)out.push('洞洞板切縫補償不可為負數。');
  if(bool(p.reinforceGuides)&&num(p.reinforceStripWidth,0)<=0)out.push('已開啟背面定位線，但補強條寬必須大於 0 mm。');

}

/* v12.17.9.26 pegboard cut length / utilization diagnostics */
function pegboardCutPlanStats(){
  const st=pegboardStats(),p=state.pegboard||pegboardDefaults;
  const boardArea=Math.max(0,st.w*st.h);
  const holeArea=st.holeCount*Math.PI*Math.pow(Math.max(0,st.cutDia)/2,2);
  const mountArea=st.mountCount*Math.PI*Math.pow(Math.max(0,st.mountCutDia)/2,2);
  const openArea=holeArea+mountArea;
  const openPct=boardArea>0?openArea/boardArea*100:0;
  const outerLen=st.w>0&&st.h>0?(2*(st.w+st.h)):0;
  const holeLen=st.holeCount*Math.PI*Math.max(0,st.cutDia);
  const mountLen=st.mountCount*Math.PI*Math.max(0,st.mountCutDia);
  const totalLen=outerLen+holeLen+mountLen;
  const usedWidth=st.cols>0?((st.cols-1)*st.pitch+st.cutDia):0;
  const usedHeight=st.rows>0?((st.rows-1)*st.rowPitch+st.cutDia):0;
  const coverPct=(st.w>0&&st.h>0)?Math.max(0,Math.min(100,(usedWidth*usedHeight)/(st.w*st.h)*100)):0;
  const edgeWasteX=st.w>0?Math.max(0,(st.mx+st.rightMargin)/st.w*100):0;
  const edgeWasteY=st.h>0?Math.max(0,(st.my+st.bottomMargin)/st.h*100):0;
  const density=boardArea>0?st.holeCount/(boardArea/10000):0;
  let risk='ok',riskLabel='切割量正常';
  if(st.holeCount>320||totalLen>18000){risk='warn';riskLabel='切割量偏高';}
  if(st.holeCount>520||totalLen>28000){risk='danger';riskLabel='建議分片';}
  return {boardArea,holeArea,mountArea,openArea,openPct,outerLen,holeLen,mountLen,totalLen,usedWidth,usedHeight,coverPct,edgeWasteX,edgeWasteY,density,risk,riskLabel};
}
function pegboardCutPlanHtml(){
  const st=pegboardStats(),m=pegboardCutPlanStats();
  const lenText=m.totalLen>=1000?round(m.totalLen/1000,2)+' m':round(m.totalLen,0)+' mm';
  const holeLenText=m.holeLen>=1000?round(m.holeLen/1000,2)+' m':round(m.holeLen,0)+' mm';
  const openPct=round(m.openPct,1);

}
