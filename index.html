      .pwa-mini-version{display:inline-flex;align-items:center;border-radius:999px;background:#efefef;color:#333;padding:4px 9px;font-size:.72rem;font-weight:800;margin-left:6px;}
      @media(max-width:680px){#${UPDATE_BAR_ID}{align-items:flex-start;flex-direction:column}.pwa-actions{width:100%;justify-content:flex-start}}
    `;
    document.head.appendChild(css);
    const bar = document.createElement('div');
    bar.id = UPDATE_BAR_ID;
    bar.hidden = true;
    bar.innerHTML = `<div id="pwaBarTextV17">偵測到新版。</div><div class="pwa-actions"><button id="pwaUpdateNowV17">更新</button><button class="secondary" id="${INSTALL_BTN_ID}" hidden>安裝到桌面</button><button class="secondary" id="pwaCheckUpdateV17">檢查更新</button><button class="secondary" id="pwaClearCacheV17">清除快取</button><button class="secondary" id="pwaCloseBarV17">關閉</button></div>`;
    document.body.appendChild(bar);
    document.getElementById('pwaCloseBarV17').onclick = () => { bar.hidden = true; };
    document.getElementById('pwaUpdateNowV17').onclick = () => {
      if (waitingWorker) waitingWorker.postMessage({type:'SKIP_WAITING'});
      else window.location.reload();
    };
    document.getElementById('pwaCheckUpdateV17').onclick = async () => {
      const text = document.getElementById('pwaBarTextV17');
      text.textContent = '正在檢查更新…';
      bar.hidden = false;
      try {
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) await reg.update();
        text.textContent = '已檢查更新；若有新版會顯示更新按鈕。';
      } catch(e){ text.textContent = '檢查更新失敗，可能目前不是 HTTPS/PWA 環境。'; }
    };
    document.getElementById('pwaClearCacheV17').onclick = async () => {
      try {
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
        localStorage.setItem('woodworking_pwa_cache_cleared_at', new Date().toISOString());
        window.location.reload();
      } catch(e){ window.location.reload(); }
    };
    document.getElementById(INSTALL_BTN_ID).onclick = async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      try { await deferredInstallPrompt.userChoice; } catch(e) {}
      deferredInstallPrompt = null;
      document.getElementById(INSTALL_BTN_ID).hidden = true;
    };
  }

  function showPwaBar(message, updateAvailable=false){
    ensurePwaBar();
    document.getElementById('pwaBarTextV17').textContent = message;
    document.getElementById('pwaUpdateNowV17').hidden = !updateAvailable;
    document.getElementById(UPDATE_BAR_ID).hidden = false;
  }

  function setVisibleVersion(){
    document.title = '我の木工 PWA v25';
    const heroTop = document.querySelector('.hero > div'); if (heroTop) heroTop.textContent = '私人我の木工 PWA v24';
    const heroH1 = document.querySelector('.hero h1'); if (heroH1) heroH1.textContent = '穩定保護版：版本、備份、更新';
    const heroP = document.querySelector('.hero p'); if (heroP) heroP.textContent = '以可正常使用的 v23 為底，加入版本顯示、備份提醒、更新檢查與快取修復，保留專案、購物、耗材、鋸路排版與完整備份。';
    const footer = document.querySelector('.footer'); if (footer) footer.innerHTML = 'PWA v24 穩定版｜尺寸單位 mm｜本機儲存 localStorage｜無啟動畫面｜穩定更新';
    const save = document.getElementById('saveNote');
    if (save && !save.querySelector('.pwa-mini-version')) {
      save.insertAdjacentHTML('beforeend', `<span class="pwa-mini-version">${APP_VERSION}</span>`);
    }
  }

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredInstallPrompt = e;
    ensurePwaBar();
    document.getElementById(INSTALL_BTN_ID).hidden = false;
    showPwaBar('可以安裝到手機桌面。點「安裝到桌面」。', false);
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      setVisibleVersion();
      ensurePwaBar();
      try {
        const reg = await navigator.serviceWorker.register('./service-worker.js', {scope:'./'});
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              waitingWorker = newWorker;
              showPwaBar('偵測到新版 App。按「更新」套用。', true);
            }
          });
        });
        if (reg.waiting) {
          waitingWorker = reg.waiting;
          showPwaBar('已有新版等待套用。按「更新」重新載入。', true);
        }
        setTimeout(() => reg.update().catch(()=>{}), 2500);
      } catch(e) {
        showPwaBar('目前不是可註冊 PWA 的環境。PWA 需要 HTTPS 或 localhost；直接開 HTML 檔仍可使用一般功能。', false);
      }
    });
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  } else {
    window.addEventListener('load', () => { setVisibleVersion(); });
  }
})();
</script>



<script>
// v24 stable rebuild from v23: project manager, shopping list, inventory, kerf layout, warnings, full backup.
(function(){
  'use strict';
  const V23 = 'PWA v24';
  const PROJECT_KEY = 'woodworking_projects_v23';
  const SHOP_KEY = 'woodworking_shopping_v23';
  const INV_KEY = 'woodworking_inventory_v23';
  const LAYOUT_KEY = 'woodworking_layout_settings_v23';

  function h(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function readJSON(key, fallback){ try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e){ return fallback; } }
  function writeJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
  function nowText(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  function money(v){ return v ? `NT$${h(v)}` : ''; }
  function currentTitle(){ const f=state.resultForm||state.form; return `${projectName(f.projectType)} ${f.width}×${f.depth}×${f.height}mm`; }

  function ensureTabsV23(){
    const add = [['projects','專案'],['shopping','購物'],['inventory','耗材'],['backup','備份']];
    add.forEach(t => { if (!tabs.some(x => x[0] === t[0])) tabs.push(t); });
  }

  function getLayoutSettings(){ return Object.assign({ kerf:3, spacing:3, margin:5 }, readJSON(LAYOUT_KEY, {})); }
  function saveLayoutSettingsFromDOM(){
    const old = getLayoutSettings();
    const next = {
      kerf: Number(document.getElementById('v23Kerf')?.value ?? old.kerf) || 0,
      spacing: Number(document.getElementById('v23Spacing')?.value ?? old.spacing) || 0,
      margin: Number(document.getElementById('v23Margin')?.value ?? old.margin) || 0
    };
    writeJSON(LAYOUT_KEY, next);
  }

  function warningsV23(){
    const f=state.resultForm||state.form; const type=f.projectType; const out=[];
    const W=Number(f.width)||0, D=Number(f.depth)||0, H=Number(f.height)||0, t=Number(f.materialThickness)||0;
    const kerf=getLayoutSettings().kerf;
    if (kerf <= 0) out.push(['排版未設定鋸路/切縫','鋸片裁切建議 2–4 mm；雷射可用 0.1–0.3 mm。']);
    if (t <= 5) out.push(['板厚偏薄','薄板適合背板、展示件或雷射件；承重與鎖螺絲要保守。']);
    if (type==='drawer'){
      const slide=Number(f.slideLength)||0;
      if (slide > D-20) out.push(['滑軌長度可能過長',`滑軌 ${slide} mm，大於可用深度約 ${Math.max(0,D-20)} mm。`]);
      if ((Number(f.gap)||0) < 1.5) out.push(['抽面板縫隙偏小','建議四周 2 mm 左右，避免摩擦或安裝後卡住。']);
    }
    if (type==='doorpanel'){
      const cup=Number(f.hingeCupDiameter)||35;
      if (t < 18 && cup >= 35) out.push(['杯鉸孔有打穿風險','35mm 杯鉸孔常需約 11–13 mm 深，薄門板要先試鑽。']);
    }
    if (['bookshelf','cabinet','wallcabinet','lstorage'].includes(type)){
      if (W > 900 && t < 18) out.push(['跨度偏長','層板超過 900 mm 且板厚小於 18 mm，可能下垂，建議加背條或中隔板。']);
      if (H > 1400) out.push(['高櫃防傾倒','高櫃、書架、吊櫃建議加牆面固定或防傾倒五金。']);
    }
    if (type==='pegboard'){
      const spacing=Number(f.holeSpacing)||0, hole=Number(f.holeDiameter)||0, edge=Number(f.edgeMargin)||0;
      if (spacing && hole && spacing < hole*4) out.push(['孔距可能過密','洞洞板孔距太密會削弱板材，重載工具牆要保守。']);
      if (edge < 20) out.push(['孔邊距偏小','邊緣太近容易裂，建議至少 25–30 mm。']);
      if (!Number(f.cleatThickness)) out.push(['背後需留空','洞洞板若用掛鉤，背後要留空間，或用墊條/框架墊出厚度。']);
    }
    return out;
  }

  function renderWarningsCard(){
    const list=warningsV23();
    return `<div class="card"><h2>錯誤提醒 / 不合理尺寸提醒</h2>${list.length ? list.map(w=>`<div class="option-card"><strong>${h(w[0])}</strong><div class="small">${h(w[1])}</div></div>`).join('') : '<div class="option-card">目前沒有明顯不合理提醒；正式下料前仍建議實量板厚與五金尺寸。</div>'}</div>`;
  }

  function renderLayoutV23(){
    const f = state.resultForm, result = state.result;
    const set = getLayoutSettings();
    const rawPieces = getFlattenedPieces(result.cutList).filter(p=>p.w > 0 && p.h > 0);
    const add = set.kerf + set.spacing;
    const pieces = rawPieces.map(p => ({...p, name:p.name, w:Math.ceil(p.w + add), h:Math.ceil(p.h + add), rawW:p.w, rawH:p.h}));
    const boardW = Math.max(10, (Number(f.stockBoardWidth)||1220) - set.margin*2);
    const boardH = Math.max(10, (Number(f.stockBoardHeight)||2440) - set.margin*2);
    const qty = Math.max(1, Math.floor(Number(f.stockBoardQty)||1));
    const nested = nestPieces(pieces, boardW, boardH, qty);
    const placed = nested.boards.reduce((s,b)=>s+b.placed.length,0);
    return `<div class="card"><h2>板材排版 / 省料切割圖</h2><div class="grid three">
      <label><div class="label">鋸路 / 雷射切縫 mm</div><input id="v23Kerf" type="number" step="0.1" value="${h(set.kerf)}"><div class="inline-note">鋸片常見 2–4；雷射約 0.1–0.3。</div></label>
      <label><div class="label">零件間距 mm</div><input id="v23Spacing" type="number" step="0.1" value="${h(set.spacing)}"></label>
      <label><div class="label">板邊安全邊距 mm</div><input id="v23Margin" type="number" step="0.1" value="${h(set.margin)}"></label>
    </div><div class="btn-row"><button class="primary" id="v23LayoutApply">套用排版設定</button></div><div class="small">目前排版尺寸已把鋸路與間距加入零件外框，原板可用尺寸會扣掉板邊安全邊距。</div></div>
    <div class="layout-wrap"><div class="card"><h2>排版圖</h2><div class="board-list">${nested.boards.length ? nested.boards.map((b,i)=>`<div class="board-card"><div><strong>第 ${i+1} 張板</strong></div><div class="small">可用板面 ${boardW} × ${boardH} mm｜利用率 ${Math.round(b.util*100)}%｜已含鋸路/間距</div>${makeBoardSvg(b,i)}</div>`).join('') : '<div class="option-card">目前沒有可排版的零件。</div>'}</div></div>
      <div><div class="card"><h2>排版摘要</h2><div class="option-card">原板：${h(f.stockBoardWidth)} × ${h(f.stockBoardHeight)} mm；扣邊距後可用：${boardW} × ${boardH} mm</div><div class="option-card">鋸路 ${set.kerf} mm｜間距 ${set.spacing} mm｜板邊 ${set.margin} mm</div><div class="option-card">零件總數：${rawPieces.length} 件；成功排入：${placed} 件；未排入：${nested.remaining.length} 件</div>${nested.remaining.length ? `<div class="option-card"><strong>未排入零件：</strong><br>${nested.remaining.map(p=>`${h(p.name)} ${p.rawW||p.w}×${p.rawH||p.h}`).join('<br>')}</div>` : ''}</div>${renderWarningsCard()}</div></div>`;
  }

  function loadProjects(){ return readJSON(PROJECT_KEY, []); }
  function saveProjects(list){ writeJSON(PROJECT_KEY, list); }
  function renderProjectsTab(){
    const list=loadProjects();
    const rows=list.map((p,i)=>`<tr><td><strong>${h(p.name)}</strong><div class="small">${h(p.type)}｜${h(p.size)}｜${h(p.updatedAt)}</div></td><td>${h(p.status)}</td><td>${h(p.note||'')}</td><td><button class="secondary v23-load-project" data-i="${i}" style="padding:7px 10px;border-radius:10px">載入</button> <button class="secondary v23-del-project" data-i="${i}" style="padding:7px 10px;border-radius:10px">刪除</button></td></tr>`).join('');
    return `<div class="card"><h2>專案儲存 / 專案管理</h2><div class="small">把目前計算結果、裁切清單、五金與提醒存成一個專案；資料只存在本機。</div></div>
    <div class="card"><h2>儲存目前結果</h2><div class="grid two"><label><div class="label">專案名稱</div><input id="v23ProjectName" value="${h(currentTitle())}"></label><label><div class="label">狀態</div><select id="v23ProjectStatus"><option>設計中</option><option>待買料</option><option>已下料</option><option>組裝中</option><option>已完成</option></select></label><label style="grid-column:1/-1"><div class="label">備註</div><textarea id="v23ProjectNote" rows="3" placeholder="例如材料來源、問題、下次要改的地方"></textarea></label></div><div class="btn-row"><button class="primary" id="v23SaveProject">儲存成專案</button></div></div>
    <div class="card"><h2>已儲存專案：${list.length} 筆</h2><table><thead><tr><th>專案</th><th>狀態</th><th>備註</th><th>操作</th></tr></thead><tbody>${rows || '<tr><td colspan="4" class="small">尚未儲存專案。</td></tr>'}</tbody></table></div>`;
  }

  function generatedShopping(){
    const f=state.resultForm||state.form; const r=state.result; const items=[];
    const pieces=(r.cutList||[]).reduce((s,x)=>s+(Number(x.qty)||0),0);
    items.push({name:`${projectName(f.projectType)}板材零件`, spec:`依裁切清單 ${pieces} 件`, qty:'1 批', category:'板材', status:'需購買', price:'', source:''});
    items.push({name:'木螺絲', spec: Number(f.materialThickness)>=18 ? '4×40 / 4×50' : '3×25 / 3×30', qty:'約 1 包', category:'五金', status:'需購買', price:'', source:''});
    items.push({name:'木工白膠', spec:'一般木工白膠', qty:'1 瓶', category:'耗材', status:'需購買', price:'', source:''});
    items.push({name:'砂紙', spec:'#120 / #240', qty:'數張', category:'耗材', status:'需購買', price:'', source:''});
    if (f.projectType==='drawer' || f.projectType==='drawerchest') items.push({name:'三節鋼珠滑軌', spec:`${f.slideLength||350} mm`, qty:f.projectType==='drawerchest'?'依抽屜數':'1 對', category:'五金', status:'需購買', price:'', source:''});
    if (f.projectType==='doorpanel' || f.projectType==='wallcabinet') items.push({name:'35mm 杯鉸', spec:'直臂/中彎/大彎依門型', qty:`${f.hingeCount||2} 個`, category:'五金', status:'需購買', price:'', source:''});
    if (['bookshelf','cabinet','lstorage'].includes(f.projectType)) items.push({name:'層板托 / 角碼', spec:'5mm 層板托或 40×40 角碼', qty:'依層板數', category:'五金', status:'需購買', price:'', source:''});
    if (f.projectType==='pegboard') items.push({name:'洞洞板掛鉤 / 圓棒', spec:`孔距 ${f.holeSpacing||50} mm 系統`, qty:'依需求', category:'五金', status:'需購買', price:'', source:''});
    if (f.projectType==='wallcabinet' || f.projectType==='pegboard') items.push({name:'法式掛條 / 吊碼', spec:'牆面固定用', qty:'1 組', category:'五金', status:'需購買', price:'', source:''});
    return items;
  }
  function loadShopping(){ return readJSON(SHOP_KEY, []); }
  function saveShopping(list){ writeJSON(SHOP_KEY, list); }
  function renderShoppingTab(){
    const list=loadShopping();
    const rows=list.map((x,i)=>`<tr><td><strong>${h(x.name)}</strong><div class="small">${h(x.spec||'')}</div></td><td>${h(x.qty||'')}</td><td><select class="v23-shop-status" data-i="${i}"><option ${x.status==='需購買'?'selected':''}>需購買</option><option ${x.status==='已有'?'selected':''}>已有</option><option ${x.status==='已購買'?'selected':''}>已購買</option></select></td><td><input class="v23-shop-price" data-i="${i}" value="${h(x.price||'')}" placeholder="TWD"></td><td><input class="v23-shop-source" data-i="${i}" value="${h(x.source||'')}" placeholder="蝦皮/淘寶/店家"></td><td><button class="secondary v23-shop-del" data-i="${i}" style="padding:7px 10px;border-radius:10px">刪除</button></td></tr>`).join('');
    return `<div class="card"><h2>購物清單</h2><div class="small">可由目前計算結果產生清單，再標記已有、需購買或已購買。</div><div class="btn-row"><button class="primary" id="v23GenerateShopping">依目前專案產生購物清單</button><button class="secondary" id="v23ClearShopping">清空購物清單</button></div></div>
    <div class="card"><h2>清單：${list.length} 項</h2><table><thead><tr><th>品項</th><th>數量</th><th>狀態</th><th>價格</th><th>來源</th><th>操作</th></tr></thead><tbody>${rows || '<tr><td colspan="6" class="small">尚未產生清單。</td></tr>'}</tbody></table></div>`;
  }

  function loadInv(){ return readJSON(INV_KEY, []); }
  function saveInv(list){ writeJSON(INV_KEY, list); }
  function renderInventoryTab(){
    const list=loadInv();
    const rows=list.map((x,i)=>{ const low=(Number(x.qty)||0) <= (Number(x.min)||0); return `<tr><td><strong>${h(x.name)}</strong><div class="small">${h(x.spec||'')}</div></td><td>${h(x.category||'')}</td><td>${h(x.qty||0)}</td><td>${h(x.min||0)}</td><td>${money(x.price)}</td><td>${h(x.source||'')}</td><td><span class="badge ${low?'strong':'best'}">${low?'需補貨':'足夠'}</span></td><td><button class="secondary v23-inv-del" data-i="${i}" style="padding:7px 10px;border-radius:10px">刪除</button></td></tr>`; }).join('');
    return `<div class="card"><h2>耗材庫 / 五金庫</h2><div class="small">記錄螺絲、木榫、角碼、滑軌、杯鉸、砂紙、鋸片、鑽頭、銑刀、膠水、磁鐵、板材等。</div></div>
    <div class="card"><h2>新增耗材 / 五金</h2><div class="grid three"><label><div class="label">名稱</div><input id="v23InvName" placeholder="例如 4×40 木螺絲"></label><label><div class="label">分類</div><select id="v23InvCat"><option>螺絲</option><option>五金</option><option>板材</option><option>砂紙</option><option>鑽頭/刀具</option><option>膠水</option><option>其他耗材</option></select></label><label><div class="label">規格</div><input id="v23InvSpec" placeholder="尺寸/材質/品牌"></label><label><div class="label">目前數量</div><input id="v23InvQty" type="number" value="0"></label><label><div class="label">補貨線</div><input id="v23InvMin" type="number" value="1"></label><label><div class="label">單價 TWD</div><input id="v23InvPrice" placeholder="例如 120"></label><label><div class="label">來源</div><input id="v23InvSource" placeholder="蝦皮/淘寶/特力屋"></label></div><div class="btn-row"><button class="primary" id="v23AddInv">新增</button></div></div>
    <div class="card"><h2>已記錄：${list.length} 筆</h2><table><thead><tr><th>品項</th><th>分類</th><th>數量</th><th>補貨線</th><th>單價</th><th>來源</th><th>狀態</th><th>操作</th></tr></thead><tbody>${rows || '<tr><td colspan="8" class="small">尚未新增耗材。</td></tr>'}</tbody></table></div>`;
  }

  function renderBackupTab(){
    return `<div class="card"><h2>一鍵備份 / 一鍵匯入</h2><div class="small">完整備份包含：計算狀態、專案、購物清單、耗材庫、工具庫、五金價格與本機相關資料。</div><div class="btn-row"><button class="primary" id="v23BackupAll">一鍵完整備份 JSON</button><label class="file-btn">匯入完整備份<input type="file" id="v23ImportAll" accept="application/json" style="display:none"></label><a class="file-btn" href="./clear-cache.html" style="text-decoration:none">清除 PWA 快取</a></div></div><div class="card">${renderWarningsCard()}<div class="option-card"><strong>建議</strong><div class="small">每次大改 App 或重新部署前，先備份一次。資料存在本機，換手機或清除瀏覽器資料可能會遺失。</div></div></div>`;
  }

  function bindV23(){
    const apply=document.getElementById('v23LayoutApply'); if(apply) apply.onclick=()=>{ saveLayoutSettingsFromDOM(); render(); };
    ['v23Kerf','v23Spacing','v23Margin'].forEach(id=>{ const el=document.getElementById(id); if(el) el.onchange=()=>{ saveLayoutSettingsFromDOM(); }; });
    const saveP=document.getElementById('v23SaveProject'); if(saveP) saveP.onclick=()=>{ const list=loadProjects(); const f=state.resultForm||state.form; list.unshift({name:document.getElementById('v23ProjectName').value.trim()||currentTitle(), status:document.getElementById('v23ProjectStatus').value, note:document.getElementById('v23ProjectNote').value.trim(), type:projectName(f.projectType), size:`${f.width}×${f.depth}×${f.height} mm`, form:{...f}, result:state.result, warnings:warningsV23(), updatedAt:nowText()}); saveProjects(list); render(); };
    document.querySelectorAll('.v23-load-project').forEach(b=>b.onclick=()=>{ const p=loadProjects()[Number(b.dataset.i)]; if(!p) return; state.form={...defaultForm,...p.form}; state.resultForm={...defaultForm,...p.form}; state.result=p.result || calculateAll(state.resultForm); saveState('載入專案'); activeTab='calc'; localStorage.setItem(TAB_KEY, activeTab); render(); });
    document.querySelectorAll('.v23-del-project').forEach(b=>b.onclick=()=>{ const list=loadProjects(); list.splice(Number(b.dataset.i),1); saveProjects(list); render(); });
    const gen=document.getElementById('v23GenerateShopping'); if(gen) gen.onclick=()=>{ saveShopping(generatedShopping()); render(); };
    const clear=document.getElementById('v23ClearShopping'); if(clear) clear.onclick=()=>{ if(confirm('確定清空購物清單？')){ saveShopping([]); render(); } };
    document.querySelectorAll('.v23-shop-status').forEach(el=>el.onchange=()=>{ const l=loadShopping(); if(l[el.dataset.i]) l[el.dataset.i].status=el.value; saveShopping(l); });
    document.querySelectorAll('.v23-shop-price').forEach(el=>el.onchange=()=>{ const l=loadShopping(); if(l[el.dataset.i]) l[el.dataset.i].price=el.value; saveShopping(l); });
    document.querySelectorAll('.v23-shop-source').forEach(el=>el.onchange=()=>{ const l=loadShopping(); if(l[el.dataset.i]) l[el.dataset.i].source=el.value; saveShopping(l); });
    document.querySelectorAll('.v23-shop-del').forEach(b=>b.onclick=()=>{ const l=loadShopping(); l.splice(Number(b.dataset.i),1); saveShopping(l); render(); });
    const addInv=document.getElementById('v23AddInv'); if(addInv) addInv.onclick=()=>{ const name=document.getElementById('v23InvName').value.trim(); if(!name){ alert('請輸入名稱'); return; } const l=loadInv(); l.push({name, category:document.getElementById('v23InvCat').value, spec:document.getElementById('v23InvSpec').value.trim(), qty:document.getElementById('v23InvQty').value, min:document.getElementById('v23InvMin').value, price:document.getElementById('v23InvPrice').value.trim(), source:document.getElementById('v23InvSource').value.trim(), updatedAt:nowText()}); saveInv(l); render(); };
    document.querySelectorAll('.v23-inv-del').forEach(b=>b.onclick=()=>{ const l=loadInv(); l.splice(Number(b.dataset.i),1); saveInv(l); render(); });
    const backup=document.getElementById('v23BackupAll'); if(backup) backup.onclick=()=>{ const all={version:'v24', exportedAt:new Date().toISOString(), state, projects:loadProjects(), shopping:loadShopping(), inventory:loadInv(), layout:getLayoutSettings(), localStorage:{}}; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && (k.startsWith('woodworking') || k.startsWith('hardware_'))) all.localStorage[k]=localStorage.getItem(k); } const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='wo-no-mokkou-v24-backup.json'; a.click(); URL.revokeObjectURL(url); };
    const imp=document.getElementById('v23ImportAll'); if(imp) imp.onchange=async ev=>{ const file=ev.target.files[0]; if(!file) return; try{ const data=JSON.parse(await file.text()); if(data.localStorage){ Object.entries(data.localStorage).forEach(([k,v])=>localStorage.setItem(k,v)); } else { if(data.state) localStorage.setItem(STORAGE_KEY, JSON.stringify(data.state)); if(data.projects) saveProjects(data.projects); if(data.shopping) saveShopping(data.shopping); if(data.inventory) saveInv(data.inventory); if(data.layout) writeJSON(LAYOUT_KEY, data.layout); } alert('匯入完成，將重新載入。'); location.href='./index.html?v=24&imported='+Date.now(); }catch(e){ alert('匯入失敗，請確認是完整備份 JSON。'); } ev.target.value=''; };
  }

  ensureTabsV23();
  const baseRenderCalc = renderCalcTab;
  const baseRenderMethod = renderMethodTab;
  const baseRender = render;
  renderCalcTab = function(){ return baseRenderCalc() + renderWarningsCard(); };
  renderMethodTab = function(){ return baseRenderMethod() + renderWarningsCard(); };
  renderLayoutTab = renderLayoutV23;
  render = function(){
    renderTabs();
    const view=document.getElementById('view');
    if(activeTab==='projects') view.innerHTML=renderProjectsTab();
    else if(activeTab==='shopping') view.innerHTML=renderShoppingTab();
    else if(activeTab==='inventory') view.innerHTML=renderInventoryTab();
    else if(activeTab==='backup') view.innerHTML=renderBackupTab();
    else if(activeTab==='calc'){ view.innerHTML=renderCalcTab(); bindCommonInputs(); bindCalcButtons(); }
    else if(activeTab==='method') view.innerHTML=renderMethodTab();
    else if(activeTab==='hardware') view.innerHTML=renderHardwareTab();
    else if(activeTab==='layout') view.innerHTML=renderLayoutTab();
    else if(activeTab==='diagrams') view.innerHTML=renderDiagramsTab();
    else { baseRender(); return; }
    bindV23();
  };

  const css=document.createElement('style');
  css.textContent='@media (min-width:861px){.tabs{grid-template-columns:repeat(10,1fr)}} .file-btn{cursor:pointer}.card h2{letter-spacing:.01em}';
  document.head.appendChild(css);
  function setBrand(){
    document.title='我の木工 PWA v24';
    const top=document.querySelector('.hero > div'); if(top) top.textContent='我の木工 PWA v24';
    const h1=document.querySelector('.hero h1'); if(h1) h1.textContent='穩定保護版：版本、備份、更新';
    const p=document.querySelector('.hero p'); if(p) p.textContent='以可正常使用的 v23 為底，加入版本顯示、備份提醒、更新檢查與快取修復，保留專案、購物、耗材、鋸路排版與完整備份。';
    const foot=document.querySelector('.footer'); if(foot) foot.textContent='PWA v24 穩定版｜尺寸單位 mm｜本機儲存 localStorage｜無啟動畫面｜穩定更新';
    const save=document.getElementById('saveNote'); if(save && !save.textContent.includes('PWA v24')) save.insertAdjacentHTML('beforeend',' <span class="pwa-mini-version">PWA v24</span>');
  }
  window.addEventListener('load', ()=>{ setTimeout(()=>{ setBrand(); ensureTabsV23(); render(); }, 80); });
  setBrand();
  try{ render(); }catch(e){ console.error('v23 render failed', e); }
})();
</script>


<script>
// v24 stability layer: visible version, backup reminder, update/cache controls.
(function(){
  'use strict';
  const APP_VERSION = 'PWA v25';
  const LAST_BACKUP_KEY = 'woodworking_last_backup_at_v24';
  const STABLE_BASE = 'v23 穩定底版';

  function h(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function fmtDate(iso){
    if (!iso) return '尚未備份';
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return '尚未備份';
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  function daysSince(iso){
    if (!iso) return Infinity;
    const d = new Date(iso).getTime();
    if (!Number.isFinite(d)) return Infinity;
    return (Date.now() - d) / 86400000;
  }
  function allWoodworkingLocalStorage(){
    const obj = {};
    for (let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if (k && (k.startsWith('woodworking') || k.startsWith('hardware_'))) obj[k] = localStorage.getItem(k);
    }
    return obj;
  }
  function downloadBackup(){
    const payload = {
      version: 'v24',
      app: '我の木工',
      exportedAt: new Date().toISOString(),
      stableBase: STABLE_BASE,
      localStorage: allWoodworkingLocalStorage()
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `wo-no-mokkou-v24-full-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    localStorage.setItem(LAST_BACKUP_KEY, new Date().toISOString());
    updateStabilityText('已建立完整備份。');
  }
  async function checkUpdate(){
    updateStabilityText('正在檢查更新…');
    try{
      if ('serviceWorker' in navigator){
        const reg = await navigator.serviceWorker.getRegistration();
        if (reg) await reg.update();
      }
      const r = await fetch('./version.json?t=' + Date.now(), {cache:'no-store'});
      const j = await r.json();
      updateStabilityText(`已檢查：線上版本 ${h(j.version || '未知')}。目前頁面 ${APP_VERSION}。`);
    } catch(e){
      updateStabilityText('檢查更新失敗。若 App 異常，請用「清除快取」後重開。');
    }
  }
  async function clearPwaCache(){
    updateStabilityText('正在清除 PWA 快取…');
    try{
      if ('caches' in window){
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
      if ('serviceWorker' in navigator){
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
    } catch(e){}
    location.replace('./index.html?v=24&fresh=' + Date.now());
  }
  function hardReload(){ location.replace('./index.html?v=24&t=' + Date.now()); }
  function updateStabilityText(extra){
    const el = document.getElementById('v24StabilityStatus');
    if (!el) return;
    const last = localStorage.getItem(LAST_BACKUP_KEY);
    const d = daysSince(last);
    const backupText = d === Infinity ? '尚未建立 v24 備份' : `上次備份：${fmtDate(last)}（約 ${Math.floor(d)} 天前）`;
    const reminder = d >= 7 ? '｜建議現在備份' : '｜備份狀態正常';
    el.textContent = `${backupText}${reminder}${extra ? '｜' + extra : ''}`;
  }
  function ensureStabilityCard(){
    if (document.getElementById('v24StabilityCard')) { updateStabilityText(); return; }
    const hero = document.querySelector('.hero');
    if (!hero) return;
    const card = document.createElement('div');
    card.id = 'v24StabilityCard';
    card.className = 'v24-stability-card';
    card.innerHTML = `
      <div class="v24-title-row"><strong>穩定版保護</strong><span>${APP_VERSION}</span></div>
      <div id="v24StabilityStatus" class="v24-status">檢查備份狀態中…</div>
      <div class="v24-actions">
        <button type="button" id="v24BackupBtn">立即完整備份</button>
        <button type="button" id="v24CheckBtn">檢查更新</button>
        <button type="button" id="v24ClearBtn">清除快取</button>
        <button type="button" id="v24ReloadBtn">重新載入最新版</button>
      </div>`;
    hero.appendChild(card);
    document.getElementById('v24BackupBtn').onclick = downloadBackup;
    document.getElementById('v24CheckBtn').onclick = checkUpdate;
    document.getElementById('v24ClearBtn').onclick = clearPwaCache;
    document.getElementById('v24ReloadBtn').onclick = hardReload;
    updateStabilityText();
  }
  function setBrandV24(){
    document.title = '我の木工 PWA v25';
    const top = document.querySelector('.hero > div'); if (top) top.textContent = '我の木工 PWA v24';
    const h1 = document.querySelector('.hero h1'); if (h1) h1.textContent = '穩定保護版：版本、備份、更新';
    const p = document.querySelector('.hero p'); if (p) p.textContent = '以可正常使用的 v23 為底，加入版本顯示、備份提醒、更新檢查與快取修復，保留專案、購物、耗材、鋸路排版與完整備份。';
    const foot = document.querySelector('.footer'); if (foot) foot.textContent = 'PWA v24 穩定版｜尺寸單位 mm｜本機儲存 localStorage｜無啟動畫面｜穩定更新';
    const save = document.getElementById('saveNote');
    if (save && !save.textContent.includes('PWA v24')) save.insertAdjacentHTML('beforeend', ' <span class="pwa-mini-version">PWA v24</span>');
    ensureStabilityCard();
    // remove any older splash/intro remnants if cached HTML ever contains them
    document.querySelectorAll('#splash,.splash,.intro-screen,.startup-screen').forEach(el => el.remove());
  }
  const style = document.createElement('style');
  style.textContent = `
    .v24-stability-card{margin-top:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px;color:#fff}
    .v24-title-row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:8px}.v24-title-row span{background:#fff;color:#111;border-radius:999px;padding:5px 9px;font-size:.78rem;font-weight:800}.v24-status{font-size:.8rem;color:#ddd;margin-bottom:10px;line-height:1.5}.v24-actions{display:flex;flex-wrap:wrap;gap:8px}.v24-actions button{border:none;border-radius:12px;background:#fff;color:#111;font-weight:800;padding:9px 11px;font-size:.8rem}.pwa-mini-version{display:inline-block;margin-left:8px;background:#fff;color:#111;border-radius:999px;padding:4px 8px;font-size:.76rem;font-weight:800}
  `;
  document.head.appendChild(style);
  window.addEventListener('load', () => { setBrandV24(); setTimeout(setBrandV24, 150); setTimeout(setBrandV24, 800); });
  const oldRender = window.render;
  if (typeof oldRender === 'function'){
    window.render = function(){ const r = oldRender.apply(this, arguments); setTimeout(setBrandV24, 0); return r; };
  }
  setBrandV24();
})();
</script>


<script>
// v25 project management layer: search, status filter, copy, cost statistics.
(function(){
  'use strict';
  const APP_VERSION_V25 = 'PWA v25';
  const PROJECT_KEY = 'woodworking_projects_v23';
  const SHOP_KEY = 'woodworking_shopping_v23';
  const INV_KEY = 'woodworking_inventory_v23';
  const FILTER_KEY = 'woodworking_project_filter_v25';
  const LAST_BACKUP_KEY = 'woodworking_last_backup_at_v25';

  function h(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function readJSON(key, fallback){ try{ const v=localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
  function writeJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
  function nowText(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  function numberOnly(v){ const n = Number(String(v ?? '').replace(/[^0-9.\-]/g,'')); return Number.isFinite(n) ? n : 0; }
  function twd(n){ return `NT$${Math.round(Number(n)||0).toLocaleString('zh-TW')}`; }
  function loadProjects(){ return readJSON(PROJECT_KEY, []); }
  function saveProjects(list){ writeJSON(PROJECT_KEY, list); }
  function loadShopping(){ return readJSON(SHOP_KEY, []); }
  function loadInv(){ return readJSON(INV_KEY, []); }
  function projectCost(p){
    if (p && (p.cost !== undefined && p.cost !== null && p.cost !== '')) return numberOnly(p.cost);
    if (p && Array.isArray(p.shopping)) return p.shopping.reduce((s,x)=>s+numberOnly(x.price),0);
    return 0;
  }
  function currentTitle(){
    const f = (window.state && (state.resultForm || state.form)) || {};
    const name = (typeof projectName === 'function') ? projectName(f.projectType) : (f.projectType || '專案');
    return `${name} ${f.width||0}×${f.depth||0}×${f.height||0}mm`;
  }
  function currentCostGuess(){
    const shopping = loadShopping();
    const n = shopping.reduce((s,x)=>s+numberOnly(x.price),0);
    return n || '';
  }
  function getFilter(){ return Object.assign({q:'', status:'全部', sort:'updated_desc'}, readJSON(FILTER_KEY, {})); }
  function setFilter(next){ writeJSON(FILTER_KEY, Object.assign(getFilter(), next)); }
  function normalize(s){ return String(s||'').toLowerCase().trim(); }
  function filteredProjects(list){
    const f = getFilter();
    const q = normalize(f.q);
    let arr = list.map((p,i)=>({p,i}));
    if (f.status && f.status !== '全部') arr = arr.filter(x => String(x.p.status||'') === f.status);
    if (q) arr = arr.filter(x => normalize([x.p.name,x.p.type,x.p.size,x.p.status,x.p.note,x.p.updatedAt,x.p.completedAt].join(' ')).includes(q));
    const sort = f.sort || 'updated_desc';
    arr.sort((a,b)=>{
      if (sort === 'cost_desc') return projectCost(b.p) - projectCost(a.p);
      if (sort === 'cost_asc') return projectCost(a.p) - projectCost(b.p);
      if (sort === 'name_asc') return String(a.p.name||'').localeCompare(String(b.p.name||''), 'zh-Hant');
      if (sort === 'status_asc') return String(a.p.status||'').localeCompare(String(b.p.status||''), 'zh-Hant');
      return String(b.p.updatedAt||'').localeCompare(String(a.p.updatedAt||''));
    });
    return arr;
  }
  function cutSummary(p){
    const cut = p && p.result && Array.isArray(p.result.cutList) ? p.result.cutList : [];
    const total = cut.reduce((s,x)=>s+(Number(x.qty)||0),0);
    if (!cut.length) return '尚無裁切清單';
    return `${cut.length} 種零件 / ${total} 件`;
  }
  function projectStats(list, filtered){
    const totalCost = list.reduce((s,p)=>s+projectCost(p),0);
    const filteredCost = filtered.reduce((s,x)=>s+projectCost(x.p),0);
    const statusMap = {};
    list.forEach(p=>{ const k=p.status||'未分類'; statusMap[k]=(statusMap[k]||0)+1; });
    const statusText = Object.entries(statusMap).map(([k,v])=>`${h(k)} ${v}`).join('｜') || '尚無資料';
    return `<div class="grid three">
      <div class="option-card"><strong>全部專案</strong><div class="small">${list.length} 筆｜總成本 ${twd(totalCost)}</div></div>
      <div class="option-card"><strong>目前篩選</strong><div class="small">${filtered.length} 筆｜篩選成本 ${twd(filteredCost)}</div></div>
      <div class="option-card"><strong>狀態分布</strong><div class="small">${statusText}</div></div>
    </div>`;
  }
  function renderProjectsTabV25(){
    const list = loadProjects();
    const filter = getFilter();
    const filtered = filteredProjects(list);
    const statusOptions = ['全部','設計中','待買料','已下料','組裝中','已完成'];
    const rows = filtered.map(({p,i})=>{
      const cost = projectCost(p);
      const warnCount = Array.isArray(p.warnings) ? p.warnings.length : 0;
      const details = `<details><summary>查看專案內容</summary><div class="small" style="margin-top:8px;line-height:1.7">類型：${h(p.type||'')}<br>尺寸：${h(p.size||'')}<br>裁切：${h(cutSummary(p))}<br>提醒：${warnCount} 項<br>完成日期：${h(p.completedAt||'未填')}</div></details>`;
      return `<tr>
        <td><strong>${h(p.name)}</strong><div class="small">${h(p.type)}｜${h(p.size)}｜更新 ${h(p.updatedAt||'')}</div>${details}</td>
        <td><span class="badge">${h(p.status||'未分類')}</span></td>
        <td><strong>${twd(cost)}</strong></td>
        <td><div class="small" style="max-width:220px;white-space:normal">${h(p.note||'')}</div></td>
        <td style="white-space:nowrap"><button class="secondary v25-load-project" data-i="${i}" style="padding:7px 10px;border-radius:10px">載入</button> <button class="secondary v25-copy-project" data-i="${i}" style="padding:7px 10px;border-radius:10px">複製</button> <button class="secondary v25-del-project" data-i="${i}" style="padding:7px 10px;border-radius:10px">刪除</button></td>
      </tr>`;
    }).join('');
    return `<div class="card"><h2>專案管理強化版</h2><div class="small">v25 新增：專案複製、搜尋、狀態篩選、成本統計與更大的備註欄位。資料仍只存在本機。</div></div>
      <div class="card"><h2>專案成本統計</h2>${projectStats(list, filtered)}</div>
      <div class="card"><h2>儲存目前結果</h2><div class="grid two">
        <label><div class="label">專案名稱</div><input id="v25ProjectName" value="${h(currentTitle())}"></label>
        <label><div class="label">狀態</div><select id="v25ProjectStatus">${statusOptions.filter(x=>x!=='全部').map(x=>`<option>${x}</option>`).join('')}</select></label>
        <label><div class="label">預估 / 實際成本 TWD</div><input id="v25ProjectCost" type="number" value="${h(currentCostGuess())}" placeholder="例如 850"></label>
        <label><div class="label">完成日期</div><input id="v25ProjectDone" type="date"></label>
        <label style="grid-column:1/-1"><div class="label">備註</div><textarea id="v25ProjectNote" rows="5" placeholder="材料來源、問題、下次要改的地方、施工注意點"></textarea></label>
      </div><div class="btn-row"><button class="primary" id="v25SaveProject">儲存成專案</button></div></div>
      <div class="card"><h2>搜尋 / 篩選</h2><div class="grid three">
        <label><div class="label">關鍵字</div><input id="v25ProjectSearch" value="${h(filter.q)}" placeholder="搜尋名稱、備註、類型"></label>
        <label><div class="label">狀態</div><select id="v25ProjectFilterStatus">${statusOptions.map(x=>`<option ${filter.status===x?'selected':''}>${x}</option>`).join('')}</select></label>
        <label><div class="label">排序</div><select id="v25ProjectSort"><option value="updated_desc" ${filter.sort==='updated_desc'?'selected':''}>最近更新</option><option value="cost_desc" ${filter.sort==='cost_desc'?'selected':''}>成本高到低</option><option value="cost_asc" ${filter.sort==='cost_asc'?'selected':''}>成本低到高</option><option value="name_asc" ${filter.sort==='name_asc'?'selected':''}>名稱 A-Z</option><option value="status_asc" ${filter.sort==='status_asc'?'selected':''}>狀態排序</option></select></label>
      </div><div class="btn-row"><button class="primary" id="v25ApplyProjectFilter">套用篩選</button><button class="secondary" id="v25ClearProjectFilter">清除篩選</button></div></div>
      <div class="card"><h2>已儲存專案：${list.length} 筆</h2><table><thead><tr><th>專案</th><th>狀態</th><th>成本</th><th>備註</th><th>操作</th></tr></thead><tbody>${rows || '<tr><td colspan="5" class="small">沒有符合條件的專案，或尚未儲存專案。</td></tr>'}</tbody></table></div>`;
  }
  function saveCurrentProjectV25(){
    const list = loadProjects();
    const f = (window.state && (state.resultForm || state.form)) || {};
    const name = document.getElementById('v25ProjectName')?.value.trim() || currentTitle();
    const status = document.getElementById('v25ProjectStatus')?.value || '設計中';
    const note = document.getElementById('v25ProjectNote')?.value.trim() || '';
    const cost = document.getElementById('v25ProjectCost')?.value || '';
    const completedAt = document.getElementById('v25ProjectDone')?.value || '';
    let result = state && state.result ? state.result : null;
    try { if (!result && typeof calculateAll === 'function') result = calculateAll(f); } catch(e){}
    let warnings = [];
    try { if (typeof warningsV23 === 'function') warnings = warningsV23(); } catch(e){}
    list.unshift({
      name, status, note, cost, completedAt,
      type: (typeof projectName === 'function') ? projectName(f.projectType) : String(f.projectType||''),
      size: `${f.width||0}×${f.depth||0}×${f.height||0} mm`,
      form: {...f}, result, warnings,
      shopping: loadShopping(), inventorySnapshotCount: loadInv().length,
      updatedAt: nowText(), version: 'v25'
    });
    saveProjects(list); render();
  }
  function loadProjectV25(index){
    const p = loadProjects()[Number(index)]; if(!p) return;
    try{
      state.form = {...defaultForm, ...p.form};
      state.resultForm = {...defaultForm, ...p.form};
      state.result = p.result || (typeof calculateAll === 'function' ? calculateAll(state.resultForm) : null);
      saveState('載入專案');
      activeTab = 'calc'; localStorage.setItem(TAB_KEY, activeTab); render();
    }catch(e){ alert('載入失敗，專案資料可能不完整。'); }
  }
  function copyProjectV25(index){
    const list = loadProjects(); const p = list[Number(index)]; if(!p) return;
    const copy = JSON.parse(JSON.stringify(p));
    copy.name = `${copy.name || '未命名專案'} - 複製`;
    copy.status = '設計中';
    copy.updatedAt = nowText();
    copy.version = 'v25-copy';
    list.unshift(copy); saveProjects(list); render();
  }
  function deleteProjectV25(index){
    const list = loadProjects(); const p = list[Number(index)]; if(!p) return;
    if(!confirm(`刪除專案「${p.name || ''}」？`)) return;
    list.splice(Number(index),1); saveProjects(list); render();
  }
  function bindProjectsV25(){
    const save = document.getElementById('v25SaveProject'); if(save) save.onclick = saveCurrentProjectV25;
    const apply = document.getElementById('v25ApplyProjectFilter'); if(apply) apply.onclick = () => { setFilter({q:document.getElementById('v25ProjectSearch').value, status:document.getElementById('v25ProjectFilterStatus').value, sort:document.getElementById('v25ProjectSort').value}); render(); };
    const clear = document.getElementById('v25ClearProjectFilter'); if(clear) clear.onclick = () => { writeJSON(FILTER_KEY, {q:'', status:'全部', sort:'updated_desc'}); render(); };
    const search = document.getElementById('v25ProjectSearch'); if(search) search.onkeydown = ev => { if(ev.key === 'Enter'){ setFilter({q:search.value}); render(); } };
    const stat = document.getElementById('v25ProjectFilterStatus'); if(stat) stat.onchange = () => { setFilter({status:stat.value}); render(); };
    const sort = document.getElementById('v25ProjectSort'); if(sort) sort.onchange = () => { setFilter({sort:sort.value}); render(); };
    document.querySelectorAll('.v25-load-project').forEach(b=>b.onclick=()=>loadProjectV25(b.dataset.i));
    document.querySelectorAll('.v25-copy-project').forEach(b=>b.onclick=()=>copyProjectV25(b.dataset.i));
    document.querySelectorAll('.v25-del-project').forEach(b=>b.onclick=()=>deleteProjectV25(b.dataset.i));
  }
  function allWoodworkingLocalStorage(){
    const obj = {}; for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k && (k.startsWith('woodworking') || k.startsWith('hardware_'))) obj[k]=localStorage.getItem(k); } return obj;
  }
  function downloadBackupV25(){
    const payload = {version:'v25', app:'我の木工', exportedAt:new Date().toISOString(), localStorage: allWoodworkingLocalStorage()};
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob); const a=document.createElement('a');
    a.href = url; a.download = `wo-no-mokkou-v25-full-backup-${new Date().toISOString().slice(0,10)}.json`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    localStorage.setItem(LAST_BACKUP_KEY, new Date().toISOString());
    const st=document.getElementById('v24StabilityStatus'); if(st) st.textContent='已建立 v25 完整備份。';
  }
  async function checkUpdateV25(){
    const st=document.getElementById('v24StabilityStatus'); if(st) st.textContent='正在檢查更新…';
    try{ if('serviceWorker' in navigator){ const reg=await navigator.serviceWorker.getRegistration(); if(reg) await reg.update(); } const r=await fetch('./version.json?t='+Date.now(),{cache:'no-store'}); const j=await r.json(); if(st) st.textContent=`已檢查：線上版本 ${j.version || '未知'}；目前頁面 ${APP_VERSION_V25}。`; }catch(e){ if(st) st.textContent='檢查更新失敗，請清除快取後重開。'; }
  }
  async function clearCacheV25(){
    try{ if('caches' in window){ const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k))); } if('serviceWorker' in navigator){ const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister())); } }catch(e){}
    location.replace('./index.html?v=25&fresh='+Date.now());
  }
  function setBrandV25(){
    document.title = '我の木工 PWA v25';
    const top = document.querySelector('.hero > div'); if(top) top.textContent = '我の木工 PWA v25';
    const h1 = document.querySelector('.hero h1'); if(h1) h1.textContent = '專案強化版：搜尋、篩選、複製、成本';
    const p = document.querySelector('.hero p'); if(p) p.textContent = '以 v24 穩定版為底，強化專案管理：可複製專案、搜尋、狀態篩選、成本統計與大型備註欄位。';
    const foot = document.querySelector('.footer'); if(foot) foot.textContent = 'PWA v25 專案強化版｜尺寸單位 mm｜本機儲存 localStorage｜無啟動畫面｜穩定更新';
    document.querySelectorAll('.pwa-mini-version').forEach(x=>x.textContent='PWA v25');
    const row = document.querySelector('#v24StabilityCard .v24-title-row'); if(row){ const strong=row.querySelector('strong'); const span=row.querySelector('span'); if(strong) strong.textContent='穩定版保護'; if(span) span.textContent='PWA v25'; }
    const b1=document.getElementById('v24BackupBtn'); if(b1) b1.onclick=downloadBackupV25;
    const b2=document.getElementById('v24CheckBtn'); if(b2) b2.onclick=checkUpdateV25;
    const b3=document.getElementById('v24ClearBtn'); if(b3) b3.onclick=clearCacheV25;
    const b4=document.getElementById('v24ReloadBtn'); if(b4) b4.onclick=()=>location.replace('./index.html?v=25&t='+Date.now());
  }
  const style = document.createElement('style');
  style.textContent = `.v25-project-table td{vertical-align:top}.v25-cost{font-weight:900}.card details summary{cursor:pointer;font-weight:700}.card textarea{font-family:inherit}`;
  document.head.appendChild(style);

  const oldRender = window.render;
  window.render = function(){
    if (typeof activeTab !== 'undefined' && activeTab === 'projects'){
      if (typeof renderTabs === 'function') renderTabs();
      const view = document.getElementById('view');
      if (view) view.innerHTML = renderProjectsTabV25();
      bindProjectsV25(); setBrandV25();
      return;
    }
    const r = (typeof oldRender === 'function') ? oldRender.apply(this, arguments) : undefined;
    setTimeout(setBrandV25, 0);
    return r;
  };
  try { render = window.render; } catch(e) {}
  window.addEventListener('load', ()=>{ setTimeout(setBrandV25, 60); setTimeout(()=>{ try{ render(); }catch(e){} }, 120); });
  setBrandV25();
  try { if (typeof render === 'function') render(); } catch(e){ console.error('v25 render failed', e); }
})();
</script>


<script>
// v26 construction steps + production records/photos layer.
(function(){
  'use strict';
  const APP_VERSION_V26 = 'PWA v26';
  const STEPS_KEY = 'woodworking_steps_v26';
  const RECORDS_KEY = 'woodworking_records_v26';
  const RECORD_FILTER_KEY = 'woodworking_record_filter_v26';

  function h(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function readJSON(key, fallback){ try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
  function writeJSON(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
  function nowText(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
  function currentForm(){ return (typeof state !== 'undefined' && (state.resultForm || state.form)) ? (state.resultForm || state.form) : {}; }
  function pName(f){ try{ return (typeof projectName === 'function') ? projectName(f.projectType) : String(f.projectType || '專案'); }catch(e){ return String(f.projectType || '專案'); } }
  function currentProjectKey(){ const f=currentForm(); return [f.projectType||'custom', f.width||0, f.depth||0, f.height||0, f.materialThickness||0].join('_'); }
  function currentProjectTitle(){ const f=currentForm(); return `${pName(f)} ${f.width||0}×${f.depth||0}×${f.height||0}mm`; }
  function loadStepsStore(){ return readJSON(STEPS_KEY, {itemsByKey:{}}); }
  function saveStepsStore(s){ writeJSON(STEPS_KEY, s); }
  function loadSteps(key=currentProjectKey()){ const s=loadStepsStore(); return Array.isArray(s.itemsByKey && s.itemsByKey[key]) ? s.itemsByKey[key] : []; }
  function saveSteps(items, key=currentProjectKey()){ const s=loadStepsStore(); if(!s.itemsByKey) s.itemsByKey={}; s.itemsByKey[key]=items; s.updatedAt=new Date().toISOString(); saveStepsStore(s); }
  function loadRecords(){ return readJSON(RECORDS_KEY, []); }
  function saveRecords(list){ writeJSON(RECORDS_KEY, list); }
  function stepItem(text, group){ return {id:'s'+Math.random().toString(36).slice(2)+Date.now(), text, group:group||'一般', checked:false, note:''}; }
  function defaultStepsForCurrent(){
    const f=currentForm(); const type=f.projectType; const steps=[];
    steps.push(stepItem('確認成品外尺寸、板厚、五金實際規格與牆面/安裝空間', '準備'));
    steps.push(stepItem('依 App 裁切清單標記零件名稱與方向，確認鋸路/切縫預留', '準備'));
    steps.push(stepItem('裁切主要板件，保留 1–2 mm 修整量；成組零件盡量同時裁切保持一致', '下料'));
    steps.push(stepItem('試排板件與五金位置，先不要上膠，確認孔位、邊距與開合空間', '試組'));
    if(type==='drawer'){
      steps.push(stepItem('裁切抽屜側板、前後板與底板；底板槽先試切廢料確認深度', '抽屜'));
      steps.push(stepItem('側板預鑽先導孔，前後板確認垂直後再鎖螺絲或上膠夾緊', '抽屜'));
      steps.push(stepItem('安裝滑軌，左右高度一致，先只鎖調整孔，測試順暢後再補鎖', '抽屜'));
      steps.push(stepItem('安裝抽面板，四周留縫約 2 mm，最後再調整把手或反彈器', '抽屜'));
    } else if(['cabinet','bookshelf','shoecabinet','tvconsole','wallcabinet','lstorage'].includes(type)){
      steps.push(stepItem('側板、頂底板、中隔板先標記內外面與前後方向，避免組裝反向', '櫃體'));
      steps.push(stepItem('層板孔、層板托、角碼或木榫孔先用治具定位，左右高度要一致', '櫃體'));
      steps.push(stepItem('先組成方框並量對角線，確認櫃體方正後再固定背板或背條', '櫃體'));
      steps.push(stepItem('高櫃、書架、吊櫃或壁掛件加防傾倒/牆面固定，最後再放重物測試', '櫃體'));
      if(type==='wallcabinet') steps.push(stepItem('法式掛條或吊碼先鎖到牆體結構，掛上後檢查水平與防脫落固定', '壁掛'));
    } else if(type==='pegboard'){
      steps.push(stepItem('先確認孔距、孔徑、邊距與背後留空；重載位置可加背條或加厚補強', '洞洞板'));
      steps.push(stepItem('雷射/鑽孔前先做 3–5 個孔測試，確認掛鉤或圓棒插入鬆緊度', '洞洞板'));
      steps.push(stepItem('牆面固定位置先找結構或使用合適壁虎，板背加墊條保持掛鉤空間', '洞洞板'));
      steps.push(stepItem('掛重物前先用較輕工具測試，重物建議跨多孔位或使用獨立托架', '洞洞板'));
    } else if(type==='doorpanel'){
      steps.push(stepItem('門板四周確認縫隙，標記上/下/左/右，避免木紋與方向裝反', '門板'));
      steps.push(stepItem('杯鉸孔先在廢料試鑽深度，避免 35mm 杯孔打穿門板', '門板'));
      steps.push(stepItem('先裝鉸鏈與底座，門縫調整後再補鎖全部螺絲', '門板'));
    } else if(type==='table'){
      steps.push(stepItem('桌腳與圍板先配對標記，榫卯或角碼位置保持對稱', '桌子'));
      steps.push(stepItem('先乾組桌架並量對角線，確認不晃後再上膠或補鎖', '桌子'));
      steps.push(stepItem('桌面與桌架連接需預留木材伸縮空間，不建議整排死鎖', '桌子'));
    } else {
      steps.push(stepItem('依目前做法先完成乾式試組，再決定是否上膠或永久固定', '組裝'));
    }
    steps.push(stepItem('所有外露邊角倒角/砂磨，檢查毛邊、崩邊與雷射焦痕', '修整'));
    steps.push(stepItem('正式承重或使用前，逐一檢查螺絲、角碼、滑軌、掛條與活動件', '驗收'));
    steps.push(stepItem('拍照記錄完成狀態，填寫問題與下次改善備註', '紀錄'));
    return steps;
  }
  function progressText(items){ const total=items.length; const done=items.filter(x=>x.checked).length; const pct=total?Math.round(done/total*100):0; return {done,total,pct}; }
  function renderStepsTabV26(){
    const key=currentProjectKey(); const saved=loadSteps(key); const items=saved.length?saved:defaultStepsForCurrent(); const p=progressText(items);
    const rows=items.map((x,i)=>`<div class="v26-step-row ${x.checked?'done':''}">
      <label class="v26-step-check"><input type="checkbox" class="v26-step-toggle" data-i="${i}" ${x.checked?'checked':''}><span><strong>${h(x.group||'步驟')}</strong>｜${h(x.text)}</span></label>
      <textarea class="v26-step-note" data-i="${i}" rows="2" placeholder="此步驟備註，例如孔位、實際尺寸、問題">${h(x.note||'')}</textarea>
      <div class="btn-row" style="margin-top:4px"><button class="secondary v26-step-up" data-i="${i}" style="padding:6px 9px;border-radius:10px">上移</button><button class="secondary v26-step-down" data-i="${i}" style="padding:6px 9px;border-radius:10px">下移</button><button class="secondary v26-step-del" data-i="${i}" style="padding:6px 9px;border-radius:10px">刪除</button></div>
    </div>`).join('');
    return `<div class="card"><h2>施工步驟勾選</h2><div class="small">依目前計算結果產生施工流程，可邊做邊勾選。不同尺寸/類型會分開儲存。</div></div>
      <div class="card"><h2>${h(currentProjectTitle())}</h2><div class="v26-progress"><div style="width:${p.pct}%"></div></div><div class="small">進度：${p.done}/${p.total}，${p.pct}%｜儲存鍵：${h(key)}</div><div class="btn-row"><button class="primary" id="v26GenSteps">重新產生預設步驟</button><button class="secondary" id="v26ClearChecks">清除全部勾選</button><button class="secondary" id="v26ExportSteps">匯出步驟文字</button></div></div>
      <div class="card"><h2>新增自訂步驟</h2><div class="grid two"><label><div class="label">分類</div><input id="v26NewStepGroup" placeholder="例如：下料 / 組裝 / 修整"></label><label><div class="label">步驟內容</div><input id="v26NewStepText" placeholder="輸入要加入的施工步驟"></label></div><div class="btn-row"><button class="primary" id="v26AddStep">加入步驟</button></div></div>
      <div class="card"><h2>步驟清單</h2><div class="v26-step-list">${rows}</div></div>`;
  }
  function bindStepsTabV26(){
    const key=currentProjectKey(); let items=loadSteps(key); if(!items.length){ items=defaultStepsForCurrent(); saveSteps(items,key); }
    const persist=()=>saveSteps(items,key);
    document.querySelectorAll('.v26-step-toggle').forEach(el=>el.onchange=()=>{ items[Number(el.dataset.i)].checked=el.checked; persist(); render(); });
    document.querySelectorAll('.v26-step-note').forEach(el=>el.onchange=()=>{ items[Number(el.dataset.i)].note=el.value; persist(); });
    document.querySelectorAll('.v26-step-del').forEach(b=>b.onclick=()=>{ items.splice(Number(b.dataset.i),1); persist(); render(); });
    document.querySelectorAll('.v26-step-up').forEach(b=>b.onclick=()=>{ const i=Number(b.dataset.i); if(i>0){ [items[i-1],items[i]]=[items[i],items[i-1]]; persist(); render(); } });
    document.querySelectorAll('.v26-step-down').forEach(b=>b.onclick=()=>{ const i=Number(b.dataset.i); if(i<items.length-1){ [items[i+1],items[i]]=[items[i],items[i+1]]; persist(); render(); } });
    const gen=document.getElementById('v26GenSteps'); if(gen) gen.onclick=()=>{ if(confirm('重新產生會覆蓋目前這組施工步驟，確定？')){ saveSteps(defaultStepsForCurrent(),key); render(); } };
    const clear=document.getElementById('v26ClearChecks'); if(clear) clear.onclick=()=>{ items.forEach(x=>x.checked=false); persist(); render(); };
    const add=document.getElementById('v26AddStep'); if(add) add.onclick=()=>{ const text=document.getElementById('v26NewStepText').value.trim(); if(!text){ alert('請輸入步驟內容'); return; } const group=document.getElementById('v26NewStepGroup').value.trim()||'自訂'; items.push(stepItem(text,group)); persist(); render(); };
    const exp=document.getElementById('v26ExportSteps'); if(exp) exp.onclick=()=>{ const txt=[`我の木工 施工步驟｜${currentProjectTitle()}`,`匯出時間：${nowText()}`,''].concat(items.map((x,i)=>`${i+1}. [${x.checked?'完成':'未完成'}] ${x.group||'步驟'}｜${x.text}${x.note?`\n   備註：${x.note}`:''}`)).join('\n'); const blob=new Blob([txt],{type:'text/plain;charset=utf-8'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`wo-no-mokkou-steps-${new Date().toISOString().slice(0,10)}.txt`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); };
  }
  function compressImage(file, maxSize=900, quality=.68){
    return new Promise((resolve,reject)=>{
      if(!file) return resolve('');
      const img=new Image(); const url=URL.createObjectURL(file);
      img.onload=()=>{ try{ const scale=Math.min(1, maxSize/Math.max(img.width,img.height)); const w=Math.max(1,Math.round(img.width*scale)); const hgt=Math.max(1,Math.round(img.height*scale)); const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=hgt; const ctx=canvas.getContext('2d'); ctx.drawImage(img,0,0,w,hgt); URL.revokeObjectURL(url); resolve(canvas.toDataURL('image/jpeg', quality)); }catch(e){ reject(e); } };
      img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('image load failed')); };
      img.src=url;
    });
  }
  function renderRecordsTabV26(){
    const records=loadRecords(); const filter=readJSON(RECORD_FILTER_KEY,{mode:'current',q:''}); const key=currentProjectKey(); const q=String(filter.q||'').toLowerCase();

  `;
  document.head.appendChild(style);

  function esc(s){return String(s ?? '').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
  function num(v){ const n=Number(v); return Number.isFinite(n)?n:0; }
  function fmt(v){ const n=num(v); return (Math.round(n*10)/10).toString().replace(/\.0$/,''); }

  function mark(x,y,n){ return `<circle cx="${x}" cy="${y}" r="12" fill="#111"></circle><text x="${x}" y="${y+4}" font-size="11" fill="#fff" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">${esc(n)}</text>`; }
  function pName(type){ try{ return (typeof projectName==='function') ? projectName(type) : String(type||'專案'); }catch(e){ return String(type||'專案'); } }
  function card(title, tag, note, body){ return `<div class="v30-card"><div class="v30-head"><strong>${esc(title)}</strong><span class="v30-tag">${esc(tag)}</span></div><div class="v30-note">${esc(note)}</div>${body}</div>`; }

  function parseDrawerHeights(f){
    const count=Math.max(1, Math.round(num(f.shelfCount)||3));
    const raw=String(f.drawerHeights||'').split(/[,，\s]+/).map(v=>num(v)).filter(v=>v>0);
    if(raw.length>=count) return raw.slice(0,count);
    const gap=num(f.gap)||2, usable=Math.max(120, num(f.height) - gap*(count+1) - 36);
    const each=Math.max(80, Math.floor(usable/count));
    return Array.from({length:count},()=>each);
  }

  function buildPieces(f){
    const type=f.projectType, W=num(f.width), D=num(f.depth), H=num(f.height), t=Math.max(1,num(f.materialThickness)||18), gap=num(f.gap)||2, arm=num(f.armDepth)||Math.max(180,D), backT=num(f.backThickness)||5, shelfCount=Math.max(1,Math.round(num(f.shelfCount)||2));

      const mi=methodInfo();
      return {pieces:pcs, hardware:[{item:'系統孔 / 層板托',spec:'5 mm 孔；孔距 32 mm',note:'常見前後排孔心離板前/後約 37 mm'},{item:'板件固定做法',spec:mi.label,note:mi.install},{item:'背板固定',spec:'2.5×16 mm 或釘槍',note:'背板可顯著提升抗扭'},{item:'施工判斷',spec:mi.label,note:mi.note}]};

    }
    if(type===DRAWER_CHEST_KEY){

        pcs.push({no:n++,name:`抽屜底板 ${idx+1}`,size:mm(boxW,Math.max(60,slideLen-2*t),bottomT),note:`第 ${idx+1} 層底板`});

  function bindDiagramTools(){
    const m=document.getElementById('v30Method'); if(m) m.onchange=()=>{ setMethod(m.value); render(); };
    const s=document.getElementById('v30Scale'); if(s) s.onchange=()=>{ setScale(s.value); render(); };
    const print=document.getElementById('v30PrintPdf'); if(print) print.onclick=()=>window.print();
    const png=document.getElementById('v30ExportPng');
    if(png) png.onclick=()=>{
      const svg=document.querySelector('#view .v30-export-target');
      if(!svg){ alert('目前沒有可匯出的施工圖。'); return; }
      const serializer=new XMLSerializer();
      let source=serializer.serializeToString(svg);
      if(!source.match(/^<svg[^>]+xmlns="http:\/\/www\.w3\.org\/2000\/svg"/)) source=source.replace(/^<svg/,'<svg xmlns="http://www.w3.org/2000/svg"');
      const blob=new Blob([source],{type:'image/svg+xml;charset=utf-8'});
      const url=URL.createObjectURL(blob); const img=new Image();
      img.onload=()=>{ const vb=svg.viewBox.baseVal; const w=(vb && vb.width) ? vb.width : svg.clientWidth || 800; const h=(vb && vb.height) ? vb.height : svg.clientHeight || 600; const canvas=document.createElement('canvas'); canvas.width=w*2; canvas.height=h*2; const ctx=canvas.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width,canvas.height); URL.revokeObjectURL(url); const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download=`wo-no-mokkou-diagram-${Date.now()}.png`; a.click(); };
      img.onerror=()=>{ URL.revokeObjectURL(url); alert('PNG 匯出失敗，請改用列印 / 存成 PDF。'); };

      const blob=new Blob([source],{type:'image/svg+xml;charset=utf-8'});
      const url=URL.createObjectURL(blob); const img=new Image();
      img.onload=()=>{ const vb=svg.viewBox.baseVal; const w=(vb && vb.width) ? vb.width : svg.clientWidth || 800; const h=(vb && vb.height) ? vb.height : svg.clientHeight || 600; const canvas=document.createElement('canvas'); canvas.width=w*2; canvas.height=h*2; const ctx=canvas.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0,canvas.width,canvas.height); URL.revokeObjectURL(url); const a=document.createElement('a'); a.href=canvas.toDataURL('image/png'); a.download=`wo-no-mokkou-layout-${Date.now()}.png`; a.click(); };
      img.onerror=()=>{ URL.revokeObjectURL(url); alert('PNG 匯出失敗，請改用列印 / 存成 PDF。'); };
      img.src=url;
    };
  }

  function applyBrandV30(){
    document.title='我の木工 PWA v30';
    const top=document.querySelector('.hero > div'); if(top) top.textContent='我の木工 PWA v30';
    const h1=document.querySelector('.hero h1'); if(h1) h1.textContent='輸出 + 排版同步 + 抽屜櫃施工圖版';
    const p=document.querySelector('.hero p'); if(p) p.textContent='加入匯出 PNG / 列印 PDF、排版圖板件編號同步、五金做法切換、比例尺與抽屜櫃施工圖。';
    const foot=document.querySelector('.footer'); if(foot) foot.textContent='PWA v30 施工圖輸出版｜尺寸單位 mm｜本機儲存 localStorage｜穩定更新';
    document.querySelectorAll('.pwa-mini-version').forEach(x=>x.textContent=APP_VERSION_V30);
    const row=document.querySelector('#v24StabilityCard .v24-title-row'); if(row){ const strong=row.querySelector('strong'); const span=row.querySelector('span'); if(strong) strong.textContent='穩定版保護'; if(span) span.textContent=APP_VERSION_V30; }
    const save=document.getElementById('saveNote'); if(save){ const txt=(save.textContent||'').replace(/PWA v\d+/g,'').replace(/\s+/g,' ').trim(); save.innerHTML=''; const s1=document.createElement('span'); s1.textContent=txt || '本機儲存：已更新'; save.appendChild(s1); const s2=document.createElement('span'); s2.className='pwa-mini-version'; s2.textContent=APP_VERSION_V30; save.appendChild(s2); }
  }

  const prevRender = window.render;
  window.render = function(){
    const r = prevRender ? prevRender.apply(this, arguments) : undefined;
    try {
      const view=document.getElementById('view');
      if(typeof activeTab !== 'undefined' && activeTab === 'diagrams' && view){ view.innerHTML = renderDiagramsTabV30(); bindDiagramTools(); }
      else if(typeof activeTab !== 'undefined' && activeTab === 'layout' && view){ view.innerHTML = renderLayoutTabV30(); bindLayoutTools(); }
    } catch(e){ console.error('v30 render failed', e); }
    setTimeout(applyBrandV30, 0);
    return r;
  };
  try{ render = window.render; }catch(e){}
  window.addEventListener('load',()=>{ setTimeout(applyBrandV30,80); setTimeout(()=>{ try{ render(); }catch(e){} },200); });
  applyBrandV30();
})();
</script>

  const oldCalculateAllV31 = calculateAll;

  function boxBool(v){ return String(v) !== '0'; }
  function calculateBoxV31(f){
    const W=n31(f.width), D=n31(f.depth), H=n31(f.height), t=Math.max(0.1,n31(f.materialThickness,3));

      {key:'right', part:'右側板', qty:1, w:Math.max(1,D-2*t), h:H, t, note:'右側板件'},
      {key:'bottom', part:'底板', qty:1, w:Math.max(1,W-2*t), h:Math.max(1,D-2*t), t, note:'底部板件'},
      {key:'top', part: lid ? '上蓋' : '上蓋', qty:1, w:W, h:D, t, note: lid ? '上蓋板件' : '未啟用'}
    ];
    const cutList=[];
    defs.forEach(d=>{
      const inc = d.key==='top' ? (lid && boxBool(f.boxIncludeTop)) : boxBool(f['boxInclude'+d.key.charAt(0).toUpperCase()+d.key.slice(1)]);
      if(!inc) return;
      const joint = join==='finger' && boxBool(f['boxJoint'+d.key.charAt(0).toUpperCase()+d.key.slice(1)]);
      cutList.push({
        part:d.part, qty:d.qty, w:d.w, h:d.h, t:d.t,
        size:`${r31(d.w)} × ${r31(d.h)} × ${r31(d.t)}`,

        pieceKey:d.key, include:true, jointCut:joint
      });
    });
    return {
      name:'盒子',
      summary:[`外尺寸 ${r31(W)} × ${r31(D)} × ${r31(H)} mm`,`內淨約 ${r31(innerW)} × ${r31(innerD)} × ${r31(innerH)} mm`,`${lid?'有蓋':'無蓋'}` , `接合：${join==='finger'?'榫卯互扣':'直切 / 膠合'}`],

    return `<div class="card"><h2>專案儲存 / 專案管理</h2><div class="small">已同步顯示板件數量，方便你快速對照哪個專案料件比較多。</div></div><div class="card"><h2>儲存目前結果</h2><div class="grid two"><label><div class="label">專案名稱</div><input id="v23ProjectName" value="${h(currentTitle())}"></label><label><div class="label">狀態</div><select id="v23ProjectStatus"><option>設計中</option><option>待買料</option><option>已下料</option><option>組裝中</option><option>已完成</option></select></label><label style="grid-column:1/-1"><div class="label">備註</div><textarea id="v23ProjectNote" rows="3" placeholder="例如材料來源、問題、下次要改的地方"></textarea></label></div><div class="btn-row"><button class="primary" id="v23SaveProject">儲存成專案</button></div></div><div class="card"><h2>已儲存專案：${list.length} 筆</h2><table><thead><tr><th>專案</th><th>狀態</th><th>備註</th><th>操作</th></tr></thead><tbody>${rows || '<tr><td colspan="4" class="small">尚未儲存專案。</td></tr>'}</tbody></table></div>`;
  };

  const style = document.createElement('style');
  style.textContent = `
  .v31-card{background:#fffdf9;border:1.5px solid #d5bf95;border-radius:18px;padding:14px;margin-bottom:14px}
  .v31-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}
  .v31-tag{display:inline-flex;align-items:center;padding:5px 10px;border-radius:999px;background:#efe2c7;border:1px solid #d5bf95;color:#5d4827;font-size:.76rem;font-weight:700}
  .v31-note{font-size:.86rem;color:#756146;line-height:1.55}
  .v31-grid{display:grid;grid-template-columns:1fr;gap:14px}
  @media (min-width:960px){.v31-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  .v31-svg{width:100%;height:auto;background:#fff;border:1px solid #eee5d7;border-radius:12px}
  .v31-table{width:100%;border-collapse:collapse;font-size:.85rem}
  .v31-table th,.v31-table td{padding:8px 10px;border-bottom:1px solid #eadfcf;text-align:left;vertical-align:top}
  .v31-table th{background:#f7efdf;color:#6b5737;font-size:.78rem}
  .v31-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .v31-legend span{display:inline-flex;align-items:center;gap:6px;border:1px solid #d5bf95;background:#fff9ef;border-radius:999px;padding:5px 10px;font-size:.78rem;color:#5d4827}
  .v31-dot{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:#111;color:#fff;font-size:.72rem;font-weight:700;flex:none}
  `;
  document.head.appendChild(style);

  function E31(s){return String(s ?? '').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
  function T31(x,y,t,size=12,anchor='start',fill='#111'){ return `<text x="${x}" y="${y}" font-size="${size}" fill="${fill}" text-anchor="${anchor}" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">${E31(t)}</text>`; }
  function dimH31(x1,x2,y,label){ return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#666" stroke-width="1.2"></line><line x1="${x1}" y1="${y-8}" x2="${x1}" y2="${y+8}" stroke="#666" stroke-width="1.2"></line><line x1="${x2}" y1="${y-8}" x2="${x2}" y2="${y+8}" stroke="#666" stroke-width="1.2"></line><polygon points="${x1},${y} ${x1+6},${y-3} ${x1+6},${y+3}" fill="#666"></polygon><polygon points="${x2},${y} ${x2-6},${y-3} ${x2-6},${y+3}" fill="#666"></polygon>${T31((x1+x2)/2,y-6,label,11,'middle','#444')}`; }
  function dimV31(x,y1,y2,label){ return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#666" stroke-width="1.2"></line><line x1="${x-8}" y1="${y1}" x2="${x+8}" y2="${y1}" stroke="#666" stroke-width="1.2"></line><line x1="${x-8}" y1="${y2}" x2="${x+8}" y2="${y2}" stroke="#666" stroke-width="1.2"></line><polygon points="${x},${y1} ${x-3},${y1+6} ${x+3},${y1+6}" fill="#666"></polygon><polygon points="${x},${y2} ${x-3},${y2-6} ${x+3},${y2-6}" fill="#666"></polygon>${T31(x-6,(y1+y2)/2,label,11,'end','#444')}`; }
  function mark31(x,y,n){ return `<circle cx="${x}" cy="${y}" r="12" fill="#111"></circle><text x="${x}" y="${y+4}" font-size="11" fill="#fff" text-anchor="middle" font-family="system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">${E31(n)}</text>`; }
  function fmt31(v){ const n=Number(v); return (Math.round(n*10)/10).toString().replace(/\.0$/,''); }
  function mm31(a,b,c){ return [a,b,c].filter(v=>v!==undefined&&v!==null&&v!=='').map(fmt31).join(' × ') + ' mm'; }
  function legend31(items){ return `<div class="v31-legend">${items.map((p,i)=>`<span><i class="v31-dot">${i+1}</i>${E31(p.part)}</span>`).join('')}</div>`; }
  function pieceRows31(items){ return items.map((p,i)=>`<tr><td>${i+1}</td><td>${E31(p.part)}</td><td>${E31(p.size)}</td><td>${E31(p.note||'')}</td></tr>`).join(''); }
  function getScaleTag31(){ return localStorage.getItem('woodworking_v30_scale') || '1:10'; }
  function getMethod31(){ const m = localStorage.getItem('woodworking_v30_method') || 'screw'; return m==='dowel'?'木榫 + 白膠':(m==='bracket'?'角碼 / 五金片':'預鑽孔 + 木螺絲'); }

  function boxPieces31(f){ return calculateBoxV31(f).cutList.map((p,i)=>({...p,no:i+1})); }
  function drawerHeights31(f){ const count=Math.max(1, Math.round(n31(f.shelfCount)||3)); const raw=String(f.drawerHeights||'').split(/[ ,，]+/).map(v=>n31(v)).filter(v=>v>0); if(raw.length>=count) return raw.slice(0,count); const g=n31(f.gap)||2, usable=Math.max(120, n31(f.height)-g*(count+1)-36); const each=Math.max(80, Math.floor(usable/count)); return Array.from({length:count},()=>each); }

  function buildLaserPath31(x,y,w,h,tabsize,depth){
    let seg = Math.max(4, Math.round(w/tabsize)); if(seg%2===0) seg += 1; let segV = Math.max(4, Math.round(h/tabsize)); if(segV%2===0) segV += 1;
    const sx = w/seg, sy = h/segV; let d=`M ${x} ${y}`; let cx=x, cy=y;
    for(let i=0;i<seg;i++){ const nx=x+(i+1)*sx; if(i<seg-1){ d+=` L ${nx} ${cy} L ${nx} ${y - ((i%2===0)?depth:0)}`; cy = y - ((i%2===0)?depth:0); } else { d+=` L ${nx} ${y}`; cy=y; } cx=nx; }
    for(let i=0;i<segV;i++){ const ny=y+(i+1)*sy; if(i<segV-1){ d+=` L ${cx} ${ny} L ${x+w + ((i%2===0)?depth:0)} ${ny}`; cx = x+w + ((i%2===0)?depth:0); } else { d+=` L ${x+w} ${ny}`; cx=x+w; } cy=ny; }
    for(let i=0;i<seg;i++){ const nx=x+w-(i+1)*sx; if(i<seg-1){ d+=` L ${nx} ${cy} L ${nx} ${y+h + ((i%2===0)?depth:0)}`; cy = y+h + ((i%2===0)?depth:0); } else { d+=` L ${nx} ${y+h}`; cy=y+h; } cx=nx; }
    for(let i=0;i<segV;i++){ const ny=y+h-(i+1)*sy; if(i<segV-1){ d+=` L ${cx} ${ny} L ${x - ((i%2===0)?depth:0)} ${ny}`; cx = x - ((i%2===0)?depth:0); } else { d+=` L ${x} ${ny}`; cx=x; } cy=ny; }
    d+=' Z';
    return d;
  }

  function boxLaserSvg31(f){
    const items = boxPieces31(f);
    if(!items.length) return '<svg class="v31-svg" viewBox="0 0 800 340"></svg>';
    const gap=30, maxW=740; let x=30,y=30,rowH=0; const kerf=n31(f.boxLaserKerf)||0, finger=n31(f.boxFingerSize)||12, depth=Math.max(2,n31(f.materialThickness));
    let paths='';

      const path = (String(f.boxJoinType)==='finger' && p.jointCut) ? `<path d="${buildLaserPath31(x,y,w,h,Math.max(8,finger*0.8),Math.max(4,depth*0.8))}" fill="none" stroke="#111" stroke-width="1.2"></path>` : `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="#111" stroke-width="1.2"></rect>`;
      paths += path + T31(x+6,y+18,`#${i+1} ${p.part}`,12,'start','#111') + T31(x+6,y+h+18,`${fmt31(p.w)} × ${fmt31(p.h)} × ${fmt31(p.t)} mm`,11,'start','#444') + T31(x+6,y+h+34,`${p.jointCut && String(f.boxJoinType)==='finger' ? '榫卯切割' : '直切外框'}｜切縫補償 ${fmt31(kerf)} mm`,10,'start','#666');

    return `<svg class="v31-svg v31-export-svg" viewBox="0 0 800 ${vbH}" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="800" height="${vbH}" fill="#fff"></rect>${paths}</svg>`;
  }

  function renderBoxDiagrams31(){
    const f = state.resultForm, result = state.result, items = boxPieces31(f);
    const W=fmt31(f.width), D=fmt31(f.depth), H=fmt31(f.height), t=fmt31(f.materialThickness);
    const assm = `<svg class="v31-svg v31-export-target" viewBox="0 0 760 520"><rect x="100" y="86" width="190" height="150" fill="none" stroke="#111" stroke-width="2"></rect>${items.find(x=>x.part==='上蓋')?'<line x1="100" y1="74" x2="290" y2="74" stroke="#111" stroke-width="2"></line>':''}${dimH31(100,290,62,`外寬 ${W} mm`)}${dimV31(80,86,236,`外高 ${H} mm`)}${mark31(312,110,1)}${mark31(312,138,2)}${mark31(312,166,3)}${T31(196,268,`正視圖｜${getScaleTag31()}`,12,'middle','#5d4827')}<rect x="440" y="86" width="190" height="150" fill="none" stroke="#111" stroke-width="2"></rect><rect x="456" y="102" width="158" height="118" fill="none" stroke="#999" stroke-dasharray="4 4"></rect>${dimH31(440,630,62,`外寬 ${W} mm`)}${dimV31(420,86,236,`外深 ${D} mm`)}${mark31(652,110,4)}${mark31(652,138,5)}${mark31(652,166,6)}${T31(536,268,'俯視圖',12,'middle','#5d4827')}<rect x="126" y="328" width="160" height="120" fill="none" stroke="#111" stroke-width="2"></rect><rect x="286" y="328" width="14" height="120" fill="#ddd" stroke="#111"></rect>${dimH31(126,300,306,`外深 ${D} mm`)}${dimV31(106,328,448,`外高 ${H} mm`)}${T31(208,480,'側視圖',12,'middle','#5d4827')}<rect x="414" y="322" width="260" height="128" rx="12" fill="#fffaf4" stroke="#d5bf95"></rect>${T31(430,350,`有蓋 / 無蓋：${String(f.boxLidType)==='with'?'有蓋':'無蓋'}`,12,'start','#332817')}${T31(430,376,`接合：${String(f.boxJoinType)==='finger'?'榫卯互扣':'直切 / 膠合'}`,12,'start','#332817')}${T31(430,402,`板厚：${t} mm`,12,'start','#332817')}${T31(430,428,`施工建議：${getMethod31()}`,12,'start','#332817')}</svg>`;
    const flat = boxLaserSvg31(f);
    return `<div class="v31-card"><div class="v31-row"><strong>盒子成品圖 / 三視圖</strong><span class="v31-tag">盒子</span></div><div class="v31-note">支援有蓋 / 無蓋、榫卯互扣、逐片移除與逐片取消榫卯切割。</div>${assm}${legend31(items)}</div><div class="v31-card"><div class="v31-row"><strong>板件獨立編號對照裁切清單</strong><span class="v31-tag">${items.length} 件</span></div><table class="v31-table"><thead><tr><th>#</th><th>板件</th><th>尺寸</th><th>說明</th></tr></thead><tbody>${pieceRows31(items)}</tbody></table></div><div class="v31-card"><div class="v31-row"><strong>雷射雕刻 / 切割圖紙（SVG）</strong><span class="v31-tag">可直接輸出 SVG</span></div><div class="v31-note">黑線外框可直接拿去 LightBurn / 雷雕軟體使用；若某塊板件已選「取消榫卯切割」，此處會改為單純外框。</div><div class="btn-row"><button class="secondary" id="v31ExportLaserSvg">匯出盒子 SVG 圖紙</button><button class="secondary" id="v31ExportLaserPng">匯出盒子 PNG 預覽</button></div>${flat}</div>`;
  }

  function renderDrawerChestDetail31(){
    const f=state.resultForm, result=state.result; const items=(result.cutList||[]).map((p,i)=>({...p,no:i+1})); const hs=drawerHeights31(f); const D=fmt31(f.depth), slide=fmt31(f.slideLength||350), clr=fmt31(f.slideClearance||13);
    let y=90; let lines='';
    hs.forEach((h,idx)=>{ const hh=Math.max(26,Math.min(56,Number(h)/4)); const cy=y+hh/2; lines += `<line x1="464" y1="${cy}" x2="620" y2="${cy}" stroke="#666" stroke-dasharray="4 4"></line>${mark31(640,cy,idx+1)}${T31(660,cy+4,`第 ${idx+1} 層滑軌中心`,11,'start','#111')}${T31(660,cy+20,`抽面板高 ${fmt31(h)} mm`,10,'start','#666')}`; y += hh; });
    const svg=`<svg class="v31-svg v31-export-target" viewBox="0 0 780 520"><rect x="96" y="80" width="180" height="210" fill="none" stroke="#111" stroke-width="2"></rect>${hs.map((h,idx)=>{ const hh=Math.max(26,Math.min(56,Number(h)/4)); const yy=92+hs.slice(0,idx).reduce((s,v)=>s+Math.max(26,Math.min(56,Number(v)/4)),0); return `<line x1="96" y1="${yy+hh}" x2="276" y2="${yy+hh}" stroke="#777"></line>${mark31(290,yy+hh/2,idx+6)}${T31(308,yy+hh/2+4,`抽面板 ${idx+1}｜高 ${fmt31(h)} mm`,11,'start','#111')}`; }).join('')}${dimH31(96,276,56,`外寬 ${fmt31(f.width)} mm`)}${dimV31(76,80,290,`外高 ${fmt31(f.height)} mm`)}${T31(186,320,`正視圖｜${getScaleTag31()}`,12,'middle','#5d4827')}<rect x="452" y="80" width="140" height="210" fill="none" stroke="#111" stroke-width="2"></rect><line x1="580" y1="80" x2="580" y2="290" stroke="#999"></line>${lines}${dimH31(452,592,56,`外深 ${D} mm`)}${T31(522,320,`側視圖｜滑軌 ${slide} mm｜單側預留 ${clr} mm`,12,'middle','#5d4827')}<rect x="112" y="362" width="540" height="120" rx="12" fill="#fffaf4" stroke="#d5bf95"></rect>${T31(132,392,'抽屜櫃安裝尺寸重點',12,'start','#5d4827')}${T31(132,420,`1. 每層滑軌中心位置需對應各層抽面板高度。`,11,'start','#332817')}${T31(132,442,`2. 滑軌長度 ${slide} mm，單側預留 ${clr} mm。`,11,'start','#332817')}${T31(132,464,`3. 底板槽深 ${fmt31(f.grooveDepth||6)} mm，抽面板縫隙約 ${fmt31(f.gap||2)} mm。`,11,'start','#332817')}</svg>`;

  }

  function bindV31DiagramTools(){
    const btn = document.getElementById('v31ExportLaserSvg');
    if(btn) btn.onclick = () => {
      const svg = document.querySelector('.v31-export-svg');

      const url = URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=`wo-no-mokkou-box-laser-${Date.now()}.svg`; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);

      let source = serializer.serializeToString(svg);

      img.onerror = () => { URL.revokeObjectURL(url); alert('PNG 匯出失敗。'); };

  function applyBrandV31(){
    document.title='我の木工 PWA v31';
    const top=document.querySelector('.hero > div'); if(top) top.textContent='我の木工 PWA v31';
    const h1=document.querySelector('.hero h1'); if(h1) h1.textContent='盒子製作 + 雷射 SVG 圖紙版';
    const p=document.querySelector('.hero p'); if(p) p.textContent='新增盒子製作、有蓋 / 無蓋、逐片移除、逐片取消榫卯切割、可直接輸出 SVG 雷射圖紙。';
    const foot=document.querySelector('.footer'); if(foot) foot.textContent='PWA v31 盒子雷射版｜尺寸單位 mm｜本機儲存 localStorage｜穩定更新';
    document.querySelectorAll('.pwa-mini-version').forEach(x=>x.textContent=APP_VERSION_V31);
