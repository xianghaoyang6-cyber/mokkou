<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>我の木工 PWA v32</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#c9a56a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="我の木工" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --line: #e5e5e5;
      --text: #111111;
      --sub: #666666;
      --dark: #111111;
      --pill: #f0f0f0;
      --good: #1d4d2e;
      --warn: #8a5a00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.45;
    }
    .app { max-width: 1120px; margin: 0 auto; padding: 14px; }
    .hero {
      background: #111; color: #fff; border-radius: 24px; padding: 18px; margin-bottom: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,.08);
    }
    .hero h1 { margin: 4px 0 8px; font-size: 1.45rem; }
    .hero p { margin: 0; color: #d2d2d2; font-size: .93rem; }
    .save-note {
      margin-top: 10px; display: inline-block; background: rgba(255,255,255,.08);
      border-radius: 14px; padding: 8px 12px; font-size: .82rem; color: #ddd;
    }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 22px; padding: 14px; margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.03);
    }
    .card h2 { margin: 0 0 12px; font-size: 1.02rem; }
    .toolbar {
      position: sticky; top: 0; z-index: 20; background: rgba(245,245,245,.92); backdrop-filter: blur(6px); padding: 8px 0 12px;
    }
    .tabs {
      display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; background: #fff; border: 1px solid var(--line);
      border-radius: 18px; padding: 6px; box-shadow: 0 2px 8px rgba(0,0,0,.03);
    }
    .tab {
      border: none; background: transparent; border-radius: 12px; padding: 10px 8px; font-size: .82rem; font-weight: 700; color: var(--sub);
    }
    .tab.active { background: var(--dark); color: white; }
    .grid { display: grid; gap: 12px; }
    .grid.two { grid-template-columns: repeat(2,minmax(0,1fr)); }
    .grid.three { grid-template-columns: repeat(3,minmax(0,1fr)); }
    @media (max-width: 860px) {
      .tabs { grid-template-columns: repeat(3,1fr); }
      .grid.two, .grid.three { grid-template-columns: 1fr; }
    }
    label { display: block; }
    .label { font-size: .88rem; font-weight: 700; color: #333; margin-bottom: 6px; }
    .hint { font-size: .76rem; color: #888; font-weight: 400; }
    input, select, textarea {
      width: 100%; border: 1px solid var(--line); background: white; border-radius: 16px; padding: 11px 12px;
      font-size: .96rem; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #888; box-shadow: 0 0 0 3px rgba(0,0,0,.05); }
    .inline-note { font-size: .82rem; color: var(--sub); margin-top: 4px; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
    button.primary, button.secondary, .file-btn {
      border: none; border-radius: 16px; padding: 12px 16px; font-size: .95rem; font-weight: 700; cursor: pointer;
    }
    button.primary { background: var(--dark); color: white; }
    button.secondary, .file-btn { background: #f2f2f2; color: #222; border: 1px solid var(--line); }
    .pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { background: var(--pill); border-radius: 999px; padding: 8px 12px; font-size: .84rem; color: #222; }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th, td { border-bottom: 1px solid #eee; padding: 10px; vertical-align: top; text-align: left; }
    th { font-size: .8rem; color: #666; background: #f8f8f8; }
    .small { font-size: .78rem; color: #777; }
    .option-card {
      border: 1px solid var(--line); border-radius: 18px; padding: 12px; margin-bottom: 10px; background: #fff;
    }
    .badge { display: inline-block; border-radius: 999px; padding: 4px 8px; font-size: .75rem; margin-right: 6px; background: #f2f2f2; }
    .badge.best { background: #e7f5eb; color: var(--good); }
    .badge.easy { background: #eef4ff; color: #244ca0; }
    .badge.strong { background: #fff3db; color: var(--warn); }
    .diagram-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
    @media (max-width: 860px) { .diagram-grid { grid-template-columns: 1fr; } }
    .diagram { border: 1px solid var(--line); border-radius: 18px; background: #fff; padding: 12px; }
    .diagram h3 { margin: 0 0 8px; font-size: .95rem; }
    svg { width: 100%; height: auto; background: #fff; border-radius: 12px; }
    .layout-wrap { display: grid; grid-template-columns: 1.08fr .92fr; gap: 12px; }
    @media (max-width: 860px) { .layout-wrap { grid-template-columns: 1fr; } }
    .board-list { display: flex; flex-direction: column; gap: 12px; }
    .board-card { border: 1px solid var(--line); border-radius: 18px; padding: 12px; background: #fff; }
    .muted { color: var(--sub); }
    .footer { text-align: center; color: #888; font-size: .78rem; padding: 8px 0 18px; }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div>私人木工板材尺寸計算 App v4</div>
      <h1>更多家具類型 + 尺寸標註施工圖版效果圖</h1>
      <p>新增：門板、書架、L 型收納架。效果圖改成更像施工圖的尺寸標註示意。保留板材排版、五金建議、榫卯預留與本機儲存。</p>
      <div class="save-note" id="saveNote">本機儲存：尚未變更</div>
    </div>

    <div class="toolbar">
      <div class="tabs" id="tabs"></div>
    </div>

    <div id="view"></div>
    <div class="footer">v4 預覽版｜尺寸單位 mm｜本機儲存 localStorage</div>
  </div>

<script>
const STORAGE_KEY = 'woodworking_calc_v4';
const TAB_KEY = 'woodworking_calc_tab_v4';
const tabs = [
  ['calc','計算'],
  ['method','做法'],
  ['hardware','五金'],
  ['layout','排版圖'],
  ['diagrams','施工圖']
];

const defaultForm = {
  projectType: 'drawer',
  width: 600,
  depth: 400,
  height: 180,
  materialThickness: 12,
  backThickness: 5,
  bottomThickness: 5,
  gap: 2,
  slideClearance: 13,
  slideLength: 350,
  grooveDepth: 6,
  shelfCount: 1,
  legSize: 45,
  apronHeight: 80,
  tenonShoulder: 8,
  tenonRatio: 0.33,
  holeDiameter: 8,
  holeSpacing: 50,
  edgeMargin: 30,
  pegDiameter: 8,
  pegboardShelfCount: 2,
  pegboardShelfDepth: 120,
  cleatHeight: 70,
  cleatThickness: 18,
  hingeCupDiameter: 35,
  hingeCupOffset: 22,
  hingeCount: 2,
  armDepth: 280,
  stockBoardWidth: 1220,
  stockBoardHeight: 2440,
  stockBoardQty: 1
};

const projectPresets = {
  drawer: { width: 600, depth: 400, height: 180, materialThickness: 12, bottomThickness: 5, slideClearance: 13, slideLength: 350, grooveDepth: 6, gap: 2 },
  cabinet: { width: 600, depth: 350, height: 800, materialThickness: 18, backThickness: 5, shelfCount: 2, grooveDepth: 6 },
  table: { width: 1000, depth: 500, height: 750, materialThickness: 25, legSize: 45, apronHeight: 80, tenonShoulder: 8, tenonRatio: 0.33 },
  pegboard: { width: 900, height: 600, depth: 120, materialThickness: 12, holeDiameter: 8, holeSpacing: 50, edgeMargin: 30, pegDiameter: 8, pegboardShelfCount: 2, pegboardShelfDepth: 120, cleatHeight: 70, cleatThickness: 18 },
  doorpanel: { width: 400, height: 700, depth: 18, materialThickness: 18, gap: 2, hingeCupDiameter: 35, hingeCupOffset: 22, hingeCount: 2 },
  bookshelf: { width: 800, depth: 280, height: 1800, materialThickness: 18, backThickness: 5, shelfCount: 5, grooveDepth: 6 },
  lstorage: { width: 900, depth: 900, height: 1200, materialThickness: 18, armDepth: 280, shelfCount: 4, backThickness: 5 }
};

let state = loadState();
let activeTab = localStorage.getItem(TAB_KEY) || 'calc';

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    return {
      form: {...defaultForm, ...(saved.form || {})},
      resultForm: {...defaultForm, ...(saved.resultForm || saved.form || {})},
      result: saved.result || calculateAll({...defaultForm, ...(saved.resultForm || saved.form || {})})
    };
  } catch (e) {
    return { form: {...defaultForm}, resultForm: {...defaultForm}, result: calculateAll(defaultForm) };
  }
}

function saveState(note = '已儲存') {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  const t = new Date();
  const noteEl = document.getElementById('saveNote');
  if (noteEl) noteEl.textContent = `本機儲存：${note} ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
}

function n(v, fallback = 0) { const x = Number(v); return Number.isFinite(x) ? x : fallback; }
function round(v) { return Math.round(v * 10) / 10; }
function esc(s){ return String(s).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

function calculateDrawer(f) {
  const W=n(f.width), D=n(f.depth), H=n(f.height), t=n(f.materialThickness), gap=n(f.gap), sideClr=n(f.slideClearance), slideL=n(f.slideLength), groove=n(f.grooveDepth), bottomT=n(f.bottomThickness);
  const boxW = W - sideClr * 2;
  const boxD = Math.min(slideL, D - 20);
  const boxH = Math.max(40, H - 20);
  const fbLen = boxW - 2*t;
  const bottomW = boxW - 2*t + 2*groove;
  const bottomD = boxD - 2*t + 2*groove;
  return {
    name:'抽屜',
    summary:[`抽屜箱外寬 ${round(boxW)} mm`,`抽屜箱外深 ${round(boxD)} mm`,`抽屜箱外高 ${round(boxH)} mm`,`滑軌預留每側 ${sideClr} mm`],
    cutList:[
      {part:'側板', qty:2, w:boxD, h:boxH, t, size:`${round(boxD)} × ${round(boxH)} × ${t}`, note:'側板通長'},
      {part:'前板/後板', qty:2, w:fbLen, h:boxH, t, size:`${round(fbLen)} × ${round(boxH)} × ${t}`, note:'夾在兩片側板中間'},
      {part:'底板', qty:1, w:bottomW, h:bottomD, t:bottomT, size:`${round(bottomW)} × ${round(bottomD)} × ${bottomT}`, note:`四邊入槽，槽深 ${groove} mm`},
      {part:'抽屜面板', qty:1, w:W-gap*2, h:H-gap*2, t, size:`${round(W-gap*2)} × ${round(H-gap*2)} × 視設計`, note:`四周預留 ${gap} mm 縫隙`},
    ],
    methods:[
      {name:'螺絲 + 白膠', best:'最簡單', strong:'中高', difficulty:'低', detail:'新手最常見做法，先導孔再鎖 3.5×30 或 4×30。'},
      {name:'企口 + 螺絲', best:'較穩', strong:'高', difficulty:'中', detail:`前後板做企口，深 ${Math.min(6, round(t/2))} mm，可增加定位與膠合面積。`},
      {name:'箱形榫/直榫', best:'外觀較佳', strong:'高', difficulty:'中高', detail:`榫齒寬接近板厚 ${t} mm，適合想做精緻抽屜。`},
    ],
    hardware:[
      {joint:'側板 ↔ 前後板', options:[['3.5×30 木螺絲','最簡單'],['4×30 木螺絲','較強'],['直榫 + 白膠','外觀佳']]},
      {joint:'底板', options:[['5 mm 底板 + 槽','推薦'],['9 mm 底板直接鎖','重載'],['薄底板直接釘','最省事但較弱']]},
      {joint:'滑軌', options:[[`${n(f.slideLength)} mm 三節鋼珠滑軌`,'常見'],['木滑條','便宜'],['隱藏滑軌','外觀佳但較麻煩']]},
    ],
    joinery:[`底板槽寬 ${bottomT+0.3}–${bottomT+0.5} mm；槽深 ${groove} mm。`,`企口深 ${Math.min(6, round(t/2))} mm；企口寬 ${t} mm。`,`木榫替代：12 mm 板可用 6×30 木榫；孔深各約 15–16 mm。`]
  };
}

function calculateCabinet(f) {
  const W=n(f.width), D=n(f.depth), H=n(f.height), t=n(f.materialThickness), backT=n(f.backThickness), shelves=Math.max(0, Math.floor(n(f.shelfCount))), groove=n(f.grooveDepth);
  const innerW = W - 2*t;
  const innerH = H - 2*t;
  const shelfGap = shelves>0 ? round((innerH - shelves*t) / (shelves+1)) : innerH;
  return {
    name:'櫃子',
    summary:[`外尺寸 ${W} × ${D} × ${H} mm`,`內淨寬約 ${round(innerW)} mm`,`內淨高約 ${round(innerH)} mm`,`層板間距約 ${shelfGap} mm`],
    cutList:[
      {part:'側板', qty:2, w:D, h:H, t, size:`${round(D)} × ${round(H)} × ${t}`, note:'側板通高'},
      {part:'頂板/底板', qty:2, w:innerW, h:D, t, size:`${round(innerW)} × ${round(D)} × ${t}`, note:'夾在側板中間'},
      {part:'層板', qty:shelves, w:innerW-2, h:D-10, t, size:`${round(innerW-2)} × ${round(D-10)} × ${t}`, note:'活動層板左右各留約 1 mm'},
      {part:'背板', qty:1, w:W-2*groove, h:H-2*groove, t:backT, size:`${round(W-2*groove)} × ${round(H-2*groove)} × ${backT}`, note:`四邊開槽，槽深 ${groove} mm`},
    ],
    methods:[
      {name:'螺絲 + 白膠', best:'最簡單', strong:'中高', difficulty:'低', detail:'側板通高、頂底板夾中間，是最常見簡易櫃體做法。'},
      {name:'三合一連接件', best:'可拆裝', strong:'中', difficulty:'中', detail:'板式家具常見，拆裝方便。'},
      {name:'木榫 + 白膠', best:'外觀佳', strong:'高', difficulty:'中高', detail:'適合不想看見螺絲頭的櫃體；建議用定位治具。'},
    ],
    hardware:[
      {joint:'側板 ↔ 頂/底板', options:[['4×40 木螺絲','最簡單'],['三合一連接件','可拆裝'],['8×30 木榫','外觀佳']]},
      {joint:'背板', options:[['5 mm 嵌槽背板','推薦'],['背面覆蓋釘槍固定','較簡單'],['薄背板只釘四角','不推薦']]},
      {joint:'層板', options:[['5 mm 層板托','標準'],['固定層板螺絲','更穩'],['木榫固定','外觀佳']]},
      {joint:'門板', options:[['35 mm 杯鉸','最常見'],['直臂/中曲/大曲','依覆蓋型式'],['磁吸碰珠','可搭配']]},
    ],
    joinery:[`18 mm 板常用 8×30 木榫；12 mm 板常用 6×30 木榫。`,`背板槽寬 ${backT+0.3}–${backT+0.5} mm；槽深 ${groove} mm。`,`系統孔常見 5 mm 孔徑、32 mm 孔距；前排離板前緣約 37 mm。`]
  };
}

function calculateTable(f) {
  const W=n(f.width), D=n(f.depth), H=n(f.height), topT=n(f.materialThickness), leg=n(f.legSize), apronH=n(f.apronHeight), shoulder=n(f.tenonShoulder), ratio=n(f.tenonRatio);
  const apronT = Math.max(18, round(leg*0.45));
  const legL = H-topT;
  const longApron = W - 2*leg - 2*shoulder;
  const shortApron = D - 2*leg - 2*shoulder;
  const tenonT = round(apronT*ratio);
  const tenonL = round(leg*0.45);
  return {
    name:'桌子',
    summary:[`外尺寸 ${W} × ${D} × ${H} mm`,`桌腳長 ${round(legL)} mm`,`圍板高 ${apronH} mm`,`建議圍板厚 ${apronT} mm`],
    cutList:[
      {part:'桌面', qty:1, w:W, h:D, t:topT, size:`${W} × ${D} × ${topT}`, note:'實木板 / 拼板 / 夾板皆可'},
      {part:'桌腳', qty:4, w:leg, h:legL, t:leg, size:`${leg} × ${leg} × ${round(legL)}`, note:'常見 40–60 mm 方料'},
      {part:'長圍板', qty:2, w:longApron, h:apronH, t:apronT, size:`${round(longApron)} × ${apronH} × ${apronT}`, note:'兩端做榫或木榫'},
      {part:'短圍板', qty:2, w:shortApron, h:apronH, t:apronT, size:`${round(shortApron)} × ${apronH} × ${apronT}`, note:'兩端做榫或木榫'},
    ],
    methods:[
      {name:'木榫 + 白膠', best:'較簡單', strong:'中高', difficulty:'中', detail:'適合無大型機台，外觀整潔。每個接點 2 支木榫是常見做法。'},
      {name:'榫卯（榫眼榫頭）', best:'最優', strong:'高', difficulty:'高', detail:'桌腳與圍板最經典做法。'},
      {name:'角碼 + 螺絲', best:'最簡單', strong:'中', difficulty:'低', detail:'工作桌、工具桌很實用，但外觀不如榫卯。'},
    ],
    hardware:[
      {joint:'桌腳 ↔ 圍板', options:[['榫卯','最佳結構'],['2 支 8×40 木榫','較簡單'],['角碼 + 4×16 螺絲','最快']]},
      {joint:'桌面 ↔ 框架', options:[['Z 型桌面扣','推薦'],['8 字扣','推薦'],['長孔螺絲固定','可行'],['整排死鎖','不推薦於實木桌面']]},
      {joint:'抗晃補強', options:[['斜撐','最穩'],['加高圍板','有效'],['角碼','最簡單']]},
    ],
    joinery:[`榫頭厚度約圍板厚 1/3：${tenonT} mm；榫肩 ${shoulder} mm。`,`榫頭長度建議 ${tenonL} mm；榫眼深度比榫長多 1 mm。`,`木榫替代：每接點 2 支 8×40 木榫；上下邊保留至少 15–20 mm。`]
  };
}

function calculatePegboard(f) {
  const W=n(f.width), H=n(f.height), t=n(f.materialThickness), holeD=n(f.holeDiameter), space=n(f.holeSpacing), edge=n(f.edgeMargin), pegD=n(f.pegDiameter), shelfCount=Math.max(0, Math.floor(n(f.pegboardShelfCount))), shelfDepth=n(f.pegboardShelfDepth), cleatH=n(f.cleatHeight), cleatT=n(f.cleatThickness);
  const cols = Math.max(1, Math.floor((W - edge*2) / space) + 1);
  const rows = Math.max(1, Math.floor((H - edge*2) / space) + 1);
  const backStripDepth = Math.max(40, cleatT*2 + 10);
  const shelfW = Math.max(150, round(W*0.35));
  return {
    name:'洞洞板 / 收納架',
    summary:[`洞洞板 ${W} × ${H} mm`,`孔排列約 ${cols} 欄 × ${rows} 列`,`總孔數約 ${cols*rows} 孔`,`建議離牆厚度 ${backStripDepth} mm`],
    cutList:[
      {part:'洞洞板主板', qty:1, w:W, h:H, t, size:`${W} × ${H} × ${t}`, note:`孔徑 ${holeD} mm，孔距 ${space} mm`},
      {part:'背後直撐條', qty:2, w:backStripDepth, h:H, t:cleatT, size:`${backStripDepth} × ${H} × ${cleatT}`, note:'讓掛鉤後方有空間'},
      {part:'背後橫撐條', qty:2, w:W, h:backStripDepth, t:cleatT, size:`${W} × ${backStripDepth} × ${cleatT}`, note:'上下各一條'},
      {part:'法式掛條', qty:2, w:W*0.7, h:cleatH, t:cleatT, size:`${round(W*0.7)} × ${cleatH} × ${cleatT}`, note:'一條上牆、一條在背面'},
      {part:'簡易層板', qty:shelfCount, w:shelfW, h:shelfDepth, t, size:`${shelfW} × ${shelfDepth} × ${t}`, note:'可搭配角碼或木托架'},
    ],
    methods:[
      {name:'法式掛條 + 背後撐條', best:'最推薦', strong:'高', difficulty:'中', detail:'最常見且穩定，拆下方便，適合工具牆。'},
      {name:'直接鎖牆 + 墊條', best:'較簡單', strong:'中高', difficulty:'低', detail:'牆面條件允許時很直接；拆裝不如法式掛條靈活。'},
      {name:'木托架 + 層板', best:'外觀較佳', strong:'中', difficulty:'中', detail:'適合展示型收納；重物需增加托架數量。'},

function calculateDoorPanel(f) {

function calculateBookshelf(f) {

function getFlattenedPieces(cutList) {
  const pieces = [];
  cutList.forEach(item => {
    const w = Math.max(1, round(item.w || 0));
    const h = Math.max(1, round(item.h || 0));
    const qty = Math.max(0, Math.floor(n(item.qty)));
    for (let i = 0; i < qty; i++) pieces.push({name: item.part + (qty>1 ? ` ${i+1}` : ''), w, h});
  });
  return pieces.sort((a,b) => Math.max(b.w,b.h) - Math.max(a.w,a.h));
}

function nestPieces(pieces, boardW, boardH, qtyLimit) {
  const boards = [];
  let remaining = pieces.map(p => ({...p}));
  for (let b = 0; b < qtyLimit && remaining.length; b++) {
    const spaces = [{x:0,y:0,w:boardW,h:boardH}];
    const placed = [];
    const nextRemaining = [];
    for (const piece of remaining) {
      let ok = false;
      for (let i = 0; i < spaces.length; i++) {
        const s = spaces[i];
        const options = [{w:piece.w,h:piece.h,rot:false},{w:piece.h,h:piece.w,rot:true}];
        let fit = null;
        for (const opt of options) if (opt.w <= s.w && opt.h <= s.h) { fit = opt; break; }
        if (fit) {
          placed.push({...piece, x:s.x, y:s.y, w:fit.w, h:fit.h, rot:fit.rot});
          spaces.splice(i,1);
          const right = {x:s.x + fit.w, y:s.y, w:s.w - fit.w, h:fit.h};
          const bottom = {x:s.x, y:s.y + fit.h, w:s.w, h:s.h - fit.h};
          if (right.w > 30 && right.h > 30) spaces.push(right);
          if (bottom.w > 30 && bottom.h > 30) spaces.push(bottom);
          spaces.sort((a,b)=> (a.y - b.y) || (a.x - b.x));
          ok = true;
          break;
        }
      }
      if (!ok) nextRemaining.push(piece);
    }
    const usedArea = placed.reduce((sum,p)=>sum + p.w*p.h, 0);
    boards.push({placed, usedArea, wasteArea: boardW*boardH - usedArea, util: usedArea/(boardW*boardH), boardW, boardH});
    remaining = nextRemaining;
  }
  return { boards, remaining };
}

function makeBoardSvg(board, idx) {
  const pad = 12, maxW = 500;
  const scale = Math.min((maxW - pad*2) / board.boardW, 0.22);
  const H = board.boardH * scale + pad*2;
  const rects = board.placed.map((p,i) => {
    const x = pad + p.x * scale, y = pad + p.y * scale, w = p.w*scale, h = p.h*scale;
    const gray = 236 - (i*11 % 95);
    return `<g>
      <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="rgb(${gray},${gray},${gray})" stroke="#222" stroke-width="1.1"></rect>
      <text x="${x + w/2}" y="${y + h/2}" dominant-baseline="middle" text-anchor="middle" font-size="11" fill="#111">${esc(p.name)}</text>
      <text x="${x + w/2}" y="${y + h/2 + 14}" dominant-baseline="middle" text-anchor="middle" font-size="10" fill="#333">${p.w}×${p.h}</text>
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 ${maxW} ${H}"><rect x="${pad}" y="${pad}" width="${board.boardW*scale}" height="${board.boardH*scale}" fill="#fafafa" stroke="#111" stroke-width="2"></rect>${rects}<text x="${pad}" y="${H-4}" font-size="11" fill="#555">原板 ${board.boardW} × ${board.boardH} mm</text></svg>`;
}

function bindCommonInputs() {
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.dataset.key;
    el.addEventListener('input', () => {
      state.form[key] = el.type === 'number' ? (el.value === '' ? '' : Number(el.value)) : el.value;
      saveState('草稿已儲存');
    });
    el.addEventListener('change', () => {
      if (key === 'projectType') { saveState('類型已切換'); render(); }
    });
  });
}

function bindCalcButtons() {
  const calcBtn = document.getElementById('calcBtn');
  if (calcBtn) calcBtn.onclick = () => { state.resultForm = {...state.form}; state.result = calculateAll(state.resultForm); saveState('結果已更新'); render(); };
  const presetBtn = document.getElementById('presetBtn');
  if (presetBtn) presetBtn.onclick = () => { state.form = {...state.form, ...projectPresets[state.form.projectType]}; saveState('已載入常用預設'); render(); };
  const resetBtn = document.getElementById('resetBtn');
  if (resetBtn) resetBtn.onclick = () => { if (!confirm('確定要清除並恢復預設值？')) return; state = { form:{...defaultForm}, resultForm:{...defaultForm}, result:calculateAll(defaultForm) }; saveState('已恢復預設'); render(); };
  const exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.onclick = () => {
    const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'woodworking-calculator-v4-backup.json'; a.click(); URL.revokeObjectURL(url);
  };
  const importInput = document.getElementById('importInput');
  if (importInput) importInput.onchange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const text = await file.text(); const parsed = JSON.parse(text);
      state = { form: {...defaultForm, ...(parsed.form || {})}, resultForm: {...defaultForm, ...(parsed.resultForm || parsed.form || {})}, result: parsed.result || calculateAll({...defaultForm, ...(parsed.resultForm || parsed.form || {})}) };
      saveState('匯入成功'); render();
    } catch(err) { alert('匯入失敗，檔案格式不正確。'); }
    e.target.value = '';
  };
}

function render() {
  renderTabs();
  const view = document.getElementById('view');
  if (activeTab === 'calc') view.innerHTML = renderCalcTab();
  else if (activeTab === 'method') view.innerHTML = renderMethodTab();
  else if (activeTab === 'hardware') view.innerHTML = renderHardwareTab();
  else if (activeTab === 'layout') view.innerHTML = renderLayoutTab();
  else view.innerHTML = renderDiagramsTab();
  bindCommonInputs();
  bindCalcButtons();
}

saveState('已載入');
render();
</script>

  function calculateWallCabinetV8(f){
    const W=n(f.width), D=n(f.depth), H=n(f.height), t=n(f.materialThickness), backT=n(f.backThickness), shelves=Math.max(1,Math.floor(n(f.shelfCount))), groove=n(f.grooveDepth), cleatH=n(f.cleatHeight), cleatT=n(f.cleatThickness), mode=f.doorMode||'open', gap=n(f.gap,2);
    const innerW=W-2*t;
    const cut=[
      {part:'側板',qty:2,w:D,h:H,t,size:`${D} × ${H} × ${t}`,note:'側板通高'},
      {part:'頂板/底板',qty:2,w:innerW,h:D,t,size:`${round(innerW)} × ${D} × ${t}`,note:'夾在側板中間'},
      {part:'層板',qty:shelves,w:innerW,h:D-10,t,size:`${round(innerW)} × ${round(D-10)} × ${t}`,note:'可做固定或活動層板'},
      {part:'背板',qty:1,w:W-2*groove,h:H-2*groove,t:backT,size:`${round(W-2*groove)} × ${round(H-2*groove)} × ${backT}`,note:'建議加背板'},
      {part:'法式掛條',qty:2,w:W*0.7,h:cleatH,t:cleatT,size:`${round(W*0.7)} × ${cleatH} × ${cleatT}`,note:'一條牆面、一條櫃體'}
    ];
    if(mode==='double') cut.push({part:'雙門門板',qty:2,w:(W-gap*3)/2,h:H-gap*2,t,size:`${round((W-gap*3)/2)} × ${round(H-gap*2)} × ${t}`,note:'左右雙門，各 2 顆杯鉸較常見'});
    if(mode==='upflip') cut.push({part:'上掀門板',qty:1,w:W-gap*2,h:H-gap*2,t,size:`${round(W-gap*2)} × ${round(H-gap*2)} × ${t}`,note:'搭配上掀支撐或氣壓撐桿'});
    const doorText=mode==='double'?'雙門':mode==='upflip'?'上掀門':'開放式';
    return {
      name:`吊櫃：${doorText}`,
      summary:[`外尺寸 ${W} × ${D} × ${H} mm`,`門型：${doorText}`,`層板數 ${shelves} 片`,`建議加法式掛條或專用吊櫃掛片`],
      cutList:cut,
      methods:[
        {name:'法式掛條式吊櫃',best:'最推薦',strong:'高',difficulty:'中',detail:'安裝調整較方便，也較容易拆下。'},
        {name:'雙門吊櫃',best:'最常見',strong:'高',difficulty:'中',detail:'使用 35 mm 杯鉸，正面較完整。'},
        {name:'上掀門吊櫃',best:'省前方空間',strong:'中高',difficulty:'中高',detail:'需搭配上掀支撐，五金成本較高。'}
      ],
      hardware:[
        {joint:'掛牆',options:[['法式掛條','推薦'],['吊櫃掛片','專業常見'],['膨脹螺絲直鎖','最簡單']]},
        {joint:'門片',options:[['35 mm 杯鉸','雙門常見'],['上掀門五金 / 氣壓撐桿','上掀門用'],['磁吸 / 反彈器','可搭配']]},
        {joint:'內部層板',options:[['5 mm 層板托','可調整'],['固定層板螺絲','較簡單'],['木榫固定','外觀佳']]}
      ],
      joinery:[`吊櫃務必確認牆體條件與膨脹螺絲適配。`,`掛牆承重優先，不建議省略背板與掛條。`,`門縫建議預留 ${gap} mm 左右。`]
    };
  }

  function calculateDrawerChestV8(f){
    const W=n(f.width), D=n(f.depth), H=n(f.height), t=n(f.materialThickness), backT=n(f.backThickness), bottomT=n(f.bottomThickness), slideClr=n(f.slideClearance), slideL=n(f.slideLength), groove=n(f.grooveDepth), gap=n(f.gap,2);
    let heights=parseHeights(f.drawerHeights);
    const drawerCount=heights.length?heights.length:Math.max(2,Math.floor(n(f.shelfCount,4)));
    const innerW=W-2*t, innerH=H-2*t;
    if(!heights.length) heights=Array.from({length:drawerCount},()=>round((innerH-gap*(drawerCount+1))/drawerCount));
    const boxW=innerW-slideClr*2, boxD=Math.min(slideL,D-30), fbLen=boxW-2*t, bottomW=boxW-2*t+2*groove, bottomD=boxD-2*t+2*groove;
    const cut=[
      {part:'櫃體側板',qty:2,w:D,h:H,t,size:`${D} × ${H} × ${t}`,note:'左右側板'},
      {part:'櫃體頂板/底板',qty:2,w:innerW,h:D,t,size:`${round(innerW)} × ${D} × ${t}`,note:'夾在側板中間'},
      {part:'背板',qty:1,w:W-2*groove,h:H-2*groove,t:backT,size:`${round(W-2*groove)} × ${round(H-2*groove)} × ${backT}`,note:'建議入槽'}
    ];
    heights.forEach((frontH,i)=>{
      const boxH=Math.max(55, round(frontH-24));
      cut.push({part:`抽屜 ${i+1} 面板`,qty:1,w:W-gap*2,h:frontH,t,size:`${round(W-gap*2)} × ${round(frontH)} × ${t}`,note:'自訂面板高度'});
      cut.push({part:`抽屜 ${i+1} 側板`,qty:2,w:boxD,h:boxH,t,size:`${round(boxD)} × ${boxH} × ${t}`,note:'側板通長'});
      cut.push({part:`抽屜 ${i+1} 前後板`,qty:2,w:fbLen,h:boxH,t,size:`${round(fbLen)} × ${boxH} × ${t}`,note:'夾在側板中間'});
      cut.push({part:`抽屜 ${i+1} 底板`,qty:1,w:bottomW,h:bottomD,t:bottomT,size:`${round(bottomW)} × ${round(bottomD)} × ${bottomT}`,note:'底板入槽'});
    });
    return {
      name:'抽屜櫃：自訂抽屜高度',
      summary:[`外尺寸 ${W} × ${D} × ${H} mm`,`抽屜數量 ${drawerCount} 層`,`面板高度：${heights.map(round).join(' / ')} mm`,`抽屜箱寬約 ${round(boxW)} mm`],
      cutList:cut,
      methods:[
        {name:'自訂高度抽屜櫃',best:'收納最靈活',strong:'高',difficulty:'中高',detail:'可做上淺下深，符合實際工具或雜物高度。'},
        {name:'等高抽屜櫃',best:'最簡單',strong:'高',difficulty:'中',detail:'輸入空白時自動等分。'},
        {name:'抽屜箱 + 面板獨立',best:'較易調整',strong:'高',difficulty:'中',detail:'先調滑軌與箱體，再裝面板，外觀比較好修。'}
      ],
      hardware:[
        {joint:'抽屜滑軌',options:[[`${slideL} mm 三節滑軌`,'最常見'],['木滑條','較便宜'],['隱藏滑軌','外觀佳']]},
        {joint:'抽屜箱體',options:[['螺絲 + 白膠','最簡單'],['企口 + 螺絲','較穩'],['直榫 + 白膠','外觀佳']]},
        {joint:'櫃體結構',options:[['4×40 木螺絲','最簡單'],['木榫','外觀佳'],['三合一件','可拆裝']]}
      ],
      joinery:[`自訂高度請用逗號輸入，例如：120,160,220,260。`,`抽屜面板之間建議保留 ${gap} mm 左右縫隙。`,`重載抽屜建議底板加厚或加撐條。`]
    };
  }

      <label><div class="label">品牌</div><input id="toolBrand" placeholder="例如 WORX / 牧田 / 大有"></label>
      <label><div class="label">型號</div><input id="toolModel" placeholder="例如 132X / 2545-20"></label>
      <label><div class="label">電池平台 / 規格</div><input id="toolPlatform" placeholder="例如 威克士20V / 牧田18V / 110V"></label>

    <div class="card"><h2>已記錄工具：${tools.length} 筆</h2><table><thead><tr><th>工具</th><th>分類</th><th>品牌</th><th>型號</th><th>平台</th><th>數量</th><th>價格</th><th>操作</th></tr></thead><tbody>${rows || '<tr><td colspan="8" class="small">尚未新增工具。</td></tr>'}</tbody></table></div>`;

  function bindToolsButtons(){

  }

  const oldRenderV8 = render;
  render = function(){
    renderTabs();
    const view=document.getElementById('view');
    if(activeTab==='tools') { view.innerHTML=renderToolsTab(); bindToolsButtons(); return; }
    if(activeTab==='calc') view.innerHTML=renderCalcTab();
    else if(activeTab==='method') view.innerHTML=renderMethodTab();
    else if(activeTab==='hardware') view.innerHTML=renderHardwareTab();

    else view.innerHTML=renderDiagramsTab();

  const style=document.createElement('style');
  style.textContent='@media (min-width:861px){.tabs{grid-template-columns:repeat(6,1fr)}}';
  document.head.appendChild(style);
  document.title='木工板材尺寸計算 App v8';
  const heroTop=document.querySelector('.hero > div'); if(heroTop) heroTop.textContent='私人木工板材尺寸計算 App v8';
  const heroH1=document.querySelector('.hero h1'); if(heroH1) heroH1.textContent='翻斗鞋櫃 / 電視櫃抽屜 / 吊櫃門型 / 自訂抽屜高度 / 工具庫';
  const heroP=document.querySelector('.hero p'); if(heroP) heroP.textContent='新增翻斗式鞋櫃、電視櫃左右抽屜+中間開放格、吊櫃雙門/上掀門切換、抽屜櫃自訂每層高度，另開工具庫頁記錄目前擁有的工具。';
  const footer=document.querySelector('.footer'); if(footer) footer.textContent='v8 預覽版｜尺寸單位 mm｜本機儲存 localStorage';
  state.form={...defaultForm,...state.form}; state.resultForm={...defaultForm,...state.resultForm}; state.result=calculateAll(state.resultForm);
  saveState('已升級 v8'); render();

<script>
// v9 enhancement: tool photos + method-specific conditional inputs
(function(){
  function e(s){ return String(s ?? '').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

  Object.assign(defaultForm, {
    pegboardMountMethod: 'screw',
    wallMountMethod: 'french',
    screwCount: 4,
    screwDiameter: 4,
    wallPlugDiameter: 6,
    toolPhoto: ''
  });
  Object.assign(projectPresets, {
    pegboard: { width:900, height:600, depth:120, materialThickness:12, holeDiameter:8, holeSpacing:50, edgeMargin:30, pegDiameter:8, pegboardShelfCount:2, pegboardShelfDepth:120, pegboardMountMethod:'screw', screwCount:4, screwDiameter:4, wallPlugDiameter:6, cleatHeight:70, cleatThickness:18 },
    wallcabinet: { width:700, depth:300, height:700, materialThickness:18, backThickness:5, shelfCount:1, grooveDepth:6, cleatHeight:70, cleatThickness:18, doorMode:'double', wallMountMethod:'french', screwCount:4, screwDiameter:5, wallPlugDiameter:8, gap:2 }
  });

  function calculatePegboardV9(f) {
    const W=n(f.width), H=n(f.height), t=n(f.materialThickness), holeD=n(f.holeDiameter), space=n(f.holeSpacing), edge=n(f.edgeMargin), pegD=n(f.pegDiameter);
    const shelfCount=Math.max(0,Math.floor(n(f.pegboardShelfCount))), shelfDepth=n(f.pegboardShelfDepth), cleatH=n(f.cleatHeight), cleatT=n(f.cleatThickness);
    const mount=f.pegboardMountMethod || 'screw';
    const screwCount=Math.max(2, Math.floor(n(f.screwCount,4))), screwD=n(f.screwDiameter,4), plugD=n(f.wallPlugDiameter,6);
    const cols=Math.max(1, Math.floor((W-edge*2)/space)+1);
    const rows=Math.max(1, Math.floor((H-edge*2)/space)+1);
    const backStripDepth=Math.max(40, cleatT*2+10);
    const shelfW=Math.max(150, round(W*0.35));
    const cut=[
      {part:'洞洞板主板', qty:1, w:W, h:H, t, size:`${W} × ${H} × ${t}`, note:`孔徑 ${holeD} mm，孔距 ${space} mm`},
      {part:'簡易層板', qty:shelfCount, w:shelfW, h:shelfDepth, t, size:`${shelfW} × ${shelfDepth} × ${t}`, note:'可搭配角碼、木托架或插入式托架'}
    ];

    if (mount === 'french') {
      cut.push(
        {part:'背後直撐條', qty:2, w:backStripDepth, h:H, t:cleatT, size:`${backStripDepth} × ${H} × ${cleatT}`, note:'讓掛鉤後方有空間'},
        {part:'背後橫撐條', qty:2, w:W, h:backStripDepth, t:cleatT, size:`${W} × ${backStripDepth} × ${cleatT}`, note:'上下各一條'},
        {part:'法式掛條', qty:2, w:W*0.7, h:cleatH, t:cleatT, size:`${round(W*0.7)} × ${cleatH} × ${cleatT}`, note:'一條上牆、一條在背面'}
      );
    } else if (mount === 'screw') {
      cut.push(
        {part:'背後墊條', qty:4, w:W, h:30, t:Math.max(12,t), size:`${W} × 30 × ${Math.max(12,t)}`, note:'上下或左右墊出離牆空間'},
        {part:'螺絲固定孔', qty:screwCount, w:screwD+1, h:screwD+1, t, size:`孔徑約 ${screwD+1} mm`, note:`建議搭配 ${plugD} mm 壁虎 / 膨脹管`}
      );
    } else {
      cut.push(
        {part:'落地側架', qty:2, w:shelfDepth, h:H, t, size:`${shelfDepth} × ${H} × ${t}`, note:'做成自立式收納架'},
        {part:'底座', qty:1, w:W, h:shelfDepth, t, size:`${W} × ${shelfDepth} × ${t}`, note:'落地式需加底座防傾'}
      );
    }

    const mountText = mount === 'french' ? '法式掛條' : mount === 'screw' ? '螺絲直接上牆' : '落地自立';
    const hardware = [
      {joint:'牆面 / 主體固定', options: mount === 'french'
        ? [['法式掛條','較優 / 可拆 / 穩'],['膨脹螺絲固定掛條','重載推薦'],['直接螺絲','更簡單但不如掛條好拆']]
        : mount === 'screw'
          ? [[`${screwD} mm 木螺絲 + ${plugD} mm 壁虎`,'最直接'],['大華司','可避免板面被螺絲頭壓壞'],['法式掛條','若未來要常拆換再選']]
          : [['側架 + 底座','不用打牆'],['背後斜撐','提高抗晃'],['牆面防倒固定片','仍建議加']]},
      {joint:'層板支撐', options:[['金屬角碼 30×30 / 40×40','最簡單'],['木製三角托架','外觀佳'],['插入式洞洞板托架','靈活']]},
      {joint:'掛鉤', options:[['8 mm 圓木棒','木工最常見'],['金屬 U 型掛鉤','最耐用'],['雷射切木掛件','客製化']]},
      {joint:'孔規格', options:[[`${pegD} mm 圓棒 / 掛鉤`,'需與孔徑配合'],[`${holeD} mm 孔徑`,'一般常見'],[`${space} mm 孔距`,'簡易型好排版']]}
    ];
    return {
      name:`洞洞板 / 收納架：${mountText}`,
      summary:[`洞洞板 ${W} × ${H} mm`,`固定方式：${mountText}`,`孔排列約 ${cols} 欄 × ${rows} 列`,`總孔數約 ${cols*rows} 孔`],
      cutList: cut,
      methods:[
        {name:'螺絲直接上牆', best: mount==='screw'?'目前選用':'最簡單', strong:'中高', difficulty:'低', detail:'適合你只想快速固定，不需要拆下整片板的情況。'},
        {name:'法式掛條 + 背後撐條', best: mount==='french'?'目前選用':'較優', strong:'高', difficulty:'中', detail:'可拆裝、調整方便，較適合工具牆長期使用。'},
        {name:'落地自立式', best: mount==='freestanding'?'目前選用':'免打牆', strong:'中', difficulty:'中', detail:'租屋或不想打牆可用，但需注意防傾。'}
      ],
      hardware,
      joinery:[
        `洞孔直徑建議比圓棒大 0.2–0.5 mm，例如 ${pegD} mm 圓棒對應 ${holeD}–${holeD+0.5} mm。`,
        mount==='screw' ? `直接鎖牆時，建議至少 ${screwCount} 個固定點，搭配華司分散壓力。` : mount==='french' ? `法式掛條常用 45° 斜切；掛條高度 ${cleatH} mm、厚 ${cleatT} mm 是實用範圍。` : `落地式建議加底座與背後斜撐，必要時仍加防倒固定片。`,
        `若用雷射切孔，孔徑需依切縫做測試補償。`
      ]
    };
  }

  function calculateWallCabinetV9(f) {
    const W=n(f.width), D=n(f.depth), H=n(f.height), t=n(f.materialThickness), backT=n(f.backThickness), shelves=Math.max(1,Math.floor(n(f.shelfCount))), groove=n(f.grooveDepth), cleatH=n(f.cleatHeight), cleatT=n(f.cleatThickness), mode=f.doorMode||'open', gap=n(f.gap,2);
    const mount=f.wallMountMethod || 'french';
    const screwCount=Math.max(2,Math.floor(n(f.screwCount,4))), screwD=n(f.screwDiameter,5), plugD=n(f.wallPlugDiameter,8);
    const innerW=W-2*t;
    const cut=[
      {part:'側板',qty:2,w:D,h:H,t,size:`${D} × ${H} × ${t}`,note:'側板通高'},
      {part:'頂板/底板',qty:2,w:innerW,h:D,t,size:`${round(innerW)} × ${D} × ${t}`,note:'夾在側板中間'},
      {part:'層板',qty:shelves,w:innerW,h:D-10,t,size:`${round(innerW)} × ${round(D-10)} × ${t}`,note:'可做固定或活動層板'},
      {part:'背板',qty:1,w:W-2*groove,h:H-2*groove,t:backT,size:`${round(W-2*groove)} × ${round(H-2*groove)} × ${backT}`,note:'建議加背板'}
    ];
    if(mount==='french') cut.push({part:'法式掛條',qty:2,w:W*0.7,h:cleatH,t:cleatT,size:`${round(W*0.7)} × ${cleatH} × ${cleatT}`,note:'一條牆面、一條櫃體'});
    if(mount==='direct') cut.push({part:'牆面固定孔',qty:screwCount,w:screwD+1,h:screwD+1,t,size:`孔徑約 ${screwD+1} mm`,note:`建議搭配 ${plugD} mm 壁虎 / 膨脹管`});
    if(mount==='hanger') cut.push({part:'吊櫃掛片安裝位',qty:2,w:60,h:60,t,size:'依掛片規格',note:'左右上角各一組掛片'});

    if(mode==='double') cut.push({part:'雙門門板',qty:2,w:(W-gap*3)/2,h:H-gap*2,t,size:`${round((W-gap*3)/2)} × ${round(H-gap*2)} × ${t}`,note:'左右雙門，各 2 顆杯鉸較常見'});
    if(mode==='upflip') cut.push({part:'上掀門板',qty:1,w:W-gap*2,h:H-gap*2,t,size:`${round(W-gap*2)} × ${round(H-gap*2)} × ${t}`,note:'搭配上掀支撐或氣壓撐桿'});
    const doorText=mode==='double'?'雙門':mode==='upflip'?'上掀門':'開放式';
    const mountText=mount==='french'?'法式掛條':mount==='direct'?'螺絲直接上牆':'吊櫃掛片';
    return {
      name:`吊櫃：${doorText} / ${mountText}`,
      summary:[`外尺寸 ${W} × ${D} × ${H} mm`,`門型：${doorText}`,`掛牆方式：${mountText}`,`層板數 ${shelves} 片`],
      cutList:cut,
      methods:[
        {name:'法式掛條式吊櫃',best:mount==='french'?'目前選用':'推薦',strong:'高',difficulty:'中',detail:'安裝調整較方便，也較容易拆下。'},
        {name:'吊櫃掛片',best:mount==='hanger'?'目前選用':'專業常見',strong:'高',difficulty:'中',detail:'五金化程度高，適合吊櫃。'},
        {name:'直接螺絲固定牆面',best:mount==='direct'?'目前選用':'最簡單',strong:'中高',difficulty:'低',detail:'可行，但拆裝與微調較不方便。'}
      ],
      hardware:[
        {joint:'掛牆',options: mount==='french' ? [['法式掛條','推薦'],['膨脹螺絲固定掛條','重載'],['吊櫃掛片','五金專業']] : mount==='direct' ? [[`${screwD} mm 螺絲 + ${plugD} mm 壁虎`,'最直接'],['大華司','分散壓力'],['法式掛條','拆裝更方便']] : [['吊櫃掛片','目前選用'],['調整式吊碼','較專業'],['法式掛條','可 DIY']]},
        {joint:'門片',options:[['35 mm 杯鉸','雙門常見'],['上掀門五金 / 氣壓撐桿','上掀門用'],['磁吸 / 反彈器','可搭配']]},
        {joint:'內部層板',options:[['5 mm 層板托','可調整'],['固定層板螺絲','較簡單'],['木榫固定','外觀佳']]}
      ],
      joinery:[`吊櫃務必確認牆體條件與膨脹螺絲適配。`,`掛牆承重優先，不建議省略背板。`,`門縫建議預留 ${gap} mm 左右。`]
    };
  }

  const oldCalculateAllV9 = calculateAll;
  calculateAll = function(form) {
    if (form.projectType === 'pegboard') return calculatePegboardV9(form);
    if (form.projectType === 'wallcabinet') return calculateWallCabinetV9(form);
    return oldCalculateAllV9(form);
  };

  function methodSelect(label,key,options) {
    return `<label><div class="label">${label}</div><select data-key="${key}">${options.map(o=>`<option value="${o[0]}" ${state.form[key]===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select></label>`;
  }

  renderCalcTab = function(){
    const f = state.form, rf = state.resultForm, result = state.result;
    let extra = '';

    if (['cabinet','bookshelf','shoecabinet','tvconsole'].includes(f.projectType)) {
      extra = `<div class="grid two">${field('背板厚','backThickness')}${field('背板槽深','grooveDepth')}${field('層板 / 分隔數','shelfCount')}${f.projectType==='shoecabinet'?methodSelect('鞋櫃做法','shoeMode',[['flat','平層板'],['tilt','斜層板'],['flip','翻斗式']]):''}${f.projectType==='shoecabinet' && f.shoeMode==='flip'?field('翻斗內深','flipBinDepth'):''}${f.projectType==='tvconsole'?methodSelect('電視櫃做法','tvMode',[['open','開放分格'],['drawer_open','左右抽屜 + 中間開放格']]):''}${f.projectType==='tvconsole' && f.tvMode==='drawer_open'?field('左右抽屜層數','tvSideDrawerCount'):''}${f.projectType==='tvconsole' && f.tvMode==='drawer_open'?field('抽屜面板高度','tvDrawerHeight'):''}</div>`;
    } else if (f.projectType === 'wallcabinet') {
      const mount = f.wallMountMethod || 'french';
      extra = `<div class="grid two">
        ${field('背板厚','backThickness')}
        ${field('背板槽深','grooveDepth')}
        ${field('層板數','shelfCount')}
        ${methodSelect('吊櫃門型','doorMode',[['open','開放式'],['double','雙門'],['upflip','上掀門']])}
        ${methodSelect('掛牆做法','wallMountMethod',[['french','法式掛條'],['direct','螺絲直接上牆'],['hanger','吊櫃掛片']])}
        ${mount==='french'?field('法式掛條高度','cleatHeight'):''}
        ${mount==='french'?field('掛條厚度','cleatThickness'):''}
        ${mount==='direct'?field('固定螺絲數','screwCount'):''}
        ${mount==='direct'?field('螺絲直徑','screwDiameter'):''}
        ${mount==='direct'?field('壁虎 / 膨脹管直徑','wallPlugDiameter'):''}
      </div>`;
    } else if (f.projectType === 'drawer') {
      extra = `<div class="grid two">${field('滑軌單側預留','slideClearance','number','常見 12.5–13')}${field('滑軌長度','slideLength')}${field('底板厚','bottomThickness')}${field('底板槽深','grooveDepth')}${field('抽面板縫隙','gap')}</div>`;
    } else if (f.projectType === 'table') {
      extra = `<div class="grid two">${field('桌腳方料','legSize')}${field('圍板高度','apronHeight')}${field('榫肩預留','tenonShoulder')}${field('榫厚比例','tenonRatio','number','常見 0.33')}</div>`;
    } else if (f.projectType === 'pegboard') {
      const mount = f.pegboardMountMethod || 'screw';
      extra = `<div class="grid two">
        ${methodSelect('洞洞板做法','pegboardMountMethod',[['screw','鎖螺絲上牆'],['french','法式掛條'],['freestanding','落地自立式']])}
        ${field('孔徑','holeDiameter')}
        ${field('孔距','holeSpacing')}
        ${field('孔邊距','edgeMargin')}
        ${field('掛鉤 / 圓棒直徑','pegDiameter')}
        ${field('層板數','pegboardShelfCount')}
        ${field('層板深度','pegboardShelfDepth')}
        ${mount==='french'?field('法式掛條高度','cleatHeight'):''}
        ${mount==='french'?field('掛條 / 墊條厚','cleatThickness'):''}
        ${mount==='screw'?field('固定螺絲數','screwCount'):''}
        ${mount==='screw'?field('螺絲直徑','screwDiameter'):''}
        ${mount==='screw'?field('壁虎 / 膨脹管直徑','wallPlugDiameter'):''}
      </div>`;
    } else if (f.projectType === 'doorpanel') {
      extra = `<div class="grid two">${field('四周預留縫隙','gap')}${field('鉸鏈杯孔直徑','hingeCupDiameter','number','常見 35')}${field('杯孔中心離門邊','hingeCupOffset','number','常見 21.5–22.5')}${field('鉸鏈數量','hingeCount')}</div>`;
    } else if (f.projectType === 'lstorage') {
      extra = `<div class="grid two">${field('單臂深度','armDepth')}${field('層板數','shelfCount')}${field('背板 / 背條厚','backThickness')}</div>`;
    } else if (f.projectType === 'drawerchest') {
      extra = `<div class="grid two">${field('抽屜層數','shelfCount')}${field('自訂每層面板高度','drawerHeights','text','例如 120,160,220,260')}${field('滑軌單側預留','slideClearance')}${field('滑軌長度','slideLength')}${field('底板厚','bottomThickness')}${field('背板厚','backThickness')}${field('底板槽深','grooveDepth')}${field('抽面板縫隙','gap')}</div>`;
    }

    return `
      <div class="card"><h2>基本輸入</h2>
        <div class="grid two">
          ${selectField('製作類型','projectType', [['drawer','抽屜'],['cabinet','櫃子'],['table','桌子'],['pegboard','洞洞板 / 收納架'],['doorpanel','門板'],['bookshelf','書架'],['lstorage','L 型收納架'],['shoecabinet','鞋櫃'],['tvconsole','電視櫃'],['wallcabinet','吊櫃'],['drawerchest','抽屜櫃']])}
          ${field('板材排版用：原板寬','stockBoardWidth','number','常見 1220')}
          ${field('外寬','width')}
          ${field('板材排版用：原板高','stockBoardHeight','number','常見 2440')}
          ${field('外深','depth','number', f.projectType==='doorpanel' ? '門板可當欄位保留，不參與主要計算' : '')}
          ${field('原板數量','stockBoardQty','number','先估用幾張')}
          ${field('外高','height')}
          ${field('主板厚','materialThickness')}
        </div>
        <div class="inline-note">輸入時只保存草稿；選擇不同做法後，只會顯示該做法需要的尺寸欄位。按「計算 / 更新結果」才刷新結果。</div>
      </div>
      <div class="card"><h2>依類型 / 做法補充</h2>${extra}
        <div class="btn-row"><button class="primary" id="calcBtn">計算 / 更新結果</button><button class="secondary" id="presetBtn">切換類型後載入常用預設</button><button class="secondary" id="resetBtn">清除並恢復預設值</button></div>
        <div class="btn-row"><button class="secondary" id="exportBtn">匯出備份</button><label class="file-btn">匯入備份<input type="file" id="importInput" accept="application/json" style="display:none"></label></div>
      </div>
      <div class="card"><h2>目前顯示的結果（最後一次計算）</h2><div class="small">類型：${projectName(rf.projectType)} ｜ 尺寸：${rf.width} × ${rf.depth} × ${rf.height} mm ｜ 板厚：${rf.materialThickness} mm</div><div class="pills" style="margin-top:10px">${result.summary.map(x=>`<span class="pill">${e(x)}</span>`).join('')}</div></div>
      <div class="card"><h2>裁切清單</h2><table><thead><tr><th>部件</th><th>數量</th><th>尺寸</th></tr></thead><tbody>${result.cutList.map(r=>`<tr><td><strong>${e(r.part)}</strong><div class="small">${e(r.note||'')}</div></td><td>${r.qty}</td><td>${e(r.size)}</td></tr>`).join('')}</tbody></table></div>`;
  };

  bindCommonInputs = function(){
    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.dataset.key;
      el.addEventListener('input', () => {
        state.form[key] = el.type === 'number' ? (el.value === '' ? '' : Number(el.value)) : el.value;
        saveState('草稿已儲存');
      });
      el.addEventListener('change', () => {
        state.form[key] = el.type === 'number' ? (el.value === '' ? '' : Number(el.value)) : el.value;
        saveState('草稿已儲存');
        if (['projectType','pegboardMountMethod','wallMountMethod','shoeMode','tvMode','doorMode'].includes(key)) render();
      });
    });
  };

  function readPhotoFile(file) {
    return new Promise((resolve,reject)=>{
      if(!file) return resolve('');
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result);
      reader.onerror=reject;
      reader.readAsDataURL(file);
    });
  }

  renderToolsTab = function(){
    const tools=loadTools();
    const rows=tools.map((t,i)=>{
      const thumb=t.photo ? `<img src="${t.photo}" alt="工具照片" style="width:54px;height:54px;object-fit:cover;border-radius:12px;border:1px solid #ddd">` : '<span class="small">無</span>';
      return `<tr><td>${thumb}</td><td><strong>${e(t.name)}</strong><div class="small">${e(t.note||'')}</div></td><td>${e(t.category||'')}</td><td>${e(t.brand||'')}</td><td>${e(t.model||'')}</td><td>${e(t.platform||'')}</td><td>${e(t.qty||1)}</td><td>${e(t.price||'')}</td><td><button class="secondary tool-del" data-i="${i}" style="padding:7px 10px;border-radius:10px">刪除</button></td></tr>`;
    }).join('');
    return `<div class="card"><h2>我的工具庫</h2><div class="small">這頁會把你目前擁有的工具存在本機瀏覽器。v9 新增照片欄位，照片會一起保存在工具庫 JSON 裡。</div></div>
    <div class="card"><h2>新增工具</h2><div class="grid two">
      <label><div class="label">工具照片</div><input id="toolPhoto" type="file" accept="image/*"><div class="inline-note">照片會以本機資料形式保存；建議用小圖，避免備份檔太大。</div></label>
      <label><div class="label">工具名稱</div><input id="toolName" value=""></label>
      <label><div class="label">分類</div><select id="toolCategory"><option>電動工具</option><option>手工具</option><option>雷射 / CNC</option><option>電池 / 充電器</option><option>五金配件</option><option>耗材</option><option>量測工具</option></select></label>
      <label><div class="label">品牌</div><input id="toolBrand" placeholder="例如 WORX / 牧田 / 大有"></label>
      <label><div class="label">型號</div><input id="toolModel" placeholder="例如 132X / 2545-20"></label>
      <label><div class="label">電池平台 / 規格</div><input id="toolPlatform" placeholder="例如 威克士20V / 牧田18V / 110V"></label>
      <label><div class="label">數量</div><input id="toolQty" type="number" value="1"></label>
      <label><div class="label">購入價 / 估價</div><input id="toolPrice" placeholder="可填台幣，例如 1838"></label>
      <label><div class="label">備註</div><input id="toolNote" placeholder="保固、來源、用途、狀態"></label>
    </div><div class="btn-row"><button class="primary" id="addToolBtn">新增到工具庫</button><button class="secondary" id="exportToolsBtn">匯出工具庫 JSON</button><label class="file-btn">匯入工具庫<input type="file" id="importToolsInput" accept="application/json" style="display:none"></label></div></div>
    <div class="card"><h2>已記錄工具：${tools.length} 筆</h2><table><thead><tr><th>照片</th><th>工具</th><th>分類</th><th>品牌</th><th>型號</th><th>平台</th><th>數量</th><th>價格</th><th>操作</th></tr></thead><tbody>${rows || '<tr><td colspan="9" class="small">尚未新增工具。</td></tr>'}</tbody></table></div>`;
  };

  bindToolsButtons = function(){
    const add=document.getElementById('addToolBtn');
    if(add) add.onclick=async function(){
      const photoFile=document.getElementById('toolPhoto').files[0];
      const item={
        name:document.getElementById('toolName').value.trim(),
        category:document.getElementById('toolCategory').value,
        brand:document.getElementById('toolBrand').value.trim(),
        model:document.getElementById('toolModel').value.trim(),
        platform:document.getElementById('toolPlatform').value.trim(),
        qty:document.getElementById('toolQty').value || 1,
        price:document.getElementById('toolPrice').value.trim(),
        note:document.getElementById('toolNote').value.trim(),
        photo: await readPhotoFile(photoFile),
        createdAt:new Date().toISOString()
      };
      if(!item.name){ alert('請先輸入工具名稱'); return; }
      const tools=loadTools(); tools.push(item); saveTools(tools); render();
    };
    document.querySelectorAll('.tool-del').forEach(btn=>btn.onclick=function(){ const i=Number(btn.dataset.i); const tools=loadTools(); tools.splice(i,1); saveTools(tools); render(); });
    const exp=document.getElementById('exportToolsBtn');
    if(exp) exp.onclick=function(){ const blob=new Blob([JSON.stringify(loadTools(),null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='woodworking-owned-tools-with-photos.json'; a.click(); URL.revokeObjectURL(url); };
    const imp=document.getElementById('importToolsInput');
    if(imp) imp.onchange=async function(ev){ const file=ev.target.files[0]; if(!file) return; try{ const parsed=JSON.parse(await file.text()); if(!Array.isArray(parsed)) throw new Error('bad'); saveTools(parsed); render(); }catch(e){ alert('匯入失敗，請確認是工具庫 JSON。'); } ev.target.value=''; };
  };

  document.title='木工板材尺寸計算 App v9';
  const heroTop=document.querySelector('.hero > div'); if(heroTop) heroTop.textContent='私人木工板材尺寸計算 App v9';
  const heroH1=document.querySelector('.hero h1'); if(heroH1) heroH1.textContent='工具照片欄位 + 依做法顯示尺寸欄位';
  const heroP=document.querySelector('.hero p'); if(heroP) heroP.textContent='新增工具庫照片欄位；計算頁面可先選做法，只列出該做法需要的尺寸欄位，例如洞洞板選「鎖螺絲上牆」就不顯示法式掛條尺寸。';
  const footer=document.querySelector('.footer'); if(footer) footer.textContent='v9 預覽版｜尺寸單位 mm｜本機儲存 localStorage';

  state.form={...defaultForm,...state.form};
  state.resultForm={...defaultForm,...state.resultForm};
  state.result=calculateAll(state.resultForm);
  saveState('已升級 v9');
  render();
})();
</script>

<script>
// v16 enhancement: Taobao button tries to open the Taobao app first, then falls back to web search.
(function(){
  function enc(s){ return encodeURIComponent(String(s || '').trim()); }

  function openWithAppFallbackV16(appUrlList, fallbackUrl){
    let movedAway = false;
    const markMoved = () => { movedAway = true; };
    const onVisibility = () => {
      if (document.hidden || document.visibilityState === 'hidden') movedAway = true;
    };
    window.addEventListener('pagehide', markMoved, { once: true });
    window.addEventListener('blur', markMoved, { once: true });
    document.addEventListener('visibilitychange', onVisibility, { once: true });

    let i = 0;
    const tryNext = () => {
      if (movedAway) return;
      if (i < appUrlList.length) {
        const url = appUrlList[i++];
        try { window.location.href = url; } catch(e) {}
        setTimeout(tryNext, 850);
      } else {
        if (!movedAway) window.open(fallbackUrl, '_blank', 'noopener,noreferrer');
      }
    };
    tryNext();
  }

  window.openTaobaoAppSearchV16 = function(title){
    const q = String(title || '').trim();
    const webUrl = 'https://s.taobao.com/search?q=' + enc(q);
    const h5Url = webUrl + '&from=chatgpt_wood_app';
    const deepLinks = [
      'tbopen://m.taobao.com/tbopen/index.html?action=ali.open.nav&module=h5&h5Url=' + encodeURIComponent(h5Url),
      'taobao://s.taobao.com/search?q=' + enc(q),
      'taobao://m.taobao.com/tbopen/index.html?action=ali.open.nav&module=h5&h5Url=' + encodeURIComponent(h5Url)
    ];
    openWithAppFallbackV16(deepLinks, webUrl);
  };

  const previousOpenBuySearchV15 = window.openBuySearchV15;
  window.openBuySearchV15 = function(title, mode){
    if (mode === 'taobao') {
      window.openTaobaoAppSearchV16(title);
      return;
    }
    if (typeof previousOpenBuySearchV15 === 'function') return previousOpenBuySearchV15(title, mode);
    let url = 'https://www.google.com/search?q=' + enc(`${title} 價格 購買 木工 五金`);
    if (mode === 'shopee') url = 'https://shopee.tw/search?keyword=' + enc(title);
    window.open(url, '_blank', 'noopener,noreferrer');
  };

  const oldRenderHardwareTabV16 = window.renderHardwareTab || renderHardwareTab;
  renderHardwareTab = function(){
    let out = oldRenderHardwareTabV16();
    out = out.replace('蝦皮/淘寶/Google 查價按鈕', '蝦皮/淘寶App/Google 查價按鈕');
    out = out.replace(/淘寶查價/g, '淘寶App查價');
    out = out.replace('每張五金卡片已加入網購預估價位、蝦皮/淘寶/Google 查價按鈕，以及安裝方法搜尋。', '每張五金卡片已加入網購預估價位、蝦皮 / 淘寶App / Google 查價按鈕，以及安裝方法搜尋。淘寶按鈕會優先嘗試開啟淘寶 App，失敗才改開網頁。');
    return out;
  };

  document.title = '木工板材尺寸計算 App v16';
  const heroTop = document.querySelector('.hero > div'); if (heroTop) heroTop.textContent = '私人木工板材尺寸計算 App v16';
  const heroH1 = document.querySelector('.hero h1'); if (heroH1) heroH1.textContent = '淘寶查價優先跳轉淘寶 App';
  const heroP = document.querySelector('.hero p'); if (heroP) heroP.textContent = '新增：五金頁面的淘寶查價按鈕會優先嘗試開啟淘寶 App 搜尋，若手機未安裝或被瀏覽器阻擋，會自動改開淘寶網頁。';
  const footer = document.querySelector('.footer'); if (footer) footer.textContent = 'v16 預覽版｜尺寸單位 mm｜本機儲存 localStorage';
  if (typeof render === 'function') render();
})();
