function resultCard(){const res=state.result,rf=state.resultForm;return `<section class="card"><h2>目前顯示的結果</h2><div class="small">類型：${projectName(rf.projectType)} ｜ 尺寸：${rf.width} × ${rf.depth} × ${rf.height} mm ｜ 板厚：${rf.materialThickness} mm</div><div class="pills" style="margin-top:10px">${res.summary.map(x=>`<span class="pill">${esc(x)}</span>`).join('')}</div></section>${cutTable(res.cutList)}`}
function cutTable(list){return `<section class="card"><h2>裁切清單</h2><div class="table-wrap"><table><thead><tr><th>#</th><th>部件</th><th>數量</th><th>尺寸</th><th>備註</th></tr></thead><tbody>${list.map((p,i)=>`<tr><td>${i+1}</td><td><strong>${esc(p.part)}</strong></td><td>${p.qty}</td><td>${esc(p.size)}</td><td>${esc(p.note||'')}</td></tr>`).join('')}</tbody></table></div></section>`}
function bindButtons(){const c=$('calcBtn');if(c)c.onclick=()=>{state.resultForm={...state.form};state.result=calculate(state.resultForm);save('結果已更新');render()};const p=$('presetBtn');if(p)p.onclick=()=>{loadPreset(true);state.resultForm={...state.form};state.result=calculate(state.form);save('已載入預設');render()};const reset=$('resetBtn');if(reset)reset.onclick=()=>{if(confirm('確定恢復預設？')){state={form:{...defaults},resultForm:{...defaults},result:calculate(defaults)};save('已恢復預設');render()}};document.querySelectorAll('[data-export]').forEach(btn=>btn.onclick=()=>exportFile(btn.dataset.export));}

function dimH(x1,x2,y,label){return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#555"/><line x1="${x1}" y1="${y-7}" x2="${x1}" y2="${y+7}" stroke="#555"/><line x1="${x2}" y1="${y-7}" x2="${x2}" y2="${y+7}" stroke="#555"/><text x="${(x1+x2)/2}" y="${y-6}" font-size="11" text-anchor="middle">${esc(label)}</text>`}

s.cutList[2]&&res.cutList[2].part)||'部件3')}${mark(356,174,4,(res.cutList[3]&&res.cutList[3].part)||'部件4')}</svg></div></div><section class="card"><h2>雷射圖紙 SVG 預覽</h2><div class="small">v72 改為 1:1 分層圖紙預覽：紅色為切割線、藍色為孔位、黑色為雕刻/標註。匯入雷射軟體後仍需確認 mm 比例。</div><div class="laser-toolbar"><button class="secondary" data-export="svg">匯出 SVG</button><button class="secondary" data-export="png">匯出 PNG</button><button class="secondary" data-export="dxf">匯出 DXF</button></div>${laserSvg()}</section>${cutTable(res.cutList)}`}
function exportFile(type){const issues=paperSafetyIssues();const bad=issues.filter(x=>x.level==='bad').length;if(bad&&!confirm(`圖紙安全檢查有 ${bad} 個紅色問題，仍要匯出？`))return;const svg=document.querySelector('.export-svg');if(!svg){toast('目前沒有可匯出的圖紙');return}if(type==='svg'){download(new Blob([new XMLSerializer().serializeToString(svg)],{type:'image/svg+xml'}),`mokkou-${VERSION}.svg`)}else if(type==='png'){let s=new XMLSerializer().serializeToString(svg);const url=URL.createObjectURL(new Blob([s],{type:'image/svg+xml'}));const img=new Image();img.onload=()=>{const vb=svg.viewBox.baseVal,c=document.createElement('canvas');c.width=vb.width*2;c.height=vb.height*2;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);c.toBlob(b=>download(b,`mokkou-${VERSION}.png`),'image/png')};img.onerror=()=>toast('PNG 匯出失敗');img.src=url}else if(type==='dxf'){download(new Blob([makeDxf()],{type:'application/dxf'}),`mokkou-${VERSION}.dxf`)}}
function makeDxf(){const pieces=flatten(state.result.cutList);let out='0\nSECTION\n2\nENTITIES\n';let x=10,y=10,row=0,bw=n(state.resultForm.stockBoardWidth,600);function line(x1,y1,x2,y2){out+=`0\nLINE\n8\nCUT\n10\n${x1}\n20\n${y1}\n30\n0\n11\n${x2}\n21\n${y2}\n31\n0\n`}function rect(x,y,w,h){line(x,y,x+w,y);line(x+w,y,x+w,y+h);line(x+w,y+h,x,y+h);line(x,y+h,x,y)}pieces.forEach(p=>{if(x+p.w+10>bw){x=10;y+=row+10;row=0}rect(x,y,p.w,p.h);x+=p.w+10;row=Math.max(row,p.h)});return out+'0\nENDSEC\n0\nEOF\n'}
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500);toast('已建立下載：'+name)}

const TOOL_STORE='mokkou_tool_library_v46';
const TOOL_STORE_OLD='mokkou_tool_library_v45';
const TOOL_SELECTED='mokkou_tool_library_v46_selected';
const TOOL_SELECTED_OLD='mokkou_tool_library_v45_selected';
const TOOL_EXPANDED='mokkou_tool_library_v46_expanded';
function newId(prefix='id'){return prefix+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7)}
function getToolLib(){
  try{const saved=JSON.parse(localStorage.getItem(TOOL_STORE)||localStorage.getItem(TOOL_STORE_OLD)||'null');if(saved&&Array.isArray(saved.categories)){saved.categories.forEach(c=>{c.items=(c.items||[]).map(x=>({...x,platform:x.platform||'',buyDate:x.buyDate||x.purchaseDate||''}))});return saved}}catch(e){}
  const cats=defaultToolCategories();
  const legacy=[['cutting','toolCuttingText'],['sanding','toolSandingText'],['laser','toolLaserText'],['drilling','toolDrillingText'],['measure','toolMeasureText'],['clamp','toolClampText'],['hand','toolHandText'],['power','toolPowerText'],['safety','toolSafetyText'],['setting','toolSettingText']];
  legacy.forEach(([id,key])=>{const v=String(state.form[key]||'').trim();if(v){const c=cats.find(x=>x.id===id);if(c)c.items=[{id:newId('legacy'),name:'舊版記錄',spec:'',usage:'',price:'',status:'待整理',platform:'',buyDate:'',note:v}]}})
  return {categories:cats,totalNote:state.form.toolText||''}
}
function putToolLib(lib,note='工具庫已儲存'){
  localStorage.setItem(TOOL_STORE,JSON.stringify(lib));
  const saveNote=$('saveNote'); if(saveNote)saveNote.textContent='本機儲存：'+note+' '+now();
}
function currentToolCat(lib){
  if(!lib.categories.length)return null;
  const wanted=localStorage.getItem(TOOL_SELECTED)||localStorage.getItem(TOOL_SELECTED_OLD);
  return lib.categories.find(c=>c.id===wanted)||lib.categories[0]
}
function currentToolSort(){return localStorage.getItem('mokkou_tool_library_v46_sort')||localStorage.getItem('mokkou_tool_library_v45_sort')||'date_desc'}
function priceNum(v){const s=String(v||'').replace(/,/g,'');const m=s.match(/\d+(?:\.\d+)?/);return m?parseFloat(m[0]):Number.POSITIVE_INFINITY}
function dateVal(v){const t=Date.parse(v||'');return Number.isFinite(t)?t:0}
function sortToolItems(items,mode){const arr=[...(items||[])];arr.sort((a,b)=>{if(mode==='date_asc')return dateVal(a.buyDate||a.purchaseDate)-dateVal(b.buyDate||b.purchaseDate);if(mode==='price_asc')return priceNum(a.price)-priceNum(b.price);if(mode==='price_desc')return priceNum(b.price)-priceNum(a.price);if(mode==='name_asc')return String(a.name||'').localeCompare(String(b.name||''),'zh-Hant');if(mode==='status_asc')return String(a.status||'').localeCompare(String(b.status||''),'zh-Hant')||String(a.name||'').localeCompare(String(b.name||''),'zh-Hant');return dateVal(b.buyDate||b.purchaseDate)-dateVal(a.buyDate||a.purchaseDate)});return arr}
function currentExpandedTool(){return localStorage.getItem(TOOL_EXPANDED)||''}
function renderTools(){
  const lib=getToolLib();
  const cat=currentToolCat(lib);
  if(cat)localStorage.setItem(TOOL_SELECTED,cat.id);
  const sortMode=currentToolSort();
  const expandedId=currentExpandedTool();
  const options=lib.categories.map(c=>`<option value="${esc(c.id)}" ${cat&&c.id===cat.id?'selected':''}>${esc(c.name)}</option>`).join('');
  const rawItems=cat&&cat.items?cat.items:[];
  const sortedItems=sortToolItems(rawItems,sortMode);

function priceNum(v){const x=Number(String(v||'').replace(/[^0-9.\-]/g,''));return Number.isFinite(x)?x:0}
function kgNum(v){const x=Number(String(v||'').replace(/[^0-9.\-]/g,''));return Number.isFinite(x)?x:0}
function mainlandPlatform(p){return ['淘寶','拼多多','1688'].includes(String(p||''))}
function defaultCurrencyForPlatform(p){return mainlandPlatform(p)?'CNY':'TWD'}
function defaultCnyRate(){const saved=Number(localStorage.getItem('mokkou_cny_twd_rate_v53')||'');return Number.isFinite(saved)&&saved>0?saved:4.55}
function itemCurrency(item){return String(item&&item.priceCurrency||defaultCurrencyForPlatform(item&&item.platform)||'TWD')}
function itemCnyRate(item){const x=Number(String(item&&item.cnyRate||'').replace(/[^0-9.\-]/g,''));return Number.isFinite(x)&&x>0?x:defaultCnyRate()}
function shopBasePriceTwd(item){const base=priceNum(item&&item.price);if(!base)return 0;return itemCurrency(item)==='CNY'?base*itemCnyRate(item):base}
function shopOriginalPriceLabel(item){const base=priceNum(item&&item.price);if(!base)return '—';if(itemCurrency(item)==='CNY')return `¥${r(base)} ≈ NT$${r(shopBasePriceTwd(item))}`;return `NT$${r(base)}`}
function shopShipping(item){const manual=priceNum(item&&item.shippingFee);if(manual>0)return manual;if(mainlandPlatform(item&&item.platform))return Math.round(kgNum(item&&item.weightKg)*70);return 0}
function shopTotal(item){return shopBasePriceTwd(item)+shopShipping(item)}
function dateVal(s){const x=Date.parse(s||'');return Number.isFinite(x)?x:0}
function shopDisplayPrice(item){const base=shopOriginalPriceLabel(item);const ship=shopShipping(item);const total=shopTotal(item);if(base==='—')return '—';return ship?`${base}；含運估 NT$${r(total)}`:`${base}`}

function sortShoppingItems(items){const sort=localStorage.getItem(SHOP_SORT)||'date-desc';const arr=[...items];arr.sort((a,b)=>{if(sort==='date-desc')return dateVal(b.seenDate)-dateVal(a.seenDate);if(sort==='date-asc')return dateVal(a.seenDate)-dateVal(b.seenDate);if(sort==='price-asc')return shopTotal(a)-shopTotal(b);if(sort==='price-desc')return shopTotal(b)-shopTotal(a);if(sort==='name-asc')return String(a.compareName||a.name||'').localeCompare(String(b.compareName||b.name||''),'zh-Hant');if(sort==='platform-asc')return String(a.platform||'').localeCompare(String(b.platform||''),'zh-Hant');if(sort==='status-asc')return String(a.status||'').localeCompare(String(b.status||''),'zh-Hant');if(sort==='category-asc')return String(a.category||'').localeCompare(String(b.category||''),'zh-Hant');return 0});return arr}
function filteredShoppingItems(items){const p=localStorage.getItem(SHOP_PLATFORM)||'全部';return p==='全部'?items:items.filter(x=>String(x.platform||'其他')===p)}

  const filterBody=`<div class="shopping-sort-row"><label><div class="label">平台篩選</div><select id="shoppingPlatformFilter">${shoppingSelectOptions(shoppingPlatformOptions,filter)}</select></label><label><div class="label">排序方式</div><select id="shoppingSortSelect">${shoppingSelectOptions([['date-desc','看到日期：新到舊'],['date-asc','看到日期：舊到新'],['price-asc','總價：低到高'],['price-desc','總價：高到低'],['name-asc','比價名稱排序'],['platform-asc','平台排序'],['category-asc','類型排序'],['status-asc','狀態排序']],sort)}</select></label></div>`;
  const formBody=`<input type="hidden" id="shopEditId"><div class="shopping-form-grid"><label><div class="label">比價名稱 <span class="hint">相同商品請填一樣，才能聯動比價</span></div><input id="shopCompareName" placeholder="例：威克士 4.0Ah 電池"></label><label><div class="label">商品標題 / 店家名稱</div><input id="shopName" placeholder="例：威克士原廠 4.0Ah 電池"></label><label><div class="label">類型</div><select id="shopCategory">${shoppingSelectOptions(shoppingCategoryOptions,'工具')}</select></label><label><div class="label">平台</div><select id="shopPlatform">${shoppingSelectOptions(shoppingPlatformOptions.filter(x=>x[0]!=='全部'),'蝦皮')}</select></label><label><div class="label">規格 / 型號</div><input id="shopSpec" placeholder="例：20V 4.0Ah / 600×400×3mm"></label><label><div class="label">用途</div><input id="shopUsage" placeholder="例：木工工具電池 / 雷射切割板材"></label><label><div class="label">價格幣別</div><select id="shopPriceCurrency"><option value="TWD">台幣 TWD</option><option value="CNY">人民幣 RMB / CNY</option></select></label><label><div class="label">人民幣匯率 <span class="hint">1 RMB = ? TWD，可自行改</span></div><input id="shopCnyRate" type="number" inputmode="decimal" step="0.01" placeholder="例：4.55"></label><label><div class="label">當天看到價格 <span class="hint">依上方幣別輸入</span></div><input id="shopPrice" type="number" inputmode="decimal" placeholder="例：188"></label><label><div class="label">重量 <span class="hint">kg，大陸平台估集運</span></div><input id="shopWeightKg" type="number" inputmode="decimal" placeholder="例：1.2"></label><label><div class="label">運費 / 集運費 <span class="hint">台幣，可空白自動估算</span></div><input id="shopShippingFee" type="number" inputmode="decimal" placeholder="例：70"></label><label><div class="label">看到日期</div><input id="shopSeenDate" type="date"></label><label><div class="label">狀態</div><select id="shopStatus">${shoppingSelectOptions(shoppingStatusOptions,'想買')}</select></label><label><div class="label">商品連結</div><input id="shopUrl" placeholder="貼上商品網址，可留空"></label><label class="full"><div class="label">換算預覽</div><div id="shopPricePreview" class="shopping-price-preview">輸入價格後會顯示 RMB / TWD 換算與含運估算。</div></label><label class="full"><div class="label">備註</div><textarea id="shopNote" placeholder="例：注意是否原廠、是否含保固、是否需加集運、賣家評價。"></textarea></label></div><div class="btn-row shopping-form-buttons"><button class="primary" type="button" id="shopAddItem">新增項目</button><button class="secondary" type="button" id="shopUpdateItem">更新項目</button><button class="secondary tool-danger-btn" type="button" id="shopDeleteCurrent">刪除目前項目</button><button class="secondary" type="button" id="shopClearForm">清空輸入</button></div>`;
  const compareBody=`<div class="small">同一個「比價名稱」底下的淘寶、拼多多、蝦皮價格會自動放在一起比較；人民幣會先換成台幣，再加上集運 / 運費估算。每個群組也可跳到專門比價網站。</div>${compare}`;
  const listBody=`<div class="small">點擊商品名稱可展開詳細資料；展開後可編輯、刪除，或直接加入其他平台價格。</div>${list}`;

  return [

    shoppingFold('note','購物總備註 / 舊版筆記','跨商品購買策略與舊版備註。',noteBody,false)
  ].join('')
}

function shopQuery(item){return String((item&&((item.compareName||'')+' '+(item.spec||'')))||(item&&item.name)||'木工 工具').trim().replace(/\s+/g,' ')}
function shopPlatformUrl(platform,query){const q=encodeURIComponent(String(query||'木工 工具').trim()||'木工 工具');const p=String(platform||'').toLowerCase();if(String(platform).includes('淘寶')||p.includes('taobao'))return `https://s.taobao.com/search?q=${q}`;if(String(platform).includes('拼多多')||p.includes('pinduoduo')||p.includes('pdd'))return `https://mobile.yangkeduo.com/search_result.html?search_key=${q}`;if(String(platform).includes('蝦皮')||p.includes('shopee'))return `https://shopee.tw/search?keyword=${q}`;if(String(platform).includes('1688'))return `https://s.1688.com/selloffer/offer_search.htm?keywords=${q}`;if(String(platform).includes('露天'))return `https://www.ruten.com.tw/find/?q=${q}`;return `https://www.google.com/search?q=${q}`}
function shopCompareSiteUrl(site,query){const q=encodeURIComponent(String(query||'木工 工具').trim()||'木工 工具');if(site==='BigGo')return `https://biggo.com.tw/s/?q=${q}`;if(site==='飛比')return `https://feebee.com.tw/s/?q=${q}`;if(site==='LINE購物')return `https://buy.line.me/search?keyword=${q}`;if(site==='Google購物')return `https://www.google.com/search?tbm=shop&q=${q}`;return `https://www.google.com/search?q=${q}`}
function shopCleanUrl(url){const s=String(url||'').trim();if(!s)return '';if(/^https?:\/\//i.test(s))return s;return 'https://'+s}
function shopLinkButtons(item,compact=false){const q=shopQuery(item);const same=shopPlatformUrl(item.platform,q);const original=shopCleanUrl(item.url);const cls=compact?'shopping-link-btn small-link':'shopping-link-btn';let html='';if(original)html+=`<a class="${cls} primary-link" href="${esc(original)}" target="_blank" rel="noopener noreferrer">開商品頁</a>`;html+=`<a class="${cls} platform-link" href="${esc(same)}" target="_blank" rel="noopener noreferrer">搜${esc(item.platform||'平台')}</a>`;if(!compact){html+=`<a class="${cls}" href="${esc(shopPlatformUrl('淘寶',q))}" target="_blank" rel="noopener noreferrer">淘寶比價</a>`;html+=`<a class="${cls}" href="${esc(shopPlatformUrl('拼多多',q))}" target="_blank" rel="noopener noreferrer">拼多多比價</a>`;html+=`<a class="${cls}" href="${esc(shopPlatformUrl('蝦皮',q))}" target="_blank" rel="noopener noreferrer">蝦皮比價</a>`;html+=`<a class="${cls} compare-site" href="${esc(shopCompareSiteUrl('BigGo',q))}" target="_blank" rel="noopener noreferrer">BigGo 比價</a>`;html+=`<a class="${cls} compare-site" href="${esc(shopCompareSiteUrl('飛比',q))}" target="_blank" rel="noopener noreferrer">飛比價格</a>`;html+=`<a class="${cls} compare-site" href="${esc(shopCompareSiteUrl('LINE購物',q))}" target="_blank" rel="noopener noreferrer">LINE購物</a>`}else{html+=`<a class="${cls} compare-site" href="${esc(shopCompareSiteUrl('BigGo',q))}" target="_blank" rel="noopener noreferrer">BigGo</a>`;html+=`<a class="${cls} compare-site" href="${esc(shopCompareSiteUrl('飛比',q))}" target="_blank" rel="noopener noreferrer">飛比</a>`}return html}
function shopGroupLinks(name){const q=String(name||'木工 工具').trim();return `<div class="shopping-search-pack"><a class="shopping-link-btn small-link" href="${esc(shopPlatformUrl('淘寶',q))}" target="_blank" rel="noopener noreferrer">淘寶搜</a><a class="shopping-link-btn small-link" href="${esc(shopPlatformUrl('拼多多',q))}" target="_blank" rel="noopener noreferrer">拼多多搜</a><a class="shopping-link-btn small-link" href="${esc(shopPlatformUrl('蝦皮',q))}" target="_blank" rel="noopener noreferrer">蝦皮搜</a><a class="shopping-link-btn small-link compare-site" href="${esc(shopCompareSiteUrl('BigGo',q))}" target="_blank" rel="noopener noreferrer">BigGo</a><a class="shopping-link-btn small-link compare-site" href="${esc(shopCompareSiteUrl('飛比',q))}" target="_blank" rel="noopener noreferrer">飛比</a><a class="shopping-link-btn small-link compare-site" href="${esc(shopCompareSiteUrl('LINE購物',q))}" target="_blank" rel="noopener noreferrer">LINE購物</a><a class="shopping-link-btn small-link compare-site" href="${esc(shopCompareSiteUrl('Google購物',q))}" target="_blank" rel="noopener noreferrer">Google購物</a></div>`}
function renderShoppingCompare(items){const groups=shoppingCompareGroups(items);if(!groups.length)return `<div class="shopping-empty">目前沒有可比價資料。至少新增一筆商品；若同商品跨平台，請使用相同比價名稱。</div>`;return groups.map(([name,group])=>{const valid=group.filter(x=>priceNum(x.price)>0);const best=valid.slice().sort((a,b)=>shopTotal(a)-shopTotal(b))[0];const rows=sortShoppingItems(group).map(item=>{const isBest=best&&item.id===best.id;return `<tr><td>${esc(item.platform||'—')}</td><td>${esc(item.seenDate||'—')}</td><td>${shopOriginalPriceLabel(item)}</td><td>${shopShipping(item)?'NT$'+r(shopShipping(item)):'—'}</td><td><strong>${shopTotal(item)?'NT$'+r(shopTotal(item)):'—'}</strong> ${isBest?'<span class="shopping-mini-tag shopping-best">目前最低</span>':''}</td><td>${esc(item.status||'—')}</td><td><div class="shopping-compare-links">${shopLinkButtons(item,true)}</div></td></tr>`}).join('');const bestText=best?`${best.platform}｜NT$${r(shopTotal(best))}`:'尚無價格';return `<div class="shopping-compare-group"><div class="shopping-compare-head"><div><div class="shopping-compare-title">${esc(name)}</div><div class="small">共 ${group.length} 筆平台價格；RMB 先換成台幣後再比總價。</div>${shopGroupLinks(name)}</div><span class="shopping-mini-tag shopping-best">最低：${esc(bestText)}</span></div><div class="table-wrap shopping-compare-table"><table><thead><tr><th>平台</th><th>看到日期</th><th>商品價</th><th>運費 / 集運</th><th>估算總價</th><th>狀態</th><th>比價跳轉</th></tr></thead><tbody>${rows}</tbody></table></div></div>`}).join('')}
function shoppingQuickPriceHtml(item){const id=esc(item.id);const baseCurrency=defaultCurrencyForPlatform(item.platform||'蝦皮');const quickPlatforms=['拼多多','淘寶','蝦皮','1688','露天','實體店','其他'];const buttons=quickPlatforms.map(p=>`<button type="button" data-quick-platform="${esc(p)}" data-for-shop="${id}">${esc(p)}</button>`).join('');return `<div class="shopping-quick-add" data-quick-box="${id}"><h4>快速加入其他平台價格</h4><div class="shopping-quick-hint">點上方比價連結看完價格後，回來直接填價格。系統會沿用「${esc(item.compareName||item.name||'此商品')}」的比價名稱、類型、規格與用途，新增成同一組平台比價。</div><div class="shopping-quick-platforms">${buttons}</div><div class="shopping-quick-grid"><label><div class="label">平台</div><select data-quick-field="platform">${shoppingSelectOptions(shoppingPlatformOptions.filter(x=>x[0]!=='全部'),item.platform||'蝦皮')}</select></label><label><div class="label">幣別</div><select data-quick-field="currency"><option value="TWD">台幣 TWD</option><option value="CNY" ${baseCurrency==='CNY'?'selected':''}>人民幣 RMB / CNY</option></select></label><label><div class="label">看到價格</div><input data-quick-field="price" type="number" inputmode="decimal" placeholder="例：188"></label><label><div class="label">重量 kg</div><input data-quick-field="weightKg" type="number" inputmode="decimal" placeholder="可沿用或修改" value="${esc(item.weightKg||'')}"></label><label><div class="label">運費 / 集運費 NT$</div><input data-quick-field="shippingFee" type="number" inputmode="decimal" placeholder="空白自動估算"></label><label><div class="label">看到日期</div><input data-quick-field="seenDate" type="date" value="${todayStr()}"></label><label class="full"><div class="label">商品標題 / 店家</div><input data-quick-field="name" placeholder="例：拼多多某店 4.0Ah 電池" value="${esc(item.name||item.compareName||'')}"></label><label class="full"><div class="label">商品連結</div><input data-quick-field="url" placeholder="貼上新平台商品網址，可留空"></label><label class="full"><div class="label">備註</div><textarea data-quick-field="note" placeholder="例：看完拼多多價格後補入；注意是否含保固 / 是否需集運。"></textarea></label></div><div class="shopping-quick-actions"><button class="primary" type="button" data-add-quick-price="${id}">加入比價</button><button class="secondary" type="button" data-fill-main-from-quick="${id}">帶到上方表單編輯</button></div></div>`}
function readQuickShoppingPrice(base,box,forceMainForm=false){const get=(name)=>{const el=box.querySelector(`[data-quick-field="${name}"]`);return el?String(el.value||'').trim():''};const platform=get('platform')||base.platform||'蝦皮';const currency=get('currency')||defaultCurrencyForPlatform(platform);const price=get('price');if(!price){toast('請先輸入看到價格');return null}const nowIso=new Date().toISOString();const rate=currency==='CNY'?defaultCnyRate():'';const data={id:forceMainForm?'':newId('shop'),compareName:base.compareName||base.name||'',name:get('name')||base.name||base.compareName||'',category:base.category||'工具',platform,spec:base.spec||'',usage:base.usage||'',priceCurrency:currency,price,cnyRate:rate,weightKg:get('weightKg')||base.weightKg||'',shippingFee:get('shippingFee'),seenDate:get('seenDate')||todayStr(),status:'想買',url:get('url'),note:get('note')||`由「${base.platform||'原平台'}」項目快速新增的 ${platform} 比價。`,createdAt:nowIso,updatedAt:nowIso};if(!data.compareName)data.compareName=data.name;if(currency==='CNY')localStorage.setItem('mokkou_cny_twd_rate_v53',String(rate||defaultCnyRate()));return data}
function shoppingItemHtml(item,expandedId=''){const open=item.id===expandedId;const total=shopTotal(item);const ship=shopShipping(item);const tags=[item.category?`類型：${esc(item.category)}`:'',item.platform?`平台：${esc(item.platform)}`:'',priceNum(item.price)?`價格：${shopOriginalPriceLabel(item)}`:'',total?`總價：NT$${r(total)}`:'',item.seenDate?`日期：${esc(item.seenDate)}`:'',item.status?`狀態：${esc(item.status)}`:''].filter(Boolean).map((x,i)=>`<span class="shopping-mini-tag ${i===1?'shopping-platform':''}">${x}</span>`).join('');const original=shopCleanUrl(item.url);const detail=open?`<div class="shopping-detail"><div class="shopping-link-row">${shopLinkButtons(item,false)}</div><div class="shopping-meta"><div><b>比價名稱</b>${esc(item.compareName||'—')}</div><div><b>商品標題</b>${esc(item.name||'—')}</div><div><b>規格 / 型號</b>${esc(item.spec||'—')}</div><div><b>用途</b>${esc(item.usage||'—')}</div><div><b>商品價</b>${shopOriginalPriceLabel(item)}</div><div><b>人民幣匯率</b>${itemCurrency(item)==='CNY'?`1 RMB ≈ NT$${r(itemCnyRate(item))}`:'—'}</div><div><b>運費 / 集運</b>${ship?'NT$'+r(ship):'—'} ${mainlandPlatform(item.platform)&&kgNum(item.weightKg)?`（${r(kgNum(item.weightKg))}kg × 70）`:''}</div><div><b>估算總價</b>${total?'NT$'+r(total):'—'}</div><div><b>看到日期</b>${esc(item.seenDate||'—')}</div><div><b>狀態</b>${esc(item.status||'—')}</div><div><b>更新時間</b>${esc(item.updatedAt?item.updatedAt.slice(0,16).replace('T',' '):'—')}</div></div>${original?`<div class="shopping-note"><b>商品連結</b><br><span class="shopping-url"><a href="${esc(original)}" target="_blank" rel="noopener noreferrer">${esc(original)}</a></span></div>`:''}${item.note?`<div class="shopping-note">${esc(item.note)}</div>`:''}${shoppingQuickPriceHtml(item)}<div class="btn-row shopping-detail-actions"><button class="secondary" type="button" data-edit-shop="${esc(item.id)}">編輯</button><button class="secondary tool-danger" type="button" data-del-shop="${esc(item.id)}">刪除</button></div></div>`:'';return `<div class="shopping-item ${open?'is-open':''}" data-shop-id="${esc(item.id)}"><button class="shopping-summary-button" type="button" data-toggle-shop="${esc(item.id)}" aria-expanded="${open?'true':'false'}"><div class="shopping-summary-line"><div class="shopping-summary-main"><div class="shopping-summary-title">${esc(item.compareName||item.name||'未命名待購項目')}</div><div class="shopping-summary-tags">${tags||'<span class="shopping-mini-tag">尚未填寫摘要</span>'}</div></div><div class="shopping-expand-mark">${open?'收合':'展開'}</div></div></button>${detail}</div>`}
function bindShoppingLibrary(){const lib=getShoppingLib();
  document.querySelectorAll('[data-shopping-section]').forEach(d=>{d.ontoggle=()=>setShoppingSectionOpen(d.dataset.shoppingSection,d.open)});
  const sort=$('shoppingSortSelect');if(sort)sort.onchange=()=>{localStorage.setItem(SHOP_SORT,sort.value);setShoppingSectionOpen('filter',true);render()};
  const filter=$('shoppingPlatformFilter');if(filter)filter.onchange=()=>{localStorage.setItem(SHOP_PLATFORM,filter.value);localStorage.removeItem(SHOP_EXPANDED);setShoppingSectionOpen('filter',true);setShoppingSectionOpen('list',true);render();window.scrollTo({top:0,behavior:'smooth'})};
  document.querySelectorAll('[data-toggle-shop]').forEach(btn=>btn.onclick=()=>{const id=btn.dataset.toggleShop;const cur=localStorage.getItem(SHOP_EXPANDED)||'';if(cur===id)localStorage.removeItem(SHOP_EXPANDED);else localStorage.setItem(SHOP_EXPANDED,id);setShoppingSectionOpen('list',true);render();setTimeout(()=>{const el=document.querySelector(`[data-shop-id="${id}"]`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'})},40)});
  const add=$('shopAddItem');if(add)add.onclick=()=>{const data=readShoppingForm(true);if(!data)return;lib.items.push(data);localStorage.setItem(SHOP_EXPANDED,data.id);setShoppingSectionOpen('list',true);setShoppingSectionOpen('compare',true);putShoppingLib(lib,'新增待購項目');render()};
  const upd=$('shopUpdateItem');if(upd)upd.onclick=()=>{const id=$('shopEditId').value;if(!id){toast('尚未選擇要更新的項目');return}const data=readShoppingForm(false);if(!data)return;const idx=lib.items.findIndex(x=>x.id===id);if(idx<0){toast('找不到目前編輯的項目');return}lib.items[idx]=data;localStorage.setItem(SHOP_EXPANDED,data.id);setShoppingSectionOpen('list',true);setShoppingSectionOpen('compare',true);putShoppingLib(lib,'待購項目已更新');render()};
  const delCur=$('shopDeleteCurrent');if(delCur)delCur.onclick=()=>{const id=$('shopEditId').value;if(!id){toast('尚未選擇要刪除的項目');return}const item=(lib.items||[]).find(x=>x.id===id);if(!item){toast('找不到目前編輯的項目');return}if(!confirm(`刪除目前項目「${item.compareName||item.name||'未命名'}」？`))return;lib.items=lib.items.filter(x=>x.id!==id);localStorage.removeItem(SHOP_EXPANDED);setShoppingSectionOpen('list',true);putShoppingLib(lib,'待購項目已刪除');render()};

function updateShoppingPricePreview(){
  const box=$('shopPricePreview');
  if(!box)return;
  try{
    const platform=($('shopPlatform')&&$('shopPlatform').value)||'蝦皮';
    const curEl=$('shopPriceCurrency');
    const currency=(curEl&&curEl.value)||defaultCurrencyForPlatform(platform);
    const price=priceNum(($('shopPrice')&&$('shopPrice').value)||'');
    const rateEl=$('shopCnyRate');
    let rate=Number(String((rateEl&&rateEl.value)||'').replace(/[^0-9.\-]/g,''));
    if(!Number.isFinite(rate)||rate<=0)rate=defaultCnyRate();
    if(rateEl&&!rateEl.value)rateEl.value=rate;
    const weight=kgNum(($('shopWeightKg')&&$('shopWeightKg').value)||'');
    const shipEl=$('shopShippingFee');
    let ship=priceNum((shipEl&&shipEl.value)||'');
    const autoShip=mainlandPlatform(platform)&&weight>0?Math.round(weight*70):0;
    const usedShip=ship>0?ship:autoShip;
    const twd=currency==='CNY'?price*rate:price;
    const total=twd+usedShip;
    if(!price){
      box.innerHTML=`輸入價格後會顯示 RMB / TWD 換算與含運估算。${mainlandPlatform(platform)?' 大陸平台可填重量，系統會用 1 kg = 70 台幣估集運。':''}`;
      return;
    }
    const original=currency==='CNY'?`人民幣 ¥${r(price)} × 匯率 ${r(rate)} ≈ NT$${r(twd)}`:`台幣 NT$${r(price)}`;
    const shipText=usedShip>0?`運費 / 集運：NT$${r(usedShip)}${ship>0?'（手動）':'（依重量自動估）'}`:'運費 / 集運：未填，暫以 0 計';
    box.innerHTML=`<div><b>原始價格：</b>${original}</div><div><b>${shipText}</b></div><div><b>估算總價：</b>NT$${r(total)}</div>`;
  }catch(e){
    console.warn('updateShoppingPricePreview failed',e);
    box.textContent='價格預覽暫時無法計算，但不影響新增資料。';
  }
}

function renderRecords(){const lib=getRecordLib();const filter=localStorage.getItem(RECORD_CATEGORY)||'全部';const sort=localStorage.getItem(RECORD_SORT)||'date-desc';const filtered=filteredRecordItems(lib.items||[]);const sorted=sortRecordItems(filtered);const expanded=localStorage.getItem(RECORD_EXPANDED)||'';const issueCount=(lib.items||[]).filter(x=>['失敗原因','改善方式'].includes(x.category)||['待改善'].includes(x.status)).length;const list=sorted.length?sorted.map(item=>recordItemHtml(item,expanded)).join(''):`<div class="project-empty">目前沒有符合條件的紀錄。可展開「新增 / 編輯紀錄」建立第一筆。</div>`;const intro=`<div class="muted-box">可記錄施工、下料、雷射參數、失敗原因、改善方式與完工心得。建議每次測試片、正式裁切、組裝問題都留一筆，之後可回查。</div><div class="backup-stats" style="margin-top:12px"><div class="backup-stat"><b>${(lib.items||[]).length}</b>總紀錄</div><div class="backup-stat"><b>${issueCount}</b>待改善 / 失敗</div><div class="backup-stat"><b>${esc(filter)}</b>目前篩選</div></div>`;const filterBody=`<div class="grid two"><label><div class="label">分類篩選</div><select id="recordCategoryFilter">${recordCategories().map(c=>`<option value="${esc(c)}" ${filter===c?'selected':''}>${esc(c)}</option>`).join('')}</select></label><label><div class="label">排序方式</div><select id="recordSortSelect">${[['date-desc','紀錄日期：新到舊'],['date-asc','紀錄日期：舊到新'],['updated-desc','最近更新'],['updated-asc','最早更新'],['category','分類排序'],['status','狀態排序'],['type','類型排序'],['title','標題排序']].map(o=>`<option value="${o[0]}" ${sort===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select></label></div><div class="small" style="margin-top:10px">目前顯示 ${sorted.length} / ${(lib.items||[]).length} 筆。點紀錄卡片可展開細節。</div>`;const formBody=`<input type="hidden" id="recordEditId"><input type="hidden" id="recordCreatedAt"><div class="record-form-grid"><label><div class="label">紀錄標題</div><input id="recordTitle" placeholder="例：3mm 合頁盒雷射測試紀錄"></label><label><div class="label">分類</div><select id="recordCategory">${recordCategoryOptions('施工紀錄')}</select></label><label><div class="label">狀態</div><select id="recordStatus">${recordStatusOptions('草稿')}</select></label><label><div class="label">紀錄日期</div><input id="recordDate" type="date" value="${todayStr()}"></label><label><div class="label">專案類型</div><select id="recordProjectType">${projectTypeSelect(state.form.projectType)}</select></label><label><div class="label">尺寸 / 結果</div><input id="recordDimensions" placeholder="例：250 × 280 × 250 mm，板厚 3 mm"></label><label class="full"><div class="label">材料 / 板材</div><input id="recordMaterial" placeholder="例：3mm 椴木合板，切縫補償 0.15"></label><label class="full"><div class="label">工具 / 設備</div><input id="recordTools" placeholder="例：10W 藍光雷射、氣輔、直角夾"></label><label class="full"><div class="label">加工設定</div><textarea id="recordSettings" placeholder="例：速度、功率、刀數、焦距、氣輔、CNC 轉速、刀徑。"></textarea></label><label class="full"><div class="label">問題 / 現象</div><textarea id="recordIssue" placeholder="例：邊緣焦黑、榫卯太緊、尺寸短 0.4 mm。"></textarea></label><label class="full"><div class="label">原因判斷</div><textarea id="recordCause" placeholder="例：切縫補償不足、板材厚度不均、焦距偏高。"></textarea></label><label class="full"><div class="label">改善方式</div><textarea id="recordImprovement" placeholder="例：榫齒加大 0.2 mm、降低速度、增加氣輔。"></textarea></label><label class="full"><div class="label">下次動作</div><textarea id="recordNextAction" placeholder="例：下次先切測試片，再正式切。"></textarea></label><label class="full"><div class="label">補充備註</div><textarea id="recordNote"></textarea></label></div><div class="record-actions"><button class="primary" type="button" id="recordAddItem">新增紀錄</button><button class="secondary" type="button" id="recordUpdateItem">更新紀錄</button><button class="secondary tool-danger-btn" type="button" id="recordDeleteCurrent">刪除目前</button><button class="secondary" type="button" id="recordClearForm">清空輸入</button></div><div class="btn-row"><button class="secondary" type="button" id="recordFromCalc">帶入計算頁</button></div>`;const listBody=`<div class="small">點紀錄名稱或整張卡片可展開；展開後可編輯、刪除或轉成步驟提醒。</div>${list}`;const totalBody=`<textarea id="recordTotalNote" placeholder="跨專案紀錄、常用雷射設定、常犯錯誤、改版備忘。">${esc(lib.totalNote||'')}</textarea>`;return recordFold('intro','紀錄總覽','用途、總筆數、待改善數量',intro,true)+recordFold('filter','分類 / 排序',`目前：${filter}｜${sort}`,filterBody,true)+recordFold('form','新增 / 編輯紀錄','帶入計算頁、記錄失敗原因與改善方式',formBody,false)+recordFold('list','紀錄目錄',`目前顯示 ${sorted.length} 筆`,listBody,true)+recordFold('note','紀錄總備註','跨專案補充與舊版筆記',totalBody,false)}
function bindRecordsPage(){const lib=getRecordLib();document.querySelectorAll('[data-record-section]').forEach(d=>{d.ontoggle=()=>setRecordSectionOpen(d.dataset.recordSection,d.open)});const sort=$('recordSortSelect');if(sort)sort.onchange=()=>{localStorage.setItem(RECORD_SORT,sort.value);setRecordSectionOpen('filter',true);render()};const filter=$('recordCategoryFilter');if(filter)filter.onchange=()=>{localStorage.setItem(RECORD_CATEGORY,filter.value);localStorage.removeItem(RECORD_EXPANDED);setRecordSectionOpen('filter',true);setRecordSectionOpen('list',true);render()};document.querySelectorAll('[data-toggle-record]').forEach(btn=>btn.onclick=()=>{const id=btn.dataset.toggleRecord;const cur=localStorage.getItem(RECORD_EXPANDED)||'';if(cur===id)localStorage.removeItem(RECORD_EXPANDED);else localStorage.setItem(RECORD_EXPANDED,id);setRecordSectionOpen('list',true);render();setTimeout(()=>{const el=document.querySelector(`[data-record-id="${id}"]`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'})},40)});const add=$('recordAddItem');if(add)add.onclick=()=>{const data=readRecordForm(true);if(!data)return;lib.items.push(data);localStorage.setItem(RECORD_EXPANDED,data.id);setRecordSectionOpen('list',true);putRecordLib(lib,'新增紀錄');render()};const upd=$('recordUpdateItem');if(upd)upd.onclick=()=>{const id=$('recordEditId').value;if(!id){toast('尚未選擇要更新的紀錄');return}const data=readRecordForm(false);if(!data)return;const idx=lib.items.findIndex(x=>x.id===id);if(idx<0){toast('找不到目前編輯的紀錄');return}lib.items[idx]=data;localStorage.setItem(RECORD_EXPANDED,data.id);setRecordSectionOpen('list',true);putRecordLib(lib,'紀錄已更新');render()};const delCur=$('recordDeleteCurrent');if(delCur)delCur.onclick=()=>{const id=$('recordEditId').value;if(!id){toast('尚未選擇要刪除的紀錄');return}const item=(lib.items||[]).find(x=>x.id===id);if(!item)return;if(!confirm(`刪除目前紀錄「${item.title||'未命名'}」？`))return;lib.items=lib.items.filter(x=>x.id!==id);localStorage.removeItem(RECORD_EXPANDED);setRecordSectionOpen('list',true);putRecordLib(lib,'紀錄已刪除');render()};const clear=$('recordClearForm');if(clear)clear.onclick=()=>clearRecordForm();const from=$('recordFromCalc');if(from)from.onclick=()=>{setRecordSectionOpen('form',true);fillRecordForm(currentRecordDraft());toast('已帶入計算頁資料')};document.querySelectorAll('[data-edit-record]').forEach(btn=>btn.onclick=(ev)=>{ev.stopPropagation();const item=(lib.items||[]).find(x=>x.id===btn.dataset.editRecord);if(!item)return;setRecordSectionOpen('form',true);fillRecordForm(item);setTimeout(()=>{const target=$('recordTitle');if(target)window.scrollTo({top:Math.max(0,target.getBoundingClientRect().top+window.scrollY-120),behavior:'smooth'})},40)});document.querySelectorAll('[data-del-record]').forEach(btn=>btn.onclick=(ev)=>{ev.stopPropagation();const item=(lib.items||[]).find(x=>x.id===btn.dataset.delRecord);if(!item)return;if(!confirm(`刪除紀錄「${item.title||'未命名'}」？`))return;lib.items=lib.items.filter(x=>x.id!==item.id);localStorage.removeItem(RECORD_EXPANDED);setRecordSectionOpen('list',true);putRecordLib(lib,'紀錄已刪除');render()});document.querySelectorAll('[data-record-to-step]').forEach(btn=>btn.onclick=(ev)=>{ev.stopPropagation();const item=(lib.items||[]).find(x=>x.id===btn.dataset.recordToStep);if(!item)return;const steps=getCustomSteps();steps.push({id:'custom-'+Date.now(),title:item.nextAction||item.title||'由紀錄加入的步驟',phase:'custom',detail:[item.issue,item.improvement,item.note].filter(Boolean).join('\n')});setCustomSteps(steps);toast('已加入步驟頁自訂步驟')});const total=$('recordTotalNote');if(total)total.oninput=()=>{const next=getRecordLib();next.totalNote=total.value;putRecordLib(next,'紀錄備註已儲存')}}

function getBackupSectionState(){try{return JSON.parse(localStorage.getItem(BACKUP_SECTION_OPEN)||'{}')||{}}catch(e){return {}}}

function backupFold(id,title,summary,body,openDefault=false,extra=''){const st=getBackupSectionState();const open=(id in st)?st[id]:openDefault;return `<details class="card fold-card compact-fold ${extra}" data-backup-section="${esc(id)}" ${open?'open':''}><summary><div class="fold-title"><h2>${esc(title)}</h2><div class="fold-summary">${esc(summary)}</div></div><span class="fold-mark"></span></summary><div class="fold-body">${body}</div></details>`}
function localJson(key){try{return JSON.parse(localStorage.getItem(key)||'null')}catch(e){return null}}

function laserTestDefaults(){const f=state.form||{};const th=n(f.materialThickness,3);const baseSpeed=th<=2?300:th<=3?180:th<=5?90:60;return{boardW:n(f.stockBoardWidth,600),boardH:n(f.stockBoardHeight,400),cell:22,gap:6,margin:12,powers:'60,70,80,90,100',speedStart:Math.max(30,Math.round(baseSpeed*0.65)),speedEnd:Math.round(baseSpeed*1.45),speedSteps:5,passes:n(f.laserPasses,1)||1,mode:'combo',material:'',thickness:th,airAssist:String(f.laserAirAssist)==='0'?'0':'1',label:'1'}}
function readLaserTestForm(){const pick=(id,def='')=>{const el=$(id);return el?el.value:def};const settings={boardW:n(pick('testBoardW'),600),boardH:n(pick('testBoardH'),400),cell:n(pick('testCell'),22),gap:n(pick('testGap'),6),margin:n(pick('testMargin'),12),powers:pick('testPowers','60,70,80,90,100'),speedStart:n(pick('testSpeedStart'),100),speedEnd:n(pick('testSpeedEnd'),300),speedSteps:Math.max(2,Math.floor(n(pick('testSpeedSteps'),5))),passes:Math.max(1,Math.floor(n(pick('testPasses'),1))),mode:pick('testMode','combo'),material:pick('testMaterial',''),thickness:n(pick('testThickness'),n(state.form.materialThickness,3)),airAssist:pick('testAirAssist','1'),label:pick('testLabel','1')};putLaserTestSettings(settings);return settings}
function laserTestPowerList(settings){return String(settings.powers||'').split(/[，,\s]+/).map(x=>n(x,NaN)).filter(x=>Number.isFinite(x)&&x>0).slice(0,12)}
function laserTestSpeedList(settings){const c=Math.max(2,Math.floor(n(settings.speedSteps,5)));const a=n(settings.speedStart,100),b=n(settings.speedEnd,300);return Array.from({length:c},(_,i)=>Math.round(a+(b-a)*(i/(c-1))))}
function laserTestRows(settings){const powers=laserTestPowerList(settings);const speeds=laserTestSpeedList(settings);const rows=[];powers.forEach(p=>speeds.forEach(sp=>rows.push({power:p,speed:sp,passes:n(settings.passes,1)})));return rows}
function laserTestSvg(settings){const powers=laserTestPowerList(settings);const speeds=laserTestSpeedList(settings);const cell=Math.max(10,n(settings.cell,22)),gap=Math.max(2,n(settings.gap,6)),m=Math.max(6,n(settings.margin,12));const left=42,top=38;const w=Math.max(n(settings.boardW,600),left+m*2+speeds.length*(cell+gap)+80);const h=Math.max(n(settings.boardH,400),top+m*2+powers.length*(cell+gap)+58);const material=settings.material||'材料';const th=settings.thickness||'';let body=`<rect x="0" y="0" width="${w}" height="${h}" fill="white" stroke="#999" stroke-width="0.2"/>`;
body+=`<text x="${m}" y="16" font-size="6" fill="#333">10W 雷射測試片｜${esc(material)} ${esc(th)}mm｜${settings.mode==='cut'?'切割':settings.mode==='engrave'?'雕刻':'綜合'}｜${settings.airAssist==='1'?'氣輔開':'氣輔關'}｜刀數 ${settings.passes}</text>`;
speeds.forEach((sp,i)=>{const x=left+i*(cell+gap)+cell/2;body+=`<text x="${x}" y="30" font-size="5" text-anchor="middle" fill="#333">${sp}</text>`});
powers.forEach((p,ri)=>{const y=top+ri*(cell+gap)+cell/2+1.8;body+=`<text x="${m}" y="${y}" font-size="5" fill="#333">${p}%</text>`});
powers.forEach((p,ri)=>{speeds.forEach((sp,ci)=>{const x=left+ci*(cell+gap),y=top+ri*(cell+gap);const label=`${p}%/${sp}`;if(settings.mode==='engrave'){body+=`<rect x="${x}" y="${y}" width="${cell}" height="${cell}" fill="#111" stroke="none" data-power="${p}" data-speed="${sp}" data-passes="${settings.passes}"/>`}else if(settings.mode==='cut'){body+=`<rect x="${x}" y="${y}" width="${cell}" height="${cell}" fill="none" stroke="#ff0000" stroke-width="0.1" data-power="${p}" data-speed="${sp}" data-passes="${settings.passes}"/>`;body+=`<line x1="${x+cell*.2}" y1="${y+cell*.2}" x2="${x+cell*.8}" y2="${y+cell*.8}" stroke="#ff0000" stroke-width="0.1"/>`}else{body+=`<rect x="${x}" y="${y}" width="${cell}" height="${cell}" fill="none" stroke="#ff0000" stroke-width="0.1" data-power="${p}" data-speed="${sp}" data-passes="${settings.passes}"/>`;body+=`<rect x="${x+cell*.2}" y="${y+cell*.2}" width="${cell*.28}" height="${cell*.28}" fill="#111" stroke="none"/>`;body+=`<circle cx="${x+cell*.72}" cy="${y+cell*.72}" r="${cell*.12}" fill="none" stroke="#0000ff" stroke-width="0.1"/>`}if(String(settings.label)==='1'){body+=`<text x="${x+cell/2}" y="${y+cell+4.4}" font-size="3.2" text-anchor="middle" fill="#333">${label}</text>`}})});const legendY=top+powers.length*(cell+gap)+18;body+=`<text x="${m}" y="${legendY}" font-size="5" fill="#333">標記：每格＝功率/速度(mm/min)，SVG 只提供圖形與標註；實際功率/速度需在雷射軟體依格子或顏色手動設定。</text>`;return `<svg class="laser-test-svg" xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">${body}</svg>`}
function laserTestCsv(settings){const rows=laserTestRows(settings);const head=['材料','厚度mm','功率%','速度mm/min','刀數','氣輔','模式','備註'];const lines=[head.join(',')];rows.forEach(r=>lines.push([settings.material||'',settings.thickness,r.power,r.speed,r.passes,settings.airAssist==='1'?'開':'關',settings.mode,'測試後記錄切穿/焦黑/背面狀況'].map(x=>`"${String(x).replace(/"/g,'""')}"`).join(',')));return lines.join('\n')}

type="number" value="${esc(v.margin)}"></label><label><div class="label">刀數</div><input id="testPasses" type="number" value="${esc(v.passes)}"></label><label class="full"><div class="label">功率列表 %</div><input id="testPowers" value="${esc(v.powers)}" placeholder="例：60,70,80,90,100"></label><label><div class="label">速度起點 mm/min</div><input id="testSpeedStart" type="number" value="${esc(v.speedStart)}"></label><label><div class="label">速度終點 mm/min</div><input id="testSpeedEnd" type="number" value="${esc(v.speedEnd)}"></label><label><div class="label">速度欄數</div><input id="testSpeedSteps" type="number" value="${esc(v.speedSteps)}"></label><label><div class="label">氣輔</div><select id="testAirAssist"><option value="1" ${v.airAssist==='1'?'selected':''}>開</option><option value="0" ${v.airAssist==='0'?'selected':''}>關</option></select></label><label><div class="label">格內標籤</div><select id="testLabel"><option value="1" ${String(v.label)==='1'?'selected':''}>顯示</option><option value="0" ${String(v.label)==='0'?'selected':''}>隱藏</option></select></label></div><div class="laser-test-actions"><button class="primary" type="button" id="laserTestRefresh">更新預覽</button><button class="secondary" type="button" data-laser-jump="safety">去圖紙安全檢查</button><button class="secondary" type="button" data-go-tab="sizelib">去常用尺寸庫</button></div><div class="laser-test-preview" id="laserTestPreview">${preview}</div><div class="laser-test-note">正式加工建議：先切小方格，不要離開機台；若背面未切穿，優先降速度 / 增加刀數 / 調焦距；若焦黑太重，改較快速度多刀或加強氣輔。</div><div class="table-wrap laser-test-table"><table><thead><tr><th>功率</th><th>速度</th><th>刀數</th><th>氣輔</th></tr></thead><tbody>${laserTestRows(v).slice(0,80).map(r=>`<tr><td>${r.power}%</td><td>${r.speed} mm/min</td><td>${r.passes}</td><td>${v.airAssist==='1'?'開':'關'}</td></tr>`).join('')}</tbody></table></div>`}
function bindLaserTestGenerator(){const ids=['testMaterial','testThickness','testMode','testBoardW','testBoardH','testCell','testGap','testMargin','testPasses','testPowers','testSpeedStart','testSpeedEnd','testSpeedSteps','testAirAssist','testLabel'];const refresh=()=>{const v=readLaserTestForm();const p=$('laserTestPreview');if(p)p.innerHTML=laserTestSvg(v)};ids.forEach(id=>{const el=$(id);if(el){el.oninput=refresh;el.onchange=refresh}});const ref=$('laserTestRefresh');if(ref)ref.onclick=refresh;const dl=$('laserTestDownloadSvg');if(dl)dl.onclick=()=>{const v=readLaserTestForm();download(new Blob([laserTestSvg(v)],{type:'image/svg+xml'}),`10w-laser-test-${Date.now()}.svg`)};const csv=$('laserTestDownloadCsv');if(csv)csv.onclick=()=>{const v=readLaserTestForm();download(new Blob([laserTestCsv(v)],{type:'text/csv;charset=utf-8'}),`10w-laser-test-params-${Date.now()}.csv`)};document.querySelectorAll('[data-test-preset]').forEach(btn=>btn.onclick=()=>{let v=getLaserTestSettings();const f=state.form||{};if(btn.dataset.testPreset==='ply3')v={...v,material:'椴木合板',thickness:3,mode:'combo',powers:'70,80,90,100',speedStart:120,speedEnd:260,speedSteps:5,passes:2,airAssist:'1'};if(btn.dataset.testPreset==='ply5')v={...v,material:'椴木合板',thickness:5,mode:'cut',powers:'90,95,100',speedStart:50,speedEnd:110,speedSteps:5,passes:5,airAssist:'1'};if(btn.dataset.testPreset==='engraveWood')v={...v,material:'木材雕刻',thickness:n(f.materialThickness,3),mode:'engrave',powers:'20,30,40,50,60,70',speedStart:600,speedEnd:1800,speedSteps:5,passes:1,airAssist:'0'};if(btn.dataset.testPreset==='label')v={...v,material:'熱敏標籤紙',thickness:0.1,mode:'engrave',powers:'5,8,10,12,15',speedStart:2000,speedEnd:6000,speedSteps:5,passes:1,airAssist:'0'};if(btn.dataset.testPreset==='fromCalc')v={...v,boardW:n(f.stockBoardWidth,600),boardH:n(f.stockBoardHeight,400),thickness:n(f.materialThickness,3),passes:n(f.laserPasses,1)||1,airAssist:String(f.laserAirAssist)==='0'?'0':'1',material:projectName(f.projectType)+ function paperSafetyIssues(){const f=state.resultForm||state.form,res=state.result||calculate(f);const issues=[];const W=n(f.width),D=n(f.depth),H=n(f.height),t=n(f.materialThickness),bw=n(f.stockBoardWidth,600),bh=n(f.stockBoardHeight,400),qty=Math.max(1,Math.floor(n(f.stockBoardQty,1)));const pieces=flatten((res&&res.cutList)||[]);function add(level,title,desc){issues.push({level,title,desc})}if(!pieces.length)add('bad','沒有裁切清單','請先到計算頁按「更新結果」，確認板件有產生。');else add('ok','裁切清單已產生',`目前共 ${pieces.length} 件板件。`);if(W<=0||D<=0||H<=0)add('bad','尺寸不完整','寬、深、高都必須大於 0。');else add('ok','主要尺寸正常',`${W} × ${D} × ${H} mm。`);if(t<=0)add('bad','板厚不正確','主板厚必須大於 0，榫卯與孔位都會依板厚計算。');else if(t<2)add('warn','板厚偏薄',`${t} mm 較容易變形或燒穿，請降低功率並先試片。`);else add('ok','板厚已設定',`${t} mm。`);if(bw<=0||bh<=0||qty<1)add('bad','原板尺寸不正確','請設定原板寬、高與數量。');else{const packed=nest(pieces,bw,bh,qty);if(packed.remaining.length)add('bad','有板件未排入原板',`目前 ${packed.remaining.length} 件未排入，匯出前請調整原板或排版。`);else add('ok','板件可排入原板',`原板 ${bw} × ${bh} mm，共 ${qty} 張。`)}if(String(f.projectType)==='box'&&String(f.boxJoinType)==='finger'){const finger=n(f.boxFingerSize,18),kerf=n(f.boxKerf,0.15);if(finger<t*2)add('warn','榫齒可能太窄',`榫齒 ${finger} mm，小於板厚兩倍，薄齒容易燒焦或斷裂。`);else add('ok','榫齒尺寸可測試',`榫齒 ${finger} mm，仍需用同板厚測試鬆緊。`);if(kerf<=0)add('warn','切縫補償未設定','榫卯盒建議填入實測切縫補償，例如 0.10–0.20 mm 起測。');else add('ok','切縫補償已設定',`${kerf} mm。`)}else add('warn','非榫卯或未啟用榫卯','若要雷射互扣盒，請確認計算頁接合方式為榫卯互扣。');if(n(f.laserPower,0)<=0||n(f.laserSpeed,0)<=0)add('warn','雷射參數未完整','功率與速度目前不完整，建議到參數庫或測試片產生器套用。');else add('ok','雷射參數已記錄',`功率 ${n(f.laserPower)}%，速度 ${n(f.laserSpeed)} mm/min，${n(f.laserPasses,1)} 刀。`);add('warn','匯入雷射軟體後仍需確認','SVG / DXF 不能保證各軟體直接保留 mm 尺寸，匯入後請量測一個已知尺寸。');return issues}
function renderOutputSafetyCard(){const issues=paperSafetyIssues();const bad=issues.filter(x=>x.level==='bad').length,warn=issues.filter(x=>x.level==='warn').length;const status=bad?`阻擋 ${bad} 項`:(warn?`提醒 ${warn} 項`:'可匯出');return `<section class="card" id="paperSafety"><div class="view-title"><div><h2>圖紙輸出安全檢查</h2><div class="small">匯出 SVG / DXF 前先看這裡。紅色項目建議先修正；黃色項目代表仍需實測或人工確認。</div></div><span class="badge">${esc(status)}</span></div><div class="safety-list">${issues.map(x=>`<div class="safety-item safety-${x.level}"><span class="safety-dot">${x.level==='ok'?'✓':x.level==='bad'?'!':'?'}</span><div><div class="safety-title">${esc(x.title)}</div><div class="safety-desc">${esc(x.desc)}</div></div></div>`).join('')}</div><div class="btn-row"><button class="secondary" type="button" data-go-tab="calc">回計算修正</button><button class="secondary" type="button" data-go-tab="laserdb">去參數庫 / 測試片</button></div></section>`}

"date_desc">日期：新到舊</option><option value="date_asc">日期：舊到新</option><option value="thick_asc">厚度：薄到厚</option><option value="thick_desc">厚度：厚到薄</option><option value="power_asc">功率：低到高</option><option value="power_desc">功率：高到低</option><option value="speed_asc">速度：低到高</option><option value="speed_desc">速度：高到低</option><option value="material">材料排序</option><option value="status">狀態排序</option></select></label><label><div class="label">目前顯示</div><input value="${items.length} / ${all.length} 筆" readonly></label></div>`;const form=`<input type="hidden" id="laserEditId" value=""><div class="btn-row" style="margin-top:0;margin-bottom:12px"><button class="primary" type="button" id="laserFromCalc">帶入計算頁雷射參數</button><button class="secondary" type="button" id="laserClearForm">清空輸入</button></div><div class="laserdb-form-grid"><label><div class="label">參數名稱</div><input id="laserName" placeholder="例：3mm 椴木合板 10W 切割"></label><label><div class="label">材料</div><select id="laserMaterial">${laserMaterialOptions()}</select></label><label><div class="label">厚度 mm</div><input id="laserThickness" type="number" step="0.1"></label><label><div class="label">加工方式</div><select id="laserOperation">${laserOperationOptions()}</select></label><label><div class="label">設備</div><input id="laserMachine" placeholder="例：10W 藍光雷射"></label><label><div class="label">狀態</div><select id="laserStatus">${laserStatusOptions()}</select></label><label><div class="label">功率 %</div><input id="laserPowerInput" type="number" step="1"></label><label><div class="label">速度 mm/min</div><input id="laserSpeedInput" type="number" step="1"></label><label><div class="label">切割次數 / 刀數</div><input id="laserPassesInput" type="number" step="1"></label><label><div class="label">氣輔</div><select id="laserAirAssistInput"><option value="1">開</option><option value="0">關</option></select></label><label><div class="label">焦距備註</div><input id="laserFocusInput" placeholder="例：表面對焦 / 下沉 1mm"></label><label><div class="label">切縫補償 mm</div><inpu function renderLaserTestGenerator(){const v=getLaserTestSettings();const preview=laserTestSvg(v);return `<div class="muted-box"><strong>v72 測試片產生器。</strong><br>先按快速預設，再下載 SVG。測完後可在下方多選成功格，回填到參數庫。</div><div class="laser-test-head-actions"><button class="primary" type="button" id="laserTestDownloadSvg">下載測試片 SVG</button><button class="secondary" type="button" id="laserTestDownloadCsv">下載參數 CSV</button></div><div class="laser-test-mini"><button type="button" data-test-preset="ply3">3mm 合板</button><button type="button" data-test-preset="ply5">5mm 合板</button><button type="button" data-test-preset="engraveWood">木材雕刻</button><button type="button" data-test-preset="label">熱敏標籤</button><button type="button" data-test-preset="fromCalc">帶入計算頁</button></div><div class="laser-test-compact-note">目前：${esc(v.material)}｜${esc(v.thickness)} mm｜${esc(v.mode)}｜功率 ${esc(v.powers)}｜速度 ${esc(v.speedStart)}–${esc(v.speedEnd)}｜${esc(v.passes)} 刀</div><div class="laser-test-grid"><label><div class="label">材料名稱</div><input id="testMaterial" value="${esc(v.material||'')}" placeholder="例：椴木合板"></label><label><div class="label">厚度 mm</div><input id="testThickness" type="number" step="0.1" value="${esc(v.thickness)}"></label><label><div class="label">模式</div><select id="testMode"><option value="combo" ${v.mode==='combo'?'selected':''}>綜合：外框 + 填充 + 小孔</option><option value="cut" ${v.mode==='cut'?'selected':''}>切割方框</option><option value="engrave" ${v.mode==='engrave'?'selected':''}>雕刻填充</option></select></label><label><div class="label">板面寬 mm</div><input id="testBoardW" type="number" value="${esc(v.boardW)}"></label><label><div class="label">板面高 mm</div><input id="testBoardH" type="number" value="${esc(v.boardH)}"></label><label><div class="label">單格大小 mm</div><input id="testCell" type="number" value="${esc(v.cell)}"></label><label><div class="label">格距 mm</div><input id="testGap" type="number" value="${esc(v.gap)}"></label><label><div class="label">邊距 mm</div><input id="testMargin" type="number" function saveSelectedLaserTestResults(){const settings=readLaserTestForm();const checked=[...document.querySelectorAll('[data-test-success]:checked')];if(!checked.length){toast('請先勾選成功格');return}const lib=getLaserParamLib();lib.items=lib.items||[];const existing=new Set(lib.items.map(x=>[x.material,x.thickness,x.operation,x.power,x.speed,x.passes,x.airAssist].join('|')));let added=0;checked.forEach(cb=>{const power=cb.dataset.power,speed=cb.dataset.speed,passes=cb.dataset.passes;const item={id:newId('laser'),name:`${settings.material||'材料'} ${settings.thickness}mm 成功 ${power}% ${speed}`,material:settings.material||'其他',thickness:String(settings.thickness||''),operation:laserTestOperationFromMode(settings.mode),machine:'10W 藍光雷射',power:String(power),speed:String(speed),passes:String(passes),airAssist:String(settings.airAssist||'1'),focus:state.form.laserFocus||'表面對焦',kerf:String(state.form.boxKerf||''),date:new Date().toISOString().slice(0,10),status:'可用',source:'測試片回填',projectType:state.form.projectType||'box',result:'測試片多選回填：此格實測成功',note:`由 v72 測試片回填。模式：${settings.mode}；板面 ${settings.boardW}×${settings.boardH}mm；請補充背面是否切穿、焦黑與邊緣狀態。`,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};const key=[item.material,item.thickness,item.operation,item.power,item.speed,item.passes,item.airAssist].join('|');if(!existing.has(key)){lib.items.push(item);existing.add(key);added++}});localStorage.setItem(LASER_PARAM_FILTER,'可用');setLaserSectionOpen('list',true);putLaserParamLib(lib,`已回填 ${added} 筆測試結果`);toast(`已回填 ${added} 筆可用參數`);render()}
function bindLaserTestGenerator(){const ids=['testMaterial','testThickness','testMode','testBoardW','testBoardH','testCell','testGap','testMargin','testPasses','testPowers','testSpeedStart','testSpeedEnd','testSpeedSteps','testAirAssist','testLabel'];const refresh=()=>{const v=readLaserTestForm();const p=$('laserTestPreview');if(p)p.innerHTML=laserTestSvg(v);const body=$('laserTestResultBody');if(body){const rows=laserTestRows(v).slice(0,144);body.innerHTML=rows.map((r,i)=>`<tr><td><input class="v72-check" type="checkbox" data-test-success="${i}" data-power="${r.power}" data-speed="${r.speed}" data-passes="${r.passes}"></td><td>${r.power}%</td><td>${r.speed} mm/min</td><td>${r.passes}</td><td>${esc(v.material||'材料')} ${esc(v.thickness)}mm｜${esc(laserTestOperationFromMode(v.mode))}</td></tr>`).join('')}const sum=$('laserTestResultSummary');if(sum)sum.textContent=`目前可勾選 ${laserTestRows(v).slice(0,144).length} 格；可多選。`};ids.forEach(id=>{const el=$(id);if(el){el.oninput=refresh;el.onchange=refresh}});const ref=$('laserTestRefresh');if(ref)ref.onclick=refresh;const dl=$('laserTestDownloadSvg');if(dl)dl.onclick=()=>{const v=readLaserTestForm();download(new Blob([laserTestSvg(v)],{type:'image/svg+xml'}),`10w-laser-test-${Date.now()}.svg`)};const csv=$('laserTestDownloadCsv');if(csv)csv.onclick=()=>{const v=readLaserTestForm();download(new Blob([laserTestCsv(v)],{type:'text/csv;charset=utf-8'}),`10w-laser-test-params-${Date.now()}.csv`)};const sel=$('laserTestSelectAll');if(sel)sel.onclick=()=>document.querySelectorAll('[data-test-success]').forEach(x=>x.checked=true);const clr=$('laserTestClearSelected');if(clr)clr.onclick=()=>document.querySelectorAll('[data-test-success]').forEach(x=>x.checked=false);const saveBtn=$('laserTestSaveSelected');if(saveBtn)saveBtn.onclick=saveSelectedLaserTestResults;document.querySelectorAll('[data-test-preset]').forEach(btn=>btn.onclick=()=>{let v=getLaserTestSettings();const f=state.form||{};if(btn.dataset.testPreset==='ply3')v={...v,material:'椴木合板',thickness:3,mode:'combo',powers:'70,80,90,100',speedStart:120,speedEnd:260,speedSteps:5,passes:2,airAssist:'1'};if(btn.dataset.testPreset==='ply5')v={...v,material:'椴木合板',thickness:5,mode:'cut',powers:'90,95,100',speedStart:50,speedEnd:110,speedSteps:5,passes:5,airAssist:'1'};if(btn.dataset.testPreset==='engraveWood')v={...v,material:'木材雕刻',thickness:n(f.materialThickness,3),mode:'engrave',powers:'20,30,40,50,60,70',speedStart:600,speedEnd:1800,speedSteps:5,passes:1,airAssist:'0'};if(btn.dataset.testPreset==='label')v={...v,material:'熱敏標籤紙',thickness:0.1,mode:'engrave',powers:'5,8,10,12,15',speedStart:2000,speedEnd:6000,speedSteps:5,passes:1,airAssist:'0'};if(btn.dataset.testPreset==='fromCalc')v={...v,material:v.material||'椴木合板',thickness:n(f.materialThickness,3),powers:String(f.laserPower||'70,80,90,100'),speedStart:Math.max(20,Math.round(n(f.laserSpeed,100)*0.7)),speedEnd:Math.round(n(f.laserSpeed,100)*1.3),passes:n(f.laserPasses,1),airAssist:String(f.laserAirAssist||'1')};putLaserTestSettings(v);render()})}
function fingerMetrics(len,target){const safeLen=Math.max(1,n(len));const safeTarget=Math.max(6,n(target,18));let count=Math.max(4,Math.round(safeLen/safeTarget));if(count%2)count++;const actual=safeLen/count;return {count,actual}}
function fingerBoxPathPrecise(x,y,w,h,target,depth,kerf=0){const mx=fingerMetrics(w,target),my=fingerMetrics(h,target);const sx=w/mx.count,sy=h/my.count;const dpth=Math.max(1.2,Math.min(Math.max(1,Math.min(w,h)/3),n(depth,3)));let d=`M ${x} ${y}`;for(let i=0;i<mx.count;i++){const x1=x+i*sx,x2=x+(i+1)*sx;if(i%2===0)d+=` L ${x2} ${y}`;else d+=` L ${x1} ${y+dpth} L ${x2} ${y+dpth} L ${x2} ${y}`}for(let i=0;i<my.count;i++){const y1=y+i*sy,y2=y+(i+1)*sy;if(i%2===0)d+=` L ${x+w} ${y2}`;else d+=` L ${x+w-dpth} ${y1} L ${x+w-dpth} ${y2} L ${x+w} ${y2}`}for(let i=0;i<mx.count;i++){const x1=x+w-i*sx,x2=x+w-(i+1)*sx;if(i%2===0)d+=` L ${x2} ${y+h}`;else d+=` L ${x1} ${y+h-dpth} L ${x2} ${y+h-dpth} L ${x2} ${y+h}`}for(let i=0;i<my.count;i++){const y1=y+h-i*sy,y2=y+h-(i+1)*sy;if(i%2===0)d+=` L ${x} ${y2}`;else d+=` L ${x+dpth} ${y1} L ${x+dpth} ${y2} L ${x} ${y2}`}return d+' Z'}
function layeredPieceOutline(p,raw,f){const showFinger=String(f.projectType)==='box'&&String(f.boxJoinType)==='finger'&&!!raw.jointCut;if(showFinger){const t=n(raw.t||f.materialThickness,3),target=n(f.boxFingerSize,18),kerf=n(f.boxKerf,0.15);const mx=fingerMetrics(raw.w,target),my=fingerMetrics(raw.h,target);return `<path class="cut-line layer-cut" data-layer="CUT_RED" data-finger-x="${mx.count}" data-finger-y="${my.count}" data-kerf="${kerf}" d="${fingerBoxPathPrecise(p.x,p.y,p.w,p.h,target,t,kerf)}"/>`}return `<rect class="cut-line layer-cut" data-layer="CUT_RED" x="${p.x}" y="${p.y}" width="${p.w}" height="${p.h}"/>`}
function layeredPartMarks(p,f){const key=p.pieceKey||'';let extra='';if(key==='front'&&b(f.boxHandleHole)){extra+=`<rect class="engrave-line layer-engrave" data-layer="ENGRAVE_BLACK" x="${p.x+p.w*.25}" y="${p.y+p.h*.18}" width="${p.w*.5}" height="${Math.min(18,p.h*.18)}" rx="6" fill="none"/>`}if((key==='front'||key==='top')&&b(f.boxMagnet)){extra+=`<circle class="hole-line layer-hole" data-layer="HOLE_BLUE" cx="${p.x+p.w*.18}" cy="${p.y+p.h*.18}" r="${n(f.boxMagnetDiameter,6)/2}" fill="none"/><circle class="hole-line layer-hole" data-layer="HOLE_BLUE" cx="${p.x+p.w*.82}" cy="${p.y+p.h*.18}" r="${n(f.boxMagnetDiameter,6)/2}" fill="none"/>`}if((key==='back'||key==='top')&&(b(f.boxHinge)||String(f.boxLidMode)==='hinge')){const c=Math.max(1,Math.floor(n(f.boxHingeCount,2)));for(let i=0;i<c;i++){const cx=p.x+p.w*(i+1)/(c+1);extra+=`<circle class="hole-line layer-hole" data-layer="HOLE_BLUE" cx="${cx}" cy="${p.y+p.h*.86}" r="2.2" fill="none"/><circle class="hole-line layer-hole" data-layer="HOLE_BLUE" cx="${cx+12}" cy="${p.y+p.h*.86}" r="2.2" fill="none"/>`}}return extra}
function laserSvg(){const f=state.resultForm||state.form,res=state.result||calculate(f);const pieces=flatten((res&&res.cutList)||[]).filter(p=>n(p.w)>0&&n(p.h)>0);const bw=n(f.stockBoardWidth,600),bh=n(f.stockBoardHeight,400),qty=Math.max(1,Math.floor(n(f.stockBoardQty,1)));if(!pieces.length)return `<svg class="export-svg" viewBox="0 0 760 260" width="760mm" height="260mm" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="760" height="260" fill="#fff" stroke="#d7bf8c"/><text x="24" y="52" font-size="22" fill="#5d4827">目前沒有可顯示的板件</text></svg>`;const packed=nest(pieces,bw,bh,qty);const margin=10,head=26,gap=18;const boardCount=Math.max(1,packed.boards.length);const svgW=bw+margin*2,svgH=head+boardCount*(bh+gap)+20;let cut='',holes='',engrave='',texts='';packed.boards.forEach((board,bi)=>{const oy=head+bi*(bh+gap);engrave+=`<rect class="board-line" x="${margin}" y="${oy}" width="${bw}" height="${bh}" fill="none" stroke="#999" stroke-width="0.15"/><text class="text-layer" x="${margin}" y="${oy-4}" font-size="5">板 ${bi+1}｜${bw}×${bh}mm</text>`;board.placed.forEach((p,i)=>{const q={...p,x:margin+p.x,y:oy+p.y,w:p.w,h:p.h};cut+=layeredPieceOutline(q,p,f);holes+=layeredPartMarks(q,f);texts+=`<text class="text-layer" x="${q.x+2}" y="${q.y+5}" font-size="4">#${i+1} ${esc(p.name)}</text><text class="text-layer" x="${q.x+2}" y="${q.y+10}" font-size="3.5">${r(p.w)}×${r(p.h)}${p.t?`×${r(p.t)}`:''}mm</text>`})});if(packed.remaining.length){engrave+=`<text class="text-layer" x="${margin}" y="${svgH-8}" font-size="5" fill="#b13730">未排入 ${packed.remaining.length} 件，請增加原板或調整排版。</text>`}const style=`<style>.cut-line{fill:none;stroke:#ff0000;stroke-width:0.12;vector-effect:non-scaling-stroke}.hole-line{fill:none;stroke:#0000ff;stroke-width:0.12;vector-effect:non-scaling-stroke}.engrave-line{fill:none;stroke:#111;stroke-width:0.12;vector-effect:non-scaling-stroke}.text-layer{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111}.board-line{vector function pathPairs(d){const nums=(d.match(/-?\d+(?:\.\d+)?/g)||[]).map(Number);const pts=[];for(let i=0;i<nums.length-1;i+=2)pts.push([nums[i],nums[i+1]]);return pts}
function makeDxf(){const f=state.resultForm||state.form,res=state.result||calculate(f);const pieces=flatten((res&&res.cutList)||[]);const bw=n(f.stockBoardWidth,600),bh=n(f.stockBoardHeight,400),qty=Math.max(1,Math.floor(n(f.stockBoardQty,1)));const packed=nest(pieces,bw,bh,qty);let out='0\nSECTION\n2\nTABLES\n0\nTABLE\n2\nLAYER\n0\nLAYER\n2\nCUT_RED\n70\n0\n62\n1\n6\nCONTINUOUS\n0\nLAYER\n2\nHOLE_BLUE\n70\n0\n62\n5\n6\nCONTINUOUS\n0\nLAYER\n2\nENGRAVE_BLACK\n70\n0\n62\n7\n6\nCONTINUOUS\n0\nENDTAB\n0\nENDSEC\n0\nSECTION\n2\nENTITIES\n';function line(layer,x1,y1,x2,y2){out+=`0\nLINE\n8\n${layer}\n10\n${x1}\n20\n${y1}\n30\n0\n11\n${x2}\n21\n${y2}\n31\n0\n`}function circle(layer,cx,cy,r){out+=`0\nCIRCLE\n8\n${layer}\n10\n${cx}\n20\n${cy}\n30\n0\n40\n${r}\n`}function rect(layer,x,y,w,h){line(layer,x,y,x+w,y);line(layer,x+w,y,x+w,y+h);line(layer,x+w,y+h,x,y+h);line(layer,x,y+h,x,y)}function path(layer,d){const pts=pathPairs(d);for(let i=0;i<pts.length-1;i++)line(layer,pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1])}packed.boards.forEach((board,bi)=>{const oy=bi*(bh+20);board.placed.forEach(p=>{const x=p.x,y=oy+p.y;const showFinger=String(f.projectType)==='box'&&String(f.boxJoinType)==='finger'&&!!p.jointCut;if(showFinger)path('CUT_RED',fingerBoxPathPrecise(x,y,p.w,p.h,n(f.boxFingerSize,18),n(p.t||f.materialThickness,3),n(f.boxKerf,0.15)));else rect('CUT_RED',x,y,p.w,p.h);const key=p.pieceKey||'';if(key==='front'&&b(f.boxHandleHole))rect('ENGRAVE_BLACK',x+p.w*.25,y+p.h*.18,p.w*.5,Math.min(18,p.h*.18));if((key==='front'||key==='top')&&b(f.boxMagnet)){circle('HOLE_BLUE',x+p.w*.18,y+p.h*.18,n(f.boxMagnetDiameter,6)/2);circle('HOLE_BLUE',x+p.w*.82,y+p.h*.18,n(f.boxMagnetDiameter,6)/2)}if((key==='back'||key==='top')&&(b(f.boxHinge)||String(f.boxLidMode)==='hinge')){const c=Math.max(1,Math.floor(n(f.boxHingeCount,2)));for(let i=0;i<c;i++){const cx=x+p.w*(i+1)/(c+1);circle('HOLE_BLUE',cx,y+p.h*.86,2.2);circle('HOLE_BLUE',cx+12,y+p.h*.86,2.2)}}})});return out+'0\nENDSEC\n0\nEOF\n'}
function paperSafetyIssues(){const f=state.resultForm||state.form,res=state.result||calculate(f);const issues=[];const W=n(f.width),D=n(f.depth),H=n(f.height),t=n(f.materialThickness),bw=n(f.stockBoardWidth,600),bh=n(f.stockBoardHeight,400),qty=Math.max(1,Math.floor(n(f.stockBoardQty,1)));const pieces=flatten((res&&res.cutList)||[]);function add(level,title,desc){issues.push({level,title,desc})}if(!pieces.length)add('bad','沒有裁切清單','請先到計算頁按「更新結果」，確認板件有產生。');else add('ok','裁切清單已產生',`目前共 ${pieces.length} 件板件。`);if(W<=0||D<=0||H<=0)add('bad','尺寸不完整','寬、深、高都必須大於 0。');else add('ok','主要尺寸正常',`${W} × ${D} × ${H} mm。`);if(t<=0)add('bad','板厚不正確','主板厚必須大於 0。');else if(t<2)add('warn','板厚偏薄',`${t} mm 較容易變形或燒穿，請降低功率並先試片。`);else add('ok','板厚已設定',`${t} mm。`);if(bw<=0||bh<=0||qty<1)add('bad','原板尺寸不正確','請設定原板寬、高與數量。');else{const packed=nest(pieces,bw,bh,qty);if(packed.remaining.length)add('bad','有板件未排入原板',`目前 ${packed.remaining.length} 件未排入，匯出前請調整原板或排版。`);else add('ok','板件可排入原板',`原板 ${bw} × ${bh} mm，共 ${qty} 張。`)}if(String(f.projectType)==='box'&&String(f.boxJoinType)==='finger'){const finger=n(f.boxFingerSize,18),kerf=n(f.boxKerf,0.15);const minSide=Math.min(...pieces.map(p=>Math.min(p.w,p.h)).filter(Boolean));const m=fingerMetrics(Math.max(1,minSide),finger);if(finger<t*2)add('warn','榫齒可能太窄',`目標榫齒 ${finger} mm，小於板厚兩倍，薄齒容易燒焦或斷裂。`);else add('ok','榫齒目標值可測試',`目標榫齒 ${finger} mm；最小板邊實際約 ${r(m.actual)} mm / 齒。`);if(m.actual<8)add('bad','實際榫齒過小',`依最小板邊換算後約 ${r(m.actual)} mm，可能不適合 10W 雷射穩定切割。`);if(kerf<=0)add('warn','切縫補償未設定','榫卯盒建議填入實測切縫補償，例如 0.10–0.20 mm 起測。');else add('ok','切縫補償已設定',`${kerf} mm；仍需用測試片確認鬆緊。`)}else add('warn','非榫卯或未啟用榫卯','若要雷射互扣盒，請確認計算頁接合方式為榫卯互扣。');add('ok','SVG / DXF 已分層',`v72 輸出含 CUT_RED 切割、HOLE_BLUE 孔位、ENGRAVE_BLACK 標註/雕刻三層。`);if(n(f.laserPower,0)<=0||n(f.laserSpeed,0)<=0)add('warn','雷射參數未完整','功率與速度目前不完整，建議到參數庫或測試片產生器套用。');else add('ok','雷射參數已記錄',`功率 ${n(f.laserPower)}%，速度 ${n(f.laserSpeed)} mm/min，${n(f.laserPasses,1)} 刀。`);add('warn','匯入雷射軟體後仍需確認','SVG / DXF 已用 mm 與分層輸出，但不同軟體仍需確認比例與分層映射。');return issues}
function renderOutputSafetyCard(){const issues=paperSafetyIssues();const bad=issues.filter(x=>x.level==='bad').length,warn=issues.filter(x=>x.level==='warn').length;const status=bad?`阻擋 ${bad} 項`:(warn?`提醒 ${warn} 項`:'可匯出');return `<section class="card" id="paperSafety"><div class="view-title"><div><h2>圖紙輸出安全檢查 v73</h2><div class="small">匯出 SVG / DXF 前先看這裡。紅色項目建議先修正；黃色項目代表仍需實測或人工確認。</div><div class="v72-layer-note"><span class="v72-layer-pill cut">CUT_RED 切割線</span><span class="v72-layer-pill hole">HOLE_BLUE 孔位線</span><span class="v72-layer-pill engrave">ENGRAVE_BLACK 標註 / 雕刻</span></div></div><span class="badge">${esc(status)}</span></div><div class="safety-list">${issues.map(x=>`<div class="safety-item safety-${x.level}"><span class="safety-dot">${x.level==='ok'?'✓':x.level==='bad'?'!':'?'}</span><div><div class="safety-title">${esc(x.title)}</div><div class="safety-desc">${esc(x.desc)}</div></div></div>`).join('')}</div><div class="btn-row"><button class="secondary" type="button" data-go-tab="calc">回計算修正</button><button class="secondary" type="button" data-go-tab="laserdb">去參數庫 / 測試片</button></div></section>`}

function stepItemHtml(item,done){const checked=done[item.id]?'checked':'';const links=(item.links||[]).map(x=>stepLink(x.tab,x.label)).join('');return `<div class="step-check-item"><input type="checkbox" data-step-check="${esc(item.id)}" ${checked}><div><div class="step-check-title">${esc(item.title)}</div>${item.detail?`<div class="step-check-detail">${esc(item.detail)}</div>`:''}${links?`<div class="step-check-actions">${links}</div>`:''}</div></div>`}

function renderCustomSteps(done){const items=getCustomSteps();const list=items.length?items.map(it=>`<div class="step-custom-item"><div class="step-custom-head"><div><label style="display:flex;gap:10px;align-items:flex-start"><input type="checkbox" data-step-check="${esc(it.id)}" ${done[it.id]?'checked':''} style="width:22px;height:22px"><span><span class="step-custom-title">${esc(it.title||'未命名步驟')}</span><span class="step-custom-detail">${esc(it.detail||'')}</span></span></label></div><button class="secondary" type="button" data-step-delete="${esc(it.id)}">刪除</button></div></div>`).join(''):`<div class="tool-empty">尚未新增自訂步驟。</div>`;return `<details class="card fold-card compact-fold" data-step-section="custom"><summary><div class="fold-title"><h2>8. 自訂步驟</h2><div class="fold-summary">可加入你自己的施工注意事項、等待時間、特殊治具流程。</div></div><span class="fold-mark"></span></summary><div class="fold-body"><div class="step-custom-grid"><label><div class="label">步驟名稱</div><input id="stepCustomTitle" placeholder="例：等待白膠固化 6 小時"></label><label><div class="label">歸類</div><select id="stepCustomPhase"><option value="custom">自訂</option><option value="test">測試片</option><option value="cut">裁切</option><option value="assembly">組裝</option><option value="finish">完工</option></select></label><label class="full"><div class="label">細節</div><textarea id="stepCustomDetail" placeholder="例：用直角夾固定，確認沒有位移後再放置到隔天。"></textarea></label></div><div class="btn-row"><button class="primary" type="button" id="stepAddCustom">新增自訂步驟</button></div>${list}</div></details>`}
function renderSteps(){const f=state.resultForm||state.form,res=state.result||calculate(f),groups=stepGroups(),done=getStepDone();const all=groups.flatMap(g=>g.items);const custom=getCustomSteps();const total=all.length+custom.length;const doneCount=all.concat(custom).filter(x=>done[x.id]).length;const percent=total?Math.round(doneCount/total*100):0;const W=n(f.width),D=n(f.depth),H=n(f.height),t=n(f.materialThickness);const pieceCount=flatten((res&&res.cutList)||[]).length;return `<section class="card"><h2>施工步驟總覽</h2><div class="small">此頁會依「計算」頁目前類型、尺寸、板厚、接合方式與特殊孔位產生施工流程。勾選狀態會存在本機；切換頁面或重新開啟仍會保留。</div><div class="step-overview"><div class="step-stat"><b>${percent}%</b>完成進度</div><div class="step-stat"><b>${doneCount}/${total}</b>已勾選</div><div class="step-stat"><b>${pieceCount} 件</b>目前板件</div></div><div class="step-progress"><span style="width:${percent}%"></span></div><div class="shopping-context"><span class="pill">${esc(projectName(f.projectType))}</span><span class="pill">${W}×${D}×${H} mm</span><span class="pill">板厚 ${t} mm</span><span class="pill">${esc(projectOptionSummary(f))}</span></div><div class="btn-row"><button class="primary" type="button" id="stepExpandAll">全部展開</button><button class="secondary" type="button" id="stepCollapseAll">全部收合</button><button class="secondary tool-danger-btn" type="button" id="stepClearDone">清除勾選</button></div><div class="step-menu">${groups.map(g=>`<button type="button" data-step-scroll="${esc(g.id)}">${esc(g.title)}｜${g.items.filter(x=>done[x.id]).length}/${g.items.length}</button>`).join('')}<button type="button" data-step-scroll="custom">8. 自訂步驟｜${custom.filter(x=>done[x.id]).length}/${custom.length}</button></div></section>${groups.map((g,i)=>renderStepFold(g,done,i)).join('')}${renderCustomSteps(done)}<section class="card"><h2>常用跳轉</h2><div class="step-jump-row">${stepLink('calc','計算頁')}${stepLink('method','做法頁')}${stepLink('hardware','五金頁')}${stepLink('diagrams','施工圖')}${stepLink('layout','排版圖')}${stepLink('materials','耗材')}${stepLink('shopping','購物')}${stepLink('records','紀錄')}${stepLink('backup','備份')}</div></section>`}
function bindStepsPage(){document.querySelectorAll('[data-step-check]').forEach(cb=>{cb.onchange=()=>{const done=getStepDone();done[cb.dataset.stepCheck]=cb.checked;setStepDone(done);toast(cb.checked?'已勾選步驟':'已取消勾選');render()}});document.querySelectorAll('[data-step-tab]').forEach(btn=>{btn.onclick=()=>{activeTab=btn.dataset.stepTab;localStorage.setItem(TAB,activeTab);render();window.scrollTo({top:0,behavior:'smooth'})}});document.querySelectorAll('[data-step-section]').forEach(d=>{d.addEventListener('toggle',()=>{const open=getOpenSteps();open[d.dataset.stepSection]=d.open;setOpenSteps(open)})});document.querySelectorAll('[data-step-scroll]').forEach(btn=>{btn.onclick=()=>{const el=$('step-'+btn.dataset.stepScroll)||document.querySelector('[data-step-section="custom"]');if(el){el.open=true;el.scrollIntoView({behavior:'smooth',block:'start'})}}});const ex=$('stepExpandAll');if(ex)ex.onclick=()=>{const open=getOpenSteps();document.querySelectorAll('[data-step-section]').forEach(d=>{d.open=true;open[d.dataset.stepSection]=true});setOpenSteps(open)};const co=$('stepCollapseAll');if(co)co.onclick=()=>{const open=getOpenSteps();document.querySelectorAll('[data-step-section]').forEach(d=>{d.open=false;open[d.dataset.stepSection]=false});setOpenSteps(open)};const clear=$('stepClearDone');if(clear)clear.onclick=()=>{if(confirm('確定清除所有步驟勾選？')){setStepDone({});render()}};const add=$('stepAddCustom');if(add)add.onclick=()=>{const title=($('stepCustomTitle')||{}).value||'';if(!title.trim()){alert('請先輸入步驟名稱');return}const items=getCustomSteps();items.push({id:'custom-'+Date.now(),title:title.trim(),phase:(($('stepCustomPhase')||{}).value||'custom'),detail:(($('stepCustomDetail')||{}).value||'').trim()});setCustomSteps(items);toast('已新增自訂步驟');render()};document.querySelectorAll('[data-step-delete]').forEach(btn=>{btn.onclick=()=>{if(!confirm('刪除此自訂步驟？'))return;const items=getCustomSteps().filter(x=>x.id!==btn.dataset.stepDelete);const done=getStepDone();delete done[btn.dataset.stepDelete];setCustomSteps(items);setStepDone(done);render()}})}

function bindBackup(){document.querySelectorAll('[data-backup-section]').forEach(d=>{d.ontoggle=()=>setBackupSectionOpen(d.dataset.backupSection,d.open)});const full=$('backupFullBtn');if(full)full.onclick=()=>downloadBackup('full');const prev=$('backupPreviewFull');if(prev)prev.onclick=()=>previewBackup('full');const copy=$('backupCopyFull');if(copy)copy.onclick=()=>copyBackup('full');document.querySelectorAll('[data-backup-scope]').forEach(btn=>btn.onclick=()=>downloadBackup(btn.dataset.backupScope));const clear=$('clearOldCacheBtn');if(clear)clear.onclick=()=>{if(confirm('確定清除舊版預覽快取？v61 主資料會保留。'))clearOldPreviewCache()};const r=$('restoreInput');if(r)r.onchange=async()=>{const file=r.files[0];if(!file)return;if(!confirm('匯入會覆蓋備份檔內包含的資料。建議先匯出目前完整備份。確定匯入？'))return;try{const obj=JSON.parse(await file.text());applyBackupObject(obj);toast('匯入成功');render()}catch(e){alert('匯入失敗：'+(e&&e.message?e.message:e))}}}

function latestProject(){const arr=[...((getProjectLib().projects)||[])];arr.sort((a,b)=>dateVal(b.updatedAt||b.createdAt)-dateVal(a.updatedAt||a.createdAt));return arr[0]||null}
function dashboardStepSummary(){const done=getStepDone();const groups=stepGroups();const custom=getCustomSteps();const all=groups.flatMap(g=>g.items).concat(custom);const doneCount=all.filter(x=>done[x.id]).length;const total=all.length;const percent=total?Math.round(doneCount/total*100):0;const todo=all.filter(x=>!done[x.id]).slice(0,4);return {total,doneCount,percent,todo}}
function dashboardLowMaterials(){return ((getMaterialLib().items)||[]).filter(materialStockLow).slice(0,5)}
function dashboardShoppingGroups(){const items=(getShoppingLib().items)||[];return shoppingCompareGroups(items).map(([name,list])=>{const best=[...list].sort((a,b)=>shopTotal(a)-shopTotal(b))[0];return {name,list,best,total:best?shopTotal(best):0}}).sort((a,b)=>a.total-b.total)}
function dashboardRecentRecords(){const arr=[...((getRecordLib().items)||[])];arr.sort((a,b)=>dateVal(b.recordDate||b.updatedAt)-dateVal(a.recordDate||a.updatedAt));return arr.slice(0,4)}

function getHomeOpen(){try{return JSON.parse(localStorage.getItem(HOME_OPEN)||'{}')||{}}catch(e){return {}}}
