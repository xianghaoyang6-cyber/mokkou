<style>
:root{
  --bg:#f6efe3;--card:#fffaf1;--card2:#fffdf8;--line:#d7bf8c;--line2:#eadcc2;
  --text:#2b2216;--sub:#766247;--accent:#b88a44;--accent2:#6b4a1f;

}
*{box-sizing:border-box}
html{max-width:100%;overflow-x:hidden;scroll-behavior:auto}
body{margin:0;max-width:100%;overflow-x:hidden;background:linear-gradient(180deg,var(--bg),#fffaf1);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.5;padding-bottom:calc(96px + env(safe-area-inset-bottom))}
.app{width:100%;max-width:1120px;margin:0 auto;padding:14px;overflow-x:hidden}
.hero,.card,.fold-card{background:rgba(255,250,241,.94);border:1.5px solid var(--line);border-radius:24px;box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.hero{padding:18px}.hero-kicker{font-weight:950;color:var(--accent2);font-size:.92rem}.hero h1{margin:5px 0 6px;font-size:1.42rem;line-height:1.24}.hero p{margin:0;color:var(--sub);font-weight:700}.status{margin-top:12px;border:1.5px solid var(--line2);background:#fffdf8;border-radius:18px;padding:10px 12px;display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.badge,.pill{display:inline-flex;align-items:center;border:1px solid #e0cda8;background:#f3e6cd;border-radius:999px;color:#5c492b;padding:5px 10px;font-size:.82rem;font-weight:900}.badge{background:#2b2015;color:#fff;border-color:#2b2015}.card{padding:16px}.card h2,.fold-title{margin:0 0 8px;font-size:1.12rem;color:#2b2216}.small{font-size:.86rem;color:var(--sub);font-weight:700}.muted{background:#f8edd8;border:1.5px dashed var(--line);border-radius:16px;padding:10px;color:#6b5737;font-weight:800}.grid{display:grid;gap:10px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.grid.four{grid-template-columns:repeat(4,minmax(0,1fr))}@media(max-width:760px){.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}}
label{display:block}.label{font-weight:950;color:#5c492b;margin-bottom:5px}.hint{font-size:.78rem;color:#927a55;font-weight:750}
input,select,textarea{width:100%;border:1.5px solid var(--line);background:#fffdf8;color:var(--text);border-radius:15px;padding:11px 12px;font-size:1rem;font-weight:700;outline:none}textarea{min-height:120px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:.86rem}
.range-field input[type=range]{padding:0;border:none;box-shadow:none;background:transparent;accent-color:#0b84ff}.range-wrap{display:grid;gap:8px}.range-value{font-size:1.05rem;font-weight:900;color:#2b2216}.live-status{font-size:.86rem;font-weight:800;color:#6f624b;margin-top:6px}input:focus,select:focus,textarea:focus{border-color:#8d6c37;box-shadow:0 0 0 3px rgba(184,138,68,.2)}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}button{touch-action:manipulation;-webkit-tap-highlight-color:rgba(184,138,68,.18);font-family:inherit}button.primary,button.secondary,.quick-btn,.file-btn{border:1.5px solid var(--line);border-radius:15px;padding:11px 13px;font-weight:950;font-size:.94rem;cursor:pointer}button.primary{background:var(--dark);border-color:var(--dark);color:#fff}button.secondary,.quick-btn,.file-btn{background:#fffdf8;color:#4b3b22}.quick-btn.active{background:var(--accent);border-color:var(--accent2);color:#fff}.quick-btn small{display:block;font-size:.72rem;font-weight:800;opacity:.82;margin-top:2px}.danger{color:var(--danger)!important}.ok{color:var(--ok)!important}.warn{color:var(--warn)!important}
.fold-head{width:100%;border:0;background:linear-gradient(180deg,#fffaf1,#f8edd8);padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;cursor:pointer}.fold-head-main{min-width:0}.fold-title{margin:0;font-weight:950}.fold-sub{font-size:.84rem;color:#806a48;font-weight:800;margin-top:3px}.fold-state{flex:0 0 auto;display:inline-flex;border:1.5px solid var(--line);border-radius:999px;background:#fffdf8;color:#4b3b22;padding:6px 11px;font-weight:950}.fold-card.open .fold-state{background:var(--dark);border-color:var(--dark);color:#fff}.fold-body{border-top:1px solid var(--line2);padding:14px 16px 16px}.fold-card:not(.open) .fold-body{display:none}
.table-wrap{overflow:auto;border:1.5px solid var(--line2);border-radius:16px;background:#fffdf8}table{width:100%;border-collapse:collapse;font-size:.9rem}th,td{border-bottom:1px solid #eadcc2;padding:9px 10px;text-align:left;vertical-align:top;white-space:nowrap}th{background:#f4e6cb;color:#5c492b;font-size:.8rem}tr:last-child td{border-bottom:0}.svg-box{background:#fff;border:1.5px solid var(--line2);border-radius:16px;padding:10px;overflow:auto}.svg-box svg{display:block;width:100%;height:auto;min-width:320px;background:#fff}.svg-small svg{min-width:620px}.dim{font-size:9px;fill:#333}.cut{fill:none;stroke:#111;stroke-width:1.2;vector-effect:non-scaling-stroke}.guide{fill:none;stroke:#777;stroke-width:.7;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}.engrave{fill:none;stroke:#444;stroke-width:.8;vector-effect:non-scaling-stroke}.labelText{font-size:10px;fill:#222;font-weight:700}.home-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}@media(max-width:760px){.home-grid{grid-template-columns:1fr}}
.bottom-nav{position:fixed;left:10px;right:10px;bottom:calc(8px + env(safe-area-inset-bottom));z-index:60;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:6px;background:rgba(255,250,241,.96);border:1.5px solid var(--line);border-radius:22px;padding:8px;box-shadow:0 10px 30px rgba(45,31,12,.18);backdrop-filter:blur(10px)}.bottom-nav button{min-width:0;border:1.5px solid var(--line2);background:#fffdf8;color:#5c492b;border-radius:15px;padding:8px 3px;font-weight:950;font-size:.78rem;line-height:1.12;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:52px}.bottom-nav button.active{background:var(--accent);border-color:var(--accent2);color:#fff}.nav-ico{font-size:1.05rem}.top-btn{position:fixed;right:14px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:58;border:0;background:#111;color:#fff;border-radius:999px;padding:12px 14px;font-weight:950;box-shadow:0 8px 24px rgba(0,0,0,.22);cursor:pointer}.footer{text-align:center;color:#806a48;font-size:.82rem;font-weight:700;padding:10px 0 22px}.notice-list{margin:8px 0 0;padding-left:1.1rem}.notice-list li{margin:4px 0}.source-tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin:8px 0 12px}@media(max-width:480px){.source-tabs{grid-template-columns:1fr}.bottom-nav{left:6px;right:6px;padding:7px;gap:5px}.bottom-nav button{font-size:.72rem;min-height:49px}.app{padding:10px}.card,.hero{border-radius:20px;padding:14px}.fold-head{padding:14px}.fold-body{padding:12px 14px 14px}.top-btn{right:8px}}
</style>
</head>
<body>
<div class="app" id="top">
  <section class="hero">
    <div class="hero-kicker">我の木工 PWA v12.10</div>
    <h1>SVG 幾何切縫補償版｜外輪廓 / 內孔實際套用</h1>
    <p>v12.09 將你的 10W 藍光實測切縫補償正式套用到 SVG 幾何：外輪廓向外補償、中心孔向內補償；乾淨 SVG 可直接用於正式切割測試。</p>
    <div class="status"><strong id="saveNote">本機儲存：已就緒</strong><span class="badge">10W 藍光｜300×300｜有效 280×280 mm</span></div>
  </section>
  <main id="view"></main>
  <div class="footer">PWA v12.10 分層 SVG 版｜單一 HTML｜手機優先｜SVG 優先｜不自動滾動</div>
</div>
<button class="top-btn" type="button" id="topBtn">↑</button>
<nav class="bottom-nav" id="bottomNav" aria-label="底部導航"></nav>
<script>
(function(){
'use strict';
const VERSION='v12.10';
const STORE='mokkou_v12_state';
const NAV=[['home','首頁','⌂'],['calc','計算','▣'],['knob','旋鈕','◎'],['drawing','圖紙','◇'],['more','更多','☰']];
const defaults={
  page:'home',
  ui:{foldOpen:{'home-start':true,'calc-type':true,'calc-size':true,'knob-style':true,'knob-size':true,'drawing-source':true,'more-diagram':true}},
  calc:{type:'box',width:250,depth:280,height:250,thickness:3,backThickness:5,bottomThickness:3,sizeMode:'outer',boxLid:'hinge',boxJoint:'finger',fingerSize:18,kerf:0.065,slideClearance:13,slideLength:350,drawerGap:2,shelfCount:2,doorGap:2},
  knob:{style:'round',template:'M5',outerDiameter:48,centerHole:5.2,thickness:3,targetThickness:12,layerCount:4,nutShape:'hex',nutAcross:8.2,nutDepth:3,kerf:0.065,roundness:42,count:6},
  drawing:{source:'calc',workArea:300,effectiveArea:280,margin:10,showLabels:true,showDimensions:true},
  params:{ply3:'功率 100%，速度 100～180，2～4 刀，氣輔開。實際需依板材測試。',ply5:'功率 100%，速度 60～100，4～7 刀，氣輔開。建議先切小片。',kerf:'10W 藍光實測：LightBurn 以 20 mm 為基礎製作 10 個獨立方塊，切口偏移設 0；實測總長 98.7～98.8 mm，推算切縫寬約 0.12～0.13 mm；建議軟體切口偏移補償 0.06～0.065 mm。App 內預設採 0.065 mm。',kerfTest:'LightBurn｜20 mm 方塊 × 10 個｜切口偏移 0｜實測總長 98.7～98.8 mm｜推算切縫 0.12～0.13 mm｜補償值 0.06～0.065 mm。'}
};
let state=loadState();
function $(id){return document.getElementById(id)}
function esc(v){return String(v??'').replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function num(v,d=0){const x=Number(v);return Number.isFinite(x)?x:d}
function round(v,p=1){const k=Math.pow(10,p);return Math.round(num(v)*k)/k}
function bool(v){return v===true||v==='true'||v==='1'}
function deepMerge(a,b){const out=Array.isArray(a)?a.slice():{...a};Object.keys(b||{}).forEach(k=>{if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k]))out[k]=deepMerge(out[k]||{},b[k]);else out[k]=b[k]});return out}
function loadState(){try{return deepMerge(defaults,JSON.parse(localStorage.getItem(STORE)||'{}'))}catch(e){return structuredClone(defaults)}}
function save(note='已儲存'){localStorage.setItem(STORE,JSON.stringify(state));const el=$('saveNote');if(el)el.textContent='本機儲存：'+note+' '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}
function setPage(page,goTop){state.page=page;save('切換頁面');render();if(goTop)window.scrollTo(0,0)}
function renderNav(){const nav=$('bottomNav');nav.innerHTML=NAV.map(([id,label,ico])=>`<button type="button" class="${state.page===id?'active':''}" data-page="${id}"><span class="nav-ico">${ico}</span><span>${label}</span></button>`).join('');nav.querySelectorAll('[data-page]').forEach(btn=>btn.onclick=()=>setPage(btn.dataset.page,true))}
function fold(id,title,sub,body,openDefault=false){const open=state.ui.foldOpen[id] ?? openDefault;return `<section class="fold-card ${open?'open':''}" data-fold="${esc(id)}"><button class="fold-head" type="button" data-fold-toggle="${esc(id)}"><span class="fold-head-main"><span class="fold-title">${esc(title)}</span><span class="fold-sub">${esc(sub)}</span></span><span class="fold-state">${open?'收合':'展開'}</span></button><div class="fold-body">${body}</div></section>`}
function bindFolds(){document.querySelectorAll('[data-fold-toggle]').forEach(btn=>{btn.onclick=(e)=>{e.preventDefault();const id=btn.dataset.foldToggle;state.ui.foldOpen[id]=!state.ui.foldOpen[id];save('收合狀態已更新');render();};});}
function field(path,label,type='number',hint=''){const val=getPath(path);return `<label><div class="label">${esc(label)} ${hint?`<span class="hint">${esc(hint)}</span>`:''}</div><input type="${type}" data-bind="${esc(path)}" value="${esc(val)}"></label>`}
function rangeField(path,label,min=0,max=100,step=1,hint=''){const val=Number(getPath(path)||0);const id='range-'+path.replace(/\./g,'-');return `<label class="range-field"><div class="label">${esc(label)} <span class="hint">${esc(hint||`${min}～${max}`)}</span></div><div class="range-wrap"><input type="range" min="${min}" max="${max}" step="${step}" data-bind="${esc(path)}" data-live-preview="knob" value="${esc(val)}"><output class="range-value" id="${id}">${esc(val)}</output></div></label>`}
function select(path,label,options,hint=''){const val=String(getPath(path));return `<label><div class="label">${esc(label)} ${hint?`<span class="hint">${esc(hint)}</span>`:''}</div><select data-bind="${esc(path)}">${options.map(o=>`<option value="${esc(o[0])}" ${val===String(o[0])?'selected':''}>${esc(o[1])}</option>`).join('')}</select></label>`}
function textArea(path,label,hint=''){return `<label><div class="label">${esc(label)} ${hint?`<span class="hint">${esc(hint)}</span>`:''}</div><textarea data-bind="${esc(path)}">${esc(getPath(path))}</textarea></label>`}
function getPath(path){return path.split('.').reduce((o,k)=>o?o[k]:undefined,state)}
function setPath(path,val){const parts=path.split('.');let o=state;for(let i=0;i<parts.length-1;i++)o=o[parts[i]];o[parts[parts.length-1]]=val}

function bindInputs(){document.querySelectorAll('[data-bind]').forEach(el=>{const update=()=>{let v=el.value;if(el.type==='number'||el.type==='range')v=el.value===''?'':Number(el.value);if(el.type==='checkbox')v=el.checked;setPath(el.dataset.bind,v);const out=document.getElementById('range-'+el.dataset.bind.replace(/\./g,'-'));if(out)out.textContent=String(v);save('資料已更新');if(el.dataset.livePreview==='knob'){updateKnobPreview(true);return}if(el.dataset.bind==='calc.type'||el.dataset.bind==='drawing.source'||el.dataset.bind==='knob.style'||el.dataset.bind==='knob.template'){applyTemplateIfNeeded(el.dataset.bind);render();}};el.addEventListener('input',()=>{if(el.tagName==='SELECT')return;update();},{passive:true});el.addEventListener('change',update);});}
function applyTemplateIfNeeded(path){if(path==='knob.template'){const t=state.knob.template;const map={M3:[3.2,5.7],M4:[4.2,7.2],M5:[5.2,8.2],M6:[6.2,10.2],M8:[8.3,13.2]};if(map[t]){state.knob.centerHole=map[t][0];state.knob.nutAcross=map[t][1];}}}
function projectName(t){return {box:'盒子',drawer:'抽屜',cabinet:'櫃子'}[t]||t}
function calcResult(){const f=state.calc;const type=f.type;if(type==='drawer')return calcDrawer(f);if(type==='cabinet')return calcCabinet(f);return calcBox(f)}
function piece(part,qty,w,h,t,note){return {part,qty:Math.max(0,Math.floor(num(qty))),w:round(w),h:round(h),t:round(t),size:`${round(w)} × ${round(h)} × ${round(t)} mm`,note}}

function calcBox(f){let W=num(f.width),D=num(f.depth),H=num(f.height),t=num(f.thickness),bt=num(f.bottomThickness,t);let innerW=W-2*t,innerD=D-2*t,innerH=H-t;if(f.sizeMode==='inner'){innerW=W;innerD=D;innerH=H;W=innerW+2*t;D=innerD+2*t;H=innerH+t}const hasLid=f.boxLid!=='none';const joint=f.boxJoint==='finger'?'finger':'straight';const pieces=[piece('前板',1,W,H,t,'正面板'),piece('後板',1,W,H,t,'背面板'),piece('左側板',1,D,H,t,'側板'),piece('右側板',1,D,H,t,'側板'),piece('底板',1,innerW,innerD,bt,joint==='finger'?'底板四邊帶榫卯':'底板')];pieces.forEach(p=>{p.sourceType='box';p.joint=joint;p.fingerSize=num(f.fingerSize,18);p.jointDepth=t;if(joint==='finger'){if(['前板','後板'].includes(p.part))p.edgeModes={top:'flat',right:'out',bottom:'in',left:'out'};else if(['左側板','右側板'].includes(p.part))p.edgeModes={top:'flat',right:'in',bottom:'in',left:'in'};else if(p.part==='底板')p.edgeModes={top:'out',right:'out',bottom:'out',left:'out'};}});if(hasLid){const lid=piece('上蓋',1,W,D,t,f.boxLid==='hinge'?'合頁蓋':'平蓋');lid.sourceType='box';lid.joint='straight';pieces.push(lid)}return {name:'盒子',summary:[`外尺寸 ${round(W)} × ${round(D)} × ${round(H)} mm`,`內尺寸約 ${round(innerW)} × ${round(innerD)} × ${round(innerH)} mm`,`接合：${joint==='finger'?'榫卯':'直切'}`,`榫齒寬：${round(f.fingerSize)} mm｜切縫補償：${round(f.kerf,2)} mm`,`板件 ${pieces.reduce((s,p)=>s+p.qty,0)} 件`],pieces};}
function calcDrawer(f){const W=num(f.width),D=num(f.depth),H=num(f.height),t=num(f.thickness),bt=num(f.bottomThickness,t),gap=num(f.drawerGap),clr=num(f.slideClearance),sl=num(f.slideLength);const boxW=W-2*clr,boxD=Math.min(D-20,sl),boxH=Math.max(40,H-20);return {name:'抽屜',summary:[`抽屜箱外寬 ${round(boxW)} mm`,`抽屜箱外深 ${round(boxD)} mm`,`滑軌每側 ${round(clr)} mm`,`抽面縫 ${round(gap)} mm`],pieces:[piece('側板',2,boxD,boxH,t,'左右側板'),piece('前板 / 後板',2,boxW-2*t,boxH,t,'夾在側板中間'),piece('底板',1,boxW-2*t,boxD-2*t,bt,'可入槽或底鎖'),piece('抽屜面板',1,W-2*gap,H-2*gap,t,'外露面板')]};}
function calcCabinet(f){const W=num(f.width),D=num(f.depth),H=num(f.height),t=num(f.thickness),bt=num(f.backThickness),s=Math.max(0,Math.floor(num(f.shelfCount)));const innerW=W-2*t;return {name:'櫃子',summary:[`外尺寸 ${W} × ${D} × ${H} mm`,`內淨寬 ${round(innerW)} mm`,`層板 ${s} 片`,`背板 ${bt} mm`],pieces:[piece('側板',2,D,H,t,'左右側板'),piece('頂板 / 底板',2,innerW,D,t,'夾在側板中間'),piece('層板',s,innerW,D-10,t,'固定或活動層板'),piece('背板',1,W-12,H-12,bt,'增加抗扭')]};}

function renderHome(){const res=calcResult();return `<section class="card"><h2>v12.09 SVG 幾何切縫補償版</h2><div class="home-grid"><div class="muted">這版把切縫補償真正套用到 SVG 幾何：外輪廓會依補償值向外擴，中心孔會依補償值向內縮；圖紙文字仍顯示設計尺寸，乾淨 SVG 保持無字。</div><div><div class="pill">工作區 300×300 mm</div> <div class="pill">有效區 280×280 mm</div> <div class="pill">SVG 優先</div></div></div></section>${fold('home-start','快速開始','選一個常用入口，不自動滾動。',`<div class="grid two"><button class="quick-btn" data-action="quick-calc" data-type="box">做盒子<small>榫卯 / 上蓋 / 板件</small></button><button class="quick-btn" data-action="quick-calc" data-type="drawer">做抽屜<small>滑軌間隙 / 面板縫</small></button><button class="quick-btn" data-action="quick-calc" data-type="cabinet">做櫃子<small>側板 / 層板 / 背板</small></button><button class="quick-btn" data-action="quick-page" data-page="knob">做旋鈕<small>中心孔 / 螺母槽</small></button><button class="quick-btn" data-action="quick-page" data-page="drawing">看圖紙<small>SVG / 280×280 分片</small></button><button class="quick-btn" data-action="quick-page" data-page="more">備份資料<small>JSON 匯出 / 匯入</small></button></div>`,true)}${fold('home-recent','最近設定','目前計算結果摘要。',summaryHtml(res),false)}${fold('home-notice','v12.00 暫緩功能','紙盒刀模、照片庫、DXF / PNG 暫不納入第一版。',`<ul class="notice-list"><li>紙盒刀模改列 v12.10 或之後加回。</li><li>照片庫 / 圖庫等大型功能等核心穩定後再加。</li><li>v11 保留為備份與功能參考，不再直接疊補丁。</li></ul>`,false)}`}
function summaryHtml(res){return `<div class="grid two"><div class="muted"><strong>目前類型：</strong>${esc(res.name)}<br><strong>摘要：</strong><br>${res.summary.map(x=>'・'+esc(x)).join('<br>')}</div><div class="table-wrap"><table><thead><tr><th>部件</th><th>數量</th><th>尺寸</th></tr></thead><tbody>${res.pieces.map(p=>`<tr><td>${esc(p.part)}</td><td>${p.qty}</td><td>${esc(p.size)}</td></tr>`).join('')}</tbody></table></div></div>`}
function renderCalc(){const f=state.calc;const res=calcResult();const typeButtons=['box','drawer','cabinet'].map(t=>`<button class="quick-btn ${f.type===t?'active':''}" data-calc-type="${t}">${projectName(t)}<small>${t==='box'?'收納盒 / 雷射盒':t==='drawer'?'滑軌抽屜':'櫃體 / 層板'}</small></button>`).join('');let typeBody='';if(f.type==='box'){typeBody=`<div class="grid two">${select('calc.sizeMode','尺寸模式',[['outer','輸入外尺寸'],['inner','輸入內尺寸']])}${select('calc.boxLid','蓋型',[['none','無蓋'],['plain','平蓋'],['hinge','合頁蓋']])}${select('calc.boxJoint','接合',[['finger','榫卯'],['straight','直切']])}${field('calc.fingerSize','榫齒寬','number','mm')}${field('calc.kerf','切縫補償','number','mm')}</div>`}else if(f.type==='drawer'){typeBody=`<div class="grid two">${field('calc.slideClearance','滑軌單側預留','number','mm')}${field('calc.slideLength','滑軌長度','number','mm')}${field('calc.drawerGap','抽面縫隙','number','mm')}</div>`}else{typeBody=`<div class="grid two">${field('calc.shelfCount','層板數','number','片')}${field('calc.backThickness','背板厚','number','mm')}${field('calc.doorGap','門板預留縫','number','mm')}</div>`}return `${fold('calc-type','製作類型','v12.10 已加入分層 SVG；盒子 / 旋鈕切縫補償預設為 0.065 mm。',`<div class="grid three">${typeButtons}</div>`,true)}${fold('calc-size','主要尺寸','輸入寬、深、高與板厚。',`<div class="grid two">${field('calc.width','外寬 W','number','mm')}${field('calc.depth','外深 D','number','mm')}${field('calc.height','外高 H','number','mm')}${field('calc.thickness','主板厚','number','mm')}${field('calc.bottomThickness','底板厚','number','mm')}${field('calc.backThickness','背板厚','number','mm')}</div>`,true)}${fold('calc-type-settings','類型設定','依目前類型顯示需要的設定。',typeBody,false)}<section class="card"><h2>操作</h2><div class="btn-row"><button class="primary" data-action="save-calc">儲存設定</button><button class="secondary" data-action="apply-drawing-calc">套用到圖紙</button><button class="secondary" data-action="reset-calc">恢復預設尺寸</button></div></section>${fold('calc-result','計算結果','板件清單與尺寸。',summaryHtml(res),false)}`}
function renderKnob(){const k=state.knob;const styleBtns=[['round','圓形'],['hex','六角'],['star','星形'],['gear','齒輪止滑'],['flower','梅花'],['bar','長條']].map(([id,label])=>`<button class="quick-btn ${k.style===id?'active':''}" data-knob-style="${id}">${label}</button>`).join('');const tempBtns=['M3','M4','M5','M6','M8'].map(t=>`<button class="quick-btn ${k.template===t?'active':''}" data-knob-template="${t}">${t}<small>孔 / 螺母槽</small></button>`).join('');return `${fold('knob-style','樣式選擇','點子選項不會讓父層收合。',`<div class="grid three">${styleBtns}</div>`,true)}${fold('knob-template','規格模板','快速套用 M3～M8。',`<div class="grid five">${tempBtns}</div>`,false)}${fold('knob-size','尺寸設定','旋鈕外徑、中心孔、板厚與疊片。',`<div class="grid two">${field('knob.outerDiameter','外徑 / 長度','number','mm')}${field('knob.centerHole','中心孔','number','mm')}${field('knob.thickness','單片板厚','number','mm')}${field('knob.targetThickness','目標厚度','number','mm')}${field('knob.layerCount','疊片數','number','片')}${field('knob.count','排版數量','number','個')}</div>`,true)}${fold('knob-hole','孔型 / 螺母槽','六角螺母槽與補償。',`<div class="grid two">${select('knob.nutShape','螺母槽',[['hex','六角'],['round','圓形沉孔'],['none','不加']])}${field('knob.nutAcross','螺母對邊 / 沉孔直徑','number','mm')}${field('knob.nutDepth','螺母槽深度','number','mm')}${field('knob.kerf','切縫補償','number','mm')}</div>`,false)}${fold('knob-round','圓滑 / 補償助手','把凸起位置修得更圓，避免太尖。',`<div class="grid two">${rangeField('knob.roundness','圓滑度',0,100,1,'0～100')}<div class="muted">建議：圓形 / 六角可設 0～25；星形、梅花、齒輪止滑可先從 35～55 開始。數值越大，凸起越圓滑。</div></div>`,false)}${fold('knob-result','旋鈕結果與預覽','SVG 預覽與下載使用同一套輪廓與內嵌樣式。',`<div class="muted">建議疊片數：${Math.ceil(num(k.targetThickness)/Math.max(0.1,num(k.thickness)))} 片；目前設定 ${num(k.layerCount)} 片。</div><div id="knobPreviewBox" data-knob-preview="1" class="svg-box" style="margin-top:10px">${knobSvgPreview()}</div><div class="btn-row"><button class="primary" data-action="download-knob-svg">下載旋鈕 SVG</button><button class="secondary" data-action="refresh-knob-preview">套用預覽</button><button class="secondary" data-action="apply-drawing-knob">套用到圖紙</button></div>`,true)}`}
function svgStyleBlock(mode='normal'){if(mode==='layered')return `<style><![CDATA[

]]></style>`}
function smoothClosedPath(pts,t=.2){if(!pts||pts.length<3)return polygonPath(pts||[]);if(t<=0)return polygonPath(pts);const n=pts.length,entry=[],exit=[];for(let i=0;i<n;i++){const prev=pts[(i-1+n)%n],cur=pts[i],next=pts[(i+1)%n];entry.push([cur[0]+(prev[0]-cur[0])*t,cur[1]+(prev[1]-cur[1])*t]);exit.push([cur[0]+(next[0]-cur[0])*t,cur[1]+(next[1]-cur[1])*t]);}let d=`M ${round(entry[0][0],2)} ${round(entry[0][1],2)}`;for(let i=0;i<n;i++){const ni=(i+1)%n;d+=` Q ${round(pts[i][0],2)} ${round(pts[i][1],2)} ${round(exit[i][0],2)} ${round(exit[i][1],2)} L ${round(entry[ni][0],2)} ${round(entry[ni][1],2)}`;}return d+' Z'}
function knobOutlineMarkup(style,cx,cy,d,roundnessPct,kerfOffset=0){const k=Math.max(0,num(kerfOffset,0));const cd=num(d)+2*k;const r=cd/2;const smooth=Math.max(0,Math.min(100,num(roundnessPct,0)))/100;if(style==='round')return `<circle class="cut" cx="${cx}" cy="${cy}" r="${round(r,3)}"/>`;if(style==='bar')return `<rect class="cut" x="${round(cx-cd/2,3)}" y="${round(cy-cd*.225,3)}" width="${round(cd,3)}" height="${round(cd*.45,3)}" rx="${round(cd*(0.12+0.28*smooth),2)}"/>`;const pts=knobPoints(style,cx,cy,r);if(!pts)return '';const t=(style==='hex'?0.05+0.18*smooth:0.06+0.32*smooth);return `<path class="cut" d="${smoothClosedPath(pts,t)}"/>`}
function knobPoints(style,cx,cy,r){if(style==='hex'){let pts=[];for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)])}return pts}if(style==='star'){let pts=[];for(let i=0;i<10;i++){const rr=i%2?r*.55:r;const a=-Math.PI/2+i*Math.PI/5;pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}return pts}if(style==='gear'){let pts=[];for(let i=0;i<32;i++){const rr=i%2?r:r*.86;const a=-Math.PI/2+i*Math.PI/16;pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}return pts}if(style==='flower'){let pts=[];for(let i=0;i<72;i++){const a=-Math.PI/2+i*Math.PI*2/72;const rr=r*(.84+.16*Math.sin(6*a));pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}return pts}return null}
function polygonPath(pts){return 'M '+pts.map(p=>`${round(p[0],2)} ${round(p[1],2)}`).join(' L ')+' Z'}

function updateKnobPreview(fromSlider=false){const boxes=document.querySelectorAll('[data-knob-preview],#knobPreviewBox');boxes.forEach(box=>{box.innerHTML=knobSvgPreview();});const status=document.getElementById('knobLiveStatus');if(status)status.textContent='預覽已同步：'+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});if(fromSlider&&window.requestAnimationFrame){requestAnimationFrame(()=>{document.querySelectorAll('[data-knob-preview],#knobPreviewBox').forEach(box=>{box.innerHTML=knobSvgPreview();});});}}
function knobSvgPreview(){const k=state.knob;const d=num(k.outerDiameter),cx=80,cy=80,ko=Math.max(0,num(k.kerf,0));const holeR=Math.max(0.05,num(k.centerHole)/2-ko);let nut='';if(k.nutShape==='hex'){nut=`<path class="engrave" d="${polygonPath(knobPoints('hex',cx,cy,num(k.nutAcross)/Math.sqrt(3)))}"/>`}else if(k.nutShape==='round'){nut=`<circle class="engrave" cx="${cx}" cy="${cy}" r="${num(k.nutAcross)/2}"/>`}return `<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock()}<rect x="1" y="1" width="158" height="158" fill="#fff" stroke="#eadcc2"/>${knobOutlineMarkup(k.style,cx,cy,d,k.roundness,ko)}<circle class="cut" cx="${cx}" cy="${cy}" r="${round(holeR,3)}"/>${nut}<text class="labelText" x="10" y="148">${esc(k.style)}｜外徑 ${round(d)}｜孔 ${round(k.centerHole)} mm｜補償 ${round(ko,3)}</text></svg>`}

function renderDrawing(){const source=state.drawing.source;const svg=source==='knob'?knobBatchSvg({labels:true}):layoutSvg({labels:true,notes:true});return `${fold('drawing-source','圖紙來源','選擇目前木工計算或旋鈕。',`<div class="source-tabs"><button class="quick-btn ${source==='calc'?'active':''}" data-drawing-source="calc">目前計算結果<small>盒子 / 抽屜 / 櫃子</small></button><button class="quick-btn ${source==='knob'?'active':''}" data-drawing-source="knob">目前旋鈕結果<small>批量排版</small></button></div>`,true)}${fold('drawing-area','雷射工作區','以 10W 藍光 300×300 mm、有效 280×280 mm 為基準。',`<div class="grid three">${field('drawing.workArea','機台工作區','number','mm')}${field('drawing.effectiveArea','有效切割區','number','mm')}${field('drawing.margin','邊距','number','mm')}</div><div class="muted" style="margin-top:10px">建議有效區固定 280×280 mm，保留邊距、夾具與機台誤差。</div>`,false)}${fold('drawing-preview','SVG 預覽','v12.10 已加入分層 SVG：CUT_RED 供切割、GUIDE_GRAY 供參考、ENGRAVE_BLACK 供雕刻 / 標記。',`<div class="svg-box svg-small">${svg}</div><div class="btn-row"><button class="primary" data-action="download-current-svg">下載預覽版 SVG</button><button class="secondary" data-action="download-current-svg-clean">下載乾淨 SVG</button><button class="secondary" data-action="download-current-svg-layered">下載分層 SVG</button><button class="secondary" data-action="download-json">下載 JSON 設定</button></div><div class="muted" style="margin-top:10px">建議：LightBurn 匯入後把 CUT_RED 設正式切割、GUIDE_GRAY 設為關閉或低功率標記、ENGRAVE_BLACK 設雕刻或依需要關閉。</div>`,true)}`}
function flattenPieces(pieces){const out=[];pieces.forEach(p=>{for(let i=0;i<p.qty;i++)out.push({...p,name:p.part+(p.qty>1?' '+(i+1):'')})});return out.sort((a,b)=>Math.max(b.w,b.h)-Math.max(a.w,a.h))}
function nestPieces(pieces,area){let x=10,y=22,rowH=0,placed=[],board=1;for(const p of pieces){let w=num(p.w),h=num(p.h);let rot=false;if(w>area-20&&h<=area-20){[w,h]=[h,w];rot=true}if(x+w>area-10){x=10;y+=rowH+8;rowH=0}if(y+h>area-10){board++;x=10;y=22;rowH=0}placed.push({...p,x,y,w,h,rot,board});x+=w+8;rowH=Math.max(rowH,h)}return {placed,boards:board}}

function edgeSegmentPointsHorizontal(pts,x0,x1,y,depth,tooth,inwardDown=true,phase=0){const len=Math.abs(x1-x0),dir=x1>=x0?1:-1;const n=Math.max(2,Math.round(len/Math.max(4,tooth)));const step=len/n;for(let i=0;i<n;i++){const a=x0+dir*i*step,b=x0+dir*(i+1)*step;const notch=(i+phase)%2===0;if(notch){const yy=y+(inwardDown?depth:-depth);pts.push([a,yy],[b,yy],[b,y]);}else pts.push([b,y]);}}
function edgeSegmentPointsVertical(pts,y0,y1,x,depth,tooth,inwardRight=false,phase=0){const len=Math.abs(y1-y0),dir=y1>=y0?1:-1;const n=Math.max(2,Math.round(len/Math.max(4,tooth)));const step=len/n;for(let i=0;i<n;i++){const a=y0+dir*i*step,b=y0+dir*(i+1)*step;const notch=(i+phase)%2===0;if(notch){const xx=x+(inwardRight?depth:-depth);pts.push([xx,a],[xx,b],[x,b]);}else pts.push([x,b]);}}
function fingerRectPath(x,y,w,h,tooth,depth){tooth=Math.max(4,num(tooth,18));depth=Math.max(1,Math.min(num(depth,3),Math.min(w,h)/4));const pts=[[x,y]];edgeSegmentPointsHorizontal(pts,x,x+w,y,depth,tooth,true,0);edgeSegmentPointsVertical(pts,y,y+h,x+w,depth,tooth,false,1);edgeSegmentPointsHorizontal(pts,x+w,x,y+h,depth,tooth,false,0);edgeSegmentPointsVertical(pts,y+h,y,x,depth,tooth,true,1);return 'M '+pts.map(p=>`${round(p[0],2)} ${round(p[1],2)}`).join(' L ')+' Z'}
function addEdge(pts,kind,a,b,pos,tooth,depth,mode){if(mode==='flat'){if(kind==='h')pts.push([b,pos]);else pts.push([pos,b]);return}if(kind==='h'){const isTop=a<b&&mode;const inwardDown=(mode==='out')?(a<b?false:true):(a<b?true:false);edgeSegmentPointsHorizontal(pts,a,b,pos,depth,tooth,inwardDown,0);}else{const inwardRight=(mode==='out')?(a<b?true:false):(a<b?false:true);edgeSegmentPointsVertical(pts,a,b,pos,depth,tooth,inwardRight,0);}}
function fingerRectPathByEdges(x,y,w,h,tooth,depth,edges){tooth=Math.max(4,num(tooth,18));depth=Math.max(1,Math.min(num(depth,3),Math.min(w,h)/4));edges=edges||{top:'flat',right:'flat',bottom:'flat',left:'flat'};const pts=[[x,y]];addEdge(pts,'h',x,x+w,y,tooth,depth,edges.top||'flat');addEdge(pts,'v',y,y+h,x+w,tooth,depth,edges.right||'flat');addEdge(pts,'h',x+w,x,y+h,tooth,depth,edges.bottom||'flat');addEdge(pts,'v',y+h,y,x,tooth,depth,edges.left||'flat');return 'M '+pts.map(p=>`${round(p[0],2)} ${round(p[1],2)}`).join(' L ')+' Z'}

function dimensionMarkup(p,ox){const x=ox+p.x,y=p.y,w=num(p.w),h=num(p.h);const bx=y+h+8,rx=x+w+8;const midX=x+w/2,midY=y+h/2;return `<g class="dimMark"><line class="dimLine" x1="${x}" y1="${bx}" x2="${x+w}" y2="${bx}"/><line class="dimTick" x1="${x}" y1="${bx-3}" x2="${x}" y2="${bx+3}"/><line class="dimTick" x1="${x+w}" y1="${bx-3}" x2="${x+w}" y2="${bx+3}"/><text class="dim" text-anchor="middle" x="${midX}" y="${bx+10}">${round(w)} mm</text><line class="dimLine" x1="${rx}" y1="${y}" x2="${rx}" y2="${y+h}"/><line class="dimTick" x1="${rx-3}" y1="${y}" x2="${rx+3}" y2="${y}"/><line class="dimTick" x1="${rx-3}" y1="${y+h}" x2="${rx+3}" y2="${y+h}"/><text class="dim" x="${rx+4}" y="${midY}">${round(h)} mm</text></g>`}
function pieceJointLabel(p,ox){if(!(p.sourceType==='box'&&p.joint==='finger'))return '';return `<text class="dim" x="${ox+p.x+3}" y="${p.y+24}">榫齒 ${round(p.fingerSize)} mm</text>`}
function kerfOffsetForPiece(p){if(p.sourceType==='box')return Math.max(0,num(state.calc.kerf,0));return 0}
function compensatedPieceBox(p,ox){const k=kerfOffsetForPiece(p);return {x:round(ox+p.x-k,3),y:round(p.y-k,3),w:round(num(p.w)+2*k,3),h:round(num(p.h)+2*k,3),k}}
function pieceCutMarkup(p,ox,opts={}){const g=compensatedPieceBox(p,ox);const hasEdges=p.sourceType==='box'&&p.joint==='finger'&&p.edgeModes;const allFinger=p.sourceType==='box'&&p.joint==='finger'&&p.fingerEdges==='all';if(hasEdges){const d=fingerRectPathByEdges(g.x,g.y,g.w,g.h,p.fingerSize,p.jointDepth,p.edgeModes);return `<path class="cut" d="${d}"/>`;}if(allFinger){const d=fingerRectPath(g.x,g.y,g.w,g.h,p.fingerSize,p.jointDepth);return `<path class="cut" d="${d}"/>`;}return `<rect class="cut" x="${g.x}" y="${g.y}" width="${g.w}" height="${g.h}"/>`}

function layoutSvg(opts={}){const showLabels=opts.labels!==false,showNotes=opts.notes!==false&&showLabels;const area=num(state.drawing.effectiveArea,280),res=calcResult(),pieces=flattenPieces(res.pieces).filter(p=>p.w>0&&p.h>0);const lay=nestPieces(pieces,area);const W=area*lay.boards+20*(lay.boards+1),H=area+(showNotes?66:24);let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock()}`;for(let b=1;b<=lay.boards;b++){const ox=20+(b-1)*(area+20);s+=`<rect x="${ox}" y="20" width="${area}" height="${area}" fill="#fff" stroke="#b88a44" stroke-width="1.5"/>`;if(showLabels)s+=`<text class="labelText" x="${ox}" y="15">第 ${b} 片｜有效 ${area}×${area} mm</text>`;lay.placed.filter(p=>p.board===b).forEach(p=>{s+=pieceCutMarkup(p,ox,{labels:showLabels});if(showLabels){s+=`<text class="labelText" x="${ox+p.x+3}" y="${p.y+12}">${esc(p.name)}</text>`;s+=`<text class="dim" x="${ox+p.x+3}" y="${p.y+p.h-4}">${round(p.w)}×${round(p.h)} mm</text>`;s+=pieceJointLabel(p,ox);s+=dimensionMarkup(p,ox);}});}const jointNote=state.calc.type==='box'?`｜盒子接合：${state.calc.boxJoint==='finger'?'榫卯':'直切'}`:'';if(showNotes){s+=`<text class="dim" x="20" y="${H-32}">來源：${esc(res.name)}${jointNote}｜預覽版顯示板件名稱、寬高尺寸線與榫齒提示；切線已套用切縫補償。</text><text class="dim" x="20" y="${H-20}">正式切割請下載乾淨 SVG，避免文字與標註一起進入雷射軟體；外輪廓已向外補償。</text><text class="dim" x="20" y="${H-8}">盒子榫卯已補到底板；v12.09 先套用外輪廓 / 內孔補償，後續可再做公母齒精準交錯。</text>`;}return s+`</svg>`}
function knobBatchSvg(opts={}){const showLabels=opts.labels!==false;const area=num(state.drawing.effectiveArea,280),k=state.knob,d=num(k.outerDiameter),ko=Math.max(0,num(k.kerf,0)),cd=d+2*ko,gap=8;const cols=Math.max(1,Math.floor((area-20)/(cd+gap))),rows=Math.ceil(num(k.count)/cols);const H=Math.max(area+(showLabels?40:20),rows*(cd+gap)+(showLabels?60:40));let s=`<svg viewBox="0 0 ${area+40} ${H}" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock()}<rect x="20" y="20" width="${area}" height="${area}" fill="#fff" stroke="#b88a44" stroke-width="1.5"/>`;if(showLabels)s+=`<text class="labelText" x="20" y="15">旋鈕排版｜有效 ${area}×${area} mm</text>`;for(let i=0;i<num(k.count);i++){const c=i%cols,r=Math.floor(i/cols),cx=20+10+cd/2+c*(cd+gap),cy=34+cd/2+r*(cd+gap);if(cy+cd/2>20+area)continue;const holeR=Math.max(0.05,num(k.centerHole)/2-ko);s+=knobOutlineMarkup(k.style,cx,cy,d,k.roundness,ko)+`<circle class="cut" cx="${cx}" cy="${cy}" r="${round(holeR,3)}"/>`;if(k.nutShape==='hex')s+=`<path class="engrave" d="${polygonPath(knobPoints('hex',cx,cy,num(k.nutAcross)/Math.sqrt(3)))}"/>`;else if(k.nutShape==='round')s+=`<circle class="engrave" cx="${cx}" cy="${cy}" r="${num(k.nutAcross)/2}"/>`;}
if(showLabels)s+=`<text class="dim" x="20" y="${H-8}">外徑 ${round(d)} mm｜中心孔 ${round(k.centerHole)} mm｜補償 ${round(ko,3)} mm｜數量 ${num(k.count)}</text>`;return s+`</svg>`}

function layoutSvgLayered(){const area=num(state.drawing.effectiveArea,280),res=calcResult(),pieces=flattenPieces(res.pieces).filter(p=>p.w>0&&p.h>0);const lay=nestPieces(pieces,area);const W=area*lay.boards+20*(lay.boards+1),H=area+24;let guide='',cut='',engrave='';for(let b=1;b<=lay.boards;b++){const ox=20+(b-1)*(area+20);guide+=`<rect class="guide" x="${ox}" y="20" width="${area}" height="${area}"/>`;lay.placed.filter(p=>p.board===b).forEach(p=>{cut+=pieceCutMarkup(p,ox);});}return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock('layered')}<g id="GUIDE_GRAY">${guide}</g><g id="CUT_RED">${cut}</g><g id="ENGRAVE_BLACK">${engrave}</g></svg>`}
function knobBatchSvgLayered(){const area=num(state.drawing.effectiveArea,280),k=state.knob,d=num(k.outerDiameter),ko=Math.max(0,num(k.kerf,0)),cd=d+2*ko,gap=8;const cols=Math.max(1,Math.floor((area-20)/(cd+gap))),rows=Math.ceil(num(k.count)/cols);const H=Math.max(area+20,rows*(cd+gap)+40);let guide=`<rect class="guide" x="20" y="20" width="${area}" height="${area}"/>`,cut='',engrave='';for(let i=0;i<num(k.count);i++){const c=i%cols,r=Math.floor(i/cols),cx=20+10+cd/2+c*(cd+gap),cy=34+cd/2+r*(cd+gap);if(cy+cd/2>20+area)continue;const holeR=Math.max(0.05,num(k.centerHole)/2-ko);cut+=knobOutlineMarkup(k.style,cx,cy,d,k.roundness,ko)+`<circle class="cut" cx="${cx}" cy="${cy}" r="${round(holeR,3)}"/>`;if(k.nutShape==='hex')engrave+=`<path class="engrave" d="${polygonPath(knobPoints('hex',cx,cy,num(k.nutAcross)/Math.sqrt(3)))}"/>`;else if(k.nutShape==='round')engrave+=`<circle class="engrave" cx="${cx}" cy="${cy}" r="${num(k.nutAcross)/2}"/>`;}
return `<svg viewBox="0 0 ${area+40} ${H}" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock('layered')}<g id="GUIDE_GRAY">${guide}</g><g id="CUT_RED">${cut}</g><g id="ENGRAVE_BLACK">${engrave}</g></svg>`}

function laserKerfPresetHtml(){return `<div class="notice" style="margin-bottom:12px"><strong>你的 10W 藍光實測切縫預設</strong><br>測試方式：LightBurn｜20 mm 方塊 × 10 個｜切口偏移 0<br>實測總長：98.7～98.8 mm（理想 100 mm）<br>推算切縫寬：約 0.12～0.13 mm<br>建議軟體切口偏移補償：0.06～0.065 mm<br>目前 App 預設補償值：0.065 mm</div><div class="btn-row"><button class="primary" data-action="apply-kerf-preset">套用實測切縫預設</button></div>`}

function renderMore(){return `${fold('more-diagram','施工圖三視圖','正視圖、側視圖、俯視圖與尺寸標註。',`<div class="svg-box">${diagramSvg()}</div>`,true)}${fold('more-params','10W 藍光參數','已加入你的 20 mm × 10 方塊切縫實測資料，可一鍵套用到盒子與旋鈕補償。',`${laserKerfPresetHtml()}<div class="grid">${textArea('params.ply3','3mm 膠合板參考')}${textArea('params.ply5','5mm 膠合板參考')}${textArea('params.kerf','切縫補償備註')}${textArea('params.kerfTest','實測數據紀錄')}</div>`,false)}${fold('more-backup','JSON 備份 / 還原','v12.00 使用新的 localStorage key，不直接吃 v11 舊資料。',`<div class="btn-row"><button class="primary" data-action="download-json">匯出 JSON</button><label class="file-btn">匯入 JSON<input type="file" id="jsonFile" accept="application/json" hidden></label><button class="secondary danger" data-action="clear-v12">清除 v12 資料</button></div><textarea id="jsonText" readonly>${esc(JSON.stringify(state,null,2))}</textarea>`,false)}${fold('more-about','關於 v12.10','第一階段不含紙盒刀模、照片庫、DXF / PNG；本版新增 LightBurn 友善分層 SVG。',`<ul class="notice-list"><li>v12.00：木工板材核心乾淨骨架。</li><li>v12.01：補回 SVG 一致性與旋鈕圓滑調整。</li><li>v12.02：補上盒子榫卯接合圖紙對應。</li><li>v12.03：補上底板榫卯，新增乾淨無字 SVG 下載。</li><li>v12.04：修正首頁模板字串錯誤造成的啟動空白。</li><li>v12.05：圓滑度改為滑動條。</li><li>v12.06：圓滑度滑動時同步刷新旋鈕預覽。</li><li>v12.07：圖紙預覽版升級板件寬高尺寸標註，乾淨 SVG 保持無字。</li><li>v12.08：加入 10W 藍光實測切縫預設，切口偏移補償建議 0.06～0.065 mm。</li><li>v12.09：切縫補償正式套用到 SVG 幾何；外輪廓向外補償，中心孔向內補償。</li><li>v12.10：新增分層 SVG，可輸出 CUT_RED / GUIDE_GRAY / ENGRAVE_BLACK 給 LightBurn 使用。</li><li>v12.20：可規劃照片庫與正式 App 本機照片架構。</li></ul>`,false)}`}
function diagramSvg(){const res=calcResult(),f=state.calc,W=num(f.width),D=num(f.depth),H=num(f.height);const vw=760,vh=280;const scale=Math.min(180/Math.max(W,D,1),180/Math.max(H,1));const fw=W*scale,fh=H*scale,sd=D*scale,tw=W*scale,td=D*scale;let s=`<svg viewBox="0 0 ${vw} ${vh}" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock()}<rect x="1" y="1" width="${vw-2}" height="${vh-2}" fill="#fff" stroke="#eadcc2"/>`;s+=viewBlock(40,50,fw,fh,'正視圖',`${W}×${H}`);s+=viewBlock(290,50,sd,fh,'側視圖',`${D}×${H}`);s+=viewBlock(520,70,tw,td,'俯視圖',`${W}×${D}`);s+=`<text class="labelText" x="40" y="250">${esc(res.name)}｜板件 ${res.pieces.reduce((a,p)=>a+p.qty,0)} 件｜施工前請確認實際板厚。</text></svg>`;return s}

function viewBlock(x,y,w,h,title,dim){w=Math.max(20,w);h=Math.max(20,h);return `<text class="labelText" x="${x}" y="${y-10}">${title}</text><rect class="cut" x="${x}" y="${y}" width="${w}" height="${h}"/><line class="dimLine" x1="${x}" y1="${y+h+8}" x2="${x+w}" y2="${y+h+8}"/><line class="dimTick" x1="${x}" y1="${y+h+5}" x2="${x}" y2="${y+h+11}"/><line class="dimTick" x1="${x+w}" y1="${y+h+5}" x2="${x+w}" y2="${y+h+11}"/><line class="dimLine" x1="${x+w+8}" y1="${y}" x2="${x+w+8}" y2="${y+h}"/><line class="dimTick" x1="${x+w+5}" y1="${y}" x2="${x+w+11}" y2="${y}"/><line class="dimTick" x1="${x+w+5}" y1="${y+h}" x2="${x+w+11}" y2="${y+h}"/><text class="dim" x="${x}" y="${y+h+22}">${dim} mm</text>`}
function render(){renderNav();const view=$('view');if(state.page==='calc')view.innerHTML=renderCalc();else if(state.page==='knob')view.innerHTML=renderKnob();else if(state.page==='drawing')view.innerHTML=renderDrawing();else if(state.page==='more')view.innerHTML=renderMore();else view.innerHTML=renderHome();bindFolds();bindInputs();bindActions();}
function bindActions(){document.querySelectorAll('[data-calc-type]').forEach(btn=>btn.onclick=()=>{state.calc.type=btn.dataset.calcType;save('製作類型已更新');render();});document.querySelectorAll('[data-knob-style]').forEach(btn=>btn.onclick=()=>{state.knob.style=btn.dataset.knobStyle;save('旋鈕樣式已更新');render();});document.querySelectorAll('[data-knob-template]').forEach(btn=>btn.onclick=()=>{state.knob.template=btn.dataset.knobTemplate;applyTemplateIfNeeded('knob.template');save('規格模板已套用');render();});document.querySelectorAll('[data-drawing-source]').forEach(btn=>btn.onclick=()=>{state.drawing.source=btn.dataset.drawingSource;save('圖紙來源已更新');render();});document.querySelectorAll('[data-action]').forEach(btn=>btn.onclick=()=>handleAction(btn.dataset.action,btn));const file=$('jsonFile');if(file)file.onchange=importJson;}

function handleAction(action,btn){if(action==='quick-calc'){state.calc.type=btn.dataset.type;setPage('calc',true);return}if(action==='quick-page'){setPage(btn.dataset.page,true);return}if(action==='save-calc'){save('計算設定已儲存');return}if(action==='apply-drawing-calc'){state.drawing.source='calc';setPage('drawing',true);return}if(action==='apply-drawing-knob'){state.drawing.source='knob';setPage('drawing',true);return}if(action==='refresh-knob-preview'){updateKnobPreview(false);save('旋鈕預覽已套用');return}if(action==='apply-kerf-preset'){state.calc.kerf=0.065;state.knob.kerf=0.065;state.params.kerf='10W 藍光實測：LightBurn 以 20 mm 為基礎製作 10 個獨立方塊，切口偏移設 0；實測總長 98.7～98.8 mm，推算切縫寬約 0.12～0.13 mm；建議軟體切口偏移補償 0.06～0.065 mm。App 內預設採 0.065 mm。';state.params.kerfTest='LightBurn｜20 mm 方塊 × 10 個｜切口偏移 0｜實測總長 98.7～98.8 mm｜推算切縫 0.12～0.13 mm｜補償值 0.06～0.065 mm。';save('已套用 10W 藍光實測切縫預設 0.065 mm');render();return}if(action==='download-current-svg'){downloadText('mokkou_v12_10_drawing_preview.svg',state.drawing.source==='knob'?knobBatchSvg({labels:true}):layoutSvg({labels:true,notes:true}),'image/svg+xml');return}if(action==='download-current-svg-clean'){downloadText('mokkou_v12_10_drawing_clean.svg',state.drawing.source==='knob'?knobBatchSvg({labels:false}):layoutSvg({labels:false,notes:false}),'image/svg+xml');return}if(action==='download-current-svg-layered'){downloadText('mokkou_v12_10_drawing_layered.svg',state.drawing.source==='knob'?knobBatchSvgLayered():layoutSvgLayered(),'image/svg+xml');return}if(action==='download-knob-svg'){downloadText('mokkou_v12_10_knob.svg',knobSvgPreview(),'image/svg+xml');return}if(action==='download-json'){downloadText('mokkou_v12_10_backup.json',JSON.stringify(state,null,2),'application/json');return}if(action==='reset-calc'){state.calc=structuredClone(defaults.calc);save('已恢復預設尺寸');render();return}if(action==='clear-v12'){if(confirm('確定清除 v12 本機資料？')){localStorage.removeItem(STORE);state=loadState();save('已清除 v12 資料');render();}}}
function downloadText(name,text,mime){const blob=new Blob([text],{type:mime+';charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);save('已產生下載檔')}
function importJson(e){const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);state=deepMerge(defaults,data);save('JSON 已匯入');render();}catch(err){alert('JSON 匯入失敗：'+err.message)}};reader.readAsText(file,'utf-8')}
$('topBtn').onclick=()=>window.scrollTo(0,0);
render();save('已就緒');
})();
</script>
</body>
