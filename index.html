function galleryCard(x){const open=localStorage.getItem(GALLERY_EXPANDED)===x.id;const tags=[x.category,x.material,x.thickness?`${x.thickness} mm`:'',x.power?`功率 ${x.power}%`:'',x.speed?`速度 ${x.speed}`:'',x.status].filter(Boolean).map(v=>`<span class="laserdb-tag">${esc(v)}</span>`).join('');return `<div class="v73-gallery-card" data-gallery-id="${esc(x.id)}"><img class="v73-gallery-img" src="${esc(x.image)}" alt="${esc(x.title)}"><div class="v73-gallery-title">${esc(x.title||'未命名照片')}</div><div class="v73-gallery-meta">${tags}</div><div class="small">日期：${esc(x.date||'—')}</div><div class="btn-row"><button class="secondary" type="button" data-toggle-gallery="${esc(x.id)}">${open?'收合':'展開'}</button><button class="secondary" type="button" data-edit-gallery="${esc(x.id)}">編輯</button><button class="secondary laserdb-danger" type="button" data-del-gallery="${esc(x.id)}">刪除</button></div>${open?`<div class="v73-gallery-note">${esc(x.note||'未填寫備註')}</div><div class="btn-row"><button class="primary" type="button" data-gallery-to-laser="${esc(x.id)}">用照片資料建立參數草稿</button><button class="secondary" type="button" data-gallery-apply-calc="${esc(x.id)}">套用數值到計算頁</button></div>`:''}</div>`}
function renderGallery(){const lib=getGalleryLib();const items=galleryFilterItems();const cats=galleryCategories();const materials=[...new Set((lib.items||[]).map(x=>x.material).filter(Boolean))];const f=localStorage.getItem(GALLERY_FILTER)||'all';const filter=`<div class="laserdb-filter-grid"><label><div class="label">篩選</div><select id="galleryFilter"><option value="all">全部</option>${cats.map(c=>`<option value="${esc(c)}" ${f===c?'selected':''}>${esc(c)}</option>`).join('')}${materials.map(m=>`<option value="${esc(m)}" ${f===m?'selected':''}>材料：${esc(m)}</option>`).join('')}</select></label><label><div class="label">目前照片</div><input readonly value="${items.length} / ${(lib.items||[]).length} 張"></label></div>`;const form=`<input type="hidden" id="galleryEditId"><div class="btn-row" style="margin-top:0;margin-bottom:12px"><button class="primary" type="button" id="galleryFromTest">帶入測試片設定</button><button class="secondary" type="button" id="galleryClearForm">清空輸入</button></div><div class="v73-photo-form"><label><div class="label">照片標題</div><input id="galleryTitle" placeholder="例：3mm 合板 80% 180mm 成功"></label><label><div class="label">分類</div><select id="galleryCategory">${cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select></label><label><div class="label">日期</div><input id="galleryDate" type="date" value="${new Date().toISOString().slice(0,10)}"></label><label><div class="label">材料</div><input id="galleryMaterial" placeholder="例：椴木合板"></label><label><div class="label">厚度 mm</div><input id="galleryThickness" type="number" step="0.1"></label><label><div class="label">狀態</div><select id="galleryStatus"><option>成功</option><option>可用</option><option>待判斷</option><option>焦黑</option><option>未切穿</option><option>失敗</option></select></label><label><div class="label">功率 %</div><input id="galleryPower" type="number"></label><label><div class="label">速度</div><input id="gallerySpeed" type="number"></label><label><div class="label">刀數</div><input id="galleryPasses" type="number"></label><label class="full"><div class="label">選擇照片 <span class="hint">會壓縮後存在本機 localStorage</span></div><input id="galleryFile" type="file" accept="image/*"><img id="galleryPreview" class="v73-photo-preview" alt="preview"></label><label class="full"><div class="label">備註</div><textarea id="galleryNote" placeholder="記錄背面、焦黑、邊緣、是否切穿、當天材料來源。"></textarea></label></div><div class="btn-row"><button class="primary" type="button" id="galleryAdd">新增照片紀錄</button><button class="secondary" type="button" id="galleryUpdate">更新照片紀錄</button><button class="secondary laserdb-danger" type="button" id="galleryDeleteCurrent">刪除目前照片</button></div><div class="v73-small-warn">注意：照片會存在這台手機瀏覽器裡。大量照片會占用 localStorage，建議只放測試結果代表照片，並定期備份 JSON。</div>`;const list=items.length?`<div class="v73-gallery-grid">${items.map(galleryCard).join('')}</div>`:`<div class="laserdb-empty">目前沒有照片。測試完拍照後，在上方新增照片紀錄，下次可直接回來對照。</div>`;return `<section class="card"><div class="view-title"><div><h2>雷射測試圖庫</h2><div class="small">把測試片、切割結果、焦黑背面、榫卯鬆緊拍照保存。下次做同材料時可直接查看照片對照。</div></div><span class="badge">${(lib.items||[]).length} 張</span></div><div class="muted-box">建議每次測試保存：正面、背面、最成功格、最失敗格。照片會壓縮成 JPG 後存在本機。</div></section><section class="card"><h2>篩選</h2>${filter}</section><section class="card"><h2>新增 / 編輯照片紀錄</h2>${form}</section><section class="card"><h2>照片目錄</h2>${list}</section>`}
function bindGallery(){const lib=getGalleryLib();const filter=$('galleryFilter');if(filter)filter.onchange=()=>{localStorage.setItem(GALLERY_FILTER,filter.value);render()};const file=$('galleryFile');if(file)file.onchange=async()=>{const f=file.files&&file.files[0];if(!f)return;try{const data=await imageToDataUrl(f,1200,.72);localStorage.setItem('mokkou_gallery_pending_image',data);const prev=$('galleryPreview');if(prev){prev.src=data;prev.style.display='block'}toast('照片已壓縮載入，按新增或更新保存')}catch(e){alert('照片讀取失敗：'+(e.message||e))}};const from=$('galleryFromTest');if(from)from.onclick=()=>{fillGalleryForm(currentGalleryDraft());toast('已帶入目前測試片設定')};const clear=$('galleryClearForm');if(clear)clear.onclick=()=>fillGalleryForm(currentGalleryDraft());const add=$('galleryAdd');if(add)add.onclick=()=>{const data=readGalleryForm(true);if(!data)return;lib.items.push(data);localStorage.setItem(GALLERY_EXPANDED,data.id);putGalleryLib(lib,'新增照片紀錄');localStorage.removeItem('mokkou_gallery_pending_image');render()};const upd=$('galleryUpdate');if(upd)upd.onclick=()=>{const data=readGalleryForm(false);if(!data)return;const idx=lib.items.findIndex(x=>x.id===data.id);if(idx<0){toast('尚未選擇要更新的照片');return}lib.items[idx]=data;putGalleryLib(lib,'照片紀錄已更新');localStorage.removeItem('mokkou_gallery_pending_image');render()};const delCur=$('galleryDeleteCurrent');if(delCur)delCur.onclick=()=>{const id=($('galleryEditId')||{}).value;if(!id){toast('尚未選擇要刪除的照片');return}if(confirm('刪除目前照片紀錄？')){lib.items=lib.items.filter(x=>x.id!==id);putGalleryLib(lib,'照片已刪除');render()}};document.querySelectorAll('[data-toggle-gallery]').forEach(btn=>btn.onclick=()=>{const id=btn.dataset.toggleGallery;localStorage.setItem(GALLERY_EXPANDED,localStorage.getItem(GALLERY_EXPANDED)===id?'':id);render()});document.querySelectorAll('[data-edit-gallery]').forEach(btn=>btn.onclick=()=>{const x=(lib.items||[]).find(i=>i.id===btn.dataset.editGallery);if(x){fillGalleryForm(x);window.scrollTo({top:0,behavior:'smooth'})}});document.querySelectorAll('[data-del-gallery]').forEach(btn=>btn.onclick=()=>{const x=(lib.items||[]).find(i=>i.id===btn.dataset.delGallery);if(x&&confirm(`刪除照片「${x.title||'未命名'}」？`)){lib.items=lib.items.filter(i=>i.id!==x.id);putGalleryLib(lib,'照片已刪除');render()}});document.querySelectorAll('[data-gallery-apply-calc]').forEach(btn=>btn.onclick=()=>{const x=(lib.items||[]).find(i=>i.id===btn.dataset.galleryApplyCalc);if(!x)return;state.form.materialThickness=n(x.thickness,state.form.materialThickness);state.form.laserPower=n(x.power,state.form.laserPower);state.form.laserSpeed=n(x.speed,state.form.laserSpeed);state.form.laserPasses=n(x.passes,state.form.laserPasses);save('已套用照片數值');activeTab='calc';localStorage.setItem(TAB,activeTab);render();window.scrollTo({top:0,behavior:'smooth'})});document.querySelectorAll('[data-gallery-to-laser]').forEach(btn=>btn.onclick=()=>{const x=(lib.items||[]).find(i=>i.id===btn.dataset.galleryToLaser);if(!x)return;activeTab='laserdb';localStorage.setItem(TAB,activeTab);setLaserSectionOpen('form',true);render();setTimeout(()=>fillLaserForm({id:'',name:x.title,material:x.material,thickness:x.thickness,operation:x.category&&x.category.includes('雕')?'雕刻':'切割',machine:'10W 藍光雷射',power:x.power,speed:x.speed,passes:x.passes,airAssist:'1',date:x.date,status:x.status==='成功'||x.status==='可用'?'可用':'測試中',source:'圖庫照片',result:x.status,note:x.note}),80)})}
function v73LayerPresets(){return [{id:'lightburn',title:'LightBurn / 通用顏色分層',items:['紅色 CUT_RED：Line / Cut，設定切割功率與速度','藍色 HOLE_BLUE：孔位切割，可用同切割或較低速','黑色 ENGRAVE_BLACK：Fill / Engrave，只做標註或淺雕','匯入後確認尺寸單位 mm，先用框線預覽走位']},{id:'lasergrbl',title:'LaserGRBL / GRBL 類',items:['先用 Inkscape 或雷射軟體分色匯入','紅線先跑外框切割，黑色文字可改低功率雕刻','孔位可單獨一層，避免跟外框混在一起','請確認 S 值範圍與機台韌體一致']},{id:'xtool',title:'xTool Creative Space 類',items:['依顏色分物件處理：紅線切割、藍線孔位、黑色雕刻','確認單位不要被縮放','若文字標註不想加工，匯入後關閉黑色層','正式切割前先跑框線']},{id:'generic',title:'其它軟體保守設定',items:['先只開紅色切割外框測尺寸','孔位確認後再開藍色層','標註文字通常不建議正式雕在板件上','每個顏色都要人工指定功率、速度、刀數']}]} 
function renderLayerPresetSection(){return `<div class="muted-box">SVG / DXF 只負責分層與標註，不能直接把功率速度寫入所有雷射軟體。以下是匯入後的操作提示。</div><div class="v73-layer-grid">${v73LayerPresets().map(p=>`<div class="v73-layer-card"><div class="v73-layer-title">${esc(p.title)}</div><ul class="v73-layer-list">${p.items.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><div class="btn-row"><button class="secondary" type="button" data-layer-copy="${esc(p.id)}">複製提示</button></div></div>`).join('')}</div>`}
function bindLayerPresetButtons(){document.querySelectorAll('[data-layer-copy]').forEach(btn=>btn.onclick=()=>{const p=v73LayerPresets().find(x=>x.id===btn.dataset.layerCopy);if(!p)return;const text=p.title+'\n'+p.items.map(x=>'- '+x).join('\n');if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>toast('已複製分層提示')).catch(()=>toast('可手動複製'));else toast('此瀏覽器不支援自動複製')})}
function fingerTestDefaults(){return {material:'椴木合板',thickness:n(state.form.materialThickness,3),boardW:180,boardH:120,finger:18,kerfs:'0.10,0.15,0.20,0.25',tightness:'-0.10,0,0.10,0.20',label:'1'}}
function getFingerTest(){try{return {...fingerTestDefaults(),...(JSON.parse(localStorage.getItem(FINGER_TEST_STORE)||'{}')||{})}}catch(e){return fingerTestDefaults()}}
function putFingerTest(v){localStorage.setItem(FINGER_TEST_STORE,JSON.stringify(v))}
function readFingerTest(){return {material:($('fingerMaterial')||{}).value||'椴木合板',thickness:n(($('fingerThickness')||{}).value,3),boardW:n(($('fingerBoardW')||{}).value,180),boardH:n(($('fingerBoardH')||{}).value,120),finger:n(($('fingerSize')||{}).value,18),kerfs:(($('fingerKerfs')||{}).value||'0.10,0.15,0.20'),tightness:(($('fingerTightness')||{}).value||'-0.10,0,0.10'),label:(($('fingerLabel')||{}).value||'1')}}
function numsFromCsv(s){return String(s||'').split(',').map(x=>Number(x.trim())).filter(Number.isFinite)}
function fingerTestSvg(v){const kerfs=numsFromCsv(v.kerfs);const fits=numsFromCsv(v.tightness);const cols=Math.max(1,kerfs.length),rows=Math.max(1,fits.length);const cellW=44,cellH=34,margin=12;const W=Math.max(n(v.boardW,180),margin*2+cols*cellW);const H=Math.max(n(v.boardH,120),margin*2+rows*cellH+18);let g='';for(let r0=0;r0<rows;r0++){for(let c0=0;c0<cols;c0++){const x=margin+c0*cellW,y=margin+18+r0*cellH;const k=kerfs[c0],fit=fits[r0];const slot=Math.max(3,n(v.thickness,3)+fit);g+=`<g><rect x="${x}" y="${y}" width="32" height="22" fill="none" stroke="#f00" stroke-width="0.12"/><rect x="${x+10}" y="${y+2}" width="${slot}" height="18" fill="none" stroke="#00f" stroke-width="0.12"/><path d="M ${x+34} ${y} h 8 v 7 h ${n(v.thickness,3)+fit} v 8 h -${n(v.thickness,3)+fit} v 7 h -8 z" fill="none" stroke="#f00" stroke-width="0.12"/>${String(v.label)==='1'?`<text x="${x}" y="${y-2}" font-size="3.2" fill="#111">K${k} / F${fit}</text>`:''}</g>`}}const style=`<style>.cut{stroke:#f00;fill:none;stroke-width:.12;vector-effect:non-scaling-stroke}.hole{stroke:#00f;fill:none;stroke-width:.12;vector-effect:non-scaling-stroke}text{font-family:Arial,sans-serif}</style>`;return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}mm" height="${H}mm" viewBox="0 0 ${W} ${H}">${style}<rect x="0" y="0" width="${W}" height="${H}" fill="white"/><text x="${margin}" y="10" font-size="4">榫卯鬆緊測試｜${esc(v.material)} ${esc(v.thickness)}mm｜紅=切割 藍=插槽參考</text>${g}</svg>`}
function fingerTestCsv(v){const kerfs=numsFromCsv(v.kerfs),fits=numsFromCsv(v.tightness);let rows=['material,thickness,kerf,tightness_note'];fits.forEach(f=>kerfs.forEach(k=>rows.push([v.material,v.thickness,k,f].join(','))));return rows.join('\n')}
function renderFingerTestGenerator(){const v=getFingerTest();return `<div class="muted-box">用來測榫卯鬆緊與切縫補償。建議同一種板材先切這個小測試片，再正式切盒子。</div><div class="laser-test-head-actions"><button class="primary" type="button" id="fingerDownloadSvg">下載榫卯測試 SVG</button><button class="secondary" type="button" id="fingerDownloadCsv">下載 CSV</button></div><div class="laser-test-mini"><button type="button" data-finger-preset="ply3">3mm 合板</button><button type="button" data-finger-preset="ply5">5mm 合板</button><button type="button" data-finger-preset="fromCalc">帶入計算頁</button></div><div class="laser-test-grid"><label><div class="label">材料</div><input id="fingerMaterial" value="${esc(v.material)}"></label><label><div class="label">板厚 mm</div><input id="fingerThickness" type="number" step="0.1" value="${esc(v.thickness)}"></label><label><div class="label">榫齒目標 mm</div><input id="fingerSize" type="number" value="${esc(v.finger)}"></label><label><div class="label">板面寬 mm</div><input id="fingerBoardW" type="number" value="${esc(v.boardW)}"></label><label><div class="label">板面高 mm</div><input id="fingerBoardH" type="number" value="${esc(v.boardH)}"></label><label><div class="label">標籤</div><select id="fingerLabel"><option value="1" ${String(v.label)==='1'?'selected':''}>顯示</option><option value="0" ${String(v.label)==='0'?'selected':''}>隱藏</option></select></label><label class="full"><div class="label">切縫補償測試值</div><input id="fingerKerfs" value="${esc(v.kerfs)}" placeholder="0.10,0.15,0.20"></label><label class="full"><div class="label">鬆緊測試值</div><input id="fingerTightness" value="${esc(v.tightness)}" placeholder="-0.10,0,0.10,0.20"></label></div><div class="laser-test-actions"><button class="primary" type="button" id="fingerRefresh">更新預覽</button><button class="secondary" type="button" id="fingerApplyKerf">把中間值套到計算頁切縫</button><button class="secondary" type="button" data-go-tab="gallery">去圖庫記錄照片</button></div><div class="v73-finger-preview" id="fingerPreview">${fingerTestSvg(v)}</div>`}
function bindFingerTestGenerator(){const ids=['fingerMaterial','fingerThickness','fingerSize','fingerBoardW','fingerBoardH','fingerLabel','fingerKerfs','fingerTightness'];const refresh=()=>{const v=readFingerTest();putFingerTest(v);const p=$('fingerPreview');if(p)p.innerHTML=fingerTestSvg(v)};ids.forEach(id=>{const el=$(id);if(el){el.oninput=refresh;el.onchange=refresh}});const r=$('fingerRefresh');if(r)r.onclick=refresh;const dl=$('fingerDownloadSvg');if(dl)dl.onclick=()=>{const v=readFingerTest();download(new Blob([fingerTestSvg(v)],{type:'image/svg+xml'}),`finger-fit-test-${Date.now()}.svg`)};const csv=$('fingerDownloadCsv');if(csv)csv.onclick=()=>{const v=readFingerTest();download(new Blob([fingerTestCsv(v)],{type:'text/csv;charset=utf-8'}),`finger-fit-test-${Date.now()}.csv`)};const apply=$('fingerApplyKerf');if(apply)apply.onclick=()=>{const v=readFingerTest();const ks=numsFromCsv(v.kerfs);if(ks.length){state.form.boxKerf=ks[Math.floor(ks.length/2)];save('已套用榫卯切縫');toast('已套用中間切縫值到計算頁')}};document.querySelectorAll('[data-finger-preset]').forEach(btn=>btn.onclick=()=>{let v=getFingerTest();if(btn.dataset.fingerPreset==='ply3')v={...v,material:'椴木合板',thickness:3,finger:18,kerfs:'0.10,0.15,0.20,0.25',tightness:'-0.10,0,0.10,0.20'};if(btn.dataset.fingerPreset==='ply5')v={...v,material:'椴木合板',thickness:5,finger:20,kerfs:'0.12,0.18,0.24,0.30',tightness:'-0.15,0,0.15,0.30'};if(btn.dataset.fingerPreset==='fromCalc')v={...v,material:v.material||'椴木合板',thickness:n(state.form.materialThickness,3),finger:n(state.form.boxFingerSize,18),kerfs:`${Math.max(0,n(state.form.boxKerf,.15)-.05).toFixed(2)},${n(state.form.boxKerf,.15).toFixed(2)},${(n(state.form.boxKerf,.15)+.05).toFixed(2)}`};putFingerTest(v);render()})}

function uniqueSorted(arr){return [...new Set(arr.filter(v=>String(v||'').trim()).map(v=>String(v).trim()))].sort((a,b)=>a.localeCompare(b,'zh-Hant'))}
function v74Includes(hay,needle){return String(hay||'').toLowerCase().includes(String(needle||'').toLowerCase())}
function v74GalleryFilters(){return {category:localStorage.getItem(GALLERY_FILTER)||'all',material:localStorage.getItem(GALLERY_MATERIAL_V74)||'all',thickness:localStorage.getItem(GALLERY_THICKNESS_V74)||'all',status:localStorage.getItem(GALLERY_STATUS_V74)||'all',sort:localStorage.getItem(GALLERY_SORT_V74)||'date_desc',search:localStorage.getItem(GALLERY_SEARCH_V74)||''}}

galleryFilterItems=function(){const lib=getGalleryLib();const f=v74GalleryFilters();let items=[...(lib.items||[])];if(f.category!=='all')items=items.filter(x=>String(x.category||'')===f.category);if(f.material!=='all')items=items.filter(x=>String(x.material||'')===f.material);if(f.thickness!=='all')items=items.filter(x=>String(x.thickness||'')===f.thickness);if(f.status!=='all')items=items.filter(x=>String(x.status||'')===f.status);if(f.search.trim()){const q=f.search.trim();items=items.filter(x=>[x.title,x.category,x.material,x.thickness,x.status,x.power,x.speed,x.note].some(v=>v74Includes(v,q)))}const num=(x,k)=>Number(x[k]||0);const date=(x)=>String(x.date||x.createdAt||'');items.sort((a,b)=>{if(f.sort==='date_asc')return date(a).localeCompare(date(b));if(f.sort==='power_asc')return num(a,'power')-num(b,'power');if(f.sort==='power_desc')return num(b,'power')-num(a,'power');if(f.sort==='speed_asc')return num(a,'speed')-num(b,'speed');if(f.sort==='speed_desc')return num(b,'speed')-num(a,'speed');if(f.sort==='material')return String(a.material||'').localeCompare(String(b.material||''),'zh-Hant')||num(a,'thickness')-num(b,'thickness');if(f.sort==='status')return String(a.status||'').localeCompare(String(b.status||''),'zh-Hant');return date(b).localeCompare(date(a))});return items}

galleryCard=function(x){const open=localStorage.getItem(GALLERY_EXPANDED)===x.id;const tags=['category','material','thickness','power','speed','passes','status'].map(k=>x[k]?`<span class="pill">${k==='thickness'?esc(x[k])+' mm':k==='power'?'功率 '+esc(x[k])+'%':k==='speed'?'速度 '+esc(x[k]):k==='passes'?esc(x[k])+' 刀':esc(x[k])}</span>`:'').join('');return `<div class="v73-gallery-card"><button class="v74-gallery-img-btn" type="button" data-gallery-zoom="${esc(x.id)}" aria-label="放大照片"><img class="v73-gallery-img" src="${esc(x.image)}" alt="${esc(x.title)}"></button><div class="v73-gallery-title">${esc(x.title||'未命名照片')}</div><div class="v73-gallery-meta">${tags}</div><div class="small">日期：${esc(x.date||'—')}｜點照片可放大縮小</div><div class="btn-row"><button class="primary" type="button" data-gallery-zoom="${esc(x.id)}">查看照片</button><button class="secondary" type="button" data-toggle-gallery="${esc(x.id)}">${open?'收合':'展開'}</button><button class="secondary" type="button" data-edit-gallery="${esc(x.id)}">編輯</button><button class="secondary laserdb-danger" type="button" data-del-gallery="${esc(x.id)}">刪除</button></div>${open?`<div class="v73-gallery-note">${esc(x.note||'未填寫備註')}</div><div class="btn-row"><button class="primary" type="button" data-gallery-to-laser="${esc(x.id)}">用照片資料建立參數草稿</button><button class="secondary" type="button" data-gallery-apply-calc="${esc(x.id)}">套用數值到計算頁</button></div>`:''}</div>`}

function openGalleryZoom(id){const x=(getGalleryLib().items||[]).find(i=>i.id===id);if(!x)return;galleryZoomScale=1;const modal=$('galleryZoomModal'),img=$('galleryZoomImg');if(!modal||!img)return;img.src=x.image;img.style.transform='scale(1)';$('galleryZoomTitle').textContent=x.title||'未命名照片';$('galleryZoomMeta').textContent=`${x.material||'材料未填'}｜${x.thickness||'—'} mm｜功率 ${x.power||'—'}%｜速度 ${x.speed||'—'}｜${x.status||'未分類'}`;modal.classList.add('show')}
function setGalleryZoom(delta,reset=false){const img=$('galleryZoomImg');if(!img)return;if(reset)galleryZoomScale=1;else galleryZoomScale=Math.max(.5,Math.min(5,galleryZoomScale+delta));img.style.transform=`scale(${galleryZoomScale})`;const btn=$('galleryZoomReset');if(btn)btn.textContent=Math.round(galleryZoomScale*100)+'%'}
function bindGalleryZoom(){document.querySelectorAll('[data-gallery-zoom]').forEach(btn=>btn.onclick=()=>openGalleryZoom(btn.dataset.galleryZoom));const close=()=>{const m=$('galleryZoomModal');if(m)m.classList.remove('show')};const c=$('galleryZoomClose');if(c)c.onclick=close;const m=$('galleryZoomModal');if(m)m.onclick=(e)=>{if(e.target===m)close()};const zi=$('galleryZoomIn');if(zi)zi.onclick=()=>setGalleryZoom(.25);const zo=$('galleryZoomOut');if(zo)zo.onclick=()=>setGalleryZoom(-.25);const zr=$('galleryZoomReset');if(zr)zr.onclick=()=>setGalleryZoom(0,true);const body=$('galleryZoomBody');if(body)body.onwheel=(e)=>{if(!e.ctrlKey)return;e.preventDefault();setGalleryZoom(e.deltaY<0?.2:-.2)}}

renderGallery=function(){const lib=getGalleryLib();const items=galleryFilterItems();const all=lib.items||[];const cats=galleryCategories();const f=v74GalleryFilters();const materials=uniqueSorted(all.map(x=>x.material));const thicknesses=uniqueSorted(all.map(x=>x.thickness));const statuses=uniqueSorted(all.map(x=>x.status));const filter=`<div class="v74-filter-grid"><label><div class="label">分類</div><select id="galleryFilter"><option value="all">全部分類</option>${cats.map(c=>`<option value="${esc(c)}" ${f.category===c?'selected':''}>${esc(c)}</option>`).join('')}</select></label><label><div class="label">材料</div><select id="galleryMaterialFilter"><option value="all">全部材料</option>${materials.map(m=>`<option value="${esc(m)}" ${f.material===m?'selected':''}>${esc(m)}</option>`).join('')}</select></label><label><div class="label">厚度</div><select id="galleryThicknessFilter"><option value="all">全部厚度</option>${thicknesses.map(t=>`<option value="${esc(t)}" ${f.thickness===t?'selected':''}>${esc(t)} mm</option>`).join('')}</select></label><label><div class="label">狀態</div><select id="galleryStatusFilter"><option value="all">全部狀態</option>${statuses.map(s=>`<option value="${esc(s)}" ${f.status===s?'selected':''}>${esc(s)}</option>`).join('')}</select></label><label><div class="label">排序</div><select id="gallerySort"><option value="date_desc" ${f.sort==='date_desc'?'selected':''}>日期：新到舊</option><option value="date_asc" ${f.sort==='date_asc'?'selected':''}>日期：舊到新</option><option value="material" ${f.sort==='material'?'selected':''}>材料 / 厚度</option><option value="power_asc" ${f.sort==='power_asc'?'selected':''}>功率低到高</option><option value="power_desc" ${f.sort==='power_desc'?'selected':''}>功率高到低</option><option value="speed_asc" ${f.sort==='speed_asc'?'selected':''}>速度低到高</option><option value="speed_desc" ${f.sort==='speed_desc'?'selected':''}>速度高到低</option><option value="status" ${f.sort==='status'?'selected':''}>狀態</option></select></label><label><div class="label">搜尋</div><input id="gallerySearch" value="${esc(f.search)}" placeholder="材料、功率、備註"></label><label><div class="label">目前照片</div><input readonly value="${items.length} / ${all.length} 張"></label><label><div class="label">快速操作</div><button class="secondary" type="button" id="galleryClearFilters">清除篩選</button></label></div>`;const summary=`<div class="v74-chip-row"><span class="v74-chip">照片 ${all.length} 張</span><span class="v74-chip">材料 ${materials.length} 種</span><span class="v74-chip">成功 / 可用 ${all.filter(x=>['成功','可用'].includes(x.status)).length} 張</span><span class="v74-chip">可點照片放大</span></div>`;const form=`<input type="hidden" id="galleryEditId"><div class="btn-row" style="margin-top:0;margin-bottom:12px"><button class="primary" type="button" id="galleryFromTest">帶入測試片設定</button><button class="secondary" type="button" id="galleryClearForm">清空輸入</button></div><div class="v73-photo-form"><label><div class="label">照片標題</div><input id="galleryTitle" placeholder="例：3mm 合板 80% 180mm 成功"></label><label><div class="label">分類</div><select id="galleryCategory">${cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select></label><label><div class="label">日期</div><input id="galleryDate" type="date" value="${new Date().toISOString().slice(0,10)}"></label><label><div class="label">材料</div><input id="galleryMaterial" placeholder="例：椴木合板"></label><label><div class="label">厚度 mm</div><input id="galleryThickness" type="number" step="0.1"></label><label><div class="label">狀態</div><select id="galleryStatus"><option>成功</option><option>可用</option><option>待判斷</option><option>焦黑</option><option>未切穿</option><option>失敗</option><option>剛好</option><option>偏緊</option><option>偏鬆</option></select></label><label><div class="label">功率 %</div><input id="galleryPower" type="number"></label><label><div class="label">速度</div><input id="gallerySpeed" type="number"></label><label><div class="label">刀數</div><input id="galleryPasses" type="number"></label><label class="full"><div class="label">選擇照片 <span class="hint">會壓縮後存在本機 localStorage</span></div><input id="galleryFile" type="file" accept="image/*"><img id="galleryPreview" class="v73-photo-preview" alt="preview"></label><label class="full"><div class="label">備註</div><textarea id="galleryNote" placeholder="記錄背面、焦黑、邊緣、是否切穿、榫卯鬆緊、材料來源。"></textarea></label></div><div class="btn-row"><button class="primary" type="button" id="galleryAdd">新增照片紀錄</button><button class="secondary" type="button" id="galleryUpdate">更新照片紀錄</button><button class="secondary laserdb-danger" type="button" id="galleryDeleteCurrent">刪除目前照片</button></div><div class="v73-small-warn">注意：照片存在這台手機瀏覽器。照片太多會占用空間，建議定期備份 JSON。</div>`;const list=items.length?`<div class="v73-gallery-grid">${items.map(galleryCard).join('')}</div>`:`<div class="laserdb-empty">目前沒有符合條件的照片。可清除篩選，或上傳新的測試照片。</div>`;return `<section class="card"><div class="view-title"><div><h2>雷射測試圖庫 v74</h2><div class="small">照片可點擊放大縮小；可依材料、厚度、功率、速度、狀態與備註搜尋。</div></div><span class="badge">${all.length} 張</span></div>${summary}<div class="muted-box">建議保存：最成功格、焦黑失敗格、背面切穿狀況、榫卯鬆緊結果。下次用相同材料厚度時，可從參數推薦看到相關照片。</div></section><section class="card"><h2>篩選 / 排序</h2>${filter}</section><details class="card" open><summary><h2>照片目錄</h2><span class="badge">${items.length} 張</span></summary>${list}</details><details class="card"><summary><h2>新增 / 編輯照片紀錄</h2><span class="badge">上傳照片</span></summary>${form}</details>${galleryZoomModal()}`}

function recQuery(){try{return {...{material:state.form.laserMaterial||'椴木合板',thickness:state.form.materialThickness||3,operation:'切割'},...(JSON.parse(localStorage.getItem(REC_QUERY_V74)||'{}')||{})}}catch(e){return {material:'椴木合板',thickness:3,operation:'切割'}}}
function readRecQuery(){return {material:(($('recMaterial')||{}).value||'').trim()||'椴木合板',thickness:n(($('recThickness')||{}).value,state.form.materialThickness||3),operation:(($('recOperation')||{}).value||'切割')}}
function putRecQuery(q){localStorage.setItem(REC_QUERY_V74,JSON.stringify(q))}
function scoreLaserParam(p,q){let s=0;const pm=String(p.material||''), qm=String(q.material||'');if(pm===qm)s+=60;else if(pm.includes(qm)||qm.includes(pm))s+=35;const diff=Math.abs(n(p.thickness,999)-n(q.thickness,0));s+=Math.max(0,40-diff*12);if(String(p.operation||'').includes(q.operation)||String(q.operation||'').includes(p.operation||''))s+=30;if(['可用','推薦','模板'].includes(p.status))s+=18;if(String(p.source||'').includes('回填'))s+=14;if(String(p.result||'').includes('推薦等級：5'))s+=12;if(String(p.result||'').includes('切穿'))s+=8;return Math.round(s)}
function relatedGalleryForQuery(q,limit=6){return (getGalleryLib().items||[]).filter(g=>(!q.material||String(g.material||'')===String(q.material))&&(Math.abs(n(g.thickness,999)-n(q.thickness,0))<=.3)).sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))).slice(0,limit)}
function renderLaserRecommendation(){const q=recQuery();const lib=getLaserParamLib();const all=(lib.items||[]).map(p=>({...p,_score:scoreLaserParam(p,q)})).filter(p=>p._score>20).sort((a,b)=>b._score-a._score).slice(0,8);const pics=relatedGalleryForQuery(q,8);const form=`<div class="v74-filter-grid"><label><div class="label">材料</div><input id="recMaterial" value="${esc(q.material)}" placeholder="例：椴木合板"></label><label><div class="label">厚度 mm</div><input id="recThickness" type="number" step="0.1" value="${esc(q.thickness)}"></label><label><div class="label">加工</div><select id="recOperation"><option ${q.operation==='切割'?'selected':''}>切割</option><option ${q.operation==='雕刻'?'selected':''}>雕刻</option><option ${q.operation==='打標'?'selected':''}>打標</option></select></label><label><div class="label">操作</div><button class="primary" type="button" id="recRefresh">重新推薦</button></label></div><div class="btn-row"><button class="secondary" type="button" id="recFromCalc">帶入計算頁</button><button class="secondary" type="button" data-go-tab="gallery">查看相關照片</button></div>`;const cards=all.length?`<div class="v74-card-grid">${all.map(p=>`<div class="v74-rec-card"><div class="shopping-summary-line"><div><div class="laserdb-item-title">${esc(p.name||`${p.material} ${p.thickness}mm`)}</div><div class="v74-chip-row"><span class="v74-chip">分數 ${p._score}</span><span class="v74-chip">${esc(p.status||'未分類')}</span><span class="v74-chip">${esc(p.source||'自建')}</span></div></div><div class="v74-score">${p._score}</div></div><div class="laserdb-detail-grid"><div class="laserdb-detail-box"><b>材料</b>${esc(p.material)} ${esc(p.thickness)} mm</div><div class="laserdb-detail-box"><b>參數</b>${esc(p.power)}% / ${esc(p.speed)} / ${esc(p.passes)} 刀</div><div class="laserdb-detail-box"><b>結果</b>${esc(p.result||p.note||'-')}</div></div><div class="btn-row"><button class="primary" type="button" data-rec-apply="${esc(p.id)}">套用到計算頁</button><button class="secondary" type="button" data-rec-open="${esc(p.id)}"> function bindLaserRecommendation(){const refresh=()=>{const q=readRecQuery();putRecQuery(q);render()};['recMaterial','recThickness','recOperation'].forEach(id=>{const el=$(id);if(el){el.onchange=refresh}});const rr=$('recRefresh');if(rr)rr.onclick=refresh;const from=$('recFromCalc');if(from)from.onclick=()=>{putRecQuery({material:(($('recMaterial')||{}).value||'椴木合板'),thickness:state.form.materialThickness||3,operation:String(state.form.projectType)==='box'?'切割':'切割'});render()};document.querySelectorAll('[data-rec-apply]').forEach(btn=>btn.onclick=()=>{const p=(getLaserParamLib().items||[]).find(x=>x.id===btn.dataset.recApply);if(!p)return;state.form.materialThickness=n(p.thickness,state.form.materialThickness);state.form.laserPower=n(p.power,state.form.laserPower);state.form.laserSpeed=n(p.speed,state.form.laserSpeed);state.form.laserPasses=n(p.passes,state.form.laserPasses);state.form.laserAirAssist=String(p.airAssist||'1');state.form.laserNote=`推薦參數：${p.name||''}\n${p.result||''}\n${p.note||''}`;save('已套用推薦雷射參數');activeTab='calc';localStorage.setItem(TAB,activeTab);render();window.scrollTo({top:0,behavior:'smooth'})});document.querySelectorAll('[data-rec-open]').forEach(btn=>btn.onclick=()=>{localStorage.setItem(LASER_PARAM_EXPANDED,btn.dataset.recOpen);setLaserSectionOpen('list',true);render()});bindGalleryZoom()}

function getFingerFitLib(){try{const lib=JSON.parse(localStorage.getItem(FINGER_FIT_STORE)||'null');if(lib&&Array.isArray(lib.items))return lib}catch(e){}return {items:[],note:''}}

function dataUrlBytes(data){if(!data)return 0;const p=String(data).split(',')[1]||'';return Math.round((p.length*3)/4)}
function fmtBytes(bytes){const b=Math.max(0,Number(bytes)||0);if(b<1024)return b+' B';if(b<1024*1024)return (b/1024).toFixed(1)+' KB';return (b/1024/1024).toFixed(2)+' MB'}
function galleryStats(items=(getGalleryLib().items||[])){const sizes=items.map(x=>dataUrlBytes(x.image||''));return {count:items.length,total:sizes.reduce((a,b)=>a+b,0),max:Math.max(0,...sizes),avg:sizes.length?Math.round(sizes.reduce((a,b)=>a+b,0)/sizes.length):0}}
function daysAgo(iso){if(!iso)return 9999;const d=new Date(iso);if(isNaN(d))return 9999;return Math.abs((Date.now()-d.getTime())/86400000)}
async function recompressDataUrl(dataUrl,maxW=1280,quality=.72){return await new Promise((resolve,reject)=>{const img=new Image();img.onload=()=>{const ratio=Math.min(1,maxW/(img.width||maxW));const w=Math.max(1,Math.round((img.width||maxW)*ratio));const h=Math.max(1,Math.round((img.height||maxW)*ratio));const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);try{resolve(c.toDataURL('image/jpeg',quality))}catch(err){reject(err)}};img.onerror=()=>reject(new Error('圖片壓縮失敗'));img.src=dataUrl})}
function successGalleryCount(material,thickness){return (getGalleryLib().items||[]).filter(g=>String(g.material||'')===String(material||'')&&Math.abs(n(g.thickness,999)-n(thickness,0))<=0.31&&['成功','可用','剛好'].includes(String(g.status||''))).length}
function relatedFingerFit(material,thickness){return (getFingerFitLib().items||[]).filter(x=>String(x.material||'')===String(material||'')&&Math.abs(n(x.thickness,999)-n(thickness,0))<=0.31)}
function bestFingerFit(material,thickness){return relatedFingerFit(material,thickness).sort((a,b)=>fingerFitResultScore(b)-fingerFitResultScore(a))[0]||null}

let galleryZoomScaleV75=1,galleryZoomListV75=[],galleryZoomIndexV75=0;
function updateGalleryZoomV75(){const x=galleryZoomListV75[galleryZoomIndexV75];const modal=$('galleryZoomModal'),img=$('galleryZoomImg');if(!x||!modal||!img)return;img.src=x.image||'';img.style.transform=`scale(${galleryZoomScaleV75})`;img.style.transformOrigin='center center';$('galleryZoomTitle').textContent=x.title||'未命名照片';$('galleryZoomMeta').textContent=`${x.material||'材料未填'}｜${x.thickness||'—'} mm｜功率 ${x.power||'—'}%｜速度 ${x.speed||'—'}｜${x.status||'未分類'}｜${fmtBytes(dataUrlBytes(x.image||''))}`;const reset=$('galleryZoomReset');if(reset)reset.textContent=Math.round(galleryZoomScaleV75*100)+'%';modal.classList.add('show')}
openGalleryZoom=function(id){galleryZoomListV75=(getGalleryLib().items||[]).slice();galleryZoomIndexV75=Math.max(0,galleryZoomListV75.findIndex(i=>i.id===id));galleryZoomScaleV75=1;updateGalleryZoomV75()}

/* recommendation */
scoreLaserParam=function(p,q){let s=0;const pm=String(p.material||''),qm=String(q.material||'');if(pm===qm)s+=60;else if(pm.includes(qm)||qm.includes(pm))s+=35;const diff=Math.abs(n(p.thickness,999)-n(q.thickness,0));s+=Math.max(0,38-diff*12);if(String(p.operation||'').includes(q.operation)||String(q.operation||'').includes(p.operation||''))s+=28;if(String(p.status)==='可用')s+=28;else if(String(p.status)==='推薦')s+=22;else if(String(p.status)==='模板')s+=8;if(String(p.source||'').includes('回填'))s+=18;const photos=successGalleryCount(p.material,p.thickness);s+=Math.min(24,photos*6);const fit=bestFingerFit(p.material,p.thickness);if(fit){s+=Math.min(20,(Number(fit.score)||0)/5);if(String(fit.fit||fit.result||'').includes('剛好'))s+=12;if(String(fit.fit||fit.result||'').includes('偏緊')||String(fit.fit||fit.result||'').includes('偏鬆'))s+=4}if(String(p.result||'').includes('切穿'))s+=8;if(String(p.result||'').includes('焦黑'))s-=8;s+=Math.max(0,10-Math.floor(daysAgo(p.updatedAt||p.date)/20));return Math.round(s)}
function recMatchPhotos(p){return (getGalleryLib().items||[]).filter(g=>String(g.material||'')===String(p.material||'')&&Math.abs(n(g.thickness,999)-n(p.thickness,0))<=0.31).slice(0,6)}
function recSupportText(p){const photos=successGalleryCount(p.material,p.thickness);const fit=bestFingerFit(p.material,p.thickness);const parts=[photos?`成功照片 ${photos} 張`:'照片待補'];if(fit)parts.push(`榫卯 ${fit.fit||fit.result||'已記錄'} (${fit.score||fingerFitResultScore(fit)})`);if(p.status)parts.push(`狀態 ${p.status}`);return parts.join('｜')}
renderLaserRecommendation=function(){const q=recQuery();const lib=getLaserParamLib();const all=(lib.items||[]).map(p=>({...p,_score:scoreLaserParam(p,q),_photos:successGalleryCount(p.material,p.thickness),_fit:bestFingerFit(p.material,p.thickness)})).filter(p=>p._score>18).sort((a,b)=>b._score-a._score).slice(0,10);const pics=relatedGalleryForQuery(q,8);const form=`<div class="v74-filter-grid"><label><div class="label">材料</div><input id="recMaterial" value="${esc(q.material)}" placeholder="例：椴木合板"></label><label><div class="label">厚度 mm</div><input id="recThickness" type="number" step="0.1" value="${esc(q.thickness)}"></label><label><div class="label">加工</div><select id="recOperation"><option ${q.operation==='切割'?'selected':''}>切割</option><option ${q.operation==='雕刻'?'selected':''}>雕刻</option><option ${q.operation==='打標'?'selected':''}>打標</option></select></label><label><div class="label">操作</div><button class="primary" type="button" id="recRefresh">重新推薦</button></label></div><div class="btn-row"><button class="secondary" type="button" id="recFromCalc">帶入計算頁</button><button class="secondary" type="button" data-go-tab="gallery">查看相關照片</button></div>`;const cards=all.length?`<div class="v74-card-grid">${all.map(p=>`<div class="v74-rec-card"><div class="shopping-summary-line"><div><div class="laserdb-item-title">${esc(p.name||`${p.material} ${p.thickness}mm`)}</div><div class="v74-chip-row"><span class="v74-chip">分數 ${p._score}</span><span class="v74-chip">照片 ${p._photos}</span><span class="v74-chip">${esc(p.status||'未分類')}</span></div></div><div class="v74-score">${p._score}</div></div><div class="laserdb-detail-grid"><div class="laserdb-detail-box"><b>材料</b>${esc(p.material)} ${esc(p.thickness)} mm</div><div class="laserdb-detail-box"><b>參數</b>${esc(p.power)}% / ${esc(p.speed)} / ${esc(p.passes)} 刀</div><div class="laserdb-detail-box"><b>依據</b>${esc(recSupportText(p))}</div></div><div class="btn-row"><button class="primary" type="button" data-rec-apply="${esc(p.id)}" bindLaserRecommendation=function(){const refresh=()=>{const q=readRecQuery();putRecQuery(q);render()};['recMaterial','recThickness','recOperation'].forEach(id=>{const el=$(id);if(el)el.onchange=refresh});const rr=$('recRefresh');if(rr)rr.onclick=refresh;const from=$('recFromCalc');if(from)from.onclick=()=>{putRecQuery({material:(state.form.laserMaterial||'椴木合板'),thickness:state.form.materialThickness||3,operation:String(state.form.projectType)==='box'?'切割':'切割'});render()};document.querySelectorAll('[data-rec-apply]').forEach(btn=>btn.onclick=()=>{const p=(getLaserParamLib().items||[]).find(x=>x.id===btn.dataset.recApply);if(!p)return;state.form.materialThickness=n(p.thickness,state.form.materialThickness);state.form.laserPower=n(p.power,state.form.laserPower);state.form.laserSpeed=n(p.speed,state.form.laserSpeed);state.form.laserPasses=n(p.passes,state.form.laserPasses);state.form.laserAirAssist=String(p.airAssist||'1');state.form.laserNote=`推薦參數：${p.name||''}\n${p.result||''}\n${p.note||''}`;save('已套用推薦雷射參數');activeTab='calc';localStorage.setItem(TAB,activeTab);render();window.scrollTo({top:0,behavior:'smooth'})});document.querySelectorAll('[data-rec-open]').forEach(btn=>btn.onclick=()=>{localStorage.setItem(LASER_PARAM_EXPANDED,btn.dataset.recOpen);setLaserSectionOpen('list',true);render()});document.querySelectorAll('[data-rec-viewpics]').forEach(btn=>btn.onclick=()=>{const p=(getLaserParamLib().items||[]).find(x=>x.id===btn.dataset.recViewpics);if(!p)return;localStorage.setItem(GALLERY_MATERIAL_V74,p.material||'all');localStorage.setItem(GALLERY_THICKNESS_V74,String(p.thickness||'all'));activeTab='gallery';localStorage.setItem(TAB,activeTab);render();window.scrollTo({top:0,behavior:'smooth'})});bindGalleryZoom()}

function workflowTopCandidates(limit=3){const q=recQuery();return (getLaserParamLib().items||[]).map(p=>({...p,_score:scoreLaserParam(p,q)})).filter(p=>p._score>18).sort((a,b)=>b._score-a._score).slice(0,limit)}
function renderLaserWorkflow(){const q=recQuery();const top=workflowTopCandidates(3);const photos=(getGalleryLib().items||[]).filter(g=>String(g.material||'')===String(q.material||'')&&Math.abs(n(g.thickness,999)-n(q.thickness,0))<=0.31).slice(0,4);const fit=bestFingerFit(q.material,q.thickness);const issues=paperSafetyIssues();const bad=issues.filter(i=>i.level==='bad').length,warn=issues.filter(i=>i.level==='warn').length;return `<div class="muted-box">把常用流程集中在同一區：先看推薦 → 測試片 → 回填 / 拍照 → 榫卯確認 → 圖紙安全檢查 → 匯出。</div><div class="workflow-grid"><div class="workflow-step"><h3>1. 目前材料與需求</h3><div class="small">材料：${esc(q.material||'未設定')}｜厚度 ${esc(q.thickness||'—')} mm｜加工 ${esc(q.operation||'切割')}</div><div class="btn-row"><button class="secondary" type="button" data-go-tab="calc">去計算頁</button><button class="secondary" type="button" data-go-tab="sizelib">常用尺寸庫</button></div></div><div class="workflow-step"><h3>2. 推薦參數</h3>${top.length?`<div class="workflow-top-rec">${top.map(x=>`<div class="workflow-rec-item"><div class="laserdb-item-title">${esc(x.name||`${x.material} ${x.thickness}mm`)}</div><div class="small">${esc(x.power)}% / ${esc(x.speed)} / ${esc(x.passes)} 刀｜分數 ${x._score}</div><div class="small">${esc(recSupportText(x))}</div><div class="btn-row"><button class="primary" type="button" data-workflow-apply="${esc(x.id)}">套用</button><button class="secondary" type="button" data-rec-open="${esc(x.id)}">看參數</button></div></div>`).join('')}</div>`:'<div class="small">尚無足夠推薦，建議先測試片。</div>'}<div class="btn-row"><button class="secondary" type="button" data-laser-jump="recommend">進完整推薦</button></div></div><div class="workflow-step"><h3>3. 產生測試片</h3><div class="small">先用測試片驗證功率、速度、刀數，再正式切割。</div><div class="btn-row"><button class="primary" type="button" data-laser-jump="generator">開測試片產生器</button><button class="secondary" type="button" data-laser-jump="templates">看 10W 模板</button></div></div><div class="workflow-step"><h3>4. 拍照與圖庫對照</h3><div class="small">同材料厚度照片 ${photos.length} 張。建議保存成功格、焦黑格、背面切穿與榫卯結果。</div>${photos.length?`<div class="v74-mini-img-row">${photos.map(p=>`<img src="${esc(p.image)}" data-gallery-zoom="${esc(p.id)}" title="${esc(p.title)}">`).join('')}</div>`:''}<div class="btn-row"><button class="secondary" type="button" data-go-tab="gallery">去圖庫</button></div></div><div class="workflow-step"><h3>5. 榫卯鬆緊確認</h3><div class="small">${fit?`目前最佳：${esc(fit.fit||fit.result||'已記錄')}｜切縫 ${esc(fit.kerf)}｜評分 ${esc(fit.score||fingerFitResultScore(fit))}`:'尚無榫卯紀錄，建議先做榫卯測試片。'}</div><div class="btn-row"><button class="secondary" type="button" data-go-tab="fingerfit">去榫卯庫</button><button class="secondary" type="button" data-laser-jump="finger">榫卯測試片</button></div></div><div class="workflow-step"><h3>6. 圖紙安全檢查與匯出</h3><div class="small">紅色問題 ${bad} 項｜黃色提醒 ${warn} 項。匯出前先確認排版、榫齒與切縫補償。</div><div class="btn-row"><button class="secondary" type="button" data-laser-jump="safety">看安全檢查</button><button class="secondary" type="button" data-go-tab="diagrams">去施工圖</button><button class="secondary" type="button" data-go-tab="layout">去排版圖</button></div></div></div>`}

function dataUrlBytesV76(data){if(!data)return 0;const p=String(data).split(',')[1]||'';return Math.round((p.length*3)/4)}
function fmtBytesV76(bytes){const b=Math.max(0,Number(bytes)||0);if(b<1024)return b+' B';if(b<1024*1024)return (b/1024).toFixed(1)+' KB';return (b/1024/1024).toFixed(2)+' MB'}

let galleryZoomScaleV76=1,galleryZoomListV76=[],galleryZoomIndexV76=0;
function updateGalleryZoomV76(){const x=galleryZoomListV76[galleryZoomIndexV76];const modal=$('galleryZoomModal'),img=$('galleryZoomImg');if(!x||!modal||!img)return;img.src=x.image||'';img.style.transform=`scale(${galleryZoomScaleV76})`;img.style.transformOrigin='center center';const t=$('galleryZoomTitle'),m=$('galleryZoomMeta');if(t)t.textContent=x.title||'未命名照片';if(m)m.textContent=`${x.material||'材料未填'}｜${x.thickness||'—'} mm｜功率 ${x.power||'—'}%｜速度 ${x.speed||'—'}｜${x.status||'未分類'}｜${fmtBytesV76(dataUrlBytesV76(x.image||''))}`;const reset=$('galleryZoomReset');if(reset)reset.textContent=Math.round(galleryZoomScaleV76*100)+'%';modal.classList.add('show');document.body.classList.add('gallery-zoom-open')}
openGalleryZoom=function(id){galleryZoomListV76=(getGalleryLib().items||[]).slice();galleryZoomIndexV76=Math.max(0,galleryZoomListV76.findIndex(i=>i.id===id));galleryZoomScaleV76=1;updateGalleryZoomV76()}
setGalleryZoom=function(delta,reset=false){if(reset)galleryZoomScaleV76=1;else galleryZoomScaleV76=Math.max(.5,Math.min(6,galleryZoomScaleV76+delta));updateGalleryZoomV76()}
function moveGalleryZoomV76(step){if(!galleryZoomListV76.length)return;galleryZoomIndexV76=(galleryZoomIndexV76+step+galleryZoomListV76.length)%galleryZoomListV76.length;galleryZoomScaleV76=1;updateGalleryZoomV76()}
bindGalleryZoom=function(){document.querySelectorAll('[data-gallery-zoom]').forEach(btn=>btn.onclick=(e)=>{e.preventDefault();openGalleryZoom(btn.dataset.galleryZoom)});const close=()=>{const m=$('galleryZoomModal');if(m)m.classList.remove('show');document.body.classList.remove('gallery-zoom-open')};const c=$('galleryZoomClose');if(c)c.onclick=close;const m=$('galleryZoomModal');if(m)m.onclick=(e)=>{if(e.target===m)close()};const zi=$('galleryZoomIn');if(zi)zi.onclick=()=>setGalleryZoom(.25);const zo=$('galleryZoomOut');if(zo)zo.onclick=()=>setGalleryZoom(-.25);const zr=$('galleryZoomReset');if(zr)zr.onclick=()=>setGalleryZoom(0,true);const prev=$('galleryZoomPrev');if(prev)prev.onclick=()=>moveGalleryZoomV76(-1);const nxt=$('galleryZoomNext');if(nxt)nxt.onclick=()=>moveGalleryZoomV76(1);const img=$('galleryZoomImg');if(img)img.ondblclick=()=>{galleryZoomScaleV76=galleryZoomScaleV76>1?1:2;updateGalleryZoomV76()};document.onkeydown=(e)=>{const modal=$('galleryZoomModal');if(!modal||!modal.classList.contains('show'))return;if(e.key==='Escape')close();if(e.key==='ArrowLeft')moveGalleryZoomV76(-1);if(e.key==='ArrowRight')moveGalleryZoomV76(1)}}

galleryCard=function(x){const open=localStorage.getItem(GALLERY_EXPANDED)===x.id;const compare=getGalleryCompareIdsV76().includes(x.id);const tags=[x.category,x.material,x.thickness?`${x.thickness} mm`:'',x.power?`功率 ${x.power}%`:'',x.speed?`速度 ${x.speed}`:'',x.status].filter(Boolean).map(v=>`<span class="laserdb-tag">${esc(v)}</span>`).join('');const customTags=galleryTagsListV76(x).map(t=>`<span class="v76-tag">#${esc(t)}</span>`).join('');const size=fmtBytesV76(dataUrlBytesV76(x.image||''));return `<div class="v73-gallery-card" data-gallery-id="${esc(x.id)}"><img class="v73-gallery-img gallery-img-clickable" data-gallery-zoom="${esc(x.id)}" src="${esc(x.image)}" alt="${esc(x.title)}"><div class="v73-gallery-title">${esc(x.title||'未命名照片')}</div><div class="v73-gallery-meta">${tags}</div><div>${customTags}</div><div class="small">日期：${esc(x.date||'—')}｜容量 ${size}</div><label class="small"><input type="checkbox" data-gallery-compare="${esc(x.id)}" ${compare?'checked':''}> 加入比對</label><div class="btn-row"><button class="secondary" type="button" data-toggle-gallery="${esc(x.id)}">${open?'收合':'展開'}</button><button class="secondary" type="button" data-gallery-zoom="${esc(x.id)}">查看</button><button class="secondary" type="button" data-gallery-compress="${esc(x.id)}">壓縮</button><button class="secondary" type="button" data-edit-gallery="${esc(x.id)}">編輯</button><button class="secondary laserdb-danger" type="button" data-del-gallery="${esc(x.id)}">刪除</button></div>${open?`<div class="v73-gallery-note">${esc(x.note||'未填寫備註')}</div><div class="btn-row"><button class="primary" type="button" data-gallery-to-laser="${esc(x.id)}">用照片資料建立參數草稿</button><button class="secondary" type="button" data-gallery-apply-calc="${esc(x.id)}">套用數值到計算頁</button></div>`:''}</div>`}
function galleryCompareSectionV76(){const all=getGalleryLib().items||[];const ids=getGalleryCompareIdsV76();const items=ids.map(id=>all.find(x=>x.id===id)).filter(Boolean);const cards=items.length?`<div class="v76-compare-grid">${items.map(x=>`<div class="v76-compare-card"><img src="${esc(x.image)}" data-gallery-zoom="${esc(x.id)}"><b>${esc(x.title||'未命名')}</b><div class="small">${esc(x.material)}｜${esc(x.thickness)} mm</div><div class="small">功率 ${esc(x.power)}%｜速度 ${esc(x.speed)}｜${esc(x.passes)} 刀</div><div class="small">狀態：${esc(x.status)}｜${esc(x.date)}</div><div>${galleryTagsListV76(x).map(t=>`<span class="v76-tag">#${esc(t)}</span>`).join('')}</div><button class="secondary" type="button" data-remove-compare="${esc(x.id)}">移出比對</button></div>`).join('')}</div>`:'<div class="laserdb-empty">尚未選擇比對照片。可在照片卡片勾選「加入比對」。</div>';return `<section class="card"><div class="view-title"><div><h2>照片比對</h2><div class="small">可把同材料不同功率 / 速度的照片放在一起看。</div></div><span class="badge">${items.length} 張</span></div><div class="btn-row"><button class="secondary" type="button" id="galleryCompareFirstTwo">把目前篩選前 2 張加入比對</button><button class="secondary" type="button" id="galleryCompareClear">清除比對</button></div>${cards}</section>`}

renderGallery=function(){let html=renderGalleryBeforeV76();const tag=(localStorage.getItem(GALLERY_TAG_FILTER_V76)||'');const tagSection=`<section class="card"><h2>標籤 / 比對</h2><div class="laserdb-filter-grid"><label><div class="label">標籤搜尋</div><input id="galleryTagFilter" value="${esc(tag)}" placeholder="例：焦黑、背面切穿、榫卯剛好"></label><label><div class="label">說明</div><input readonly value="照片可勾選加入比對"></label></div></section>${galleryCompareSectionV76()}`;const firstEnd=html.indexOf('</section>');if(firstEnd>0&&!html.includes('galleryTagFilter'))html=html.slice(0,firstEnd+10)+tagSection+html.slice(firstEnd+10);if(!html.includes('id="galleryTags"'))html=html.replace('<label class="full"><div class="label">選擇照片', '<label class="full"><div class="label">標籤</div><input id="galleryTags" placeholder="例：焦黑, 背面切穿, 榫卯剛好"></label><label class="full"><div class="label">選擇照片');return html.replace('雷射測試圖庫 v75','雷射測試圖庫 v76')}

/* Laser backup */
function buildLaserBackupV76(){return {meta:{app:'mokkou-pwa',version:'v77',type:'laser-data',exportedAt:new Date().toISOString()},laserParams:getLaserParamLib(),gallery:getGalleryLib(),fingerFit:getFingerFitLib(),calcForm:state.form||{},resultForm:state.resultForm||{}}}
function laserParamsCsvV76(){const rows=[['名稱','材料','厚度','加工','功率','速度','刀數','氣輔','切縫','狀態','日期','來源','結果','備註']];(getLaserParamLib().items||[]).forEach(x=>rows.push([x.name,x.material,x.thickness,x.operation,x.power,x.speed,x.passes,x.airAssist,x.kerf,x.status,x.date,x.source,x.result,x.note]));return rows.map(r=>r.map(csvCell).join(',')).join('\n')}
function galleryIndexCsvV76(){const rows=[['標題','分類','材料','厚度','功率','速度','刀數','狀態','日期','標籤','容量','備註']];(getGalleryLib().items||[]).forEach(x=>rows.push([x.title,x.category,x.material,x.thickness,x.power,x.speed,x.passes,x.status,x.date,x.tags,fmtBytesV76(dataUrlBytesV76(x.image||'')),x.note]));return rows.map(r=>r.map(csvCell).join(',')).join('\n')}
function renderLaserBackupV76(){const lp=(getLaserParamLib().items||[]).length, gal=(getGalleryLib().items||[]).length, fit=(getFingerFitLib().items||[]).length, gs=galleryStatsV76();return `<div class="muted-box">此區只處理雷射相關資料：參數庫、圖庫、榫卯庫。完整 App 備份仍可到「備份」頁。</div><div class="v76-grid"><div class="v76-box"><b>${lp}</b><div class="small">雷射參數</div></div><div class="v76-box"><b>${gal}</b><div class="small">圖庫照片</div></div><div class="v76-box"><b>${fit}</b><div class="small">榫卯紀錄</div></div><div class="v76-box"><b>${fmtBytesV76(gs.total)}</b><div class="small">圖庫估計容量</div></div></div><div class="btn-row"><button class="primary" type="button" id="laserBackupExportJson">匯出雷射資料 JSON</button><button class="secondary" type="button" id="laserBackupExportParamsCsv">匯出參數 CSV</button><button class="secondary" type="button" id="laserBackupExportGalleryCsv">匯出圖庫索引 CSV</button><button class="secondary" type="button" data-go-tab="backup">去完整備份頁</button></div><label class="full"><div class="label">匯入雷射資料 JSON</div><textarea id="laserBackupImportText" placeholder="貼上 v76 匯出的雷射 JSON，或完整備份 JSON 中的 libraries。"></textarea></label><div class="btn-row"><button class="secondary" type="button" id="laserBackupImportJson">匯入雷射資料</button></div>`}
function bindLaserBackupV76(){const exp=$('laserBackupExportJson');if(exp)exp.onclick=()=>v76DownloadText(`mokkou_laser_backup_${v76Date()}.json`,JSON.stringify(buildLaserBackupV76(),null,2),'application/json;charset=utf-8');const pcsv=$('laserBackupExportParamsCsv');if(pcsv)pcsv.onclick=()=>v76DownloadText(`mokkou_laser_params_${v76Date()}.csv`,laserParamsCsvV76(),'text/csv;charset=utf-8');const gcsv=$('laserBackupExportGalleryCsv');if(gcsv)gcsv.onclick=()=>v76DownloadText(`mokkou_gallery_index_${v76Date()}.csv`,galleryIndexCsvV76(),'text/csv;charset=utf-8');const imp=$('laserBackupImportJson');if(imp)imp.onclick=()=>{try{const txt=(($('laserBackupImportText')||{}).value||'').trim();if(!txt){toast('請先貼上 JSON');return}const obj=JSON.parse(txt);if(obj.laserParams)localStorage.setItem(LASER_PARAM_STORE,JSON.stringify(obj.laserParams));if(obj.gallery)localStorage.setItem(GALLERY_STORE,JSON.stringify(obj.gallery));if(obj.fingerFit)localStorage.setItem(FINGER_FIT_STORE,JSON.stringify(obj.fingerFit));if(obj.libraries){[LASER_PARAM_STORE,GALLERY_STORE,FINGER_FIT_STORE].forEach(k=>{if(obj.libraries[k])localStorage.setItem(k,obj.libraries[k])})}save('雷射資料已匯入');render()}catch(e){alert('匯入失敗：'+(e.message||e))}}}

function renderLaserOutputHubV76(){const issues=paperSafetyIssues();const bad=issues.filter(i=>i.level==='bad').length,warn=issues.filter(i=>i.level==='warn').length,ok=issues.filter(i=>i.level==='ok').length;const list=issues.map(i=>`<div class="safety-item ${i.level}"><b>${esc(i.title)}</b><span>${esc(i.desc)}</span></div>`).join('');return `<div class="v76-fixed-note">雷射輸出整理版：匯出前先看分層、尺寸比例、切縫補償與未排入板件。</div><div class="v76-grid"><div class="v76-box"><b>${bad}</b><div class="small">紅色問題</div></div><div class="v76-box"><b>${warn}</b><div class="small">黃色提醒</div></div><div class="v76-box"><b>${ok}</b><div class="small">通過項目</div></div></div><h3>建議分層</h3><div class="v76-layer-grid"><div class="v76-layer"><span class="swatch" style="background:#e11d48"></span><b>CUT_RED</b><div class="small">外框切割線，建議設為切割。</div></div><div class="v76-layer"><span class="swatch" style="background:#2563eb"></span><b>HOLE_BLUE</b><div class="small">合頁孔、磁吸孔、孔位線。</div></div><div class="v76-layer"><span class="swatch" style="background:#111827"></span><b>ENGRAVE_BLACK</b><div class="small">文字標註、雕刻參考線。</div></div><div class="v76-layer"><span class="swatch" style="background:#9ca3af"></span><b>DIM_GRAY</b><div class="small">尺寸輔助線，正式切割可隱藏。</div></div></div><h3>匯出前檢查</h3><div class="safety-list">${list}</div><div class="btn-row"><button class="primary" type="button" data-go-tab="diagrams">去施工圖匯出</button><button class="secondary" type="button" data-go-tab="layout">去排版圖匯出</button><button class="secondary" type="button" id="laserOutputChecklistCsv">下載輸出檢查 CSV</button></div>`}

const GALLERY_SELECTED_V77='mokkou_gallery_v77_selected';
const GALLERY_BIG_ONLY_V77='mokkou_gallery_v77_big_only';
const GALLERY_BIG_LIMIT_V77=600*1024;
function v77Bytes(data){return typeof dataUrlBytesV76==='function'?dataUrlBytesV76(data):0}
function v77Fmt(bytes){return typeof fmtBytesV76==='function'?fmtBytesV76(bytes):String(bytes||0)+' B'}
function v77SelectedGalleryIds(){try{return (JSON.parse(localStorage.getItem(GALLERY_SELECTED_V77)||'[]')||[]).filter(Boolean)}catch(e){return []}}

function v77GalleryStats(){const items=getGalleryLib().items||[];const sizes=items.map(x=>v77Bytes(x.image||''));const total=sizes.reduce((a,b)=>a+b,0);const max=Math.max(0,...sizes);const big=items.filter(x=>v77Bytes(x.image||'')>=GALLERY_BIG_LIMIT_V77).length;return {count:items.length,total,max,avg:items.length?Math.round(total/items.length):0,big}}
function v77GalleryReminder(){const s=v77GalleryStats();if(s.count===0)return '<div class="v77-panel">尚無照片。之後建議每次測試後只保留代表照片，避免 localStorage 過大。</div>';if(s.total>4*1024*1024)return '<div class="v77-panel danger"><b>容量偏高：</b>圖庫估計已超過 4MB。建議先匯出雷射備份，再批次壓縮或刪除不需要的照片。</div>';if(s.big>0||s.count>=20)return '<div class="v77-panel warn"><b>備份提醒：</b>已有大圖或照片數偏多。建議定期匯出雷射資料 JSON，換手機或清除瀏覽器前尤其要先備份。</div>';return '<div class="v77-panel"><b>狀態正常：</b>目前照片容量尚可。正式切割前仍建議先保留成功 / 失敗代表照。</div>'}

function v77GalleryManagementSection(){const s=v77GalleryStats();const selected=v77SelectedGalleryIds().length;const bigOnly=localStorage.getItem(GALLERY_BIG_ONLY_V77)==='1';return `<section class="card" id="galleryAdvancedV77"><div class="view-title"><div><h2>圖庫進階管理 v77</h2><div class="small">批次選取、批次刪除、大圖篩選、選取項目匯出。</div></div><span class="badge">已選 ${selected} 張</span></div>${v77GalleryReminder()}<div class="v77-grid"><div class="v77-stat"><b>${s.count}</b><div class="small">照片數</div></div><div class="v77-stat"><b>${v77Fmt(s.total)}</b><div class="small">估計總容量</div></div><div class="v77-stat"><b>${v77Fmt(s.max)}</b><div class="small">最大單張</div></div><div class="v77-stat"><b>${s.big}</b><div class="small">大圖數</div></div></div><label class="v77-gallery-select"><input id="galleryBigOnlyV77" type="checkbox" ${bigOnly?'checked':''}> 只顯示大圖（單張約 600KB 以上）</label><div class="v77-toolbar"><button class="secondary" type="button" id="gallerySelectFilteredV77">選取目前篩選</button><button class="secondary" type="button" id="galleryClearSelectedV77">清除選取</button><button class="secondary" type="button" id="galleryExportSelectedJsonV77">匯出選取 JSON</button><button class="secondary" type="button" id="galleryExportSelectedCsvV77">匯出選取 CSV</button><button class="secondary laserdb-danger" type="button" id="galleryDeleteSelectedV77">刪除選取照片</button></div><div class="small">排序下拉已新增「容量大到小 / 容量小到大」。建議先用容量排序找出最占空間的照片。</div></section>`}

const galleryCardBeforeV77=galleryCard;
galleryCard=function(x){const selected=v77SelectedGalleryIds().includes(x.id);let html=galleryCardBeforeV77(x);const size=v77Bytes(x.image||'');const select=`<label class="v77-gallery-select"><input type="checkbox" data-gallery-select-v77="${esc(x.id)}" ${selected?'checked':''}> 批次選取 ${size>=GALLERY_BIG_LIMIT_V77?'<span class="v77-large-badge">大圖</span>':''}</label>`;html=html.replace('<div class="v73-gallery-title">',select+'<div class="v73-gallery-title">');if(selected)html=html.replace('class="v73-gallery-card"','class="v73-gallery-card v77-gallery-card-selected"');return html}

function v78SnapshotSummary(obj){if(!obj||!obj.localStorage)return '不是 v78 保險備份格式。';const raw=JSON.stringify(obj.localStorage||{});const ok=obj.meta&&obj.meta.checksum?obj.meta.checksum===v78Hash(raw):null;return `版本：${(obj.meta&&obj.meta.version)||'未知'}\n類型：${(obj.meta&&obj.meta.type)||'未知'}\n匯出時間：${(obj.meta&&obj.meta.exportedAt)||'未知'}\n資料鍵數：${Object.keys(obj.localStorage||{}).length}\n估計容量：${v78FmtBytes(v78BytesText(raw))}\n校驗：${ok===null?'無校驗碼':ok?'通過':'不一致，請勿匯入'}`}
function renderBackupInsuranceV78(){const snap=v78StorageSnapshot();return `<section class="card" id="backupInsuranceV78"><div class="view-title"><div><h2>v78 最終備份與還原保險</h2><div class="small">完整保存目前 localStorage，適合上傳 GitHub Pages 前、換手機前、清瀏覽器前使用。</div></div><span class="badge">${snap.meta.keyCount} keys</span></div><div class="v78-grid"><div class="v78-box"><b>${snap.meta.keyCount}</b><div class="small">本機資料鍵</div></div><div class="v78-box"><b>${v78FmtBytes(snap.meta.bytes)}</b><div class="small">估計容量</div></div><div class="v78-box"><b>${snap.meta.checksum}</b><div class="small">校驗碼</div></div></div><div class="btn-row"><button class="primary backup-safe" type="button" id="v78DownloadInsurance">下載保險備份 JSON</button><button class="secondary" type="button" id="v78PreviewInsurance">預覽保險備份</button><button class="secondary" type="button" id="v78CopyInsurance">複製保險備份</button><button class="secondary" type="button" id="v78DownloadStorageCsv">下載資料鍵索引 CSV</button></div><label><div class="label">匯入前檢查 / 還原</div><textarea id="v78InsuranceText" class="backup-output v78-insurance-output" placeholder="貼上 v78 保險備份 JSON，先按檢查，再決定是否還原。"></textarea></label><div class="btn-row"><button class="secondary" type="button" id="v78CheckInsurance">檢查備份內容</button><button class="secondary" type="button" id="v78RestoreMerge">合併還原</button><button class="secondary tool-danger-btn" type="button" id="v78RestoreOverwrite">清空後還原</button></div><pre id="v78InsuranceResult" class="v78-codebox">尚未檢查。</pre></section>`}
function v78StorageCsv(){const snap=v78StorageSnapshot();const rows=[['key','bytes','preview']];Object.entries(snap.localStorage).forEach(([k,v])=>rows.push([k,v78BytesText(v),String(v||'').slice(0,80)]));return rows.map(r=>r.map(csvCell).join(',')).join('\n')}
function v78RestoreObject(obj,overwrite=false){if(!obj||!obj.localStorage)throw new Error('不是 v78 保險備份格式');const raw=JSON.stringify(obj.localStorage||{});if(obj.meta&&obj.meta.checksum&&obj.meta.checksum!==v78Hash(raw))throw new Error('校驗碼不一致，已停止匯入');if(overwrite){const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&(/^(woodworking|mokkou)/.test(k)))keys.push(k)}keys.forEach(k=>localStorage.removeItem(k))}Object.entries(obj.localStorage||{}).forEach(([k,v])=>localStorage.setItem(k,String(v)));return Object.keys(obj.localStorage||{}).length}

/* === v79 patch: actual geometry output, backup migration guard, UI consistency === */
const V79_GEOM_SETTINGS='mokkou_v79_geometry_settings';
const V79_UI_UNIFIED='mokkou_v79_ui_unified';
function v79Now(){return new Date().toISOString()}
function v79Date(){return new Date().toISOString().slice(0,19).replace(/[:T]/g,'-')}
function v79Download(name,text,type='text/plain;charset=utf-8'){download(new Blob([text],{type}),name)}
function v79BytesText(t){return new Blob([String(t||'')]).size}
function v79FmtBytes(bytes){bytes=Number(bytes||0);if(bytes>1024*1024)return (bytes/1024/1024).toFixed(2)+' MB';if(bytes>1024)return (bytes/1024).toFixed(1)+' KB';return bytes+' B'}
function v79GetGeomSettings(){try{return {...v79DefaultGeomSettings(),...(JSON.parse(localStorage.getItem(V79_GEOM_SETTINGS)||'{}')||{})}}catch(e){return v79DefaultGeomSettings()}}
function v79SetGeomSettings(patch){localStorage.setItem(V79_GEOM_SETTINGS,JSON.stringify({...v79GetGeomSettings(),...(patch||{})}))}
function v79DefaultGeomSettings(){return {dimensions:true,cutOrder:true,features:true,pegHoles:true,boardFrame:true,netGuide:true,autoPreview:false,outerLast:true}}
function v79GeomData(){const f=state.resultForm||state.form;const res=state.result||calculate(f);const pieces=flatten((res&&res.cutList)||[]).filter(p=>n(p.w)>0&&n(p.h)>0);const bw=n(f.stockBoardWidth,600),bh=n(f.stockBoardHeight,400),qty=Math.max(1,Math.floor(n(f.stockBoardQty,1)));const packed=nest(pieces,bw,bh,qty);return {f,res,pieces,bw,bh,qty,packed}}
function v79IsFingerPiece(p,f){return String(f.projectType)==='box'&&String(f.boxJoinType)==='finger'&&!!p.jointCut}
function v79PiecePath(x,y,w,h,p,f){if(v79IsFingerPiece(p,f)&&typeof fingerBoxPathPrecise==='function'){return fingerBoxPathPrecise(x,y,w,h,n(f.boxFingerSize,18),n(p.t||f.materialThickness,3),n(f.boxKerf,0.15))}return `M ${r(x)} ${r(y)} L ${r(x+w)} ${r(y)} L ${r(x+w)} ${r(y+h)} L ${r(x)} ${r(y+h)} Z`}
function v79DimH(x1,x2,y,label){return `<line class="dim-line" x1="${r(x1)}" y1="${r(y)}" x2="${r(x2)}" y2="${r(y)}"/><line class="dim-line" x1="${r(x1)}" y1="${r(y-2)}" x2="${r(x1)}" y2="${r(y+2)}"/><line class="dim-line" x1="${r(x2)}" y1="${r(y-2)}" x2="${r(x2)}" y2="${r(y+2)}"/><text class="dim-text" x="${r((x1+x2)/2)}" y="${r(y-2.5)}" text-anchor="middle">${esc(label)}</text>`}
function v79DimV(x,y1,y2,label){return `<line class="dim-line" x1="${r(x)}" y1="${r(y1)}" x2="${r(x)}" y2="${r(y2)}"/><line class="dim-line" x1="${r(x-2)}" y1="${r(y1)}" x2="${r(x+2)}" y2="${r(y1)}"/><line class="dim-line" x1="${r(x-2)}" y1="${r(y2)}" x2="${r(x+2)}" y2="${r(y2)}"/><text class="dim-text" x="${r(x-2.5)}" y="${r((y1+y2)/2)}" transform="rotate(-90 ${r(x-2.5)} ${r((y1+y2)/2)})" text-anchor="middle">${esc(label)}</text>`}
function v79SlotPath(x,y,w,h){const rr=Math.min(w/2,h/2);return `M ${r(x+rr)} ${r(y)} L ${r(x+w-rr)} ${r(y)} A ${r(rr)} ${r(rr)} 0 0 1 ${r(x+w-rr)} ${r(y+h)} L ${r(x+rr)} ${r(y+h)} A ${r(rr)} ${r(rr)} 0 0 1 ${r(x+rr)} ${r(y)} Z`}
function v79FeatureSvg(q,p,f,opt){if(!opt.features)return '';let s='';const key=String(p.pieceKey||'');const name=String(p.name||p.part||'');if(key==='front'&&b(f.boxHandleHole)){const sw=Math.max(18,Math.min(q.w*.55,q.w-12)),sh=Math.min(18,Math.max(8,q.h*.16));s+=`<path class="hole-line" data-feature="handle-slot" d="${v79SlotPath(q.x+(q.w-sw)/2,q.y+Math.max(8,q.h*.18),sw,sh)}"/>`}
if((key==='front'||key==='top')&&b(f.boxMagnet)){const dia=n(f.boxMagnetDiameter,6),rad=dia/2;[[.18,.18],[.82,.18]].forEach(([px,py])=>{s+=`<circle class="hole-line" data-feature="magnet" cx="${r(q.x+q.w*px)}" cy="${r(q.y+q.h*py)}" r="${r(rad)}"/>`})}
if((key==='back'||key==='top')&&(b(f.boxHinge)||String(f.boxLidMode)==='hinge')){const c=Math.max(1,Math.floor(n(f.boxHingeCount,2)));for(let i=0;i<c;i++){const cx=q.x+q.w*(i+1)/(c+1),cy=q.y+q.h*.86;s+=`<circle class="hole-line" data-feature="hinge-hole" cx="${r(cx-6)}" cy="${r(cy)}" r="2.2"/><circle class="hole-line" data-feature="hinge-hole" cx="${r(cx+6)}" cy="${r(cy)}" r="2.2"/>`}}

/* Optimized nesting: best-fit with configurable spacing/margin/rotation */
const nestBeforeV80=nest;
nest=function(pieces,bw,bh,qty=1){
  const opt=v80PackSettings();const gap=Math.max(0,n(opt.spacing,4)),m=Math.max(0,n(opt.margin,8)),rot=!!opt.rotate;
  let items=(pieces||[]).slice().filter(p=>n(p.w)>0&&n(p.h)>0);
  items.sort((a,b)=>String(opt.sort)==='long'?Math.max(n(b.w),n(b.h))-Math.max(n(a.w),n(a.h)):(n(b.w)*n(b.h)-n(a.w)*n(a.h)));
  const boards=[];let rem=items;
  function clean(spaces){
    return spaces.filter(s=>s.w>6&&s.h>6).filter((s,i,arr)=>!arr.some((o,j)=>j!==i&&s.x>=o.x&&s.y>=o.y&&s.x+s.w<=o.x+o.w&&s.y+s.h<=o.y+o.h));
  }
  for(let bno=0;bno<Math.max(1,Math.floor(qty))&&rem.length;bno++){
    let spaces=[{x:m,y:m,w:bw-2*m,h:bh-2*m}],placed=[],next=[];
    for(const p of rem){
      let best=null;
      const opts=[{w:n(p.w),h:n(p.h),rot:false}];
      if(rot&&Math.abs(n(p.w)-n(p.h))>.001)opts.push({w:n(p.h),h:n(p.w),rot:true});
      for(let si=0;si<spaces.length;si++){
        const s=spaces[si];
        for(const o of opts){
          if(o.w<=s.w&&o.h<=s.h){
            const waste=s.w*s.h-o.w*o.h;const edge=Math.min(s.w-o.w,s.h-o.h);const score=waste+edge*12+s.y*.01+s.x*.001;
            if(!best||score<best.score)best={si,s,o,score};
          }
        }
      }
      if(!best){next.push(p);continue}
      const {si,s,o}=best;placed.push({...p,x:s.x,y:s.y,w:o.w,h:o.h,rot:o.rot});spaces.splice(si,1);
      const right={x:s.x+o.w+gap,y:s.y,w:s.w-o.w-gap,h:o.h};
      const bottom={x:s.x,y:s.y+o.h+gap,w:s.w,h:s.h-o.h-gap};
      const rightFull={x:s.x+o.w+gap,y:s.y,w:s.w-o.w-gap,h:s.h};
      if((s.w-o.w)>(s.h-o.h)){spaces.push(rightFull,bottom)}else{spaces.push(right,bottom)}
      spaces=clean(spaces).sort((a,b)=>a.y-b.y||a.x-b.x);
    }
    boards.push({placed,bw,bh});rem=next;
  }
  return {boards,remaining:rem,settings:opt}
}

  const styleTxt=`<style>.cut-line{fill:none;stroke:#ff0000;stroke-width:0.10;vector-effect:non-scaling-stroke}.fold-line{fill:none;stroke:#00a651;stroke-width:0.10;stroke-dasharray:3 2;vector-effect:non-scaling-stroke}.pb-label{font-family:Arial,'Noto Sans TC',sans-serif;font-size:4px;fill:#111}.dim-line{stroke:#888;stroke-width:.08;stroke-dasharray:1 1;vector-effect:non-scaling-stroke}.note{font-family:Arial,'Noto Sans TC',sans-serif;font-size:4px;fill:#555}</style>`;
  const note=`<text class="note" x="${m}" y="${svgH-8}">紙盒刀模：紅線切割，綠線壓痕 / 淺雕。${v80LayerTip()}</text>`;

function v106LaserSafetyIssues(){

  const maxH=pieces.length?Math.max(...pieces.map(p=>n(p.h,0))):0;

  else if(power>85&&speed<150)add('warn','高功率低速度組合','功率偏高且速度偏慢，容易嚴重焦黑或起火，請先做小測試片。');
