function layoutBoardStats(){
  const a=analyzeCalcLayout();
  if(a.error)return {error:a.error,info:a.info,boards:[],a};
  const info=a.info,lay=a.layout||{placed:[],boards:0};
  const placed=(lay.placed||[]).filter(p=>!p.overflow);
  const boardNos=[...new Set(placed.map(p=>p.board))].sort((x,y)=>x-y);
  const maxBoard=Math.max(lay.boards||0,...boardNos,1);
  const boards=[];
  for(let b=1;b<=maxBoard;b++){
    const ps=placed.filter(p=>p.board===b);
    if(!ps.length&&b>boardNos.length)continue;
    const area=ps.reduce((sum,p)=>sum+num(p.w)*num(p.h),0);
    const denom=Math.max(1,num(lay.usable||info.usable)*num(lay.usable||info.usable));
    boards.push({board:b,pieces:ps,area,usage:Math.min(999,area/denom*100)});
  }
  return {info,boards,a,placedCount:placed.length,totalPieces:a.pieces.length,oversizeCount:a.oversize.length,manualCount:manualRotateCount(),rotatedCount:a.rotated.length};

function jigCalc(){
  const j=state.jig||{};
  const len=Math.max(1,num(j.stripLength,120));
  const width=Math.max(1,num(j.stripWidth,12));
  const target=Math.max(0.1,num(j.targetThickness,12));
  const mat=Math.max(0.1,num(j.materialThickness,3));
  const layers=Math.max(1,Math.ceil(target/mat));
  const actual=layers*mat;
  const diff=actual-target;
  const area=Math.max(1,num(j.effectiveArea,280));
  const oneFits=len<=area&&width<=area;
  const canRotate=width<=area&&len<=area;
  const maxCols=Math.max(1,Math.floor(area/Math.max(1,width)));
  const maxRows=Math.max(1,Math.floor(area/Math.max(1,len)));
  const perBoardStraight=(len<=area&&width<=area)?Math.max(1,maxCols*maxRows):0;
  const maxColsRot=Math.max(1,Math.floor(area/Math.max(1,len)));
  const maxRowsRot=Math.max(1,Math.floor(area/Math.max(1,width)));
  const perBoardRot=(width<=area&&len<=area)?Math.max(1,maxColsRot*maxRowsRot):0;
  const perBoard=Math.max(perBoardStraight,perBoardRot);
  const boards=perBoard>0?Math.ceil(layers/perBoard):0;
  let level='ok',label='可行',note='尺寸可由目前板厚堆疊，後續可加入磁鐵槽。';
  if(!canRotate){level='danger';label='超出有效區';note='單片長條超出有效 280×280 mm，需縮短長度或分段。';}
  else if(Math.abs(diff)>0.01){level='warn';label='厚度進位';note='目標厚度無法剛好整除板厚，已自動進位片數。';}
  return {len,width,target,mat,layers,actual,diff,area,oneFits,canRotate,perBoard,boards,level,label,note};
}

function jigMagnetCalc(){
  const r=jigCalc();
  const j=state.jig||{};
  const enabled=bool(j.magnetEnabled);
  if(!enabled){
    return {r,enabled:false,mt:0,mw:0,ml:0,wall:0,allow:0,count:0,edge:0,spacing:0,slotLayers:0,actualSlotHeight:0,extraHeight:0,slotDepth:0,slotLength:0,slotStart:0,slotEnd:0,totalLen:0,canPlaceLayers:false,startLayer:0,endLayer:0,hasTopCover:false,hasBottomCover:false,level:'off',label:'已停用',note:'目前未啟用隱藏式側吸磁鐵槽；分片結果全部視為完整長條，不產生磁鐵槽。'};
  }
  const mt=Math.max(0.1,num(j.magnetThickness,2));
  const mw=Math.max(0.1,num(j.magnetWidth,6));
  const ml=Math.max(0.1,num(j.magnetLength,10));
  const wall=Math.max(0,num(j.sideWall,0.5));
  const allow=Math.max(0,num(j.magnetAllowance,0.2));
  const count=Math.max(1,Math.floor(num(j.magnetCount,1)));
  const edge=Math.max(0,num(j.magnetEdgeOffset,20));
  const spacing=Math.max(0,num(j.magnetSpacing,30));
  const slotLayers=Math.max(1,Math.ceil(mw/Math.max(0.1,r.mat)));
  const actualSlotHeight=slotLayers*r.mat;
  const extraHeight=actualSlotHeight-mw;
  const slotDepth=mt+allow;
  const slotLength=ml+allow;
  const slotStart=wall;
  const slotEnd=wall+slotDepth;
  const totalLen=edge+(slotLength*count)+(spacing*Math.max(0,count-1));
  const canPlaceLayers=slotLayers<=r.layers;
  const startLayer=canPlaceLayers?Math.floor((r.layers-slotLayers)/2)+1:1;
  const endLayer=canPlaceLayers?startLayer+slotLayers-1:r.layers;
  const hasTopCover=startLayer>1;
  const hasBottomCover=endLayer<r.layers;
  const warnings=[];
  const dangers=[];
  if(!canPlaceLayers)dangers.push('磁鐵所需開槽片數大於總片數。');
  if(slotEnd>r.width)dangers.push('側壁厚度加磁鐵槽深已超過長條寬度。');
  if(totalLen>r.len)dangers.push('磁鐵數量、距端與間距超過長條長度。');
  if(canPlaceLayers&&(!hasTopCover||!hasBottomCover))warnings.push('開槽層外側沒有完整封面或封底，隱藏效果會變差。');
  if(wall<0.3)warnings.push('側壁小於 0.3mm，邊緣很薄，切割與膠合時易破。');
  else if(wall<0.8)warnings.push('側壁小於 0.8mm，吸力較好但邊緣較脆。');
  if(extraHeight>0.6)warnings.push(`實際槽高比磁鐵寬度多 ${round(extraHeight,1)}mm，需要用膠固定。`);
  let level='ok',label='可行',note='可做隱藏式側吸磁鐵槽；磁鐵靠近側面工作面。';
  if(dangers.length){level='danger';label='需修正';note=dangers.join(' ');}
  else if(warnings.length){level='warn';label='可行但注意';note=warnings.join(' ');}
  return {r,enabled,mt,mw,ml,wall,allow,count,edge,spacing,slotLayers,actualSlotHeight,extraHeight,slotDepth,slotLength,slotStart,slotEnd,totalLen,canPlaceLayers,startLayer,endLayer,hasTopCover,hasBottomCover,level,label,note};
}

function jigLayerRows(){
  const r=jigCalc();
  const m=jigMagnetCalc();
  const rows=[['v12.33.3','文字標記瘦身；下載鏈保留。'],];
  for(let i=1;i<=r.layers;i++){
    const isSlot=m.enabled&&m.canPlaceLayers&&i>=m.startLayer&&i<=m.endLayer;
    let role='完整長條',tone='normal',detail=`${round(r.len)}×${round(r.width)}×${round(r.mat)} mm`;
    if(isSlot){role='磁鐵槽片';tone='slot';detail=`槽 ${round(m.slotDepth,1)}×${round(m.slotLength,1)}｜側壁 ${round(m.wall,1)}`;}
    else if(m.enabled&&i<m.startLayer){role='完整封面';tone='cover';detail=`封面 ${round(r.len)}×${round(r.width)}×${round(r.mat)}`;}
    else if(m.enabled&&i>m.endLayer){role='完整封底';tone='cover';detail=`封底 ${round(r.len)}×${round(r.width)}×${round(r.mat)}`;}
    rows.push({index:i,isSlot,role,tone,detail});
  }
  return {r,m,rows};
}

function jigPreviewSvg(){

  const drawX=18;
  const drawW=224;
  const drawH=18;
  const rowGap=54;
  const top=56;
  const slotColor='#dff0e7';
  const coverColor='#f7f0df';
  const normalColor='#fffdf8';
  const markup=[];
  const legendY=26;
  markup.push(`<rect x="18" y="${legendY}" width="10" height="10" fill="${slotColor}" stroke="#8f7752" stroke-width="0.5"/><text class="dim" x="32" y="${legendY+9}">磁鐵槽片</text>`);
  markup.push(`<rect x="102" y="${legendY}" width="10" height="10" fill="${coverColor}" stroke="#8f7752" stroke-width="0.5"/><text class="dim" x="116" y="${legendY+9}">封面 / 封底</text>`);
  markup.push(`<rect x="204" y="${legendY}" width="10" height="10" fill="${normalColor}" stroke="#8f7752" stroke-width="0.5"/><text class="dim" x="218" y="${legendY+9}">完整片</text>`);
  for(const p of pieces){
    const y=top+(p.index-1)*rowGap;
    const fill=p.isSlot?slotColor:(p.tone==='cover'?coverColor:normalColor);
    markup.push(`<text class="labelText" x="${drawX}" y="${y-10}" style="font-size:8.5px">第 ${p.index} 片｜${p.role}</text>`);
    markup.push(`<rect x="${drawX}" y="${y}" width="${drawW}" height="${drawH}" rx="1.5" fill="${fill}" stroke="#111" stroke-width="1.1"/>`);
    if(p.isSlot){
      const sx=drawX+Math.min(drawW-14,Math.max(0,(m.edge/Math.max(1,r.len))*drawW));
      const sw=Math.max(14,Math.min(drawW-(sx-drawX),Math.max(10,(m.slotLength/Math.max(1,r.len))*drawW)));
      const sy=y+Math.min(drawH-4,Math.max(0,(m.slotStart/Math.max(1,r.width))*drawH));
      const sh=Math.max(4,Math.min(drawH-(sy-y),Math.max(3,(m.slotDepth/Math.max(1,r.width))*drawH)));
      markup.push(`<rect x="${round(sx,3)}" y="${round(sy,3)}" width="${round(sw,3)}" height="${round(sh,3)}" rx="0.8" fill="#fff" stroke="#222" stroke-width="0.9"/>`);
      markup.push(`<line x1="${round(drawX,3)}" y1="${round(sy,3)}" x2="${round(sx,3)}" y2="${round(sy,3)}" class="guide"/>`);
    }
    const desc=p.isSlot?`槽 ${round(m.slotDepth,1)}×${round(m.slotLength,1)}｜側壁 ${round(m.wall,1)} mm`:`${round(r.len)}×${round(r.width)} mm`;
    markup.push(`<text class="dim" x="${drawX}" y="${y+drawH+13}" style="font-size:8.2px">${desc}</text>`);
  }
  const stackTop=top+pieces.length*rowGap+16;
  const layerH=12, stackW=92, stackX=18;
  const stack=[];
  for(const p of pieces){
    const yy=stackTop+(p.index-1)*(layerH+5);
    const fill=p.isSlot?slotColor:(p.tone==='cover'?coverColor:normalColor);
    stack.push(`<rect x="${stackX}" y="${yy}" width="${stackW}" height="${layerH}" rx="1" fill="${fill}" stroke="#8f7752" stroke-width="0.8"/>`);
    stack.push(`<text class="dim" x="${stackX+stackW+8}" y="${yy+9}">第 ${p.index} 片：${p.role}</text>`);
  }
  const vbH=Math.max(230,stackTop+pieces.length*(layerH+5)+20);
  return `<svg width="${vbW}mm" height="${round(vbH)}mm" viewBox="0 0 ${vbW} ${round(vbH)}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMin meet">${svgStyleBlock()}<rect x="0" y="0" width="${vbW}" height="${round(vbH)}" fill="#fff"/><text class="labelText" x="14" y="15">治具分片預覽｜手機示意</text>${markup.join('')}<text class="labelText" x="14" y="${round(stackTop-8)}">疊片層位</text>${stack.join('')}<text class="dim" x="14" y="${round(vbH-6)}">示意圖供手機檢查。</text></svg>`;
}

function flowSlotSvgElement(m,x,y,color,sw,extra=''){
  const kind=m.slotKind==='open'?'open':(m.slotKind==='tenon'?'tenon':'embedded');
  const dir=['top','bottom','left','right'].includes(m.openDirection)?m.openDirection:'top';
  const px=x+num(m.x,0), py=y+num(m.y,0), w=num(m.width,0), h=num(m.height,0);
  if(kind==='open'||kind==='tenon'){
    return '';
  }
  return `<rect ${extra} x="${flowSvgAttr(px)}" y="${flowSvgAttr(py)}" width="${flowSvgAttr(w)}" height="${flowSvgAttr(h)}" rx="${flowSvgAttr(num(m.rx,0))}" fill="none" stroke="${color}" stroke-width="${sw}"/>`;
}function flowCleanSvg(base){
  base=flowOutputBase(base);
  const boards=flowPackBoards(base);
  const panelGap=20;
  const totalW=base.boardWidth*boards.length+Math.max(0,boards.length-1)*panelGap;
  const totalH=base.boardHeight;
  const sw=0.1;
  const groups=boards.map((board,bi)=>{
    const ox=bi*(base.boardWidth+panelGap);
    const items=(board.items||[]).map(it=>{
      const l=it.layer||{};
      const x=num(ox+it.x+num(it.offsetX,0),0), y=num(it.y+num(it.offsetY,0),0), w=num(it.pieceW,it.w), h=num(it.pieceH,it.h);
      const shape=flowPieceCutElement(l,x,y,w,h,'#000',sw,'none');
      const holes=(l.holes||[]).map(hh=>`<circle data-flow-piece="${esc(l.id||'S')}" cx="${flowSvgAttr(x+num(hh.cx,0))}" cy="${flowSvgAttr(y+num(hh.cy,0))}" r="${flowSvgAttr(num(hh.r,0))}" fill="none" stroke="#000" stroke-width="${sw}"/>`).join('\n');
      const slots=(l.slots||[]).filter(m=>!['open','tenon'].includes(m.slotKind)).map(m=>flowSlotSvgElement(m,x,y,'#000',sw,`data-flow-slot="magnet" data-flow-slot-id="${esc(m.id)}" data-flow-piece="${esc(l.id||'S')}"`)).join('\n');
      return [shape,holes,slots].filter(Boolean).join('\n');
    }).join('\n');
    return `<g>\n${items}\n</g>`;
  }).join('\n');
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${flowSvgAttr(totalW)}mm" height="${flowSvgAttr(totalH)}mm" viewBox="0 0 ${flowSvgAttr(totalW)} ${flowSvgAttr(totalH)}">\n${groups}\n</svg>`;
}
function flowLayeredSvg(base){
  base=flowOutputBase(base);
  const boards=flowPackBoards(base);
  const panelGap=20;
  const maxItems=Math.max(1,...boards.map(b=>(b.items||[]).length));
  const labelBandH=Math.max(24,Math.min(70,10+maxItems*5.2));
  const totalW=base.boardWidth*boards.length+Math.max(0,boards.length-1)*panelGap;
  const totalH=base.boardHeight+labelBandH;
  const cutSw=0.1, guideSw=0.08;
  const nl='\n';
  const guide=boards.map((board,bi)=>{
    const ox=bi*(base.boardWidth+panelGap);
    return `<rect x="${flowSvgAttr(ox)}" y="0" width="${flowSvgAttr(base.boardWidth)}" height="${flowSvgAttr(base.boardHeight)}" fill="none" stroke="#999" stroke-width="${guideSw}" stroke-dasharray="2 2"/>`;
  }).join(nl);
  const cuts=boards.map((board,bi)=>{
    const ox=bi*(base.boardWidth+panelGap);
    return (board.items||[]).map(it=>{
      const l=it.layer||{};
      const x=num(ox+it.x+num(it.offsetX,0),0), y=num(it.y+num(it.offsetY,0),0), w=num(it.pieceW,it.w), h=num(it.pieceH,it.h);
      const shape=flowPieceCutElement(l,x,y,w,h,'#ff0000',cutSw,'none');
      const holes=(l.holes||[]).map(hh=>`<circle data-flow-piece="${esc(l.id||'S')}" cx="${flowSvgAttr(x+num(hh.cx,0))}" cy="${flowSvgAttr(y+num(hh.cy,0))}" r="${flowSvgAttr(num(hh.r,0))}" fill="none" stroke="#ff0000" stroke-width="${cutSw}"/>`).join(nl);
      const slots=(l.slots||[]).filter(m=>!['open','tenon'].includes(m.slotKind)).map(m=>flowSlotSvgElement(m,x,y,'#ff0000',cutSw,`data-flow-slot="magnet" data-flow-slot-id="${esc(m.id)}" data-flow-piece="${esc(l.id||'S')}"`)).join(nl);
      return [shape,holes,slots].filter(Boolean).join(nl);
    }).join(nl);
  }).join(nl);
  const labels=boards.map((board,bi)=>{
    const ox=bi*(base.boardWidth+panelGap);
    const labelY=base.boardHeight+5;
    const head=`<text x="${flowSvgAttr(ox+3)}" y="${flowSvgAttr(labelY)}" font-size="4.2" fill="#000">${esc(board.id||('B'+(bi+1)))} 板件標註｜開口式凹口已併入外輪廓</text>`;
    const itemLines=(board.items||[]).map((it,idx)=>{
      const l=it.layer||{};
      const role=l.role==='cover'?'封面':(l.role==='bottom'?'底層':'中間層');
      const slots=(l.slots||[]).map(m=>`${m.id}${m.slotKind==='tenon'?'(凸榫)':(m.slotKind==='open'?'('+flowOpenDirectionLabel(m.openDirection)+')':'')}`).join('、')||'無槽';
      const holes=(l.holes||[]).length?`孔${(l.holes||[]).map(h=>h.id||'P').join('、')}`:'無孔';
      const y=labelY+5+idx*5.2;
      return `<text x="${flowSvgAttr(ox+3)}" y="${flowSvgAttr(y)}" font-size="3.8" fill="#000">${esc(l.id||'S')}｜${esc(role)}｜${esc(holes)}｜${esc(slots)}</text>`;
    }).join(nl);
    return head+(itemLines?nl+itemLines:'');
  }).join(nl);
  const style=``;
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${flowSvgAttr(totalW)}mm" height="${flowSvgAttr(totalH)}mm" viewBox="0 0 ${flowSvgAttr(totalW)} ${flowSvgAttr(totalH)}">${nl}${style}${nl}<g id="GUIDE_GRAY">${nl}${guide}${nl}</g>${nl}<g id="CUT_RED">${nl}${cuts}${nl}</g>${nl}<g id="ENGRAVE_BLACK">${nl}${labels}${nl}</g>${nl}</svg>`;
}
function flowCheckPush(list,scope,level,text){
  list.push({scope,level:['ok','warn','danger'].includes(level)?level:'ok',text:String(text||'')});
}
function flowCheckScopeLabel(scope){return {step1:'尺寸',locator:'定位孔',magnet:'磁鐵槽',joint:'榫卯',output:'輸出'}[scope]||scope}
function flowCollectChecks(base){
  const f=flowEnsure();
  base=base||flowCurrentBaseV122711();
  const checks=[];
  const eps=0.05;
  const finalT=num(base.finalThickness,0), actualT=num(base.actualThickness,0), sheetT=num(base.sheetThickness,0);
  if(actualT-finalT>eps)flowCheckPush(checks,'step1','warn',`實際疊厚 ${flowFmt(actualT)}mm，比成品厚 ${flowFmt(finalT)}mm 多 ${flowFmt(actualT-finalT)}mm；切割可做，但成品厚度需確認。`);
  else if(finalT-actualT>eps)flowCheckPush(checks,'step1','danger',`實際疊厚 ${flowFmt(actualT)}mm，小於成品厚 ${flowFmt(finalT)}mm；請檢查板厚或層數。`);
  else flowCheckPush(checks,'step1','ok',`實際疊厚 ${flowFmt(actualT)}mm 與成品厚 ${flowFmt(finalT)}mm 一致。`);
  if(sheetT<=0)flowCheckPush(checks,'step1','danger','單片板厚不可小於或等於 0。');
  if(num(base.length,0)>num(base.boardWidth,0)||num(base.width,0)>num(base.boardHeight,0))flowCheckPush(checks,'step1','danger',`單片 ${flowFmt(base.length)}×${flowFmt(base.width)}mm 超過板面 ${flowFmt(base.boardWidth)}×${flowFmt(base.boardHeight)}mm；目前不旋轉排版，需調整尺寸或板面。`);
  else flowCheckPush(checks,'step1','ok',`單片 ${flowFmt(base.length)}×${flowFmt(base.width)}mm 可放入目前板面。`);
  flowCheckPush(checks,'step1','ok','尺寸採即時計算；加工、預覽與 SVG 會直接使用目前欄位值。');
  const loc=base.locator||{};
  if(!loc.enabled)flowCheckPush(checks,'locator','ok','定位孔停用，不參與輸出。');
  else{
    const expected=Math.max(0,Math.floor(num(loc.count,0)));
    const positions=Array.isArray(loc.positions)?loc.positions:[];
    if(expected<=0)flowCheckPush(checks,'locator','warn','定位孔已啟用，但孔數為 0。');
    if(positions.length<expected)flowCheckPush(checks,'locator','warn',`設定 ${expected} 孔，但只有 ${positions.length} 孔落在板件範圍內；請檢查首孔距或孔距。`);
    if(num(loc.diameter,0)>Math.min(num(base.length,0),num(base.width,0)))flowCheckPush(checks,'locator','danger',`定位孔孔徑 ${flowFmt(loc.diameter)}mm 大於板件短邊，需修正。`);
    const activeLayers=(base.layers||[]).filter(l=>l.locatorHole).map(l=>l.id);
    if(!activeLayers.length)flowCheckPush(checks,'locator','warn','定位孔已啟用，但目前沒有任何層設定開孔。');
    else flowCheckPush(checks,'locator','ok',`定位孔作用層：${activeLayers.join('、')}。`);
    const minEdge=Math.min(...positions.map(h=>Math.min(num(h.cx,0)-num(h.r,0),num(base.length,0)-num(h.cx,0)-num(h.r,0),num(h.cy,0)-num(h.r,0),num(base.width,0)-num(h.cy,0)-num(h.r,0))).concat([999]));
    if(positions.length&&minEdge<3)flowCheckPush(checks,'locator','warn',`定位孔距板邊最小約 ${flowFmt(Math.max(0,minEdge))}mm，建議至少保留 3mm 以上。`);
  }
  const magnetOp=flowBuildMagnetOperation(base);
  const jointOp=flowBuildJointOperation(base);
  let outputBase=null;
  try{outputBase=flowApplyOperations(base,[magnetOp,jointOp]);}catch(err){flowCheckPush(checks,'output','danger','加工運算發生錯誤：'+(err&&err.message?err.message:err));outputBase=base;}
  if(!magnetOp.enabled)flowCheckPush(checks,'magnet','ok','磁鐵槽停用，不參與輸出。');
  else{
    const target=(magnetOp.targetLayers||[]).length;
    if(target<=0)flowCheckPush(checks,'magnet','danger','磁鐵槽已啟用，但沒有可加工的目標層。');
    const side=magnetOp.openDirection;
    const badSize=(side==='top'||side==='bottom')?(num(magnetOp.slotLength,0)>num(base.length,0)||num(magnetOp.slotWidth,0)>num(base.width,0)):(num(magnetOp.slotWidth,0)>num(base.length,0)||num(magnetOp.slotLength,0)>num(base.width,0));
    if(badSize)flowCheckPush(checks,'magnet','danger',`磁鐵槽 ${flowFmt(magnetOp.slotLength)}×${flowFmt(magnetOp.slotWidth)}mm 超過目前靠邊方向可用尺寸。`);
    const magSlots=(outputBase.layers||[]).flatMap(l=>(l.slots||[]).filter(s=>s.type==='magnet-slot').map(s=>({layer:l.id,slot:s})));
    const expected=target*Math.max(0,Math.floor(num(magnetOp.slotCount,0)));
    if(expected>0&&magSlots.length<expected)flowCheckPush(checks,'magnet','warn',`預期磁鐵槽 ${expected} 個，目前有效輸出 ${magSlots.length} 個；部分槽位可能超出板件或被保護。`);
    else flowCheckPush(checks,'magnet','ok',`磁鐵槽有效輸出 ${magSlots.length} 個。`);
    (outputBase.operationWarnings||[]).filter(w=>String(w).includes('M')||String(w).includes('磁鐵')||String(w).includes('距離定位孔')).forEach(w=>flowCheckPush(checks,'magnet','warn',w));
  }
  if(!jointOp.enabled)flowCheckPush(checks,'joint','ok','端部榫卯停用，不參與輸出。');
  else{
    const target=(jointOp.targetLayers||[]).length;
    if(target<=0)flowCheckPush(checks,'joint','danger','端部榫卯已啟用，但沒有任何輸出層；請確認 S 層「輸出 / 不出」。');
    const jointSlots=(outputBase.layers||[]).flatMap(l=>(l.slots||[]).filter(s=>s.type==='edge-joint').map(s=>({layer:l.id,slot:s})));
    if(target>0&&jointSlots.length===0)flowCheckPush(checks,'joint','warn','端部榫卯已啟用，但目前沒有有效榫卯線；請檢查數量、沿邊位置、榫寬與作用層。');
    else flowCheckPush(checks,'joint','ok',`端部榫卯有效輸出 ${jointSlots.length} 處。`);
    (jointOp.targetLayers||[]).forEach(id=>{
      const layer=(base.layers||[]).find(l=>l.id===id);
      const p=jointOp.layerProfiles&&jointOp.layerProfiles[id]?flowJointNormalizeProfile(jointOp.layerProfiles[id]):null;
      if(!layer||!p)return;
      const sides=flowJointProfileListForLayer(layer,jointOp).map(x=>x.side);
      const vertical=sides.some(x=>x==='left'||x==='right');
      const horizontal=sides.some(x=>x==='top'||x==='bottom');
      if(vertical&&num(p.jointDepth,0)>num(layer.length,0))flowCheckPush(checks,'joint','danger',`${id} 榫深 ${flowFmt(p.jointDepth)}mm 超過長度 ${flowFmt(layer.length)}mm。`);
      if(horizontal&&num(p.jointDepth,0)>num(layer.width,0))flowCheckPush(checks,'joint','danger',`${id} 榫深 ${flowFmt(p.jointDepth)}mm 超過寬度 ${flowFmt(layer.width)}mm。`);
      if(vertical&&num(p.jointWidth,0)>num(layer.width,0))flowCheckPush(checks,'joint','danger',`${id} 榫寬 ${flowFmt(p.jointWidth)}mm 超過板寬 ${flowFmt(layer.width)}mm。`);
      if(horizontal&&num(p.jointWidth,0)>num(layer.length,0))flowCheckPush(checks,'joint','danger',`${id} 榫寬 ${flowFmt(p.jointWidth)}mm 超過板長 ${flowFmt(layer.length)}mm。`);
    });
    (outputBase.operationWarnings||[]).filter(w=>String(w).includes('J')||String(w).includes('榫卯')||String(w).includes('凹口')||String(w).includes('凸榫')).forEach(w=>flowCheckPush(checks,'joint','warn',w));
  }
  try{
    const boards=flowPackBoards(outputBase);
    const oversized=[];
    (boards||[]).forEach(b=>(b.items||[]).forEach(it=>{if(num(it.w,0)>num(base.boardWidth,0)||num(it.h,0)>num(base.boardHeight,0))oversized.push((it.layer&&it.layer.id)||'S?');}));
    if(oversized.length)flowCheckPush(checks,'output','danger',`有板件超過 ${flowFmt(base.boardWidth)}×${flowFmt(base.boardHeight)}mm 板面：${oversized.join('、')}。`);
    else flowCheckPush(checks,'output','ok',`目前排版需 ${boards.length} 張 B 板面。`);
    if((outputBase.operationWarnings||[]).length)flowCheckPush(checks,'output','warn',`加工提醒共 ${(outputBase.operationWarnings||[]).length} 項，下載前建議展開「加工」查看。`);
  }catch(err){flowCheckPush(checks,'output','danger','排版檢查發生錯誤：'+(err&&err.message?err.message:err));}
  return checks;
}
function flowCheckCardHtml(base,scope='total',title='流程總檢查'){
  const all=flowCollectChecks(base);
  const items=scope==='total'?all:(scope==='step1'?all.filter(x=>x.scope==='step1'||x.scope==='locator'):all.filter(x=>x.scope===scope));
  const counts={ok:items.filter(x=>x.level==='ok').length,warn:items.filter(x=>x.level==='warn').length,danger:items.filter(x=>x.level==='danger').length};
  const orderMap={danger:0,warn:1,ok:2};
  const ordered=items.slice().sort((a,b)=>orderMap[a.level]-orderMap[b.level]);
  const levelClass=counts.danger?'danger':(counts.warn?'warn':'ok');
  const status=counts.danger?`需修正 ${counts.danger}`:(counts.warn?`注意 ${counts.warn}`:'目前正常');
  const important=ordered.filter(x=>x.level!=='ok');
  const brief=(important.length?important:ordered).slice(0,scope==='total'?3:2);
  const briefHtml=(brief.length?brief:[{scope,level:'ok',text:'目前沒有需要顯示的檢查項。'}]).map(it=>`<div class="flow-check-item ${esc(it.level)}"><span class="tag">${esc(flowCheckScopeLabel(it.scope))}</span><span>${esc(it.text)}</span></div>`).join('');
  const detailItems=ordered.length?ordered:brief;
  const detailHtml=detailItems.map(it=>`<div class="flow-check-item ${esc(it.level)}"><span class="tag">${esc(flowCheckScopeLabel(it.scope))}</span><span>${esc(it.text)}</span></div>`).join('');
  const detailTitle=scope==='total'?`完整檢查 ${items.length} 項`:`完整清單 ${items.length} 項`;
  return `<div class="flow-check-card"><div class="flow-check-card-head"><b>${esc(title)}</b><span class="flow-check-state ${esc(levelClass)}">${esc(status)}</span></div><div class="flow-check-kpis"><div class="ok">正常 <b>${counts.ok}</b></div><div class="warn">注意 <b>${counts.warn}</b></div><div class="danger">需修正 <b>${counts.danger}</b></div></div><div class="flow-check-brief">${briefHtml}</div><details class="flow-check-detail"><summary>${esc(detailTitle)}｜只提醒，不自動改尺寸</summary><div class="flow-check-items">${detailHtml}</div><div class="flow-check-note">此卡只讀取目前 Step 設定與輸出幾何；不移動定位孔、不避讓磁鐵槽、不修改榫卯參數。</div></details></div>`;
}

function pegboardCutPlanStats(){
  const st=pegboardStats(),p=state.pegboard||pegboardDefaults;
  const boardArea=Math.max(0,st.w*st.h);
  const holeArea=st.holeCount*Math.PI*Math.pow(Math.max(0,st.cutDia)/2,2);
  const mountArea=st.mountCount*Math.PI*Math.pow(Math.max(0,st.mountCutDia)/2,2);
  const openArea=holeArea+mountArea;
  const openPct=boardArea>0?openArea/boardArea*100:0;
  const outerLen=st.w>0&&st.h>0?(2*(st.w+st.h)):0;
  const holeLen=st.holeCount*Math.PI*Math.max(0,st.cutDia);
  const mountLen=st.mountCount*Math.PI*Math.max(0,st.mountCutDia);
  const totalLen=outerLen+holeLen+mountLen;
  const usedWidth=st.cols>0?((st.cols-1)*st.pitch+st.cutDia):0;
  const usedHeight=st.rows>0?((st.rows-1)*st.rowPitch+st.cutDia):0;
  const coverPct=(st.w>0&&st.h>0)?Math.max(0,Math.min(100,(usedWidth*usedHeight)/(st.w*st.h)*100)):0;
  const edgeWasteX=st.w>0?Math.max(0,(st.mx+st.rightMargin)/st.w*100):0;
  const edgeWasteY=st.h>0?Math.max(0,(st.my+st.bottomMargin)/st.h*100):0;
  const density=boardArea>0?st.holeCount/(boardArea/10000):0;
  let risk='ok',riskLabel='切割量正常';
  if(st.holeCount>320||totalLen>18000){risk='warn';riskLabel='切割量偏高';}
  if(st.holeCount>520||totalLen>28000){risk='danger';riskLabel='建議分片';}
  return {boardArea,holeArea,mountArea,openArea,openPct,outerLen,holeLen,mountLen,totalLen,usedWidth,usedHeight,coverPct,edgeWasteX,edgeWasteY,density,risk,riskLabel};
}
