function calcBox(f){let W=num(f.width),D=num(f.depth),H=num(f.height),t=num(f.thickness),bt=num(f.bottomThickness,t);let innerW=W-2*t,innerD=D-2*t,innerH=H-t;if(f.sizeMode==='inner'){innerW=W;innerD=D;innerH=H;W=innerW+2*t;D=innerD+2*t;H=innerH+t}const hasLid=f.boxLid!=='none';const joint=f.boxJoint==='finger'?'finger':'straight';const bottomMode=f.bottomJoint||'finger';const bottomLabel=bottomJointLabel(bottomMode);const pieces=[piece('前板',1,W,H,t,'正面板'),piece('後板',1,W,H,t,'背面板'),piece('左側板',1,D,H,t,'側板'),piece('右側板',1,D,H,t,'側板')];if(bottomMode!=='none'){let bw=innerW,bh=innerD,bnote=bottomLabel,bjoint='straight',bem=null;if(bottomMode==='flat'){bw=W;bh=D;bnote='平放底板｜外尺寸底貼'}else if(bottomMode==='inset'){bw=innerW;bh=innerD;bnote='內嵌底板｜放入盒內'}else{bw=innerW;bh=innerD;bnote='榫卯底板｜四邊可卡合';bjoint='finger';bem={top:'out',right:'out',bottom:'out',left:'out'}}const bottom=piece('底板',1,bw,bh,bt,bnote);bottom.sourceType='box';bottom.joint=bjoint;bottom.bottomJoint=bottomMode;bottom.fingerSize=num(f.fingerSize,18);bottom.jointDepth=t;if(bem)bottom.edgeModes=bem;pieces.push(bottom);}pieces.forEach(p=>{p.sourceType='box';if(!p.joint)p.joint=joint;p.fingerSize=num(f.fingerSize,18);p.jointDepth=t;if(joint==='finger'&&p.part!=='底板'){if(['前板','後板'].includes(p.part))p.edgeModes={top:'flat',right:'out',bottom:'in',left:'out'};else if(['左側板','右側板'].includes(p.part))p.edgeModes={top:'flat',right:'in',bottom:'in',left:'in'};}});if(hasLid){const lid=piece('上蓋',1,W,D,t,f.boxLid==='hinge'?'合頁蓋':'平蓋');lid.sourceType='box';lid.joint='straight';pieces.push(lid)}applyBoxEdgeOverrides(pieces);return {name:'盒子',summary:[`外尺寸 ${round(W)} × ${round(D)} × ${round(H)} mm`,`內尺寸約 ${round(innerW)} × ${round(innerD)} × ${round(innerH)} mm`,`盒體接合：${joint==='finger'?'榫卯':'直切'}`,`底板接合：${bottomLabel}`,`榫齒寬：${round(f.fingerSize)} mm｜切縫補償：${round(f.kerf,2)} mm`,`板件 ${pieces.reduce((s,p)=>s+p.qty,0)} 件`],pieces};}
function calcDrawer(f){const W=num(f.width),D=num(f.depth),H=num(f.height),t=num(f.thickness),bt=num(f.bottomThickness,t),gap=num(f.drawerGap),clr=num(f.slideClearance),sl=num(f.slideLength);const boxW=W-2*clr,boxD=Math.min(D-20,sl),boxH=Math.max(40,H-20);return {name:'抽屜',summary:[`抽屜箱外寬 ${round(boxW)} mm`,`抽屜箱外深 ${round(boxD)} mm`,`滑軌每側 ${round(clr)} mm`,`抽面縫 ${round(gap)} mm`],pieces:[piece('側板',2,boxD,boxH,t,'左右側板'),piece('前板 / 後板',2,boxW-2*t,boxH,t,'夾在側板中間'),piece('底板',1,boxW-2*t,boxD-2*t,bt,'可入槽或底鎖'),piece('抽屜面板',1,W-2*gap,H-2*gap,t,'外露面板')]};}
function calcCabinet(f){const W=num(f.width),D=num(f.depth),H=num(f.height),t=num(f.thickness),bt=num(f.backThickness),s=Math.max(0,Math.floor(num(f.shelfCount)));const innerW=W-2*t;return {name:'櫃子',summary:[`外尺寸 ${W} × ${D} × ${H} mm`,`內淨寬 ${round(innerW)} mm`,`層板 ${s} 片`,`背板 ${bt} mm`],pieces:[piece('側板',2,D,H,t,'左右側板'),piece('頂板 / 底板',2,innerW,D,t,'夾在側板中間'),piece('層板',s,innerW,D-10,t,'固定或活動層板'),piece('背板',1,W-12,H-12,bt,'增加抗扭')]};}

function renderHome(){const res=calcResult();return `<section class="card"><h2>v12.15.3.8 版本號金屬藍顯示版</h2><div class="home-grid"><div class="muted">這版不新增新功能，主要把 App 介面中所有顯示的版本號套用金屬藍字色，包含首頁、頁尾、版本重點、關於紀錄與各頁可見版本文字。</div><div><div class="pill">工作區 300×300 mm</div> <div class="pill">有效區 280×280 mm</div> <div class="pill">SVG 優先</div><div class="pill">穩定整理版</div></div></div></section>${fold('home-start','快速開始','選一個常用入口，不自動滾動。',`<div class="grid two"><button class="quick-btn" data-action="quick-calc" data-type="box">做盒子<small>榫卯 / 上蓋 / 板件</small></button><button class="quick-btn" data-action="quick-calc" data-type="drawer">做抽屜<small>滑軌間隙 / 面板縫</small></button><button class="quick-btn" data-action="quick-calc" data-type="cabinet">做櫃子<small>側板 / 層板 / 背板</small></button><button class="quick-btn" data-action="quick-page" data-page="knob">做旋鈕<small>中心孔 / 螺母槽</small></button><button class="quick-btn" data-action="quick-page" data-page="drawing">看圖紙<small>SVG / 280×280 分片</small></button><button class="quick-btn" data-action="quick-page" data-page="more">備份資料<small>JSON 匯出 / 匯入</small></button></div>`,true)}${fold('home-recent','最近設定','目前計算結果摘要。',summaryHtml(res),false)}${fold('home-notice','v12.00 暫緩功能','紙盒刀模、照片庫、DXF / PNG 暫不納入第一版。',`<ul class="notice-list"><li>紙盒刀模改列 v12.10 或之後加回。</li><li>照片庫 / 圖庫等大型功能等核心穩定後再加。</li><li>v11 保留為備份與功能參考，不再直接疊補丁。</li></ul>`,false)}`}
function summaryHtml(res){return `<div class="grid two"><div class="muted"><strong>目前類型：</strong>${esc(res.name)}<br><strong>摘要：</strong><br>${res.summary.map(x=>'・'+esc(x)).join('<br>')}</div><div class="table-wrap"><table><thead><tr><th>部件</th><th>數量</th><th>尺寸</th></tr></thead><tbody>${res.pieces.map(p=>`<tr><td>${esc(p.part)}</td><td>${p.qty}</td><td>${esc(p.size)}</td></tr>`).join('')}</tbody></table></div></div>`}

function layoutModeLabel(mode){return {compact:'緊密',standard:'標準',safe:'保守',custom:'自訂'}[mode]||'自訂'}
function gapForMode(mode){return {compact:4,standard:8,safe:12}[mode]??num(state.drawing.pieceGap,8)}
function safeAreaInfo(){const area=Math.max(1,num(state.drawing.effectiveArea,280));const margin=Math.max(0,num(state.drawing.margin,10));const usable=Math.max(1,area-2*margin);const gap=Math.max(0,num(state.drawing.pieceGap,8));const autoRotate=state.drawing.autoRotate!==false;const showSafeFrame=state.drawing.showSafeFrame!==false;const outputOnlyFit=state.drawing.outputOnlyFit===true;const layoutMode=state.drawing.layoutMode||'standard';return {area,margin,usable,gap,autoRotate,showSafeFrame,outputOnlyFit,layoutMode,modeLabel:layoutModeLabel(layoutMode)}}
function pieceDisplayName(p){return p.name||p.part||'板件'}
function manualRotateMap(){if(!state.drawing.manualRotate||typeof state.drawing.manualRotate!=='object'||Array.isArray(state.drawing.manualRotate))state.drawing.manualRotate={};return state.drawing.manualRotate}
function manualRotateKey(p){return state.calc.type+'::'+pieceDisplayName(p)}
function getManualRotateMode(p){const m=manualRotateMap()[manualRotateKey(p)];return (m==='normal'||m==='rotate')?m:'auto'}
function manualRotateModeLabel(mode){return {auto:'自動',normal:'原方向',rotate:'旋轉 90°'}[mode]||'自動'}
function manualRotateCount(){const prefix=state.calc.type+'::';return Object.keys(manualRotateMap()).filter(k=>k.startsWith(prefix)).length}


function bottomJointLabel(mode){return {flat:'平放底板',inset:'內嵌底板',finger:'榫卯底板',none:'無底板'}[mode]||'榫卯底板'}
function bottomJointShort(mode){return {flat:'外尺寸底貼',inset:'縮入盒內',finger:'四邊榫卯',none:'不產生底板'}[mode]||'四邊榫卯'}
function bottomJointDims(){const f=state.calc;let W=num(f.width),D=num(f.depth),H=num(f.height),t=num(f.thickness),bt=num(f.bottomThickness,t);let innerW=W-2*t,innerD=D-2*t,innerH=H-t;if(f.sizeMode==='inner'){innerW=W;innerD=D;innerH=H;W=innerW+2*t;D=innerD+2*t;H=innerH+t}const mode=f.bottomJoint||'finger';if(mode==='none')return {mode,label:bottomJointLabel(mode),w:0,h:0,t:bt,note:'不產生底板，SVG 與排版摘要不會列出底板。'};if(mode==='flat')return {mode,label:bottomJointLabel(mode),w:W,h:D,t:bt,note:'底板採外尺寸，適合直接黏在盒子底部；切割與組裝最簡單。'};if(mode==='inset')return {mode,label:bottomJointLabel(mode),w:innerW,h:innerD,t:bt,note:'底板採內尺寸，適合放入四邊板內側；外觀看起來較乾淨。'};return {mode,label:bottomJointLabel(mode),w:innerW,h:innerD,t:bt,note:'底板採內尺寸，四邊生成榫卯輪廓；適合需要卡合定位的雷射切割盒。'}}

  return `<div class="bottom-joint-box">

function pieceOutputMap(){if(!state.calc.pieceOutput||typeof state.calc.pieceOutput!=='object'||Array.isArray(state.calc.pieceOutput))state.calc.pieceOutput={};return state.calc.pieceOutput}
function pieceOutputKey(p){return state.calc.type+'::'+pieceDisplayName(p)}
function isPieceOutputEnabled(p){return pieceOutputMap()[pieceOutputKey(p)]!==false}
function allCalcPiecesFlattened(){try{return flattenPieces(calcResult().pieces).filter(p=>p.w>0&&p.h>0)}catch(e){return []}}
function selectedCalcPiecesForLayout(){return allCalcPiecesFlattened().filter(isPieceOutputEnabled)}
function pieceOutputStats(){const pieces=allCalcPiecesFlattened();const enabled=pieces.filter(isPieceOutputEnabled);const disabled=pieces.filter(p=>!isPieceOutputEnabled(p));return {pieces,enabled,disabled,total:pieces.length,enabledCount:enabled.length,disabledCount:disabled.length}}
function pieceOutputQuickMode(){const st=pieceOutputStats();if(!st.total)return 'none';if(st.disabledCount===0)return 'all';const bottom=p=>String(pieceDisplayName(p)).includes('底板');const bottomTotal=st.pieces.filter(bottom).length;const enabledBottom=st.enabled.filter(bottom).length;if(bottomTotal>0&&st.enabledCount===bottomTotal&&enabledBottom===bottomTotal)return 'bottom';return 'custom'}
function pieceOutputQuickModeLabel(){const m=pieceOutputQuickMode();return m==='all'?'全部輸出':m==='bottom'?'只輸出底板':m==='custom'?'自訂輸出':'無板件'}
function pieceOutputControlsHtml(){const st=pieceOutputStats();if(!st.total)return `<div class="piece-output-note">目前沒有可控制輸出的板件。</div>`;const quickMode=pieceOutputQuickMode();const rows=st.pieces.map(p=>{const on=isPieceOutputEnabled(p),key=pieceOutputKey(p);return `<div class="piece-output-row ${on?'':'off'}"><div class="piece-output-row-head"><div>${esc(pieceDisplayName(p))}<small>${round(p.w)} × ${round(p.h)} × ${round(p.t)} mm｜${esc(p.note||'板件')}</small></div><span class="piece-output-badge ${on?'':'off'}">${on?'會輸出':'不輸出'}</span></div><div class="piece-output-actions"><button class="quick-btn ${on?'active':''}" data-piece-output-key="${esc(key)}" data-piece-output-mode="on">輸出<small>加入圖紙 / SVG</small></button><button class="quick-btn ${!on?'active':''}" data-piece-output-key="${esc(key)}" data-piece-output-mode="off">不輸出<small>暫時排除</small></button></div></div>`}).join('');return `<div class="piece-output-box"><div class="piece-output-head"><span>板件輸出控制</span><span>輸出 ${st.enabledCount} / ${st.total} 件</span></div><div class="piece-output-note">關閉某片板件後，圖紙預覽、排版摘要、預覽 SVG、乾淨 SVG、分層 SVG 都會同步排除該板件；計算尺寸仍會保留，方便之後再打開。</div><div class="piece-output-bulk"><button class="quick-btn bulk-all ${quickMode==='all'?'active':''}" data-action="piece-output-all">全部輸出<small>所有板件加入圖紙 / SVG</small></button><button class="quick-btn bulk-bottom ${quickMode==='bottom'?'active':''}" data-action="piece-output-bottom-only">只輸出底板<small>只保留底板，其它暫時排除</small></button></div><div class="piece-output-mode-note">目前批次狀態：${pieceOutputQuickModeLabel()}</div>${rows}</div>`}
function pieceOutputSummaryHtml(){const st=pieceOutputStats();if(!st.total)return '';const disabled=st.disabled.map(p=>pieceDisplayName(p)).join('、')||'無';return `<div class="piece-output-summary">目前 SVG 輸出板件：${st.enabledCount} / ${st.total} 件<br>不輸出：${esc(disabled)}</div>`}

function boxEdgeMap(){if(!state.calc.edgeModes||typeof state.calc.edgeModes!=='object'||Array.isArray(state.calc.edgeModes))state.calc.edgeModes={};return state.calc.edgeModes}
function edgeControlKey(p){return 'box::'+pieceDisplayName(p)}
function edgeSideLabel(side){return {top:'上',right:'右',bottom:'下',left:'左'}[side]||side}
function edgeModeLabel(mode){return {flat:'直邊',out:'公榫',in:'母榫'}[mode]||'直邊'}
function edgeModeShort(mode){return {flat:'直',out:'公',in:'母'}[mode]||'直'}
function cleanEdgeModes(m){const out={};['top','right','bottom','left'].forEach(side=>{const v=m&&m[side];out[side]=(v==='out'||v==='in'||v==='flat')?v:'flat'});return out}
function getPieceEdgeModes(p){return cleanEdgeModes(p.edgeModes||{})}
function getEdgeOverride(p){const map=boxEdgeMap();const raw=map[edgeControlKey(p)];return raw&&typeof raw==='object'&&!Array.isArray(raw)?raw:null}
function getEffectiveEdgeModes(p){return cleanEdgeModes(getEdgeOverride(p)||p.edgeModes||{})}
function applyBoxEdgeOverrides(pieces){if(state.calc.type!=='box')return pieces;pieces.forEach(p=>{if(!(p.sourceType==='box'&&p.joint==='finger'))return;const o=getEdgeOverride(p);if(o)p.edgeModes=getEffectiveEdgeModes(p);});return pieces}
function edgeControlPieces(){try{return allCalcPiecesFlattened().filter(p=>p.sourceType==='box'&&p.joint==='finger'&&p.edgeModes)}catch(e){return []}}
function edgeOverrideCount(){const prefix='box::';return Object.keys(boxEdgeMap()).filter(k=>k.startsWith(prefix)).length}
function edgeControlSummary(){const pieces=edgeControlPieces();if(!pieces.length)return '無可控制榫卯的盒子板件';return `已自訂 ${edgeOverrideCount()} / ${pieces.length} 件`}

function analyzeCalcLayout(){

  }

    lay=nestPieces(pieces,info.area,info.margin);
  }catch(e){
    return {info,pieces,normal:[],rotated:[],oversize:[],placed:[],layout:null,error:e.message};
  }
  const placed=(lay.placed||[]).filter(p=>!p.overflow);
  const normal=placed.filter(p=>!p.rot);
  const rotated=placed.filter(p=>p.rot);
  const oversize=(lay.oversize||[]).map(p=>({...p,origW:num(p.origW??p.w),origH:num(p.origH??p.h),canRotate:!!p.canRotate}));
  return {info,pieces,normal,rotated,oversize,placed,layout:lay,error:null};

function layoutOutputStatus(scope='calc'){

    if(a.oversize.length)return {level:'danger',label:'有板件無法放入',detail:'有 '+a.oversize.length+' 件板件超出目前排版區。'};
  }
  if(warnings.some(w=>w.includes('必須')||w.includes('超出')||w.includes('吃掉'))){level='danger';label='設定需要修正';detail='有尺寸或排版設定需要修正。';}
  else if(warnings.length){level='warn';label='可輸出但需注意';detail='有 '+warnings.length+' 項注意事項，建議切割前確認。';}

function layoutBoardStats(){
  const a=analyzeCalcLayout();
  if(a.error)return {error:a.error,info:a.info,boards:[],a};
  const info=a.info,lay=a.layout||{placed:[],boards:0};
  const placed=(lay.placed||[]).filter(p=>!p.overflow);
  const boardNos=[...new Set(placed.map(p=>p.board))].sort((x,y)=>x-y);
  const maxBoard=Math.max(lay.boards||0,...boardNos,1);
  const boards=[];
  for(let b=1;b<=maxBoard;b++){
    const ps=placed.filter(p=>p.board===b);
    if(!ps.length&&b>boardNos.length)continue;
    const area=ps.reduce((sum,p)=>sum+num(p.w)*num(p.h),0);
    const denom=Math.max(1,num(lay.usable||info.usable)*num(lay.usable||info.usable));
    boards.push({board:b,pieces:ps,area,usage:Math.min(999,area/denom*100)});
  }
  return {info,boards,a,placedCount:placed.length,totalPieces:a.pieces.length,oversizeCount:a.oversize.length,manualCount:manualRotateCount(),rotatedCount:a.rotated.length};
}

    const manualRot=a.rotated.filter(p=>p.manualMode==='rotate');const autoRot=a.rotated.filter(p=>p.manualMode!=='rotate');if(autoRot.length)out.push('有 '+autoRot.length+' 件板件會自動旋轉 90° 進行排版：'+autoRot.slice(0,4).map(pieceDisplayName).join('、')+(autoRot.length>4?' 等':'')+'。');if(manualRot.length)out.push('有 '+manualRot.length+' 件板件已手動指定旋轉 90°：'+manualRot.slice(0,4).map(pieceDisplayName).join('、')+(manualRot.length>4?' 等':'')+'。');
  }

  const meta=`有效區 ${round(info.area)}×${round(info.area)} mm｜邊距 ${round(info.margin)} mm｜排版區 ${round(info.usable)}×${round(info.usable)} mm｜間距 ${round(info.gap)} mm｜自動旋轉 ${info.autoRotate?'開啟':'關閉'}｜手動指定 ${manualRotateCount()} 件｜只輸出可放入 ${info.outputOnlyFit?'開啟':'關閉'}｜SVG板件 ${pieceOutputStats().enabledCount}/${pieceOutputStats().total}`;
  if(!warnings.length)return `<div data-check-scope="${esc(scope)}" class="${cls}"><span class="status-chip ${status.level}">${status.label}</span><br>檢查結果：目前可排版。<br>${meta}${extra}</div>`;
  return `<div data-check-scope="${esc(scope)}" class="${cls}"><span class="status-chip ${status.level}">${status.label}</span><br><strong>檢查提醒：</strong><br>${meta}<ul>${warnings.map(w=>`<li>${esc(w)}</li>`).join('')}</ul>${extra}</div>`;

function renderKnob(){const k=state.knob;const styleBtns=[['round','圓形'],['hex','六角'],['star','星形'],['gear','齒輪止滑'],['flower','梅花'],['bar','長條']].map(([id,label])=>`<button class="quick-btn ${k.style===id?'active':''}" data-knob-style="${id}">${label}</button>`).join('');const tempBtns=['M3','M4','M5','M6','M8'].map(t=>`<button class="quick-btn ${k.template===t?'active':''}" data-knob-template="${t}">${t}<small>孔 / 螺母槽</small></button>`).join('');return `${fold('knob-style','樣式選擇','點子選項不會讓父層收合。',`<div class="grid three">${styleBtns}</div>`,true)}${fold('knob-template','規格模板','快速套用 M3～M8。',`<div class="grid five">${tempBtns}</div>`,false)}${fold('knob-size','尺寸設定','旋鈕外徑、中心孔、板厚與疊片。',`<div class="grid two">${field('knob.outerDiameter','外徑 / 長度','number','mm')}${field('knob.centerHole','中心孔','number','mm')}${field('knob.thickness','單片板厚','number','mm')}${field('knob.targetThickness','目標厚度','number','mm')}${field('knob.layerCount','疊片數','number','片')}${field('knob.count','排版數量','number','個')}</div>`,true)}${fold('knob-hole','孔型 / 螺母槽','六角螺母槽與補償。',`<div class="grid two">${select('knob.nutShape','螺母槽',[['hex','六角'],['round','圓形沉孔'],['none','不加']])}${field('knob.nutAcross','螺母對邊 / 沉孔直徑','number','mm')}${field('knob.nutDepth','螺母槽深度','number','mm')}${field('knob.kerf','切縫補償','number','mm')}</div>`,false)}${fold('knob-round','圓滑 / 補償助手','把凸起位置修得更圓，避免太尖。',`<div class="grid two">${rangeField('knob.roundness','圓滑度',0,100,1,'0～100')}<div class="muted">建議：圓形 / 六角可設 0～25；星形、梅花、齒輪止滑可先從 35～55 開始。數值越大，凸起越圓滑。</div></div>`,false)}${fold('knob-result','旋鈕結果與預覽','SVG 預覽與下載使用同一套輪廓與內嵌樣式。',`<div class="muted">建議疊片數：${Math.ceil(num(k.targetThickness)/Math.max(0.1,num(k.thickness)))} 片；目前設定 ${num(k.layerCount)} 片。</div><div id="knobPreviewBox" data-knob-preview="1" class="svg-box" style="margin-top:10px">${knobSvgPreview()}</div><div class="btn-row"><button class="primary" data-action="download-knob-svg">下載旋鈕 SVG</button><button class="secondary" data-action="refresh-knob-preview">套用預覽</button ]]></style>`}
function smoothClosedPath(pts,t=.2){if(!pts||pts.length<3)return polygonPath(pts||[]);if(t<=0)return polygonPath(pts);const n=pts.length,entry=[],exit=[];for(let i=0;i<n;i++){const prev=pts[(i-1+n)%n],cur=pts[i],next=pts[(i+1)%n];entry.push([cur[0]+(prev[0]-cur[0])*t,cur[1]+(prev[1]-cur[1])*t]);exit.push([cur[0]+(next[0]-cur[0])*t,cur[1]+(next[1]-cur[1])*t]);}let d=`M ${round(entry[0][0],2)} ${round(entry[0][1],2)}`;for(let i=0;i<n;i++){const ni=(i+1)%n;d+=` Q ${round(pts[i][0],2)} ${round(pts[i][1],2)} ${round(exit[i][0],2)} ${round(exit[i][1],2)} L ${round(entry[ni][0],2)} ${round(entry[ni][1],2)}`;}return d+' Z'}
function knobOutlineMarkup(style,cx,cy,d,roundnessPct,kerfOffset=0){const k=Math.max(0,num(kerfOffset,0));const cd=num(d)+2*k;const r=cd/2;const smooth=Math.max(0,Math.min(100,num(roundnessPct,0)))/100;if(style==='round')return `<circle class="cut" cx="${cx}" cy="${cy}" r="${round(r,3)}"/>`;if(style==='bar')return `<rect class="cut" x="${round(cx-cd/2,3)}" y="${round(cy-cd*.225,3)}" width="${round(cd,3)}" height="${round(cd*.45,3)}" rx="${round(cd*(0.12+0.28*smooth),2)}"/>`;const pts=knobPoints(style,cx,cy,r);if(!pts)return '';const t=(style==='hex'?0.05+0.18*smooth:0.06+0.32*smooth);return `<path class="cut" d="${smoothClosedPath(pts,t)}"/>`}
function knobPoints(style,cx,cy,r){if(style==='hex'){let pts=[];for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)])}return pts}if(style==='star'){let pts=[];for(let i=0;i<10;i++){const rr=i%2?r*.55:r;const a=-Math.PI/2+i*Math.PI/5;pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}return pts}if(style==='gear'){let pts=[];for(let i=0;i<32;i++){const rr=i%2?r:r*.86;const a=-Math.PI/2+i*Math.PI/16;pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}return pts}if(style==='flower'){let pts=[];for(let i=0;i<72;i++){const a=-Math.PI/2+i*Math.PI*2/72;const rr=r*(.84+.16*Math.sin(6*a));pts.push([cx+rr*Math.cos(a),cy+rr*Math.sin(a)])}return pts}return null}
function polygonPath(pts){return 'M '+pts.map(p=>`${round(p[0],2)} ${round(p[1],2)}`).join(' L ')+' Z'}

function updateKnobPreview(fromSlider=false){const boxes=document.querySelectorAll('[data-knob-preview],#knobPreviewBox');boxes.forEach(box=>{box.innerHTML=knobSvgPreview();});const status=document.getElementById('knobLiveStatus');if(status)status.textContent='預覽已同步：'+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});if(fromSlider&&window.requestAnimationFrame){requestAnimationFrame(()=>{document.querySelectorAll('[data-knob-preview],#knobPreviewBox').forEach(box=>{box.innerHTML=knobSvgPreview();});});}}
function knobSvgPreview(){const k=state.knob;const d=num(k.outerDiameter),cx=80,cy=80,ko=Math.max(0,num(k.kerf,0));const holeR=Math.max(0.05,num(k.centerHole)/2-ko);let nut='';if(k.nutShape==='hex'){nut=`<path class="engrave" d="${polygonPath(knobPoints('hex',cx,cy,num(k.nutAcross)/Math.sqrt(3)))}"/>`}else if(k.nutShape==='round'){nut=`<circle class="engrave" cx="${cx}" cy="${cy}" r="${num(k.nutAcross)/2}"/>`}return `<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock()}<rect x="1" y="1" width="158" height="158" fill="#fff" stroke="#eadcc2"/>${knobOutlineMarkup(k.style,cx,cy,d,k.roundness,ko)}<circle class="cut" cx="${cx}" cy="${cy}" r="${round(holeR,3)}"/>${nut}<text class="labelText" x="10" y="148">${esc(k.style)}｜外徑 ${round(d)}｜孔 ${round(k.centerHole)} mm｜補償 ${round(ko,3)}</text></svg>`}

function flattenPieces(pieces){const out=[];pieces.forEach(p=>{for(let i=0;i<p.qty;i++)out.push({...p,name:p.part+(p.qty>1?' '+(i+1):'')})});return out.sort((a,b)=>Math.max(b.w,b.h)-Math.max(a.w,a.h))}
function basePieceForLayout(p,rot=false,reason=''){
  const w0=num(p.w),h0=num(p.h),mode=getManualRotateMode(p);
  return {...p,origW:w0,origH:h0,w:rot?h0:w0,h:rot?w0:h0,rot:!!rot,fitStatus:rot?'rotated':'normal',rotateReason:reason,manualMode:mode};
}
function fitsBoard(p,usable){return num(p.w)<=usable&&num(p.h)<=usable}
function boardOrientations(raw,usable,autoRotate){
  const mode=getManualRotateMode(raw);
  const normal=basePieceForLayout(raw,false,'');
  const rotated=basePieceForLayout(raw,true,mode==='rotate'?'手動指定':'原方向超出');
  const out=[];
  if(mode==='normal'){
    if(fitsBoard(normal,usable))out.push(normal);
    return out;
  }
  if(mode==='rotate'){
    if(num(raw.w)===num(raw.h)){if(fitsBoard(normal,usable))out.push({...normal,rotateReason:'正方形不需旋轉'});return out;}
    if(fitsBoard(rotated,usable))out.push(rotated);
    return out;
  }
  if(fitsBoard(normal,usable))out.push(normal);
  if(autoRotate&&num(raw.w)!==num(raw.h)&&fitsBoard(rotated,usable))out.push(rotated);
  return out;
}
function orientationFailure(raw,usable,autoRotate){
  const mode=getManualRotateMode(raw),normal=basePieceForLayout(raw,false,''),rotated=basePieceForLayout(raw,true,mode==='rotate'?'手動指定':'原方向超出');
  const normalFits=fitsBoard(normal,usable),rotatedFits=num(raw.w)!==num(raw.h)&&fitsBoard(rotated,usable);
  let p=mode==='rotate'?rotated:normal;
  let problem='超過排版區';
  if(mode==='rotate'&&normalFits&&!rotatedFits)problem='手動旋轉後超尺寸，改回自動或原方向可放入';
  else if(mode==='normal'&&rotatedFits)problem='手動固定原方向後超尺寸，改回自動或旋轉可放入';
  else if(mode==='auto'&&!autoRotate&&rotatedFits)problem='自動旋轉關閉，旋轉後其實可放入';
  return {p,normalFits,rotatedFits,canRotate:rotatedFits,manualMode:mode,problem};
}
function pickOrientationForCurrentRow(raw,usable,autoRotate,remainW,remainH){
  const opts=boardOrientations(raw,usable,autoRotate);
  if(!opts.length)return null;
  const normal=opts.find(p=>!p.rot);
  if(normal&&num(normal.w)<=remainW&&num(normal.h)<=remainH)return normal;
  const rotated=opts.find(p=>p.rot&&num(p.w)<=remainW&&num(p.h)<=remainH);
  if(rotated)return {...rotated,rotateReason:rotated.manualMode==='rotate'?'手動指定':'補入同列'};
  return null;
}
function pickOrientationForNewRow(raw,usable,autoRotate){
  const opts=boardOrientations(raw,usable,autoRotate);
  if(!opts.length)return null;
  const normal=opts.find(p=>!p.rot);
  if(normal)return normal;
  const rotated=opts.find(p=>p.rot);
  return rotated?{...rotated,rotateReason:rotated.manualMode==='rotate'?'手動指定':'原方向超出'}:opts[0];
}
function nestPieces(pieces,area,margin=10){
  margin=Math.max(0,Math.min(num(margin,10),Math.max(0,area/3)));
  const info=safeAreaInfo();const gap=Math.max(0,num(info.gap,8));const autoRotate=info.autoRotate;
  const top=20+margin,bottom=20+area-margin,right=area-margin;
  let x=margin,y=top,rowH=0,placed=[],oversize=[],board=1;
  const usable=Math.max(1,area-2*margin);
  for(const raw of pieces){
    const opts=boardOrientations(raw,usable,autoRotate);
    if(!opts.length){
      const fail=orientationFailure(raw,usable,autoRotate);
      const p={...fail.p,fitStatus:'oversize',canRotate:fail.canRotate,problem:fail.problem,manualMode:fail.manualMode};
      oversize.push({...p,board:null});
      if(x+Math.min(num(p.w),usable)>right){x=margin;y+=rowH+gap;rowH=0}
      if(y+Math.min(num(p.h),usable)>bottom){board++;x=margin;y=top;rowH=0}
      placed.push({...p,x,y,w:num(p.w),h:num(p.h),board,overflow:true});
      x+=Math.min(num(p.w),usable)+gap;rowH=Math.max(rowH,Math.min(num(p.h),usable));
      continue;
    }
    let remainW=right-x, remainH=bottom-y;
    let p=pickOrientationForCurrentRow(raw,usable,autoRotate,remainW,remainH);
    if(!p){
      x=margin;y+=rowH+gap;rowH=0;
      if(y>=bottom){board++;x=margin;y=top;}
      p=pickOrientationForNewRow(raw,usable,autoRotate);
      if(!p){
        const fail=orientationFailure(raw,usable,autoRotate);const o={...fail.p,fitStatus:'oversize',canRotate:fail.canRotate,problem:fail.problem,manualMode:fail.manualMode};
        oversize.push({...o,board:null});placed.push({...o,x,y,w:num(o.w),h:num(o.h),board,overflow:true});
        x+=Math.min(num(o.w),usable)+gap;rowH=Math.max(rowH,Math.min(num(o.h),usable));continue;
      }
      if(y+num(p.h)>bottom){board++;x=margin;y=top;rowH=0;}
    }
    placed.push({...p,x,y,w:num(p.w),h:num(p.h),board,overflow:false});
    x+=num(p.w)+gap;rowH=Math.max(rowH,num(p.h));
  }
  return {placed,oversize,boards:board,margin,usable,gap,autoRotate}
}

function segmentCount(len,tooth){
  tooth=Math.max(4,num(tooth,18));
  let n=Math.max(1,Math.round(Math.abs(len)/tooth));
  if(n<1)n=1;
  return n;
}
function pushTopEdge(pts,x,y,w,tooth,depth,mode){
  if(mode==='flat'){pts.push([x+w,y]);return}
  const n=segmentCount(w,tooth),step=w/n;
  for(let i=0;i<n;i++){
    const a=x+i*step,b=x+(i+1)*step;
    if(i%2===0){const yy=mode==='out'?y-depth:y+depth;pts.push([a,yy],[b,yy],[b,y])}
    else pts.push([b,y]);
  }
}
function pushRightEdge(pts,x,y,h,tooth,depth,mode){
  if(mode==='flat'){pts.push([x,y+h]);return}
  const n=segmentCount(h,tooth),step=h/n;
  for(let i=0;i<n;i++){
    const a=y+i*step,b=y+(i+1)*step;
    if(i%2===0){const xx=mode==='out'?x+depth:x-depth;pts.push([xx,a],[xx,b],[x,b])}
    else pts.push([x,b]);
  }
}
function pushBottomEdge(pts,x,y,w,tooth,depth,mode){
  if(mode==='flat'){pts.push([x,y]);return}
  const n=segmentCount(w,tooth),step=w/n;
  for(let i=0;i<n;i++){
    const a=x+w-i*step,b=x+w-(i+1)*step;
    if(i%2===0){const yy=mode==='out'?y+depth:y-depth;pts.push([a,yy],[b,yy],[b,y])}
    else pts.push([b,y]);
  }
}
function pushLeftEdge(pts,x,y,h,tooth,depth,mode){
  if(mode==='flat'){pts.push([x,y]);return}
  const n=segmentCount(h,tooth),step=h/n;
  for(let i=0;i<n;i++){
    const a=y+h-i*step,b=y+h-(i+1)*step;
    if(i%2===0){const xx=mode==='out'?x-depth:x+depth;pts.push([xx,a],[xx,b],[x,b])}
    else pts.push([x,b]);
  }
}
function fingerRectPath(x,y,w,h,tooth,depth){
  return fingerRectPathByEdges(x,y,w,h,tooth,depth,{top:'out',right:'out',bottom:'out',left:'out'});
}
function fingerRectPathByEdges(x,y,w,h,tooth,depth,edges){
  tooth=Math.max(4,num(tooth,18));
  depth=Math.max(1,Math.min(num(depth,3),Math.min(w,h)/4));
  edges=edges||{top:'flat',right:'flat',bottom:'flat',left:'flat'};
  const pts=[[x,y]];
  pushTopEdge(pts,x,y,w,tooth,depth,edges.top||'flat');
  pushRightEdge(pts,x+w,y,h,tooth,depth,edges.right||'flat');
  pushBottomEdge(pts,x,y+h,w,tooth,depth,edges.bottom||'flat');
  pushLeftEdge(pts,x,y,h,tooth,depth,edges.left||'flat');
  return 'M '+pts.map(p=>`${round(p[0],2)} ${round(p[1],2)}`).join(' L ')+' Z';
}

function dimensionMarkup(p,ox){const x=ox+p.x,y=p.y,w=num(p.w),h=num(p.h);const bx=y+h+8,rx=x+w+8;const midX=x+w/2,midY=y+h/2;return `<g class="dimMark"><line class="dimLine" x1="${x}" y1="${bx}" x2="${x+w}" y2="${bx}"/><line class="dimTick" x1="${x}" y1="${bx-3}" x2="${x}" y2="${bx+3}"/><line class="dimTick" x1="${x+w}" y1="${bx-3}" x2="${x+w}" y2="${bx+3}"/><text class="dim" text-anchor="middle" x="${midX}" y="${bx+10}">${round(w)} mm</text><line class="dimLine" x1="${rx}" y1="${y}" x2="${rx}" y2="${y+h}"/><line class="dimTick" x1="${rx-3}" y1="${y}" x2="${rx+3}" y2="${y}"/><line class="dimTick" x1="${rx-3}" y1="${y+h}" x2="${rx+3}" y2="${y+h}"/><text class="dim" x="${rx+4}" y="${midY}">${round(h)} mm</text></g>`}
function pieceJointLabel(p,ox){if(!(p.sourceType==='box'&&p.joint==='finger'))return '';return `<text class="dim" x="${ox+p.x+3}" y="${p.y+24}">榫齒 ${round(p.fingerSize)} mm</text>`}
function kerfOffsetForPiece(p){if(p.sourceType==='box')return Math.max(0,num(state.calc.kerf,0));return 0}
function compensatedPieceBox(p,ox){const k=kerfOffsetForPiece(p);return {x:round(ox+p.x-k,3),y:round(p.y-k,3),w:round(num(p.w)+2*k,3),h:round(num(p.h)+2*k,3),k}}
function pieceCutMarkupRaw(p,ox){const g=compensatedPieceBox(p,ox);const hasEdges=p.sourceType==='box'&&p.joint==='finger'&&p.edgeModes;const allFinger=p.sourceType==='box'&&p.joint==='finger'&&p.fingerEdges==='all';if(hasEdges){const d=fingerRectPathByEdges(g.x,g.y,g.w,g.h,p.fingerSize,p.jointDepth,p.edgeModes);return `<path class="cut" d="${d}"/>`;}if(allFinger){const d=fingerRectPath(g.x,g.y,g.w,g.h,p.fingerSize,p.jointDepth);return `<path class="cut" d="${d}"/>`;}return `<rect class="cut" x="${g.x}" y="${g.y}" width="${g.w}" height="${g.h}"/>`}
function pieceCutMarkup(p,ox,opts={}){if(p.rot){const local={...p,x:0,y:0,w:p.origW||p.h,h:p.origH||p.w};const tx=round(ox+p.x+p.w,3),ty=round(p.y,3);return `<g transform="translate(${tx},${ty}) rotate(90)">${pieceCutMarkupRaw(local,0)}</g>`;}return pieceCutMarkupRaw(p,ox)}

function layoutSvg(opts={}){const showLabels=opts.labels!==false,showNotes=opts.notes!==false&&showLabels;const area=num(state.drawing.effectiveArea,280),margin=Math.max(0,num(state.drawing.margin,10)),info=safeAreaInfo(),res=calcResult(),pieces=selectedCalcPiecesForLayout();const lay=nestPieces(pieces,area,margin);const W=area*lay.boards+20*(lay.boards+1),H=area+(showNotes?86:24);let s=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${svgStyleBlock()}`;for(let b=1;b<=lay.boards;b++){const ox=20+(b-1)*(area+20);const boardPieces=(lay.placed||[]).filter(p=>p.board===b && !(info.outputOnlyFit&&p.overflow));const fitPieces=boardPieces.filter(p=>!p.overflow);const usedArea=fitPieces.reduce((sum,p)=>sum+num(p.w)*num(p.h),0);const usage=usedArea/Math.max(1,num(lay.usable)*num(lay.usable))*100;s+=`<rect x="${ox}" y="20" width="${area}" height="${area}" fill="#fff" stroke="#b88a44" stroke-width="1.5"/>${showLabels&&info.showSafeFrame?`<rect class="safe-frame" x="${ox+margin}" y="${20+margin}" width="${Math.max(1,area-2*margin)}" height="${Math.max(1,area-2*margin)}"/>`:''}`;if(showLabels)s+=`<text class="labelText" x="${ox}" y="15">第 ${b} 片｜有效 ${area}×${area} mm｜邊距 ${margin} mm｜排版區 ${round(lay.usable)}×${round(lay.usable)}｜使用率 ${round(usage,1)}%</text>`;boardPieces.forEach(p=>{s+=pieceCutMarkup(p,ox,{labels:showLabels});if(showLabels){s+=`<text class="labelText" x="${ox+p.x+3}" y="${p.y+12}">${esc(p.name)}${p.rot?'｜已旋轉'+(p.rotateReason?'：'+p.rotateReason:''):''}${p.overflow?'｜超尺寸':''}</text>`;s+=`<text class="dim" x="${ox+p.x+3}" y="${p.y+p.h-4}">${round(p.w)}×${round(p.h)} mm${p.rot?'｜原 '+round(p.origW)+'×'+round(p.origH):''}</text>`;if(p.rot)s+=`<text class="rot-tag" x="${ox+p.x+3}" y="${p.y+24}">旋轉 90°${p.rotateReason?'｜'+esc(p.rotateReason):''}</text>`;s+=pieceJointLabel(p,ox);s+=dimensionMarkup(p,ox);}});}const jointNote=state.calc.type==='box'?`｜盒子接合：${state.calc.boxJoint==='finger'?'榫卯':'直切'}`:'';if(showNotes){s+=`<text class="dim" x="20" y="${H-52}" function viewBlock(x,y,w,h,title,realW,realH,axisLabel,note){
  realW=Math.max(1,num(realW));
  realH=Math.max(1,num(realH));
  const innerX=x+16, innerY=y+16, innerW=w-32;
  const drawAreaTop=y+58;
  const drawAreaBottom=y+h-78;
  const drawAreaH=Math.max(60,drawAreaBottom-drawAreaTop);
  const drawAreaW=innerW-90;
  const scale=Math.min(drawAreaW/realW, drawAreaH/realH);
  const dw=Math.max(36,realW*scale);
  const dh=Math.max(36,realH*scale);
  const dx=x+(w-dw)/2-20;
  const dy=drawAreaTop+(drawAreaH-dh)/2;
  const rightX=dx+dw+16;
  const bottomY=dy+dh+18;
  const dimLabel=`${round(realW)} × ${round(realH)} mm`;
  return `
  <g>
    <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="18" fill="#fcfaf4" stroke="#e5d7b8"/>
    <text class="labelText" x="${innerX}" y="${innerY+13}" style="font-size:15px;font-weight:800">${title}</text>
    <text class="dim" x="${innerX+86}" y="${innerY+13}" style="font-size:11px">${axisLabel}</text>

    <rect x="${dx}" y="${dy}" width="${dw}" height="${dh}" class="cut"/>

    <line class="dimLine" x1="${dx}" y1="${bottomY}" x2="${dx+dw}" y2="${bottomY}"/>
    <line class="dimTick" x1="${dx}" y1="${bottomY-4}" x2="${dx}" y2="${bottomY+4}"/>
    <line class="dimTick" x1="${dx+dw}" y1="${bottomY-4}" x2="${dx+dw}" y2="${bottomY+4}"/>
    <text class="dim" text-anchor="middle" x="${dx+dw/2}" y="${bottomY+15}" style="font-size:12px">${round(realW)} mm</text>

    <line class="dimLine" x1="${rightX}" y1="${dy}" x2="${rightX}" y2="${dy+dh}"/>
    <line class="dimTick" x1="${rightX-4}" y1="${dy}" x2="${rightX+4}" y2="${dy}"/>
    <line class="dimTick" x1="${rightX-4}" y1="${dy+dh}" x2="${rightX+4}" y2="${dy+dh}"/>
    <text class="dim" x="${rightX+8}" y="${dy+dh/2}" style="font-size:12px">${round(realH)} mm</text>

    <text class="dim" x="${innerX}" y="${y+h-28}" style="font-size:11px">${note}</text>
    <text class="dim" x="${innerX}" y="${y+h-12}" style="font-size:11px">尺寸：${dimLabel}</text>
  </g>`
}

function openFullscreenPreview(sourceBox){const old=document.getElementById('previewModal');if(old)old.remove();const stage=sourceBox.querySelector('[data-zoom-stage]');if(!stage)return;const svg=stage.innerHTML;const modal=document.createElement('div');modal.id='previewModal';modal.className='preview-modal';modal.innerHTML=`<div class="preview-modal-head"><div class="preview-modal-title">全螢幕圖紙預覽</div><button type="button" data-modal-zoom="fit">自適應</button><button type="button" data-modal-zoom="out">－</button><button type="button" data-modal-zoom="in">＋</button><button type="button" data-modal-zoom="reset">100%</button><button type="button" data-modal-close="1">關閉</button></div><div class="preview-modal-body"><div id="fullscreenZoom" class="svg-box zoom-box" data-zoom-box="1"><div class="zoom-stage" data-zoom-stage="1">${svg}</div></div></div>`;document.body.appendChild(modal);document.body.classList.add('body-lock');const box=document.getElementById('fullscreenZoom');setTimeout(()=>{initZoomBox(box);},30);modal.querySelector('[data-modal-close]').onclick=closeFullscreenPreview;modal.querySelectorAll('[data-modal-zoom]').forEach(btn=>{btn.onclick=(e)=>{e.preventDefault();const st=box._zoomState;if(!st){initZoomBox(box);return;}const a=btn.dataset.modalZoom;if(a==='fit')zoomFit(box,st);else if(a==='reset'){st.scale=1;st.x=8;st.y=8;zoomUpdate(box,st);}else if(a==='in')zoomAt(box,st,st.scale*1.22,box.clientWidth/2,box.clientHeight/2);else if(a==='out')zoomAt(box,st,st.scale/1.22,box.clientWidth/2,box.clientHeight/2);};});}

function getSvgViewBox(svg){const raw=svg.getAttribute('viewBox')||'0 0 320 240';const a=raw.trim().split(/[\s,]+/).map(Number);return {w:a[2]||320,h:a[3]||240};}
function initZoomBox(box){const stage=box.querySelector('[data-zoom-stage]'),svg=stage&&stage.querySelector('svg');if(!stage||!svg)return;const vb=getSvgViewBox(svg);svg.setAttribute('width',vb.w);svg.setAttribute('height',vb.h);svg.style.width=vb.w+'px';svg.style.height=vb.h+'px';const st={stage,svg,w:vb.w,h:vb.h,scale:1,x:8,y:8,min:.05,max:8,pointers:new Map(),lastDist:0,lastCenter:null,lastPan:null};box._zoomState=st;zoomFit(box,st);box.onpointerdown=(e)=>{box.setPointerCapture(e.pointerId);st.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});st.lastPan={x:e.clientX,y:e.clientY};if(st.pointers.size===2){const p=[...st.pointers.values()];st.lastDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);st.lastCenter={x:(p[0].x+p[1].x)/2-box.getBoundingClientRect().left,y:(p[0].y+p[1].y)/2-box.getBoundingClientRect().top};}};box.onpointermove=(e)=>{if(!st.pointers.has(e.pointerId))return;st.pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});if(st.pointers.size>=2){const p=[...st.pointers.values()].slice(0,2);const rect=box.getBoundingClientRect();const dist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);const center={x:(p[0].x+p[1].x)/2-rect.left,y:(p[0].y+p[1].y)/2-rect.top};if(st.lastDist>0)zoomAt(box,st,st.scale*(dist/st.lastDist),center.x,center.y);st.lastDist=dist;st.lastCenter=center;}else if(st.pointers.size===1&&st.lastPan){const dx=e.clientX-st.lastPan.x,dy=e.clientY-st.lastPan.y;st.x+=dx;st.y+=dy;st.lastPan={x:e.clientX,y:e.clientY};zoomUpdate(box,st);}};box.onpointerup=box.onpointercancel=(e)=>{st.pointers.delete(e.pointerId);st.lastDist=0;st.lastCenter=null;st.lastPan=null;};box.onwheel=(e)=>{e.preventDefault();const rect=box.getBoundingClientRect();const factor=e.deltaY<0?1.12:.89;zoomAt(box,st,st.scale*factor,e.clientX-rect.left,e.clientY-rect.top);};}
function zoomFit(box,st){const bw=Math.max(1,box.clientWidth-16),bh=Math.max(1,box.clientHeight-16);const s=Math.min(bw/st.w,bh/st.h);st.scale=Math.max(st.min,Math.min(st.max,s));st.x=Math.max(8,(box.clientWidth-st.w*st.scale)/2);st.y=Math.max(8,(box.clientHeight-st.h*st.scale)/2);zoomUpdate(box,st,'自適應');}
function zoomAt(box,st,newScale,cx,cy){newScale=Math.max(st.min,Math.min(st.max,newScale));const px=(cx-st.x)/st.scale,py=(cy-st.y)/st.scale;st.scale=newScale;st.x=cx-px*st.scale;st.y=cy-py*st.scale;zoomUpdate(box,st);}
function zoomUpdate(box,st,label){st.stage.style.transform=`translate(${st.x}px,${st.y}px) scale(${st.scale})`;const id=box.id,readout=document.querySelector(`[data-zoom-readout="${id}"]`);if(readout)readout.textContent=label||`${Math.round(st.scale*100)}%`;}

function highlightVersionText(root=document.body){
  if(!root)return;
  const re=/v\d+\.\d+\.\d+(?:\.\d+)?/g;
  const skipTags=new Set(['SCRIPT','STYLE','TEXTAREA','INPUT','SELECT','OPTION','CODE']);
  const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
    acceptNode(node){
      const parent=node.parentElement;
      if(!parent)return NodeFilter.FILTER_REJECT;
      if(skipTags.has(parent.tagName))return NodeFilter.FILTER_REJECT;
      if(parent.closest('.version-blue'))return NodeFilter.FILTER_REJECT;
      if(!re.test(node.nodeValue)){re.lastIndex=0;return NodeFilter.FILTER_REJECT;}
      re.lastIndex=0;
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes=[];
  while(walker.nextNode())nodes.push(walker.currentNode);
  nodes.forEach(node=>{
    const frag=document.createDocumentFragment();
    let text=node.nodeValue,last=0;
    text.replace(re,(m,idx)=>{
      frag.appendChild(document.createTextNode(text.slice(last,idx)));
      const span=document.createElement('span');
      span.className='version-blue';
      span.textContent=m;
      frag.appendChild(span);
      last=idx+m.length;
      return m;
    });
    frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag,node);
  });
}

function render(){
  try{
    renderNav();
    const view=$('view');let html='';
    if(state.page==='calc')html=renderCalc();else if(state.page==='knob')html=renderKnob();else if(state.page==='drawing')html=renderDrawing();else if(state.page==='more')html=renderMore();else html=renderHome();
    view.innerHTML=globalCheckHtml()+html;
    bindFolds();bindInputs();bindActions();bindZoomPreviews();highlightVersionText(document.body);
  }catch(err){
    console.error(err);
    const view=$('view');
    if(view){
      view.innerHTML=`<section class="card check-top check-attn"><h2>頁面載入錯誤</h2><div class="check-main">此頁渲染時發生錯誤，已避免整頁空白。</div><div class="check-meta">錯誤：${esc(err&&err.message?err.message:err)}</div><div class="btn-row"><button class="secondary" data-action="clear-v12">清除 v12 資料</button><button class="secondary" onclick="location.reload()">重新載入</button></div></section>`;
      try{bindActions();}catch(e){}
    }
  }
}
function bindActions(){document.querySelectorAll('[data-calc-type]').forEach(btn=>btn.onclick=()=>{state.calc.type=btn.dataset.calcType;save('製作類型已更新');render();});document.querySelectorAll('[data-knob-style]').forEach(btn=>btn.onclick=()=>{state.knob.style=btn.dataset.knobStyle;save('旋鈕樣式已更新');render();});document.querySelectorAll('[data-knob-template]').forEach(btn=>btn.onclick=()=>{state.knob.template=btn.dataset.knobTemplate;applyTemplateIfNeeded('knob.template');save('規格模板已套用');render();});document.querySelectorAll('[data-drawing-source]').forEach(btn=>btn.onclick=()=>{state.drawing.source=btn.dataset.drawingSource;save('圖紙來源已更新');render();});document.querySelectorAll('[data-bottom-joint]').forEach(btn=>btn.onclick=()=>{state.calc.bottomJoint=btn.dataset.bottomJoint;save('底板接合方式已更新');render();});document.querySelectorAll('[data-layout-mode]').forEach(btn=>btn.onclick=()=>{const m=btn.dataset.layoutMode;state.drawing.layoutMode=m;state.drawing.pieceGap=gapForMode(m);save('排版模式已更新');render();});document.querySelectorAll('[data-manual-rotate-key]').forEach(btn=>btn.onclick=()=>{const map=manualRotateMap(),key=btn.dataset.manualRotateKey,mode=btn.dataset.manualRotateMode;if(mode==='auto')delete map[key];else map[key]=mode;save('手動旋轉已更新');render();});document.querySelectorAll('[data-piece-output-key]').forEach(btn=>btn.onclick=()=>{const map=pieceOutputMap(),key=btn.dataset.pieceOutputKey,mode=btn.dataset.pieceOutputMode;if(mode==='off')map[key]=false;else delete map[key];save(mode==='off'?'板件已設為不輸出':'板件已設為輸出');render();});document.querySelectorAll('[data-edge-key]').forEach(btn=>btn.onclick=()=>{setEdgeModeByKey(btn.dataset.edgeKey,btn.dataset.edgeSide,btn.dataset.edgeMode);save('每邊榫卯已更新');render();});document.querySelectorAll('[data-action]').forEach(btn=>btn.onclick=()=>handleAction(btn.dataset.action,btn));const file=$('jsonFile');if(file)file.onchange=importJson;}

function handleAction(action,btn){if(action==='quick-calc'){state.calc.type=btn.dataset.type;setPage('calc',true);return}if(action==='quick-page'){setPage(btn.dataset.page,true);return}if(action==='piece-output-all'){state.calc.pieceOutput={};save('已恢復全部板件輸出');render();return}if(action==='piece-output-bottom-only'){const map=pieceOutputMap();allCalcPiecesFlattened().forEach(p=>{const key=pieceOutputKey(p);if(String(pieceDisplayName(p)).includes('底板'))delete map[key];else map[key]=false});save('已切換為只輸出底板');render();return}if(action==='reset-edge-modes'){state.calc.edgeModes={};save('已恢復預設榫卯');render();return}if(action==='toggle-summary-detail'){state.ui.summaryDetailOpen=!bool(state.ui.summaryDetailOpen);save(state.ui.summaryDetailOpen?'排版摘要已切到詳細':'排版摘要已切到精簡');render();return}if(action==='toggle-manual-rotate-panel'){state.ui.manualRotateOpen=!bool(state.ui.manualRotateOpen);save(state.ui.manualRotateOpen?'手動旋轉板件已展開':'手動旋轉板件已收合');render();return}if(action==='toggle-auto-rotate'){state.drawing.autoRotate=!bool(state.drawing.autoRotate);save('自動旋轉已更新');render();return}if(action==='clear-manual-rotate'){state.drawing.manualRotate={};save('手動旋轉已全部恢復自動');render();return}if(action==='toggle-safe-frame'){state.drawing.showSafeFrame=!bool(state.drawing.showSafeFrame);save('安全框顯示已更新');render();return}if(action==='toggle-output-only-fit'){state.drawing.outputOnlyFit=!bool(state.drawing.outputOnlyFit);save(state.drawing.outputOnlyFit?'已開啟只輸出可放入板件':'已關閉只輸出可放入板件');render();return}if(action==='save-calc'){save('計算設定已儲存');return}if(action==='apply-drawing-calc'){state.drawing.source='calc';setPage('drawing',true);return}if(action==='apply-drawing-knob'){state.drawing.source='knob';setPage('drawing',true);return}if(action==='refresh-knob-preview'){updateKnobPreview(false);save('旋鈕預覽已套用');return}if(action==='apply-kerf-preset'){state.calc.kerf=0.065;state.knob.kerf=0.065;state.params.kerf='10W 藍光實測：LightBurn 以 20 mm 為基礎製作 10 個獨立方塊，切口偏移設 0；實測總長 98.7～98.8 mm，推算切縫寬約 0.12～0.13 mm；建議軟體切口偏移補償 0.06～0.065 mm。App 內預設採 0.065 mm。';state.params.kerfTest='LightBurn｜20 mm 方塊 × 10 個｜切口偏移 0｜實測總長 98.7～98.8 mm｜推算切縫 0.12～0.13 mm｜補償值 0.06～0.065 mm。';save('已套用 10W 藍光實測切縫預設 0.065 mm');render();return}if(action==='download-current-svg'){if(!downloadGuard(state.drawing.source==='knob'?'knob':'calc','預覽版 SVG'))return;downloadText('mokkou_v12_15_3_8_drawing_preview.svg',state.drawing.source==='knob'?knobBatchSvg({labels:true}):layoutSvg({labels:true,notes:true}),'image/svg+xml');return}if(action==='download-current-svg-clean'){if(!downloadGuard(state.drawing.source==='knob'?'knob':'calc','乾淨 SVG'))return;downloadText('mokkou_v12_15_3_8_drawing_clean.svg',state.drawing.source==='knob'?knobBatchSvg({labels:false}):layoutSvg({labels:false,notes:false}),'image/svg+xml');return}if(action==='download-current-svg-layered'){if(!downloadGuard(state.drawing.source==='knob'?'knob':'calc','分層 SVG'))return;downloadText('mokkou_v12_15_3_8_drawing_layered.svg',state.drawing.source==='knob'?knobBatchSvgLayered():layoutSvgLayered(),'image/svg+xml');return}if(action==='download-knob-svg'){if(!downloadGuard('knob','旋鈕 SVG'))return;downloadText('mokkou_v12_15_3_8_knob.svg',knobSvgPreview(),'image/svg+xml');return}if(action==='download-json'){downloadText('mokkou_v12_15_3_8_backup.json',JSON.stringify(state,null,2),'application/json');return}if(action==='reset-calc'){state.calc=structuredClone(defaults.calc);save('已恢復預設尺寸');render();return}if(action==='clear-v12'){if(confirm('確定清除 v12 本機資料？')){localStorage.removeItem(STORE);state=loadState();save('已清除 v12 資料');render();}}}
function downloadText(name,text,mime){const blob=new Blob([text],{type:mime+';charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);save('已產生下載檔')}
function importJson(e){const file=e.target.files&&e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);state=deepMerge(defaults,data);save('JSON 已匯入');render();}catch(err){alert('JSON 匯入失敗：'+err.message)}};reader.readAsText(file,'utf-8')}
$('topBtn').onclick=()=>window.scrollTo(0,0);

}catch(err){

    view.innerHTML=`<section class="card"><h2>頁面載入錯誤</h2><div class="muted danger">此頁載入時發生錯誤：${esc(err&&err.message?err.message:err)}<br>請先回首頁或清除快取後重開；此錯誤卡片用來避免整頁空白。</div></section>`;
  }
  const note=$('saveNote');
  if(note)note.textContent='本機儲存：載入錯誤，請查看頁面提示';
}
