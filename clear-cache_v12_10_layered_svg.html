<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>清除木工 PWA v12.10 快取</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6efe3;color:#2b2216;margin:0;padding:18px;line-height:1.6}.card{max-width:720px;margin:0 auto;background:#fffaf1;border:1.5px solid #d7bf8c;border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(70,50,20,.08)}button{border:0;background:#20170f;color:#fff;border-radius:14px;padding:13px 16px;font-weight:900;font-size:1rem}code{background:#fff;border:1px solid #eadcc2;border-radius:8px;padding:2px 6px}
</style>
</head>
<body>
<section class="card">
<h1>清除木工 PWA v12.10 快取</h1>
<p>用途：更新 GitHub Pages 後，若手機仍載入舊版，可先執行本頁清除 Service Worker、Cache Storage 與 v12 本機資料。</p>
<p><strong>注意：</strong>這會清除 <code>mokkou_v12_state</code>。若你有重要設定，請先在 App 內匯出 JSON。</p>
<button id="clearBtn">清除快取與 v12 本機資料</button>
<p id="msg"></p>
</section>
<script>
document.getElementById('clearBtn').onclick=async()=>{
  const msg=document.getElementById('msg');
  try{
    localStorage.removeItem('mokkou_v12_state');
    if('caches' in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}
    if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}
    msg.textContent='已清除。請回到 GitHub Pages 網站，重新整理 2 次。';
  }catch(e){msg.textContent='清除時發生錯誤：'+e.message;}
};
</script>
</body>
</html>
