<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我の木工 v12.17.9.27.33 清快取</title>
  <style>
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:#f6f8fb;color:#172033;line-height:1.6}
    main{max-width:720px;margin:0 auto;padding:24px 16px}
    .card{background:#fff;border:1px solid #d8e0ec;border-radius:18px;padding:18px;box-shadow:0 8px 24px rgba(20,40,80,.08)}
    h1{font-size:22px;margin:0 0 12px}
    p{margin:8px 0;color:#40506a}
    button,a{display:inline-block;margin-top:12px;border:0;border-radius:14px;padding:12px 16px;background:#c6ff57;color:#172033;font-weight:800;text-decoration:none;cursor:pointer}
    .muted{font-size:13px;color:#6d7b90}
    .log{margin-top:12px;padding:12px;border-radius:12px;background:#eef3fb;font-size:13px;white-space:pre-wrap}
  </style>
</head>
<body>
<main>
  <section class="card">
    <h1>我の木工 v12.17.9.27.33 清快取</h1>
    <p>用途：手機或瀏覽器還停在舊版時，清除 Cache Storage 與 Service Worker 後再回首頁。</p>
    <p class="muted">此頁不會主動清除 localStorage 或 IndexedDB，避免刪到 App 本機資料。</p>
    <button id="clearBtn">清除快取並回首頁</button>
    <a href="./index.html?v=12_17_9_27_33">直接回首頁</a>
    <div id="log" class="log">尚未執行。</div>
  </section>
</main>
<script>
const log = document.getElementById('log');
document.getElementById('clearBtn').addEventListener('click', async () => {
  const lines = [];
  try {
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      lines.push('Cache Storage 已清除：' + keys.length + ' 組');
    } else {
      lines.push('此瀏覽器不支援 Cache Storage 或無需清除。');
    }
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      lines.push('Service Worker 已解除：' + regs.length + ' 組');
    } else {
      lines.push('此瀏覽器不支援 Service Worker 或無需解除。');
    }
    lines.push('即將返回首頁。');
    log.textContent = lines.join('\n');
    setTimeout(() => { location.href = './index.html?v=12_17_9_27_33_' + Date.now(); }, 600);
  } catch (err) {
    lines.push('清除時發生錯誤：' + (err && err.message ? err.message : err));
    log.textContent = lines.join('\n');
  }
});
</script>
</body>
</html>
