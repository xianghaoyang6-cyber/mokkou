<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>我の木工 PWA v12.17.9.15 清除快取</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6efe3;color:#2b2216;margin:0;padding:18px;line-height:1.6}.card{max-width:720px;margin:0 auto;background:#fffaf1;border:1.5px solid #d7bf8c;border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(70,50,20,.08)}button{width:100%;border:0;border-radius:16px;background:#20170f;color:white;font-weight:950;font-size:1rem;padding:13px;margin-top:12px}.note{background:#fffdf8;border:1.5px dashed #d7bf8c;border-radius:16px;padding:12px;margin-top:12px;font-weight:800;color:#6b5737}.ok{color:#2f6b43;font-weight:950}</style></head><body><div class="card"><h1>我の木工 PWA v12.17.9.15 清除快取</h1><p>更新後若手機仍顯示舊版，可用此頁清除 Service Worker 與快取。</p><button id="clearBtn">清除快取並重新整理</button><div id="result" class="note">尚未執行。</div></div><script>async function clearAll(){const out=document.getElementById('result');out.textContent='清除中…';try{if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches' in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}out.innerHTML='<span class="ok">已清除快取。</span> 2 秒後重新整理。';setTimeout(()=>location.reload(),2000);}catch(e){out.textContent='清除失敗：'+(e&&e.message?e.message:e);}}document.getElementById('clearBtn').onclick=clearAll;</script></body></html>
