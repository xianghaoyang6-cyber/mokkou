<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>我の木工 清除快取</title><style>body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f2e9;color:#2f2618;margin:0;display:grid;place-items:center;min-height:100vh}.card{width:min(92vw,520px);background:#fffaf2;border:1.5px solid #d6bf93;border-radius:24px;padding:24px;box-shadow:0 12px 34px rgba(0,0,0,.35)}button,a{display:inline-block;margin-top:12px;background:#c7a56a;color:#fff;border:1.5px solid #b99256;border-radius:14px;padding:12px 16px;font-weight:800;text-decoration:none}p{color:#6f5b3d;line-height:1.6}.muted{color:#8b7450;font-size:.88rem}</style></head><body><div class="card"><h1>我の木工：清除舊版快取</h1><p id="msg">正在清除舊 Service Worker 與 Cache。這不會刪除你的 localStorage 專案、工具、耗材與備份資料。</p><p class="muted">完成後會回到 PWA v32。</p><a href="./index.html?v=32">直接回到我の木工</a></div><script>(async()=>{const msg=document.getElementById('msg');try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}localStorage.setItem('woodworking_cache_cleared_at_v32',new Date().toISOString());msg.textContent='已清除舊版快取，3 秒後回到 PWA v32。';setTimeout(()=>location.replace('./index.html?v=32&clear='+Date.now()),3000)}catch(e){msg.textContent='清除時發生問題，請直接回到 App 或重新整理。'}})();</script></body></html>
